<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;}
.content{flex:1;padding:40px;}
.topbar{display:flex;justify-content:space-between;margin-bottom:20px;}
input{padding:8px;border:1px solid #d1d5db;border-radius:6px;}
table{width:100%;background:#fff;border-radius:14px;border-collapse:collapse;}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;}
th{background:#f9fafb;}
button{background:#1f2937;color:#fff;border:none;padding:6px 12px;border-radius:6px;}
button.excluir{background:#dc2626;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;}
.modal-content{background:#fff;width:900px;border-radius:16px;padding:24px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Clientes</h1>

<div class="topbar">
<input id="buscaCliente" placeholder="Buscar..." oninput="filtrarTabela()">
<button onclick="abrirNovo()">+ Novo Cliente</button>
</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Email</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Cliente</h3>

<div class="grid">
<input id="nome" placeholder="Nome">
<input id="cpf_cnpj" placeholder="CPF">
<input id="telefone_1" placeholder="Telefone">
<input id="telefone_2" placeholder="Telefone 2">
<input type="date" id="dt_nasc">
<input id="email" placeholder="Email">
<input id="nacionalidade" placeholder="Nacionalidade">
<input id="endereco" placeholder="Endereço">
</div>

<textarea id="observacao" placeholder="Observação"></textarea>

<br><br>
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let idAtual=null;
let dados=[];

const campos=["nome","cpf_cnpj","telefone_1","telefone_2","dt_nasc","email","nacionalidade","endereco","observacao"];

function getPayload(){
const obj={};
campos.forEach(c=>{
const el=document.getElementById(c);
if(el && el.value!=="") obj[c]=el.value;
});
return obj;
}

/* EXIBIÇÃO */
function formatarNome(c){
if(!c.nome) return "";
if(!c.telefone_1) return c.nome;
const t=c.telefone_1.replace(/\D/g,'').slice(-4);
return t?`${c.nome}${t}`:c.nome;
}

/* CPF */
function validarCPF(cpf){
cpf=cpf.replace(/\D/g,'');
if(cpf.length!==11||/^(\d)\1+$/.test(cpf)) return false;
let s=0;
for(let i=0;i<9;i++) s+=cpf[i]*(10-i);
let r=(s*10)%11; if(r===10) r=0;
if(r!=cpf[9]) return false;
s=0;
for(let i=0;i<10;i++) s+=cpf[i]*(11-i);
r=(s*10)%11; if(r===10) r=0;
return r==cpf[10];
}

async function carregar(){
const {data}=await supabaseClient.from("clientes").select("*").order("nome");
dados=data||[];
render(dados);
}

function render(lista){
const tbody=document.getElementById("lista");
tbody.innerHTML="";
lista.forEach(c=>{
tbody.innerHTML+=`
<tr>
<td>${formatarNome(c)}</td>
<td>${c.telefone_1||""}</td>
<td>${c.email||""}</td>
<td>
<button onclick="editar(${c.id})">Editar</button>
<button class="excluir" onclick="excluir(${c.id})">Excluir</button>
</td>
</tr>`;
});
}

function filtrarTabela(){
const t=document.getElementById("buscaCliente").value.toLowerCase();
render(dados.filter(c=>(c.nome||"").toLowerCase().includes(t)));
}

function abrirNovo(){
idAtual=null;
campos.forEach(c=>document.getElementById(c).value="");
modal.style.display="flex";
}

async function editar(id){
idAtual=id;
const {data}=await supabaseClient.from("clientes").select("*").eq("id",id).single();
campos.forEach(c=>document.getElementById(c).value=data[c]||"");
modal.style.display="flex";
}

async function salvar(){

let payload=getPayload();

if(!payload.nome){alert("Nome obrigatório");return;}
if(!payload.telefone_1){alert("Telefone obrigatório");return;}

/* limpa telefone */
const tel=payload.telefone_1.replace(/\D/g,'');
payload.telefone_1=tel;

/* duplicidade nome + telefone */
let q=supabaseClient.from("clientes").select("*")
.eq("nome",payload.nome).eq("telefone_1",tel);

if(idAtual) q=q.neq("id",idAtual);

let {data}=await q;

if(data && data.length){
alert("Cliente já existe");
return;
}

/* CPF opcional */
if(payload.cpf_cnpj){

let cpf=payload.cpf_cnpj.replace(/\D/g,'');

if(!validarCPF(cpf)){
alert("CPF inválido");
return;
}

let qcpf=supabaseClient.from("clientes").select("*").eq("cpf_cnpj",cpf);
if(idAtual) qcpf=qcpf.neq("id",idAtual);

let {data:cpfExist}=await qcpf;

if(cpfExist && cpfExist.length){
alert("CPF já cadastrado");
return;
}

payload.cpf_cnpj=cpf;
}

/* salvar */
if(idAtual){
await supabaseClient.from("clientes").update(payload).eq("id",idAtual);
}else{
await supabaseClient.from("clientes").insert(payload);
}

fecharModal();
carregar();
}

async function excluir(id){
if(!confirm("Excluir?")) return;
await supabaseClient.from("clientes").delete().eq("id",id);
carregar();
}

function fecharModal(){
modal.style.display="none";
}

carregar();

</script>

</body>
</html>
