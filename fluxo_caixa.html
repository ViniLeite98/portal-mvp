<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select,textarea{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{padding:10px;border-bottom:1px solid #eee;}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:350px;
}

.modal-box-large{
width:700px;
max-height:90vh;
overflow:auto;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label style="display:flex;justify-content:space-between;">
Cliente
<button onclick="abrirModalCliente()" style="background:#16a34a;padding:4px 8px;font-size:12px;">+ Novo</button>
</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL CLIENTE -->
<div id="modalCliente" class="modal">
<div class="modal-box modal-box-large">

<h3>Novo Cliente</h3>

<input placeholder="Nome *" id="nome">
<input placeholder="Telefone *" id="telefone_1">

<div style="margin-top:10px;text-align:right;">
<button onclick="fecharModalCliente()">Cancelar</button>
<button onclick="salvarCliente()">Salvar</button>
</div>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[], dadosClientes=[], dadosServicos=[], servicosMap={}

// 🔥 SERVIÇO CORRETO
function nomeServico(s){
if(!s) return ""
if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo} minutos`
if(s.subgrupo) return `${s.grupo} ${s.subgrupo}`
if(s.tempo) return `${s.grupo} ${s.tempo} minutos`
return s.grupo
}

// cliente nome + tel
function nomeCliente(c){
if(!c) return ""
let tel=(c.telefone_1||"").replace(/\D/g,"")
return `${c.nome} ${tel.slice(-4)}`
}

// cálculo
valor.oninput=calc
desconto.oninput=calc
function calc(){
final.value=(valor.value||0)-(desconto.value||0)
}

// carregar dados
async function carregarSelects(){

const {data:clientes}=await supabaseClient.from("clientes").select("*")
dadosClientes=clientes||[]

cliente.innerHTML="<option>Selecione</option>"
clientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${nomeCliente(c)}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
dadosServicos=servicos||[]

servico.innerHTML="<option>Selecione</option>"
servicos.forEach(s=>{
servicosMap[s.id]=s
servico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

// 🔥 valor automático
servico.onchange=()=>{
const s=servicosMap[servico.value]
if(s){
valor.value=s.valor||50
calc()
}
}
}

// lista
async function carregarLista(){
const {data}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]
render()
}

function render(){
lista.innerHTML=""
dados.forEach(r=>{
lista.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${nomeCliente(r.clientes)}</td>
<td>${nomeServico(r.servicos)}</td>
<td>${r.valor}</td>
<td>${r.valor_final}</td>
<td>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>`
})
}

// salvar
async function salvar(){
await supabaseClient.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:valor.value,
desconto:desconto.value,
valor_final:valor.value-desconto.value
})
carregarLista()
}

// cliente modal
function abrirModalCliente(){modalCliente.style.display="flex"}
function fecharModalCliente(){modalCliente.style.display="none"}

async function salvarCliente(){
let nomeVal=nome.value
let tel=telefone_1.value.replace(/\D/g,'')

if(!nomeVal||!tel){alert("Preencha nome e telefone");return}

const {data:novo}=await supabaseClient.from("clientes")
.insert({nome:nomeVal,telefone_1:tel})
.select().single()

fecharModalCliente()
await carregarSelects()
cliente.value=novo.id
}

// excluir
async function excluir(id){
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

carregarSelects()
carregarLista()
</script>

</body>
</html>
