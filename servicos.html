<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviços | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;}
.content{flex:1;padding:40px;}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}

.left-tools input{
padding:8px;
border:1px solid #d1d5db;
border-radius:6px;
width:240px;
}

.right-tools{display:flex;gap:10px;align-items:center;}

.right-tools button{
background:#2563eb;
color:#fff;
border:none;
border-radius:6px;
padding:7px 12px;
cursor:pointer;
}

.btn-novo{background:#1f2937;}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:14px;
overflow:hidden;
}

th,td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
text-align:left;
}

th{
background:#f9fafb;
cursor:pointer;
}

.btn-editar{background:#f59e0b;color:#fff;border:none;border-radius:6px;padding:6px 10px;}
.btn-excluir{background:#dc2626;color:#fff;border:none;border-radius:6px;padding:6px 10px;}

.pagination{
margin-top:20px;
display:flex;
gap:8px;
}

.pagination button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#e5e7eb;
cursor:pointer;
}

.pagination button.active{
background:#2563eb;
color:#fff;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
width:600px;
border-radius:16px;
padding:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}

label{
font-size:12px;
font-weight:600;
margin-bottom:4px;
display:block;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
width:100%;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Serviços</h1>

<div class="topbar">

<div class="left-tools">
<input id="buscaServico" placeholder="Buscar serviço..." oninput="filtrarTabela()">
</div>

<div class="right-tools">
<button onclick="abrirNovo()">+ Novo Serviço</button>

<select id="porPaginaSelect" onchange="mudarPorPagina()">
<option value="5">5</option>
<option value="10" selected>10</option>
<option value="20">20</option>
<option value="todos">Todos</option>
</select>
</div>

</div>

<table>
<thead>
<tr>
<th onclick="ordenar('grupo')">Serviço</th>
<th onclick="ordenar('tempo')">Tempo</th>
<th onclick="ordenar('valor')">Valor</th>
<th onclick="ordenar('comissao')">Comissão</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

<div class="pagination" id="paginacao"></div>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Cadastro Serviço</h3>

<div class="grid">

<div>
<label>Grupo</label>
<select id="grupo">
<option value="">Selecione</option>
<option>Nuru</option>
<option>Vivencia</option>
<option>Four Hands</option>
<option>Fetiche</option>
<option>Podolatria</option>
<option>Pspot</option>
<option>Voyeur</option>
<option>Experiência simultânea no Tantra</option>
<option>Mini Curso Sessão Vivência</option>
</select>
</div>

<div>
<label>Tempo</label>
<select id="tempo">
<option value="">Sem tempo</option>
<option value="30">30</option>
<option value="60">60</option>
<option value="90">90</option>
<option value="120">120</option>
</select>
</div>

<div>
<label>Valor</label>
<input id="valor" type="number">
</div>

<div>
<label>Comissão</label>
<input id="comissao" type="number">
</div>

<div>
<label>Status</label>
<select id="status">
<option value="ativo">ativo</option>
<option value="inativo">inativo</option>
</select>
</div>

</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<!-- ✅ SUPABASE CORRETO -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let dados=[]
let paginaAtual=1
let porPagina=10
let ordem={campo:"grupo",asc:true}
let idAtual=null

async function carregar(){
const {data}=await supabaseClient.from("servicos").select("*")
dados=data||[]
render()
}

function aplicarFiltros(){
const termo=document.getElementById("buscaServico").value.toLowerCase()

let lista=dados.filter(s=>{
return (s.grupo||"").toLowerCase().includes(termo)
})

lista.sort((a,b)=>{
let A=a[ordem.campo]||0
let B=b[ordem.campo]||0
return ordem.asc ? A>B?1:-1 : A<B?1:-1
})

return lista
}

function render(){
const lista=aplicarFiltros()

const inicio=(paginaAtual-1)*porPagina
const pag = porPagina==="todos" ? lista : lista.slice(inicio,inicio+porPagina)

const tbody=document.getElementById("lista")
tbody.innerHTML=""

pag.forEach(s=>{
const nome = s.tempo ? `${s.grupo} ${s.tempo}min` : s.grupo

tbody.innerHTML+=`
<tr>
<td>${nome}</td>
<td>${s.tempo||"-"}</td>
<td>R$ ${Number(s.valor||0).toFixed(2)}</td>
<td>R$ ${Number(s.comissao||0).toFixed(2)}</td>
<td>${s.status}</td>
<td>
<button class="btn-editar" onclick="editar('${s.id}')">Editar</button>
<button class="btn-excluir" onclick="excluir('${s.id}')">Excluir</button>
</td>
</tr>`
})

renderPaginacao(lista.length)
}

function renderPaginacao(total){
const div=document.getElementById("paginacao")
div.innerHTML=""

if(porPagina==="todos") return

const totalPaginas=Math.ceil(total/porPagina)

for(let i=1;i<=totalPaginas;i++){
div.innerHTML+=`<button onclick="irPagina(${i})">${i}</button>`
}
}

function filtrarTabela(){paginaAtual=1;render()}
function ordenar(c){
ordem.campo=c
ordem.asc=!ordem.asc
render()
}
function mudarPorPagina(){
const v=document.getElementById("porPaginaSelect").value
porPagina=v==="todos"?"todos":parseInt(v)
render()
}

function abrirNovo(){
idAtual=null
document.querySelectorAll("#modal input, #modal select").forEach(el=>el.value="")
document.getElementById("modal").style.display="flex"
}

function editar(id){
idAtual=id
const s=dados.find(x=>x.id==id)
document.getElementById("grupo").value=s.grupo
document.getElementById("tempo").value=s.tempo
document.getElementById("valor").value=s.valor
document.getElementById("comissao").value=s.comissao
document.getElementById("status").value=s.status
document.getElementById("modal").style.display="flex"
}

async function salvar(){
const payload={
grupo:grupo.value,
tempo:tempo.value?parseInt(tempo.value):null,
valor:parseFloat(valor.value),
comissao:parseFloat(comissao.value),
status:status.value
}

if(idAtual){
await supabaseClient.from("servicos").update(payload).eq("id",idAtual)
}else{
await supabaseClient.from("servicos").insert(payload)
}

fecharModal()
carregar()
}

function excluir(id){
if(confirm("Excluir?")){
supabaseClient.from("servicos").delete().eq("id",id)
carregar()
}
}

function fecharModal(){
document.getElementById("modal").style.display="none"
}

carregar()

</script>

</body>
</html>
