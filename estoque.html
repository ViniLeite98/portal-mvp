<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Materiais | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:'Segoe UI';background:#f4f6fb;}
.app{display:flex}
.content{flex:1;padding:40px}

.grid{
display:grid;
grid-template-columns: 320px 1fr;
gap:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#334155;
color:#fff;
cursor:pointer;
}

.btn-danger{background:#dc2626;margin-top:5px;}

.lista-linha{
display:flex;
align-items:center;
margin-bottom:12px;
font-size:15px;
}

.nome{white-space:nowrap;}
.pontos{flex:1;border-bottom:1px dashed #999;margin:0 10px;}
.valor{white-space:nowrap;font-weight:500;}

.acoes{
display:flex;
gap:10px;
margin-left:10px;
}

.btn-acao{cursor:pointer;opacity:0;transition:0.2s;}
.lista-linha:hover .btn-acao{opacity:1;}

.btn-edit{color:#2563eb;}
.btn-zerar{color:#f59e0b;}
.btn-delete{color:#dc2626;}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:12px;
width:300px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Materiais</h1>
<p>Controle simples</p>

<div class="grid">

<div class="card">

<h3>Novo Material</h3>

<input id="nome" placeholder="Nome">
<input id="valor" type="number" step="0.01" placeholder="Valor da unidade (R$)">

<button onclick="criarProduto()">Cadastrar</button>

<hr style="margin:15px 0">

<h3>Movimentar</h3>

<select id="produtoMov"></select>
<input id="qtd" type="number" placeholder="Quantidade">

<button onclick="entrada()">+ Entrada</button>
<button class="btn-danger" onclick="saida()">- Saída</button>

</div>

<div class="card">

<div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
  <h3>Estoque</h3>

  <div style="display:flex; gap:10px; align-items:center;">
    <strong>Qtd | Valor</strong>
    <button onclick="exportarExcel()" style="width:auto; padding:6px 12px; font-size:13px;">
      <i class="fa-solid fa-file-excel"></i> Exportar
    </button>
  </div>
</div>

<!-- 🔍 BUSCA + TOTAL -->
<input id="busca" placeholder="🔍 Buscar material..." oninput="filtrarLista()">
<div id="totalEstoque" style="margin:5px 0 15px; font-weight:600;"></div>

<div id="lista"></div>

</div>

</div>

</main>
</div>

<!-- ✏️ MODAL EDITAR -->
<div id="modalEdit" class="modal">
<div class="modal-box">
<h3>Editar Material</h3>
<input id="editNome" placeholder="Nome">
<input id="editValor" type="number" placeholder="Valor">
<button onclick="salvarEdicaoMaterial()">Salvar</button>
<button class="btn-danger" onclick="fecharEdit()">Cancelar</button>
</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

let listaGlobal=[]
let editandoMaterialId=null

async function criarProduto(){
const nome=document.getElementById("nome").value.trim()
const valor=parseFloat(document.getElementById("valor").value)||0
if(!nome){alert("Digite o nome");return}

await supabaseClient.from("produtos").insert({nome,valor})

nome.value=""
valor.value=""

carregar()
}

async function carregar(){

const {data}=await supabaseClient.from("estoque_atual").select("*").order("nome")

listaGlobal=data||[]

renderLista(listaGlobal)

// select
const sel=document.getElementById("produtoMov")
sel.innerHTML=""
data.forEach(p=>{
sel.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
})

}

function renderLista(lista){

const listaDiv=document.getElementById("lista")
listaDiv.innerHTML=""

let totalGeral=0

lista.forEach(p=>{

const total=(p.valor||0)*(p.saldo||0)
totalGeral+=total

listaDiv.innerHTML+=`
<div class="lista-linha">

<span class="nome">${p.nome}</span>
<span class="pontos"></span>

<span class="valor">
${p.saldo} | R$ ${total.toFixed(2)}
</span>

<div class="acoes">
<i class="fa-solid fa-pen btn-acao btn-edit" onclick="abrirEditar('${p.id}','${p.nome}',${p.valor||0})"></i>
<i class="fa-solid fa-xmark btn-acao btn-zerar" onclick="zerar('${p.id}',${p.saldo})"></i>
<i class="fa-solid fa-trash btn-acao btn-delete" onclick="excluir('${p.id}')"></i>
</div>

</div>
`
})

document.getElementById("totalEstoque").innerText=
"💰 Total em estoque: R$ "+totalGeral.toFixed(2)

}

function filtrarLista(){
const termo=document.getElementById("busca").value.toLowerCase()
const filtrado=listaGlobal.filter(p=>p.nome.toLowerCase().includes(termo))
renderLista(filtrado)
}

function abrirEditar(id,nome,valor){
editandoMaterialId=id
document.getElementById("editNome").value=nome
document.getElementById("editValor").value=valor
document.getElementById("modalEdit").style.display="flex"
}

function fecharEdit(){
document.getElementById("modalEdit").style.display="none"
}

async function salvarEdicaoMaterial(){
const nome=document.getElementById("editNome").value
const valor=parseFloat(document.getElementById("editValor").value)||0

await supabaseClient.from("produtos")
.update({nome,valor})
.eq("id",editandoMaterialId)

fecharEdit()
carregar()
}

async function entrada(){
const id=produtoMov.value
const qtd=parseFloat(qtd.value)
if(!qtd)return

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,tipo:"entrada",quantidade:qtd
})

qtd.value=""
carregar()
}

async function saida(){
const id=produtoMov.value
const qtd=parseFloat(qtd.value)
if(!qtd)return

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,tipo:"saida",quantidade:qtd
})

qtd.value=""
carregar()
}

async function zerar(id,saldo){
if(saldo<=0)return
await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,tipo:"saida",quantidade:saldo
})
carregar()
}

async function excluir(id){
if(!confirm("Excluir material?"))return
await supabaseClient.from("produtos").delete().eq("id",id)
carregar()
}

carregar()

</script>

</body>
</html>
