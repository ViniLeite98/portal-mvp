<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f4f6fb;}

.app{display:flex;min-height:100vh;}
#sidebar{width:260px;}
.content{flex:1;padding:40px;}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

.servico{
display:flex;
align-items:center;
gap:8px;
}

.servico i{
color:#6366f1;
}

.icones-terapeuta{
display:flex;
gap:6px;
margin-top:4px;
}

.icones-terapeuta i{
color:#6366f1;
font-size:13px;
opacity:0.9;
}

button{
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.editar{background:#f59e0b;color:#fff;}
.excluir{background:#dc2626;color:#fff;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<table>
<thead>
<tr>
<th>Terapeuta</th>
<th>Certificação</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]

/* NORMALIZAR */
function normalizar(txt){
return txt
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.trim()
}

/* ICONES */
function iconeCertificacao(nome){

if(!nome) return "fa-certificate"

const n = normalizar(nome)

if(n.includes("feminina")) return "fa-person-dress"
if(n.includes("casais")) return "fa-user-group"
if(n.includes("nuru")) return "fa-droplet"
if(n.includes("viv")) return "fa-spa"
if(n.includes("podo")) return "fa-footprints"

return "fa-certificate"
}

/* LISTA */
async function carregarLista(){

const {data}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
cpf_terapeuta,
certificacao_id,
data_obtencao,
terapeutas(nome_profissional),
certificacoes(nome)
`)

dados=data||[]
render()
}

/* RENDER COM AGRUPAMENTO */
function render(lista=dados){

const mapa={}

lista.forEach(r=>{
const nome=r.terapeutas?.nome_profissional||""

if(!mapa[nome]){
mapa[nome]={
terapeuta:nome,
certs:new Set(),
linhas:[]
}
}

const cert=r.certificacoes?.nome||""
mapa[nome].certs.add(cert)
mapa[nome].linhas.push(r)
})

const tbody=document.getElementById("lista")
tbody.innerHTML=""

Object.values(mapa).forEach(grupo=>{

const icones=[...grupo.certs]
.map(c=>`<i class="fa-solid ${iconeCertificacao(c)}"></i>`)
.join("")

grupo.linhas.forEach((r,index)=>{

tbody.innerHTML+=`
<tr>

<td>
<div>
<strong>${index===0?grupo.terapeuta:""}</strong>
<div class="icones-terapeuta">
${index===0?icones:""}
</div>
</div>
</td>

<td>
<div class="servico">
<i class="fa-solid ${iconeCertificacao(r.certificacoes?.nome)}"></i>
${r.certificacoes?.nome||""}
</div>
</td>

<td>${r.data_obtencao||""}</td>

<td>
<button class="editar">Editar</button>
<button class="excluir">Excluir</button>
</td>

</tr>
`
})

})

}

carregarLista()

</script>

</body>
</html>
