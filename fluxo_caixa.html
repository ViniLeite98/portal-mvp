<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabase = supabase.createClient(
  "https://rymehgsoarjeecuwyhny.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

// 🔥 FUNÇÃO CERTA
function nomeCliente(c){
  if(!c) return ""

  const nome = c.nome || ""

  let telefone = c.telefone_1 || c.telefone_2 || ""

  telefone = telefone.toString().replace(/\D/g,"")

  const final = telefone.length >= 4 ? telefone.slice(-4) : ""

  return final ? `${nome} ${final}` : nome
}

let dados=[]

async function carregar(){

const {data}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]

render()

}

function render(){

lista.innerHTML=""

dados.forEach(r=>{
lista.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${nomeCliente(r.clientes)}</td>
<td>${r.origem_lead || "-"}</td>
<td>${r.servicos?.grupo || ""}</td>
<td>${r.valor}</td>
<td>${r.desconto}</td>
<td>${r.valor_final}</td>
<td>-</td>
</tr>
`
})

}

carregar()

</script>

</body>
</html>
