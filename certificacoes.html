<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

h1{margin-top:0}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-box div{
display:flex;
flex-direction:column;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
min-width:200px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

button.excluir{background:#dc2626}
button.editar{background:#f59e0b}
button.salvar{background:#16a34a}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

th{
background:#f9fafb;
text-align:left;
}

.servico{
display:flex;
align-items:center;
gap:8px;
}

.servico i{
margin-left:6px;
color:#6366f1;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:420px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<div class="form-box">

<div>
<label>Terapeuta</label>
<select id="cpf_terapeuta"></select>
</div>

<div>
<label>Certificação</label>
<select id="certificacao_id"></select>
</div>

<div>
<label>Data</label>
<input type="date" id="data_obtencao">
</div>

<button onclick="vincular()">Vincular</button>

</div>

<input 
id="buscaTerapeuta" 
placeholder="Buscar profissional ou certificação..."
oninput="filtrarTabela()"
>

<button onclick="exportarExcel()">Exportar Excel</button>

<br><br>

<table>
<thead>
<tr>
<th>Terapeuta</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL LISTA -->
<div id="modalCerts" class="modal">
<div class="modal-box">
<h3 id="tituloModal"></h3>
<div id="listaCerts"></div>
<br>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let listaFiltrada=[]

function iconeCertificacao(nome){
if(!nome) return "fa-certificate"
nome = nome.toLowerCase()

if(nome.includes("feminina")) return "fa-person-dress"
if(nome.includes("casais")) return "fa-user-group"
if(nome.includes("nuru")) return "fa-droplet"
if(nome.includes("vivência")) return "fa-spa"
if(nome.includes("podologia")) return "fa-shoe-prints"

return "fa-certificate"
}

async function carregarSelects(){

const selTer=document.getElementById("cpf_terapeuta")
const selCert=document.getElementById("certificacao_id")

const {data:terapeutas}=await supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional")
.eq("status","Ativo")

selTer.innerHTML="<option value=''>Selecione</option>"
;(terapeutas||[]).forEach(t=>{
selTer.innerHTML+=`<option value="${t.cpf}">${t.nome_profissional}</option>`
})

const {data:cert}=await supabaseClient
.from("certificacoes")
.select("id,nome")

selCert.innerHTML="<option value=''>Selecione</option>"
;(cert||[]).forEach(c=>{
selCert.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
})

}

async function carregarLista(){

const {data}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
data_obtencao,
certificacoes(nome),
terapeutas(nome_profissional)
`)

dados = data || []
listaFiltrada = [...dados]

render(listaFiltrada)

}

function render(lista){

const agrupado={}

lista.forEach(r=>{
const nome=r.terapeutas?.nome_profissional||"Sem nome"

if(!agrupado[nome]){
agrupado[nome]={nome,certs:[]}
}

agrupado[nome].certs.push(r)
})

const tbody=document.getElementById("lista")
tbody.innerHTML=""

Object.values(agrupado).forEach(t=>{

tbody.innerHTML+=`
<tr>
<td>
<strong>${t.nome}</strong>
</td>

<td>
<button class="editar" onclick="abrirModal('${t.nome}')">Editar</button>
</td>
</tr>
`
})
}

function filtrarTabela(){

const termo = document
.getElementById("buscaTerapeuta")
.value
.toLowerCase()

if(!termo){
listaFiltrada = [...dados]
render(listaFiltrada)
return
}

listaFiltrada = dados.filter(d => {

const nome = (d.terapeutas?.nome_profissional || "").toLowerCase()
const cert = (d.certificacoes?.nome || "").toLowerCase()

return nome.includes(termo) || cert.includes(termo)

})

render(listaFiltrada)

}

function abrirModal(nome){

const registros = dados.filter(d =>
d.terapeutas?.nome_profissional === nome
)

document.getElementById("tituloModal").innerText = nome

let html=""

registros.forEach(r=>{
html+=`
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

<span style="flex:1">${r.certificacoes?.nome}</span>

<input 
type="date" 
value="${r.data_obtencao || ""}" 
id="data_${r.id}"
style="margin:0 10px"
onchange="destacar(this)"
>

<div>
<button class="salvar" onclick="salvarLinha('${r.id}')">Salvar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</div>

</div>
`
})

document.getElementById("listaCerts").innerHTML=html
document.getElementById("modalCerts").style.display="flex"
}

function destacar(input){
input.style.border="2px solid orange"
}

function fecharModal(){
document.getElementById("modalCerts").style.display="none"
}

async function salvarLinha(id){

const novaData = document.getElementById(`data_${id}`).value

if(!novaData){
alert("Selecione uma data")
return
}

await supabaseClient
.from("terapeuta_certificacoes")
.update({data_obtencao:novaData})
.eq("id",id)

carregarLista()
}

async function vincular(){

const cpf=document.getElementById("cpf_terapeuta").value
const cert=document.getElementById("certificacao_id").value
const data=document.getElementById("data_obtencao").value

if(!cpf||!cert){
alert("Selecione terapeuta e certificação")
return
}

await supabaseClient
.from("terapeuta_certificacoes")
.insert({
cpf_terapeuta:cpf,
certificacao_id:cert,
data_obtencao:data||null
})

carregarLista()
}

async function excluir(id){

if(!confirm("Excluir vínculo?")) return

await supabaseClient
.from("terapeuta_certificacoes")
.delete()
.eq("id",id)

carregarLista()
}

function exportarExcel(){

const exportData = dados.map(r => ({
Terapeuta: r.terapeutas?.nome_profissional,
Certificacao: r.certificacoes?.nome,
Data: r.data_obtencao
}))

const ws = XLSX.utils.json_to_sheet(exportData)
const wb = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb, ws, "Certificacoes")

XLSX.writeFile(wb, "certificacoes.xlsx")
}

carregarSelects()
carregarLista()

</script>

</body>
</html>
