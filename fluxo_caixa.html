<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select,textarea{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:350px;
}

/* 🔥 modal cliente */
.modal-box-large{
width:700px;
max-height:90vh;
overflow:auto;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<!-- 🔥 CLIENTE COM BOTÃO -->
<div class="field">
<label style="display:flex;justify-content:space-between;align-items:center;">
Cliente
<button type="button" onclick="abrirModalCliente()" style="padding:4px 8px;font-size:12px;background:#16a34a;">
+ Novo
</button>
</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<div class="form-box">

<div class="field">
<label>Data Inicial</label>
<input type="date" id="filtroInicio">
</div>

<div class="field">
<label>Data Final</label>
<input type="date" id="filtroFim">
</div>

<div class="field">
<label>Cliente</label>
<select id="filtroCliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="filtroServico"></select>
</div>

<button onclick="filtrar()">Filtrar</button>
<button onclick="limparFiltro()">Limpar</button>
<button onclick="exportarExcel()">Exportar Excel</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- 🔥 MODAL EDITAR -->
<div id="modalEditar" class="modal">
<div class="modal-box">

<h3>Editar</h3>

<label>Data</label>
<input type="date" id="editData">

<label>Cliente</label>
<select id="editCliente"></select>

<label>Serviço</label>
<select id="editServico"></select>

<label>Origem</label>
<select id="editOrigem"></select>

<label>Valor</label>
<input type="number" id="editValor">

<label>Desconto</label>
<input type="number" id="editDesconto">

<br><br>

<button onclick="salvarEdicao()">Salvar</button>
<button class="excluir" onclick="fecharModal()">Cancelar</button>

</div>
</div>

<!-- 🔥 MODAL NOVO CLIENTE -->
<div id="modalCliente" class="modal">
<div class="modal-box modal-box-large">

<h3>Novo Cliente</h3>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">

<input placeholder="Nome *" id="nome">
<input placeholder="CPF/CNPJ" id="cpf_cnpj">
<input placeholder="Telefone 1 *" id="telefone_1">
<input placeholder="Telefone 2" id="telefone_2">
<input type="date" id="dt_nasc">
<input placeholder="Email" id="email">
<input placeholder="Nacionalidade" id="nacionalidade">
<input placeholder="Endereço" id="endereco">

</div>

<textarea placeholder="Observação" id="observacao" style="margin-top:10px;width:100%"></textarea>

<div style="margin-top:15px;text-align:right;">
<button onclick="fecharModalCliente()">Cancelar</button>
<button onclick="salvarCliente()">Salvar</button>
</div>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

function nomeCliente(c){
if(!c) return ""
const nome=c.nome||""
let telefone=(c.telefone_1||"").replace(/\D/g,"")
const final=telefone.slice(-4)
return final?`${nome} ${final}`:nome
}

let dados=[],dadosClientes=[],dadosServicos=[],servicosMap={},editandoId=null

valor.oninput=()=>final.value=valor.value-desconto.value
desconto.oninput=()=>final.value=valor.value-desconto.value

async function carregarSelects(){
const {data:clientes}=await supabaseClient.from("clientes").select("*")
dadosClientes=clientes||[]
cliente.innerHTML="<option value=''>Selecione</option>"
dadosClientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${nomeCliente(c)}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
dadosServicos=servicos||[]
servico.innerHTML="<option value=''>Selecione</option>"
dadosServicos.forEach(s=>{
servicosMap[s.id]=s
servico.innerHTML+=`<option value="${s.id}">${s.grupo}</option>`
})
}

async function carregarLista(){
const {data}=await supabaseClient.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})
dados=data||[]
render()
}

function render(){
lista.innerHTML=""
dados.forEach(r=>{
lista.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${nomeCliente(r.clientes)}</td>
<td>${r.origem_lead||"-"}</td>
<td>${r.servicos?.grupo||""}</td>
<td>${r.valor}</td>
<td>${r.desconto}</td>
<td>${r.valor_final}</td>
<td>
<button class="editar" onclick="abrirEditar('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>`
})
}

function abrirEditar(id){
editandoId=id
const r=dados.find(d=>d.id==id)
editData.value=r.data
editValor.value=r.valor
editDesconto.value=r.desconto
modalEditar.style.display="flex"
}

function fecharModal(){modalEditar.style.display="none"}

async function salvar(){
await supabaseClient.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:valor.value,
desconto:desconto.value,
valor_final:valor.value-desconto.value
})
carregarLista()
}

// 🔥 CLIENTE MODAL
function abrirModalCliente(){
document.querySelectorAll("#modalCliente input, #modalCliente textarea")
.forEach(i=>i.value="")
modalCliente.style.display="flex"
}

function fecharModalCliente(){
modalCliente.style.display="none"
}

async function salvarCliente(){
let payload={}
document.querySelectorAll("#modalCliente input, #modalCliente textarea")
.forEach(i=>{ if(i.id && i.value) payload[i.id]=i.value })

if(!payload.nome||!payload.telefone_1){
alert("Nome e telefone obrigatórios")
return
}

payload.telefone_1=payload.telefone_1.replace(/\D/g,'')

const {data:novo}=await supabaseClient.from("clientes").insert(payload).select().single()

fecharModalCliente()
await carregarSelects()

if(novo) cliente.value=novo.id
}

async function excluir(id){
if(!confirm("Excluir?"))return
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

carregarSelects()
carregarLista()

</script>

</body>
</html>
