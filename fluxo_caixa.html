// 🔥 NOME DO SERVIÇO CORRETO
function nomeServico(s){
if(!s) return ""
if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo} minutos`
if(s.subgrupo) return `${s.grupo} ${s.subgrupo}`
if(s.tempo) return `${s.grupo} ${s.tempo} minutos`
return s.grupo
}

function hoje(){
const d=new Date()
const offset=d.getTimezoneOffset()
return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

data.value=hoje()

// 🔥 CALCULO NOVO
function calcular(){
final.value=(parseFloat(valor.value||0)-parseFloat(desconto.value||0))
}
valor.oninput=calcular
desconto.oninput=calcular

// 🔥 CALCULO EDIÇÃO
function calcularEdit(){
editFinal.value=(parseFloat(editValor.value||0)-parseFloat(editDesconto.value||0))
}
editValor.oninput=calcularEdit
editDesconto.oninput=calcularEdit

function formatar(v){
return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

// 🔥 CARREGAR SELECTS
async function carregarSelects(){

const {data:clientes}=await supabaseClient.from("clientes").select("*")
dadosClientes=clientes||[]

cliente.innerHTML="<option value=''>Selecione</option>"
filtroCliente && (filtroCliente.innerHTML="<option value=''>Todos</option>")

dadosClientes.forEach(c=>{

cliente.innerHTML+=`<option value="${c.id}">${nome}</option>`
if(filtroCliente) filtroCliente.innerHTML+=`<option value="${c.id}">${nome}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
dadosServicos=servicos||[]

servico.innerHTML="<option value=''>Selecione</option>"
if(filtroServico) filtroServico.innerHTML="<option value=''>Todos</option>"

dadosServicos.forEach(s=>{
servicosMap[s.id]=s
const nome = nomeServico(s)
servico.innerHTML+=`<option value="${s.id}">${nome}</option>`
if(filtroServico) filtroServico.innerHTML+=`<option value="${s.id}">${nome}</option>`
})

// 🔥 AUTO PREENCHER VALOR
servico.addEventListener("change",()=>{
const s=servicosMap[servico.value]
if(s){
valor.value=s.valor || 0
calcular()
}
})

}

// 🔥 CARREGAR LISTA
async function carregarLista(){

const {data}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]
render(dados)
}

// 🔥 RENDER
function render(lista){

listaAtual=lista

const tbody=document.getElementById("lista")
tbody.innerHTML=""

lista.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${r.clientes?.nome||r.clientes?.nome_cliente}</td>
<td>${r.origem_lead || "-"}</td>
<td>${nomeServico(r.servicos)}</td>
<td>${formatar(r.valor)}</td>
<td>${formatar(r.desconto)}</td>
<td><strong>${formatar(r.valor_final)}</strong></td>
<td>
<button class="editar" onclick="abrirEditar('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>
`
})
}

// 🔥 ABRIR MODAL
function abrirEditar(id){

const r=dados.find(d=>d.id==id)

editCliente.innerHTML="<option value=''>Selecione</option>"
dadosClientes.forEach(c=>{
const nome=c.nome||c.nome_cliente
editCliente.innerHTML+=`<option value="${c.id}">${nome}</option>`
})

editServico.innerHTML="<option value=''>Selecione</option>"
dadosServicos.forEach(s=>{
editServico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

editData.value=r.data
editCliente.value=r.cliente_id
editServico.value=r.servico_id
editValor.value=r.valor
editDesconto.value=r.desconto
editOrigem.value=r.origem_lead || ""

calcularEdit()

modalEditar.style.display="flex"
}

// 🔥 SALVAR NOVO
async function salvar(){

await supabaseClient.from("fluxo_caixa").insert({

// 🔥 SALVAR EDIÇÃO
async function salvarEdicao(){

await supabaseClient.from("fluxo_caixa").update({

cliente_id:editCliente.value,
servico_id:editServico.value,
valor:parseFloat(editValor.value||0),
desconto:parseFloat(editDesconto.value||0),
valor_final:parseFloat(editValor.value||0)-parseFloat(editDesconto.value||0),
origem_lead: editOrigem.value || null
}).eq("id",editandoId)

fecharModal()
carregarLista()
}

// 🔥 FECHAR
function fecharModal(){
modalEditar.style.display="none"
}

// 🔥 EXCLUIR
async function excluir(id){
if(!confirm("Excluir?")) return
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

// INIT
carregarSelects()
carregarLista()
calcular()
