<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<!-- 🔥 1. SUPABASE PRIMEIRO -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* SEU CSS ORIGINAL */
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">
<h1>Gestão da Equipe</h1>
</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<!-- SEU FORM CONTINUA IGUAL -->
</div>
</div>

<!-- 🔥 2. AQUI CRIA O CLIENT (SUBSTITUI SUA ANON KEY) -->
<script>
const SUPABASE_URL = "https://rymehgsoarjeecuwyhny.supabase.co";

const SUPABASE_ANON_KEY = "SUA_ANON_KEY_AQUI";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);
</script>

<!-- 🔥 3. SIDEBAR DEPOIS -->
<script src="assets/sidebar/sidebar.js"></script>

<!-- 🔥 4. SEU SCRIPT ORIGINAL (INALTERADO) -->
<script>

let cpfAtual=null;

const campos=[
"nome_completo","nome_profissional","cpf","rg","nascimento","email",
"tipo_sanguineo","telefone","telefone_emer","cep","rua","numero",
"complemento","bairro","cidade","uf","pix_tipo","pix_chave",
"cargo","tem_folga","dia_folga",
"hora_entrada","hora_saida","data_inicio","status"
];

function getPayload(){
const obj={};
campos.forEach(c=>{
const el=document.getElementById(c);
if(el && el.value!=="") obj[c]=el.value;
});
return obj;
}

function setForm(data){
campos.forEach(c=>{
const el=document.getElementById(c);
if(el){
if(c==="hora_entrada" || c==="hora_saida"){
el.value=data[c]?data[c].substring(0,5):"";
}else{
el.value=data[c]||"";
}
}
});
}

async function carregar(){

const statusFiltro = document.getElementById("filtroStatus")?.value;

let query = supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional,status,cargo")
.order("nome_profissional");

if(statusFiltro) query = query.eq("status", statusFiltro);

const {data,error}=await query;

if(error){ console.error(error); return; }

const tbody=document.getElementById("lista");
if(!tbody) return;

tbody.innerHTML="";

data.forEach(t=>{
tbody.innerHTML+=`
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>`;
});
}

async function editar(cpf){

cpfAtual=cpf;

const {data,error}=await supabaseClient
.from("terapeutas")
.select("*")
.eq("cpf",cpf)
.single();

if(error){console.error(error);return;}

setForm(data);

document.getElementById("modal").style.display="flex";
}

async function salvar(){

const payload=getPayload();

if(!payload.nome_completo||!payload.nome_profissional||!payload.email){
alert("Preencha os campos obrigatórios");
return;
}

let error;

if(cpfAtual){

delete payload.cpf;

({error}=await supabaseClient
.from("terapeutas")
.update(payload)
.eq("cpf",cpfAtual));

}else{

({error}=await supabaseClient
.from("terapeutas")
.insert(payload));

}

if(error){
console.error(error);
alert("Erro ao salvar");
return;
}

fecharModal();
carregar();
}

async function excluir(cpf){
if(!confirm("Excluir registro?"))return;

await supabaseClient
.from("terapeutas")
.delete()
.eq("cpf",cpf);

carregar();
}

function fecharModal(){
document.getElementById("modal").style.display="none";
}

carregar();

</script>

</body>
</html>
