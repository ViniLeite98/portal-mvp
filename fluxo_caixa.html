<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:350px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

function nomeCliente(c){
  if(!c) return ""
  const nome = c.nome || ""
  let telefone = (c.telefone_1 || "").replace(/\D/g,"")
  const final = telefone.slice(-4)
  return final ? `${nome} ${final}` : nome
}

let dados=[]
let editandoId=null

function hoje(){
const d=new Date()
const offset=d.getTimezoneOffset()
return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

data.value=hoje()

valor.oninput=calcular
desconto.oninput=calcular

function calcular(){
final.value=(parseFloat(valor.value||0)-parseFloat(desconto.value||0))
}

async function carregarSelects(){

setTimeout(() => {

$('#cliente').select2({
placeholder:"Buscar cliente (nome ou telefone)",
width:'200px',
minimumInputLength:2,
ajax:{
delay:300,
transport: async function(params, success, failure){

const busca = params.data.q || ""

// separa texto e número
const texto = busca.replace(/[0-9]/g, "").trim()
const numero = busca.replace(/\D/g, "").slice(-4)

let query = client
  .from("clientes")
  .select("id,nome,telefone_1")

if (texto && numero) {
  query = query
    .ilike("nome", `%${texto}%`)
    .ilike("telefone_1", `%${numero}%`)
} else if (texto) {
  query = query.ilike("nome", `%${texto}%`)
} else if (numero) {
  query = query.ilike("telefone_1", `%${numero}%`)
}

const { data, error } = await query
  .order("nome")
  .limit(20)

if(error){failure(error);return}

const results=(data||[]).map(c=>{
let tel=(c.telefone_1||"").replace(/\D/g,"")
let final=tel.slice(-4)

return{
id:c.id,
text: final ? `${c.nome} ${final}` : c.nome
}
})

success({results})

}
}
})

},200)

}

async function carregarLista(){

const {data}=await client
.from("fluxo_caixa")
.select(`*,clientes(*)`)
.order("data",{ascending:false})

dados=data||[]
render(dados)
}

function render(lista){

const tbody=document.getElementById("lista")
tbody.innerHTML=""

lista.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${nomeCliente(r.clientes)}</td>
<td>${r.origem_lead || "-"}</td>
<td>${r.valor}</td>
<td>${r.desconto}</td>
<td>${r.valor_final}</td>
</tr>
`
})
}

async function salvar(){

await client.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
valor:parseFloat(valor.value||0),
desconto:parseFloat(desconto.value||0),
valor_final:parseFloat(valor.value||0)-parseFloat(desconto.value||0)
})

carregarLista()
}

carregarSelects()
carregarLista()
calcular()

</script>

</body>
</html>
