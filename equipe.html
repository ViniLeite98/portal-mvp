<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* (SEU CSS INTACTO — NÃO ALTEREI NADA) */
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<div class="top-actions">

<input 
type="text"
id="pesquisaNome"
placeholder="Pesquisar profissional..."
onkeyup="filtrarTabela()"
>

<select id="filtroStatus">
<option value="">Todos</option>
<option value="Ativo">Ativo</option>
<option value="Inativo">Inativo</option>
</select>

<button onclick="abrirNovo()">+ Novo Cadastro</button>

</div>

<table>
<thead>
<tr>
<th>Nome Profissional</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<!-- 🔥 SEU FORM COMPLETO CONTINUA IGUAL (NÃO ALTEREI NADA) -->

</div>
</div>

<!-- 🔥 AQUI ESTÁ A MUDANÇA -->

<script src="assets/js/supabase.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

// 🔥 TROCA DA ANON KEY (SEM QUEBRAR NADA)
const supabaseClient = window.client;

let cpfAtual=null;

const campos=[
"nome_completo","nome_profissional","cpf","rg","nascimento","email",
"tipo_sanguineo","telefone","telefone_emer","cep","rua","numero",
"complemento","bairro","cidade","uf","pix_tipo","pix_chave",
"cargo","tem_folga","dia_folga",
"hora_entrada","hora_saida","data_inicio","status"
];

function getPayload(){
const obj={};
campos.forEach(c=>{
const el=document.getElementById(c);
if(el && el.value!=="") obj[c]=el.value;
});
return obj;
}

function setForm(data){
campos.forEach(c=>{
const el=document.getElementById(c);
if(el){
if(c==="hora_entrada" || c==="hora_saida"){
el.value=data[c]?data[c].substring(0,5):"";
}else{
el.value=data[c]||"";
}
}
});
}

async function carregar(){

const statusFiltro = document.getElementById("filtroStatus").value;

let query = supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional,status,cargo")
.order("nome_profissional");

if(statusFiltro) query = query.eq("status", statusFiltro);

const {data,error}=await query;

if(error){ console.error(error); return; }

const tbody=document.getElementById("lista");
tbody.innerHTML="";

data.forEach(t=>{
tbody.innerHTML+=`
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>`;
});

filtrarTabela();
}

function filtrarTabela(){

const filtro = document.getElementById("pesquisaNome").value.toLowerCase();
const linhas = document.querySelectorAll("#lista tr");

linhas.forEach(linha=>{
const nome = linha.children[0].innerText.toLowerCase();

if(nome.includes(filtro)){
linha.style.display="";
}else{
linha.style.display="none";
}
});
}

function abrirNovo(){
cpfAtual=null;
campos.forEach(c=>{
const el=document.getElementById(c);
if(el) el.value="";
});
document.getElementById("hora_entrada").value="09:00";
document.getElementById("hora_saida").value="18:00";

const cpfEl = document.getElementById("cpf");
if(cpfEl) cpfEl.disabled = false;

document.getElementById("modal").style.display="flex";
}

async function editar(cpf){

cpfAtual=cpf;

const {data,error}=await supabaseClient
.from("terapeutas")
.select("*")
.eq("cpf",cpf)
.single();

if(error){console.error(error);return;}

setForm(data);

const cpfEl = document.getElementById("cpf");
if(cpfEl) cpfEl.disabled = true;

document.getElementById("modal").style.display="flex";
}

async function salvar(){

const payload=getPayload();

if(!payload.nome_completo||!payload.nome_profissional||!payload.email){
alert("Preencha os campos obrigatórios");
return;
}

let error;

if(cpfAtual){

delete payload.cpf;

({error}=await supabaseClient
.from("terapeutas")
.update(payload)
.eq("cpf",cpfAtual));

}else{

({error}=await supabaseClient
.from("terapeutas")
.insert(payload));

}

if(error){
console.error(error);
alert("Erro ao salvar");
return;
}

fecharModal();
carregar();
}

async function excluir(cpf){
if(!confirm("Excluir registro?"))return;

await supabaseClient
.from("terapeutas")
.delete()
.eq("cpf",cpf);

carregar();
}

function fecharModal(){
document.getElementById("modal").style.display="none";
}

document.getElementById("filtroStatus").addEventListener("change", carregar);

carregar();

</script>

</body>
</html>
