<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.left-tools input{padding:8px;border:1px solid #d1d5db;border-radius:6px;width:260px;}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;font-size:14px;text-align:left;}
th{background:#f9fafb;font-weight:600;}

button{background:#1f2937;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;}
button.excluir{background:#dc2626;}

.pagination{margin-top:20px;display:flex;gap:10px;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Clientes</h1>

<div class="topbar">
<div class="left-tools">
<input id="buscaCliente" placeholder="Buscar cliente..." oninput="filtrarTabela()">
</div>

<div class="top-actions">
<button onclick="abrirNovo()">+ Novo Cliente</button>
</div>
</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Email</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

<div class="pagination">
<button onclick="paginaAnterior()">⬅️ Anterior</button>
<button onclick="proximaPagina()">Próximo ➡️</button>
</div>

</main>
</div>

<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let idAtual=null;
let pagina=0;
const limite=50;

const campos=[
"nome","cpf_cnpj","telefone_1","telefone_2",
"dt_nasc","email","nacionalidade","endereco","observacao"
];

/* ================= LOAD ================= */

async function carregar(){

const {data,error}=await supabaseClient
.from("clientes")
.select("*")
.order("nome")
.range(pagina*limite, (pagina+1)*limite-1);

if(error){
console.error(error);
return;
}

render(data);
}

/* ================= RENDER ================= */

function render(lista){
const tbody=document.getElementById("lista");
tbody.innerHTML="";

lista.forEach(c=>{
tbody.innerHTML+=`
<tr>
<td>${formatarNome(c)}</td>
<td>${c.telefone_1||""}</td>
<td>${c.email||""}</td>
<td>
<button onclick="editar('${c.id}')">Editar</button>
<button class="excluir" onclick="excluir('${c.id}')">Excluir</button>
</td>
</tr>
`;
});
}

/* ================= FORMATAÇÃO ================= */

function formatarNome(c){
if(!c.nome) return "";

const telefone=(c.telefone_1||"").replace(/\D/g,'');
const final=telefone.slice(-4);

return final ? `${c.nome} ${final}` : c.nome;
}

/* ================= BUSCA ================= */

async function filtrarTabela(){

const termo=document.getElementById("buscaCliente").value;

if(!termo){
pagina=0;
carregar();
return;
}

const {data}=await supabaseClient
.from("clientes")
.select("*")
.ilike("nome", `%${termo}%`)
.limit(50);

render(data);
}

/* ================= PAGINA ================= */

function proximaPagina(){
pagina++;
carregar();
}

function paginaAnterior(){
if(pagina>0){
pagina--;
carregar();
}
}

/* ================= CRUD ================= */

function abrirNovo(){
idAtual=null;
campos.forEach(c=>{
const el=document.getElementById(c);
if(el) el.value="";
});
modal.style.display="flex";
}

async function editar(id){
idAtual=id;

const {data,error}=await supabaseClient
.from("clientes")
.select("*")
.eq("id",id)
.single();

if(error){
console.error(error);
return;
}

campos.forEach(c=>{
const el=document.getElementById(c);
if(el) el.value=data[c]||"";
});

modal.style.display="flex";
}

async function salvar(){

let payload={};

campos.forEach(c=>{
const el=document.getElementById(c);
if(el && el.value!=="") payload[c]=el.value;
});

if(!payload.nome){ alert("Nome obrigatório"); return; }
if(!payload.telefone_1){ alert("Telefone obrigatório"); return; }

payload.telefone_1 = payload.telefone_1.replace(/\D/g,'');

let query = supabaseClient
.from("clientes")
.select("*")
.eq("nome", payload.nome)
.eq("telefone_1", payload.telefone_1);

if(idAtual){
query=query.neq("id",idAtual);
}

const {data:existente}=await query;

if(existente && existente.length>0){
alert("Cliente já existe");
return;
}

let error;

if(idAtual){
({error}=await supabaseClient.from("clientes").update(payload).eq("id",idAtual));
}else{
({error}=await supabaseClient.from("clientes").insert(payload));
}

if(error){
console.error(error);
alert("Erro ao salvar");
return;
}

fecharModal();
carregar();
}

async function excluir(id){
if(!confirm("Excluir cliente?")) return;

await supabaseClient.from("clientes").delete().eq("id",id);
carregar();
}

function fecharModal(){
modal.style.display="none";
}

/* ================= INIT ================= */

carregar();

</script>

</body>
</html>
