<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.left-tools input{padding:8px;border:1px solid #d1d5db;border-radius:6px;width:260px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;font-size:14px;text-align:left;}
th{background:#f9fafb;font-weight:600;}
button{background:#1f2937;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;}
button.excluir{background:#dc2626;}
.top-actions{display:flex;gap:10px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:500px;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Clientes</h1>

<div class="topbar">
<div class="left-tools">
<input id="buscaCliente" placeholder="Buscar..." oninput="filtrarTabela()">
</div>

<div class="top-actions">
<button onclick="exportarExcel()">📊 Exportar Excel</button>
<button onclick="abrirNovo()">+ Novo Cliente</button>
</div>
</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Email</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<input id="nome" placeholder="Nome"><br><br>
<input id="telefone_1" placeholder="Telefone"><br><br>
<input id="email" placeholder="Email"><br><br>

<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

const modal = document.getElementById("modal");

let idAtual=null;

/* LOAD */
async function carregar(){
const {data}=await supabaseClient
.from("clientes")
.select("*")
.order("nome")
.limit(50);

render(data);
}

/* 🔥 RENDER AJUSTADO */
function render(lista){
const tbody=document.getElementById("lista");
tbody.innerHTML="";

lista.forEach(c=>{

let telefone = (c.telefone_1 || "").replace(/\D/g,'');
let finalTelefone = telefone.slice(-4);

let nomeFormatado = c.nome;
if(finalTelefone){
nomeFormatado = `${c.nome}${finalTelefone}`;
}

tbody.innerHTML+=`
<tr>
<td>${nomeFormatado}</td>
<td>${c.telefone_1||""}</td>
<td>${c.email||""}</td>
<td>
<button onclick="editar('${c.id}')">Editar</button>
<button class="excluir" onclick="excluir('${c.id}')">Excluir</button>
</td>
</tr>
`;
});
}

/* BUSCA */
async function filtrarTabela(){

const termo = document.getElementById("buscaCliente").value.trim();

if(!termo){
carregar();
return;
}

let query = supabaseClient.from("clientes").select("*");
query = query.ilike("nome", `%${termo}%`);

const { data } = await query.limit(50);

render(data);
}

/* 🔥 EXPORTAR TODOS */
async function exportarExcel(){

let todos = [];
let ultimoId = 0;
const limite = 1000;

while(true){

const { data } = await supabaseClient
.from("clientes")
.select("*")
.gt("id", ultimoId)
.order("id")
.limit(limite);

if(!data || data.length === 0) break;

todos = todos.concat(data);
ultimoId = data[data.length - 1].id;

if(data.length < limite) break;
}

const formatado = todos.map(c => ({
Nome: c.nome,
Telefone: c.telefone_1,
Email: c.email
}));

const ws = XLSX.utils.json_to_sheet(formatado);
const wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, ws, "Clientes");

XLSX.writeFile(wb, "clientes.xlsx");
}

/* CRUD */

function abrirNovo(){
idAtual=null;
document.querySelectorAll("input").forEach(i=>i.value="");
modal.style.display="flex";
}

async function editar(id){
idAtual=id;
const {data}=await supabaseClient.from("clientes").select("*").eq("id",id).single();

document.getElementById("nome").value=data.nome;
document.getElementById("telefone_1").value=data.telefone_1;
document.getElementById("email").value=data.email;

modal.style.display="flex";
}

async function salvar(){

let nome=document.getElementById("nome").value;
let telefone=document.getElementById("telefone_1").value;
let email=document.getElementById("email").value;

if(!nome || !telefone){
alert("Nome e telefone obrigatórios");
return;
}

telefone = telefone.replace(/\D/g,'');

if(idAtual){
await supabaseClient.from("clientes").update({nome, telefone_1:telefone, email}).eq("id",idAtual);
}else{
await supabaseClient.from("clientes").insert({nome, telefone_1:telefone, email});
}

fecharModal();
carregar();
}

async function excluir(id){
if(!confirm("Excluir?")) return;

await supabaseClient.from("clientes").delete().eq("id",id);
carregar();
}

function fecharModal(){
modal.style.display="none";
}

carregar();

</script>

</body>
</html>
