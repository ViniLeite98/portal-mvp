<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Materiais | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

.app{display:flex}
.content{flex:1;padding:40px}

.grid{
display:grid;
grid-template-columns: 320px 1fr;
gap:30px;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#334155;
color:#fff;
cursor:pointer;
}

.btn-danger{
background:#dc2626;
margin-top:5px;
}

/* LISTA */
.categoria-titulo{
margin-top:15px;
font-weight:bold;
color:#111827;
}

.lista-linha{
display:flex;
align-items:center;
margin-bottom:10px;
font-size:15px;
position:relative;
}

.nome{
white-space:nowrap;
}

.pontos{
flex:1;
border-bottom:1px dashed #999;
margin:0 10px;
}

.valor{
white-space:nowrap;
font-weight:500;
}

.btn-delete{
opacity:0;
margin-left:10px;
cursor:pointer;
color:#dc2626;
transition:0.2s;
}

.lista-linha:hover .btn-delete{
opacity:1;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Materiais</h1>
<p>Controle simples</p>

<div class="grid">

<!-- ESQUERDA -->
<div class="card">

<h3>Novo Material</h3>

<input id="nome" placeholder="Nome do material">

<select id="categoria">
<option value="">Categoria</option>
<option>Higiene</option>
<option>Bebida</option>
<option>Alimento</option>
<option>Outros</option>
</select>

<button onclick="criarProduto()">Cadastrar</button>

<hr style="margin:15px 0">

<h3>Movimentar</h3>

<select id="produtoMov"></select>
<input id="qtd" type="number" placeholder="Quantidade">

<button onclick="entrada()">+ Entrada</button>
<button class="btn-danger" onclick="saida()">- Saída</button>

</div>

<!-- DIREITA -->
<div class="card">

<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
  <h3>Estoque</h3>
  <strong>Quantidade</strong>
</div>

<div id="lista"></div>

</div>

</div>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

async function criarProduto(){

const nome = document.getElementById("nome").value.trim()
const categoria = document.getElementById("categoria").value

if(!nome){
alert("Digite o nome")
return
}

await supabaseClient.from("produtos").insert({
nome,
categoria
})

document.getElementById("nome").value=""
document.getElementById("categoria").value=""

carregar()
}

async function carregar(){

const {data} = await supabaseClient
.from("estoque_atual")
.select("*")
.order("categoria")

const lista = document.getElementById("lista")
lista.innerHTML=""

let categoriaAtual = ""

data.forEach(p=>{

if(p.categoria !== categoriaAtual){
categoriaAtual = p.categoria

lista.innerHTML += `
<div class="categoria-titulo">
${categoriaAtual || "Sem categoria"}
</div>
`
}

lista.innerHTML+=`
<div class="lista-linha">

<span class="nome">${p.nome}</span>

<span class="pontos"></span>

<span class="valor">
${p.saldo}
</span>

<i class="fa-solid fa-trash btn-delete" onclick="excluir('${p.id}')"></i>

</div>
`
})

// select
const sel=document.getElementById("produtoMov")
sel.innerHTML=""

data.forEach(p=>{
sel.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
})

}

async function entrada(){

const id=document.getElementById("produtoMov").value
const qtd=parseFloat(document.getElementById("qtd").value)

if(!qtd) return

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,
tipo:"entrada",
quantidade:qtd
})

document.getElementById("qtd").value=""
carregar()
}

async function saida(){

const id=document.getElementById("produtoMov").value
const qtd=parseFloat(document.getElementById("qtd").value)

if(!qtd) return

const { data } = await supabaseClient
.from("estoque_atual")
.select("saldo")
.eq("id", id)
.single()

if(qtd > data.saldo){
alert("Estoque insuficiente")
return
}

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,
tipo:"saida",
quantidade:qtd
})

document.getElementById("qtd").value=""
carregar()
}

async function excluir(id){

if(!confirm("Excluir material?")) return

await supabaseClient
.from("produtos")
.delete()
.eq("id", id)

carregar()
}

carregar()

</script>

</body>
</html>
