<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

/* 🔥 MODAL NOVO */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#fff;
padding:25px;
border-radius:12px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:fadeIn .2s ease;
}

.modal-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.modal-box label{
font-size:12px;
color:#555;
}

.modal-box input,
.modal-box select{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.modal-actions{
margin-top:15px;
display:flex;
gap:10px;
justify-content:flex-end;
}

.modal-actions .salvar{
background:#2563eb;
color:#fff;
}

.modal-actions .cancelar{
background:#dc2626;
color:#fff;
}

@keyframes fadeIn{
from{transform:scale(.95);opacity:0}
to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- 🔥 MODAL BONITO -->
<div id="modalEditar" class="modal">
  <div class="modal-box">

    <h3>Editar</h3>

    <div class="modal-grid">

      <div>
        <label>Data</label>
        <input type="date" id="editData">
      </div>

      <div>
        <label>Cliente</label>
        <select id="editCliente"></select>
      </div>

      <div>
        <label>Serviço</label>
        <select id="editServico"></select>
      </div>

      <div>
        <label>Origem</label>
        <select id="editOrigem"></select>
      </div>

      <div>
        <label>Valor</label>
        <input type="number" id="editValor">
      </div>

      <div>
        <label>Desconto</label>
        <input type="number" id="editDesconto">
      </div>

    </div>

    <div class="modal-actions">
      <button class="salvar" onclick="salvarEdicao()">Salvar</button>
      <button class="cancelar" onclick="fecharModal()">Cancelar</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

function nomeCliente(c){
  if(!c) return ""
  const nome = c.nome || ""
  let telefone = (c.telefone_1 || "").replace(/\D/g,"")
  const final = telefone.slice(-4)
  return final ? `${nome} ${final}` : nome
}

let dados=[]
let dadosClientes=[]
let dadosServicos=[]
let servicosMap={}
let editandoId=null

function nomeServico(s){
if(!s) return ""
if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo} minutos`
if(s.subgrupo) return `${s.grupo} ${s.subgrupo}`
if(s.tempo) return `${s.grupo} ${s.tempo} minutos`
return s.grupo
}

valor.oninput=()=>final.value=valor.value-desconto.value
desconto.oninput=()=>final.value=valor.value-desconto.value

async function carregarSelects(){

const {data:clientes}=await supabaseClient.from("clientes").select("*")
dadosClientes=clientes||[]

cliente.innerHTML="<option>Selecione</option>"
dadosClientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${nomeCliente(c)}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
dadosServicos=servicos||[]

servico.innerHTML="<option>Selecione</option>"
dadosServicos.forEach(s=>{
servicosMap[s.id]=s
servico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

servico.onchange=()=>{
const s=servicosMap[servico.value]
if(s){
valor.value=s.valor||50
final.value=valor.value
}
}

}

async function carregarLista(){
const {data}=await supabaseClient.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]
render()
}

function render(){
lista.innerHTML=""
dados.forEach(r=>{
lista.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${nomeCliente(r.clientes)}</td>
<td>${r.origem_lead||"-"}</td>
<td>${nomeServico(r.servicos)}</td>
<td>${r.valor}</td>
<td>${r.desconto}</td>
<td>${r.valor_final}</td>
<td>
<button class="editar" onclick="abrirEditar('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>`
})
}

function abrirEditar(id){
editandoId=id
const r=dados.find(d=>d.id==id)

editData.value=r.data
editValor.value=r.valor
editDesconto.value=r.desconto

modalEditar.style.display="flex"
}

function fecharModal(){
modalEditar.style.display="none"
}

async function salvar(){
await supabaseClient.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:valor.value,
desconto:desconto.value,
valor_final:valor.value-desconto.value
})
carregarLista()
}

async function salvarEdicao(){
await supabaseClient.from("fluxo_caixa").update({
data:editData.value,
valor:editValor.value,
desconto:editDesconto.value,
valor_final:editValor.value-editDesconto.value
}).eq("id",editandoId)

fecharModal()
carregarLista()
}

async function excluir(id){
if(!confirm("Excluir?"))return
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

carregarSelects()
carregarLista()

</script>

</body>
</html>
