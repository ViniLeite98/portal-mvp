<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f4f6fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;}
.content{flex:1;padding:40px;}

.servico{
display:flex;
align-items:center;
gap:8px;
}
.servico i{
color:#6366f1;
}
button{
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}
.editar{background:#f59e0b;color:#fff;}
.excluir{background:#dc2626;color:#fff;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">
<h1>Certificações</h1>

<table>
<thead>
<tr>
<th>Terapeuta</th>
<th>Certificação</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</main>
</div>

<div id="modalEditar" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);align-items:center;justify-content:center;">
<div style="background:#fff;padding:20px;border-radius:10px;width:300px;">
<h3>Editar</h3>

<select id="edit_cpf"></select><br><br>
<select id="edit_cert"></select><br><br>
<input type="date" id="edit_data"><br><br>

<button onclick="atualizar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>
</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let editId=null

/* 🔥 NORMALIZAÇÃO (AQUI ESTÁ A CHAVE) */
function normalizar(txt){
return txt
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.trim()
}

/* ICONES */

function iconeCertificacao(nome){

if(!nome) return "fa-certificate"

const n = normalizar(nome)

/* MASSAGENS */
if(n.includes("feminina")) return "fa-person-dress"
if(n.includes("casais")) return "fa-user-group"
if(n.includes("nuru")) return "fa-droplet"
if(n.includes("viv")) return "fa-spa"

/* 🔥 PODOLATRIA (AGORA FUNCIONA SEM ERRO) */
if(n.includes("podo")) return "fa-footprints"

/* OUTROS */
if(n.includes("reflex")) return "fa-shoe-prints"
if(n.includes("shiatsu")) return "fa-hands"

return "fa-certificate"
}

/* LISTA */

async function carregarLista(){

const {data}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
cpf_terapeuta,
certificacao_id,
data_obtencao,
terapeutas(nome_profissional),
certificacoes(nome)
`)

dados=data||[]
render()
}

/* RENDER */

function render(){

const tbody=document.getElementById("lista")
tbody.innerHTML=""

dados.forEach(r=>{

const nomeCert = r.certificacoes?.nome || ""
const icone = iconeCertificacao(nomeCert)

tbody.innerHTML += `
<tr>
<td>${r.terapeutas?.nome_profissional || ""}</td>

<td>
<div class="servico">
<i class="fa-solid ${icone}"></i>
${nomeCert}
</div>
</td>

<td>${r.data_obtencao || ""}</td>

<td>
<button class="editar" onclick="abrirModal('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>
`
})

}

/* MODAL */

async function abrirModal(id){

const item = dados.find(d=>d.id==id)
editId = id

const {data:terapeutas}=await supabaseClient.from("terapeutas").select("cpf,nome_profissional")
const {data:certs}=await supabaseClient.from("certificacoes").select("id,nome")

document.getElementById("edit_cpf").innerHTML =
terapeutas.map(t=>`<option value="${t.cpf}">${t.nome_profissional}</option>`).join("")

document.getElementById("edit_cert").innerHTML =
certs.map(c=>`<option value="${c.id}">${c.nome}</option>`).join("")

document.getElementById("edit_cpf").value = item.cpf_terapeuta
document.getElementById("edit_cert").value = item.certificacao_id
document.getElementById("edit_data").value = item.data_obtencao

document.getElementById("modalEditar").style.display="flex"
}

function fecharModal(){
document.getElementById("modalEditar").style.display="none"
}

/* ATUALIZAR */

async function atualizar(){

const cpf = document.getElementById("edit_cpf").value
const cert = document.getElementById("edit_cert").value
const data = document.getElementById("edit_data").value

await supabaseClient
.from("terapeuta_certificacoes")
.update({
cpf_terapeuta:cpf,
certificacao_id:cert,
data_obtencao:data
})
.eq("id",editId)

fecharModal()
carregarLista()
}

/* EXCLUIR */

async function excluir(id){

if(!confirm("Excluir vínculo?")) return

await supabaseClient
.from("terapeuta_certificacoes")
.delete()
.eq("id",id)

carregarLista()
}

carregarLista()

</script>

</body>
</html>
