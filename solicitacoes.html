<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Solicitações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

/* KPI */
.kpi-container{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card-kpi{
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
min-width:120px;
text-align:center;
}

.card-kpi h3{
margin:0;
font-size:22px;
}

.card-kpi span{
font-size:12px;
color:#6b7280;
}

/* tabela */
table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.status-pendente{color:#f59e0b;font-weight:600;}
.status-aprovado{color:#16a34a;font-weight:600;}
.status-rejeitado{color:#dc2626;font-weight:600;}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-aprovar{background:#16a34a;color:#fff;}
.btn-rejeitar{background:#dc2626;color:#fff;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Solicitações</h1>

<!-- KPI -->
<div class="kpi-container">

<div class="card-kpi">
<h3 id="kpiTotal">0</h3>
<span>Total</span>
</div>

<div class="card-kpi">
<h3 id="kpiPendente">0</h3>
<span>Pendentes</span>
</div>

<div class="card-kpi">
<h3 id="kpiAprovado">0</h3>
<span>Aprovadas</span>
</div>

<div class="card-kpi">
<h3 id="kpiRejeitado">0</h3>
<span>Rejeitadas</span>
</div>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Terapeuta</th>
<th>Período</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

// 🔥 COLOCA SUA ANON KEY AQUI
const supabaseClient = window.supabase.createClient(
  "https://rymehgsoarjeecuwyhny.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let dados=[]

// 🚀 carregar dados
async function carregar(){

const {data} = await supabaseClient
.from("solicitacoes")
.select("*")
.order("data_inicio",{ascending:false})

dados = data || []

render(dados)
atualizarKPIs(dados)
}

// 🎯 KPI
function atualizarKPIs(lista){

const total = lista.length
const pendente = lista.filter(s => s.status === "Pendente").length
const aprovado = lista.filter(s => s.status === "Aprovado").length
const rejeitado = lista.filter(s => s.status === "Rejeitado").length

kpiTotal.innerText = total
kpiPendente.innerText = pendente
kpiAprovado.innerText = aprovado
kpiRejeitado.innerText = rejeitado

}

// 🧾 render tabela
function render(lista){

const tbody = document.getElementById("lista")
tbody.innerHTML=""

lista.forEach(s=>{

let classe = ""
if(s.status==="Pendente") classe="status-pendente"
if(s.status==="Aprovado") classe="status-aprovado"
if(s.status==="Rejeitado") classe="status-rejeitado"

tbody.innerHTML += `
<tr>
<td>${s.data_inicio}</td>
<td>${s.nome_terapeuta || "-"}</td>
<td>${s.data_inicio} até ${s.data_fim}</td>
<td class="${classe}">${s.status}</td>
<td>
<button class="btn-aprovar" onclick="aprovar('${s.id}')">Aprovar</button>
<button class="btn-rejeitar" onclick="rejeitar('${s.id}')">Rejeitar</button>
</td>
</tr>
`
})

}

// ✅ aprovar
async function aprovar(id){

await supabaseClient
.from("solicitacoes")
.update({status:"Aprovado"})
.eq("id",id)

carregar()
}

// ❌ rejeitar
async function rejeitar(id){

await supabaseClient
.from("solicitacoes")
.update({status:"Rejeitado"})
.eq("id",id)

carregar()
}

carregar()

</script>

</body>
</html>
