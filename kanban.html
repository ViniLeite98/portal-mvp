<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/sidebar/sidebar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#f5f7fb;color:#111827;min-height:100vh;}
.app{display:flex;min-height:100vh;}
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{display:flex;align-items:center;gap:16px;padding:14px 24px;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-logo{font-size:15px;font-weight:600;color:#111827;display:flex;align-items:center;gap:8px;}
.topbar-logo i{color:#6366f1;font-size:16px;}
.topbar-divider{width:1px;height:20px;background:#e5e7eb;}
.topbar-title{font-size:14px;font-weight:500;color:#374151;}
.topbar-actions{margin-left:auto;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-ghost{background:#fff;color:#374151;border:1px solid #e5e7eb;}
.btn-ghost:hover{background:#f9fafb;border-color:#d1d5db;}
.btn-primary{background:#1f2937;color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-danger{background:#dc2626;color:#fff;}
.btn-danger:hover{opacity:.9;}
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 24px;background:#fff;border-bottom:1px solid #e5e7eb;flex-shrink:0;}
.search-wrap{position:relative;flex:1;max-width:280px;}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:12px;}
.search-wrap input{width:100%;padding:8px 10px 8px 30px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;color:#111827;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
.search-wrap input:focus{border-color:#6366f1;background:#fff;}
.filter-select{padding:8px 10px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;color:#374151;font-size:13px;font-family:inherit;outline:none;cursor:pointer;}
.filter-select:focus{border-color:#6366f1;}
.board-wrap{flex:1;padding:20px 24px;overflow-x:auto;overflow-y:visible;}
.board{display:flex;gap:14px;align-items:flex-start;width:max-content;min-height:calc(100vh - 165px);padding-bottom:24px;}
.col{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
.col-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-radius:10px;border:1px solid #e5e7eb;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.col-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--col-color);}
.col-name{font-size:13px;font-weight:600;color:#111827;flex:1;}
.col-count{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;background:#f3f4f6;color:#6b7280;padding:2px 8px;border-radius:99px;}
.col-btn-add{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;color:#9ca3af;border:none;background:transparent;transition:all .15s;font-size:12px;}
.col-btn-add:hover{background:#f3f4f6;color:#374151;}
.col-body{display:flex;flex-direction:column;gap:8px;min-height:80px;padding:2px 0;border-radius:8px;transition:background .15s;}
.col-body.drag-over{background:rgba(99,102,241,0.05);outline:2px dashed rgba(99,102,241,0.35);}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;cursor:grab;transition:all .15s;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);animation:cardIn .2s ease;}
@keyframes cardIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--card-color,#e5e7eb);border-radius:3px 0 0 3px;}
.card:hover{border-color:#d1d5db;box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px);}
.card.dragging{opacity:.5;transform:scale(.97);cursor:grabbing;}
.card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.card-priority{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.priority-alta{background:#ef4444;}
.priority-media{background:#f59e0b;}
.priority-baixa{background:#10b981;}
.priority-critica{background:#ef4444;box-shadow:0 0 0 2px rgba(239,68,68,0.25);}
.card-id{font-size:10px;color:#9ca3af;font-family:'DM Mono',monospace;flex-shrink:0;margin-top:3px;}
.card-title{font-size:13px;font-weight:500;color:#111827;line-height:1.4;flex:1;}
.card-area{font-size:11px;color:#6b7280;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.02em;}
.tag-manutencao{background:#dbeafe;color:#1d4ed8;}
.tag-compra{background:#dcfce7;color:#166534;}
.tag-limpeza{background:#fef9c3;color:#854d0e;}
.tag-ti{background:#ede9fe;color:#6d28d9;}
.tag-outros{background:#f3f4f6;color:#374151;}
.tag-urgente{background:#fee2e2;color:#b91c1c;}
.card-footer{display:flex;align-items:center;gap:6px;}
.card-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;border:1.5px solid #fff;}
.card-person{font-size:11px;color:#6b7280;flex:1;}
.card-date{font-size:10px;color:#9ca3af;font-family:'DM Mono',monospace;margin-left:auto;}
.swimlane-label{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:#b91c1c;text-transform:uppercase;letter-spacing:.08em;padding:4px 8px;background:#fee2e2;border-radius:6px;border:1px solid #fecaca;margin-bottom:2px;}
.col-empty{padding:24px 12px;text-align:center;color:#d1d5db;font-size:12px;border:1.5px dashed #e5e7eb;border-radius:8px;}
.col-empty i{font-size:20px;display:block;margin-bottom:6px;}
.col-add-new{width:260px;flex-shrink:0;}
.btn-add-col{width:100%;padding:12px;background:transparent;border:1.5px dashed #d1d5db;border-radius:10px;color:#9ca3af;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.btn-add-col:hover{border-color:#6366f1;color:#6366f1;background:#f5f3ff;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:40px 20px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:16px;width:580px;max-width:100%;transform:translateY(10px);transition:transform .2s;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid #e5e7eb;gap:10px;}
.modal-title{font-size:15px;font-weight:600;color:#111827;flex:1;}
.modal-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;color:#6b7280;border:none;background:transparent;font-size:14px;transition:all .15s;}
.modal-close:hover{background:#f3f4f6;}
.modal-body{padding:22px;display:flex;flex-direction:column;gap:14px;}
.modal-footer{padding:14px 22px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px;background:#f9fafb;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field select,.field textarea{padding:9px 12px;background:#fff;border:1px solid #d1d5db;border-radius:8px;color:#111827;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
.field textarea{resize:vertical;min-height:80px;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.08);}
.detail-status-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.detail-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;}
.history-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6;}
.history-item:last-child{border-bottom:none;}
.history-dot{width:8px;height:8px;border-radius:50%;background:#6366f1;margin-top:5px;flex-shrink:0;}
.history-text{font-size:12px;color:#6b7280;line-height:1.5;}
.toast{position:fixed;bottom:24px;right:24px;background:#1f2937;border-radius:10px;padding:12px 16px;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;z-index:1100;transform:translateY(60px);opacity:0;transition:all .3s;box-shadow:0 8px 24px rgba(0,0,0,.2);}
.toast.show{transform:translateY(0);opacity:1;}
.toast i{color:#10b981;}
.toast.erro i{color:#ef4444;}
.board-loading{display:flex;align-items:center;justify-content:center;padding:60px;color:#9ca3af;font-size:13px;gap:10px;}
.board-loading i{animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#9ca3af;}
</style>
</head>
<body>
<div class="app">
<aside id="sidebar"></aside>
<div class="main-col">

<div class="topbar">
  <div class="topbar-logo"><i class="fa fa-leaf"></i>Hara Spa</div>
  <div class="topbar-divider"></div>
  <span class="topbar-title">Kanban — Gestão Interna</span>
  <div class="topbar-actions">
    <button class="btn btn-primary" onclick="abrirModalNovo()"><i class="fa fa-plus"></i> Novo Card</button>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <i class="fa fa-search"></i>
    <input type="text" id="busca" placeholder="Filtrar por título..." oninput="filtrar()">
  </div>
  <select class="filter-select" id="filtroResponsavel" onchange="filtrar()">
    <option value="">Todos os responsáveis</option>
  </select>
  <select class="filter-select" id="filtroArea" onchange="filtrar()">
    <option value="">Todas as áreas</option>
    <option>Manutenção</option><option>Compras</option><option>TI</option>
    <option>Limpeza</option><option>Administração</option><option>Recepção</option>
  </select>
  <select class="filter-select" id="filtroPrioridade" onchange="filtrar()">
    <option value="">Todas as prioridades</option>
    <option>Crítica</option><option>Alta</option><option>Média</option><option>Baixa</option>
  </select>
</div>

<div class="board-wrap">
  <div class="board" id="board">
    <div class="board-loading"><i class="fa fa-circle-notch"></i> Carregando...</div>
  </div>
</div>
</div>

<!-- MODAL NOVO / EDITAR -->
<div class="modal-overlay" id="modalNovo">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalNovoTitulo">Novo Card</div>
      <button class="modal-close" onclick="fecharModalNovo()"><i class="fa fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Título *</label><input id="novoTitulo" placeholder="Descreva a tarefa..."></div>
      <div class="form-row">
        <div class="field"><label>Área</label>
          <select id="novaArea">
            <option value="">Selecione</option>
            <option>Manutenção</option><option>Compras</option><option>TI</option>
            <option>Limpeza</option><option>Administração</option><option>Recepção</option>
          </select>
        </div>
        <div class="field"><label>Prioridade</label>
          <select id="novaPrioridade">
            <option value="Media">Média</option><option value="Alta">Alta</option>
            <option value="Baixa">Baixa</option><option value="Critica">Crítica</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>Responsável</label><select id="novoResponsavel"><option value="">Sem responsável</option></select></div>
        <div class="field"><label>Coluna</label><select id="novaColuna"></select></div>
      </div>
      <div class="field"><label>Descrição</label><textarea id="novaDescricao" placeholder="Detalhes, links, observações..."></textarea></div>
      <div class="form-row">
        <div class="field"><label>Tag</label>
          <select id="novaTag">
            <option value="">Sem tag</option>
            <option value="manutencao">Manutenção</option><option value="compra">Compra</option>
            <option value="limpeza">Limpeza</option><option value="ti">TI</option>
            <option value="urgente">Urgente</option><option value="outros">Outros</option>
          </select>
        </div>
        <div class="field"><label>Data limite</label><input type="date" id="novaData"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModalNovo()">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvarCard" onclick="salvarCard()"><i class="fa fa-check"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHE -->
<div class="modal-overlay" id="modalDetalhe">
  <div class="modal">
    <div class="modal-header">
      <span id="detalheId" style="font-family:'DM Mono',monospace;font-size:11px;color:#9ca3af;flex-shrink:0;margin-right:4px"></span>
      <div class="modal-title" id="detalheTitulo"></div>
      <button class="modal-close" onclick="fecharModalDetalhe()"><i class="fa fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="detail-status-row" id="detalheStatus"></div>
      <div class="field"><label>Descrição</label>
        <div id="detalheDesc" style="font-size:13px;color:#6b7280;line-height:1.6;padding:10px 12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;min-height:48px;white-space:pre-wrap;"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Mover para coluna</label><select id="detalheMoverColuna" onchange="moverCardModal()"></select></div>
        <div class="field"><label>Responsável</label><select id="detalheResponsavel" onchange="atualizarResponsavelModal()"></select></div>
      </div>
      <div class="field"><label>Histórico</label>
        <div id="detalheHistorico" style="max-height:160px;overflow-y:auto;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="excluirCardModal()"><i class="fa fa-trash"></i> Excluir</button>
      <button class="btn btn-ghost" onclick="fecharModalDetalhe()">Fechar</button>
      <button class="btn btn-primary" onclick="editarCardModal()"><i class="fa fa-edit"></i> Editar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="fa fa-check-circle"></i> <span id="toastMsg"></span></div>

<script>
// ── Seed de colunas padrão ────────────────────────────────────────────────────
const COLUNAS_SEED = [
  {valor:'Aberto',       descricao:'#3b82f6', ordem:0},
  {valor:'Análise',      descricao:'#f59e0b', ordem:1},
  {valor:'Impedimento',  descricao:'#ef4444', ordem:2},
  {valor:'Em andamento', descricao:'#8b5cf6', ordem:3},
  {valor:'Verificação',  descricao:'#10b981', ordem:4},
  {valor:'Concluído',    descricao:'#6b7280', ordem:5},
];

let COLUNAS = [], cards = [], pessoas = [];
let cardAtivo = null, editandoId = null, draggingId = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function getColuna(id) { return COLUNAS.find(c => c.id === id); }
function getPessoa(id) { return pessoas.find(p => p.id === id); }
function prioClass(p)  { return ({Alta:'priority-alta',Media:'priority-media',Baixa:'priority-baixa',Critica:'priority-critica'})[p] || 'priority-baixa'; }

function renderAvatar(responsavel) {
  const p = getPessoa(responsavel);
  if (!p) return '<div class="card-avatar" style="background:#d1d5db;color:#6b7280">?</div>';
  const ini = p.nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
  return '<div class="card-avatar" style="background:'+p.cor+'">'+ini+'</div>';
}
function renderTags(tags) {
  return (tags||[]).map(t => '<span class="tag tag-'+t+'">'+t+'</span>').join('');
}
function popularSelectsColunas() {
  const opts = COLUNAS.map(c => '<option value="'+c.id+'">'+c.nome+'</option>').join('');
  ['novaColuna','detalheMoverColuna'].forEach(id => { const el = document.getElementById(id); if(el) el.innerHTML = opts; });
}
function tsAgora() {
  return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}

// ── Render board ──────────────────────────────────────────────────────────────
function renderCard(card) {
  const col = getColuna(card.coluna_id);
  const p   = getPessoa(card.responsavel);
  const dataFmt = card.data_limite ? new Date(card.data_limite+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : '';
  return '<div class="card" id="card-'+card.id+'" draggable="true"'+
    ' style="--card-color:'+(col?.cor||'#e5e7eb')+'"'+
    ' ondragstart="dragStart(event,\''+card.id+'\')"'+
    ' ondragend="dragEnd()"'+
    ' onclick="abrirDetalhe(\''+card.id+'\')">' +
    '<div class="card-top">'+
      '<span class="card-priority '+prioClass(card.prioridade)+'"></span>'+
      '<span class="card-id">#'+card.id.slice(0,6)+'</span>'+
      '<div class="card-title">'+card.titulo+'</div>'+
    '</div>'+
    (card.area ? '<div class="card-area"><i class="fa fa-map-marker-alt" style="font-size:9px"></i> '+card.area+'</div>' : '')+
    (card.tags&&card.tags.length ? '<div class="card-tags">'+renderTags(card.tags)+'</div>' : '')+
    '<div class="card-footer">'+
      renderAvatar(card.responsavel)+
      '<span class="card-person">'+(p ? p.nome : 'Sem responsável')+'</span>'+
      (card.historico&&card.historico.length ? '<span style="font-size:11px;color:#9ca3af;margin-left:4px"><i class="fa fa-comment" style="font-size:9px"></i> '+card.historico.length+'</span>' : '')+
      (dataFmt ? '<span class="card-date">'+dataFmt+'</span>' : '')+
    '</div>'+
  '</div>';
}

function renderBoard(filtrados) {
  const board = document.getElementById('board');
  const lista = filtrados || cards;
  board.innerHTML = '';
  COLUNAS.forEach(function(col) {
    const colCards = lista.filter(c => c.coluna_id === col.id);
    const urgentes = colCards.filter(c => c.prioridade === 'Critica');
    const normais  = colCards.filter(c => c.prioridade !== 'Critica');
    let body = '';
    if (urgentes.length) { body += '<div class="swimlane-label"><i class="fa fa-fire"></i> Crítica</div>'; body += urgentes.map(renderCard).join(''); }
    body += normais.map(renderCard).join('');
    if (!colCards.length) body = '<div class="col-empty"><i class="fa fa-inbox"></i>Sem itens</div>';
    board.innerHTML +=
      '<div class="col">'+
        '<div class="col-header" style="--col-color:'+col.cor+'">'+
          '<div class="col-name">'+col.nome+'</div>'+
          '<span class="col-count">'+colCards.length+'</span>'+
          '<button class="col-btn-add" onclick="abrirModalNovo(\''+col.id+'\')" title="Novo card"><i class="fa fa-plus"></i></button>'+
        '</div>'+
        '<div class="col-body" id="col-'+col.id+'"'+
          ' ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event,\''+col.id+'\')"'+
        '>'+body+'</div>'+
      '</div>';
  });
  board.innerHTML += '<div class="col-add-new"><button class="btn-add-col" onclick="adicionarColuna()"><i class="fa fa-plus"></i> Nova coluna</button></div>';
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
function dragStart(e, id) {
  draggingId = id;
  setTimeout(() => { const el = document.getElementById('card-'+id); if(el) el.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
}
function dragEnd() {
  if (draggingId) { const el = document.getElementById('card-'+draggingId); if(el) el.classList.remove('dragging'); }
}
function dragOver(e)  { e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

async function drop(e, colunaId) {
  e.preventDefault(); e.stopPropagation();
  e.currentTarget.classList.remove('drag-over');
  const id = draggingId || e.dataTransfer.getData('text/plain');
  if (!id) return;
  const card = cards.find(c => c.id === id);
  if (!card || card.coluna_id === colunaId) return;

  const anterior = card.coluna_id;
  const novoHist = [...(card.historico||[]), tsAgora()+' — '+(getPessoa(card.responsavel)?.nome||'Sistema')+' moveu de "'+getColuna(anterior)?.nome+'" para "'+getColuna(colunaId)?.nome+'"'];

  // Otimista
  card.coluna_id = colunaId;
  card.historico = novoHist;
  draggingId = null;
  renderBoard();

  const {error} = await client.from('kanban_cards').update({coluna_id: colunaId, historico: novoHist}).eq('id', id);
  if (error) { toast('Erro ao mover card', true); await carregarCards(); return; }
  toast('Movido para "'+getColuna(colunaId)?.nome+'"');
}

// ── Filtro ────────────────────────────────────────────────────────────────────
function filtrar() {
  const busca = document.getElementById('busca').value.toLowerCase();
  const resp  = document.getElementById('filtroResponsavel').value;
  const area  = document.getElementById('filtroArea').value;
  const prio  = document.getElementById('filtroPrioridade').value;
  renderBoard(cards.filter(c => {
    if (busca && !c.titulo.toLowerCase().includes(busca)) return false;
    if (resp  && c.responsavel !== resp) return false;
    if (area  && c.area !== area) return false;
    if (prio  && c.prioridade !== prio) return false;
    return true;
  }));
}

// ── Modal Novo / Editar ───────────────────────────────────────────────────────
function abrirModalNovo(colunaPreset) {
  editandoId = null;
  document.getElementById('modalNovoTitulo').textContent = 'Novo Card';
  document.getElementById('novoTitulo').value = '';
  document.getElementById('novaDescricao').value = '';
  document.getElementById('novaData').value = '';
  document.getElementById('novaArea').value = '';
  document.getElementById('novaPrioridade').value = 'Media';
  document.getElementById('novoResponsavel').value = '';
  document.getElementById('novaTag').value = '';
  popularSelectsColunas();
  if (colunaPreset) document.getElementById('novaColuna').value = colunaPreset;
  document.getElementById('modalNovo').classList.add('open');
}
function fecharModalNovo() { document.getElementById('modalNovo').classList.remove('open'); editandoId = null; }

async function salvarCard() {
  const titulo = document.getElementById('novoTitulo').value.trim();
  if (!titulo) { alert('Informe um título.'); return; }

  const btn = document.getElementById('btnSalvarCard');
  btn.disabled = true; btn.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i> Salvando...';

  const tag       = document.getElementById('novaTag').value;
  const coluna_id = document.getElementById('novaColuna').value;
  const payload = {
    titulo,
    coluna_id,
    area:       document.getElementById('novaArea').value || null,
    prioridade: document.getElementById('novaPrioridade').value,
    responsavel:document.getElementById('novoResponsavel').value || null,
    descricao:  document.getElementById('novaDescricao').value || null,
    data_limite:document.getElementById('novaData').value || null,
    tags:       tag ? [tag] : [],
    ativo:      true,
  };

  let error;
  if (editandoId) {
    const card = cards.find(c => c.id === editandoId);
    const novoHist = [...(card?.historico||[]), tsAgora()+' — Card editado'];
    payload.historico = novoHist;
    ({error} = await client.from('kanban_cards').update(payload).eq('id', editandoId));
    if (!error) toast('Card atualizado!');
  } else {
    payload.historico = [tsAgora()+' — Card criado'];
    ({error} = await client.from('kanban_cards').insert(payload));
    if (!error) toast('Card criado!');
  }

  btn.disabled = false; btn.innerHTML = '<i class="fa fa-check"></i> Salvar';

  if (error) { alert('Erro ao salvar: '+error.message); return; }
  fecharModalNovo();
  await carregarCards();
}

// ── Modal Detalhe ─────────────────────────────────────────────────────────────
function abrirDetalhe(id) {
  cardAtivo = id;
  const card = cards.find(c => c.id === id); if (!card) return;
  const col  = getColuna(card.coluna_id);

  document.getElementById('detalheId').textContent = '#'+card.id.slice(0,6)+'  ';
  document.getElementById('detalheTitulo').textContent = card.titulo;
  document.getElementById('detalheDesc').textContent = card.descricao || 'Sem descrição.';
  document.getElementById('detalheStatus').innerHTML =
    '<div class="detail-badge" style="background:'+col?.cor+'18;color:'+col?.cor+';border:1px solid'+col?.cor+'33">'+col?.nome+'</div>'+
    '<div class="detail-badge" style="background:#f3f4f6;color:#374151">'+(card.area||'—')+'</div>'+
    '<div class="detail-badge" style="background:#f3f4f6;color:#374151">'+card.prioridade+'</div>';

  popularSelectsColunas();
  document.getElementById('detalheMoverColuna').value = card.coluna_id;
  document.getElementById('detalheResponsavel').innerHTML =
    '<option value="">Sem responsável</option>'+
    pessoas.map(p => '<option value="'+p.id+'"'+(p.id===card.responsavel?' selected':'')+'>'+p.nome+'</option>').join('');

  const hist = card.historico || [];
  document.getElementById('detalheHistorico').innerHTML = hist.length
    ? hist.slice().reverse().map(h => '<div class="history-item"><div class="history-dot"></div><div class="history-text">'+h+'</div></div>').join('')
    : '<div style="font-size:12px;color:#9ca3af">Sem histórico.</div>';

  document.getElementById('modalDetalhe').classList.add('open');
}
function fecharModalDetalhe() { document.getElementById('modalDetalhe').classList.remove('open'); cardAtivo = null; }

async function moverCardModal() {
  if (!cardAtivo) return;
  const card   = cards.find(c => c.id === cardAtivo); if (!card) return;
  const novaCol = document.getElementById('detalheMoverColuna').value;
  if (novaCol === card.coluna_id) return;

  const anterior = card.coluna_id;
  const novoHist = [...(card.historico||[]), tsAgora()+' — Movido de "'+getColuna(anterior)?.nome+'" para "'+getColuna(novaCol)?.nome+'"'];
  const {error} = await client.from('kanban_cards').update({coluna_id: novaCol, historico: novoHist}).eq('id', cardAtivo);
  if (error) { toast('Erro ao mover', true); return; }
  card.coluna_id = novaCol; card.historico = novoHist;
  renderBoard(); abrirDetalhe(cardAtivo); toast('Movido para "'+getColuna(novaCol)?.nome+'"');
}

async function atualizarResponsavelModal() {
  if (!cardAtivo) return;
  const card = cards.find(c => c.id === cardAtivo); if (!card) return;
  const novoResp = document.getElementById('detalheResponsavel').value || null;
  const novoHist = [...(card.historico||[]), tsAgora()+' — Responsável: '+(getPessoa(novoResp)?.nome||'Nenhum')];
  const {error} = await client.from('kanban_cards').update({responsavel: novoResp, historico: novoHist}).eq('id', cardAtivo);
  if (error) { toast('Erro ao atualizar', true); return; }
  card.responsavel = novoResp; card.historico = novoHist;
  renderBoard(); toast('Responsável atualizado!');
}

function editarCardModal() {
  if (!cardAtivo) return;
  const card = cards.find(c => c.id === cardAtivo); if (!card) return;
  fecharModalDetalhe(); editandoId = card.id;
  document.getElementById('modalNovoTitulo').textContent = 'Editar Card';
  document.getElementById('novoTitulo').value    = card.titulo;
  document.getElementById('novaDescricao').value = card.descricao || '';
  document.getElementById('novaData').value      = card.data_limite || '';
  document.getElementById('novaArea').value      = card.area || '';
  document.getElementById('novaPrioridade').value= card.prioridade;
  document.getElementById('novoResponsavel').value = card.responsavel || '';
  document.getElementById('novaTag').value       = card.tags?.[0] || '';
  popularSelectsColunas();
  document.getElementById('novaColuna').value = card.coluna_id;
  document.getElementById('modalNovo').classList.add('open');
}

async function excluirCardModal() {
  if (!cardAtivo) return;
  if (!confirm('Excluir este card permanentemente?')) return;
  const {error} = await client.from('kanban_cards').delete().eq('id', cardAtivo);
  if (error) { toast('Erro ao excluir', true); return; }
  fecharModalDetalhe();
  await carregarCards();
  toast('Card excluído.');
}

// ── Nova coluna ───────────────────────────────────────────────────────────────
async function adicionarColuna() {
  const nome = prompt('Nome da nova coluna:'); if (!nome?.trim()) return;
  const cores = ['#06b6d4','#d946ef','#f43f5e','#84cc16','#f97316','#14b8a6'];
  const cor   = cores[Math.floor(Math.random()*cores.length)];
  const {data, error} = await client.from('parametros')
    .insert({tipo:'kanban_colunas', valor:nome.trim(), descricao:cor, ordem:COLUNAS.length, ativo:true})
    .select('id,valor,descricao,ordem').single();
  if (error) { alert('Erro: '+error.message); return; }
  COLUNAS.push({id:data.id, nome:data.valor, cor:data.descricao||'#6b7280', ordem:data.ordem});
  popularSelectsColunas(); renderBoard();
  toast('Coluna "'+nome.trim()+'" criada!');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, erro) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.className = 'toast'+(erro?' erro':'');
  el.querySelector('i').className = 'fa fa-'+(erro?'exclamation-circle':'check-circle');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Carregar cards do Supabase ────────────────────────────────────────────────
async function carregarCards() {
  const {data, error} = await client
    .from('kanban_cards')
    .select('*')
    .eq('ativo', true)
    .order('ordem')
    .order('created_at');
  if (error) { console.error('Erro ao carregar cards:', error); return; }
  cards = data || [];
  renderBoard();
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  function waitUser(cb, n) {
    if (n === undefined) n = 30;
    if (window.usuarioLogado) return cb(window.usuarioLogado);
    if (n <= 0) return cb(null);
    setTimeout(() => waitUser(cb, n-1), 100);
  }

  waitUser(async function() {
    // 1. Colunas (cor em descricao)
    let {data:colData, error:colErr} = await client
      .from('parametros').select('id,valor,descricao,ordem')
      .eq('tipo','kanban_colunas').eq('ativo',true).order('ordem');
    if (colErr) { console.error(colErr); colData = []; }

    if (!colData || !colData.length) {
      const {data:seeded} = await client.from('parametros')
        .insert(COLUNAS_SEED.map(s => ({tipo:'kanban_colunas',valor:s.valor,descricao:s.descricao,ordem:s.ordem,ativo:true})))
        .select('id,valor,descricao,ordem');
      colData = seeded || [];
    }

    COLUNAS = (colData||[])
      .sort((a,b) => (a.ordem??9999)-(b.ordem??9999))
      .map(c => ({id:c.id, nome:c.valor, cor:c.descricao||'#6b7280', ordem:c.ordem}));

    // 2. Terapeutas
    const {data:ter} = await client.from('terapeutas')
      .select('cpf,nome_profissional').eq('status','Ativo').order('nome_profissional');
    const coresPessoa = ['#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#d946ef'];
    pessoas = (ter||[]).map(t => ({
      id: t.cpf, nome: t.nome_profissional,
      cor: coresPessoa[t.nome_profissional.charCodeAt(0) % coresPessoa.length]
    }));

    // 3. Selects responsável
    const sf = document.getElementById('filtroResponsavel');
    const sn = document.getElementById('novoResponsavel');
    pessoas.forEach(p => {
      sf.innerHTML += '<option value="'+p.id+'">'+p.nome+'</option>';
      sn.innerHTML += '<option value="'+p.id+'">'+p.nome+'</option>';
    });

    popularSelectsColunas();

    // 4. Cards do banco
    await carregarCards();
  });
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('modalNovo').addEventListener('click',    e => { if(e.target===e.currentTarget) fecharModalNovo(); });
  document.getElementById('modalDetalhe').addEventListener('click', e => { if(e.target===e.currentTarget) fecharModalDetalhe(); });
  init();
});
</script>
