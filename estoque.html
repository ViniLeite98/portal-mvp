<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Materiais | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

.app{display:flex}
.content{flex:1;padding:40px}

.grid{
display:grid;
grid-template-columns: 320px 1fr;
gap:30px;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#000;
color:#fff;
cursor:pointer;
}

.btn-danger{background:#dc2626;margin-top:5px;}

.lista-linha{
display:flex;
align-items:center;
margin-bottom:12px;
font-size:15px;
}

.nome{white-space:nowrap;}

.pontos{
flex:1;
border-bottom:1px dashed #999;
margin:0 10px;
}

.valor{
white-space:nowrap;
font-weight:500;
}

.acoes{
display:flex;
gap:10px;
margin-left:10px;
}

.btn-acao{
cursor:pointer;
opacity:0;
transition:0.2s;
}

.lista-linha:hover .btn-acao{
opacity:1;
}

.btn-edit{color:#2563eb;}
.btn-zerar{color:#f59e0b;}
.btn-delete{color:#dc2626;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Materiais</h1>
<p>Controle de estoque</p>

<div class="grid">

<div class="card">

<h3>Novo Material</h3>

<input id="nome" placeholder="Nome">
<input id="valor" type="number" step="0.01" placeholder="Valor da unidade (R$)">

<button onclick="criarProduto()">Cadastrar</button>

<hr style="margin:15px 0">

<h3>Entrada de Estoque</h3>

<select id="produtoMov"></select>

<input id="qtd" type="number" placeholder="Quantidade">
<input id="custo" type="number" step="0.01" placeholder="Custo unitário (R$)">
<input id="fornecedor" placeholder="Fornecedor">
<input id="responsavel" placeholder="Quem registrou">
<input id="data" type="date">

<button onclick="entrada()">Registrar Entrada</button>

<hr style="margin:15px 0">

<h3>Saída</h3>

<input id="qtdSaida" type="number" placeholder="Quantidade">

<button class="btn-danger" onclick="saida()">Registrar Saída</button>

</div>

<div class="card">

<div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
  <h3>Estoque</h3>

  <div style="display:flex; gap:10px; align-items:center;">
    <strong>Qtd | Valor</strong>
    <button onclick="exportarExcel()" style="width:auto; padding:6px 12px; font-size:13px;">
      <i class="fa-solid fa-file-excel"></i> Exportar
    </button>
  </div>
</div>

<div id="lista"></div>

</div>

</div>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

async function criarProduto(){

const nome = document.getElementById("nome").value.trim()
const valor = parseFloat(document.getElementById("valor").value) || 0

if(!nome){
alert("Digite o nome")
return
}

await supabaseClient.from("produtos").insert({ nome, valor })

document.getElementById("nome").value=""
document.getElementById("valor").value=""

carregar()
}

async function carregar(){

const {data} = await supabaseClient
.from("estoque_atual")
.select("*")
.order("nome")

const lista = document.getElementById("lista")
lista.innerHTML=""

data.forEach(p=>{

const total = (p.valor || 0) * (p.saldo || 0)

lista.innerHTML+=`
<div class="lista-linha">

<span class="nome">${p.nome}</span>

<span class="pontos"></span>

<span class="valor">
${p.saldo} | R$ ${total.toFixed(2)}
</span>

<div class="acoes">
<i class="fa-solid fa-pen btn-acao btn-edit" onclick="editarValor('${p.id}', ${p.valor || 0})"></i>
<i class="fa-solid fa-xmark btn-acao btn-zerar" onclick="zerar('${p.id}', ${p.saldo})"></i>
<i class="fa-solid fa-trash btn-acao btn-delete" onclick="excluir('${p.id}')"></i>
</div>

</div>
`
})

// select
const sel=document.getElementById("produtoMov")
sel.innerHTML=""

data.forEach(p=>{
sel.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
})

}

async function entrada(){

const id = document.getElementById("produtoMov").value
const qtd = parseFloat(document.getElementById("qtd").value)
const custo = parseFloat(document.getElementById("custo").value) || 0
const fornecedor = document.getElementById("fornecedor").value
const responsavel = document.getElementById("responsavel").value
const data = document.getElementById("data").value

if(!qtd){
alert("Digite a quantidade")
return
}

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,
tipo:"entrada",
quantidade:qtd,
custo:custo,
fornecedor:fornecedor,
responsavel:responsavel,
data:data || new Date().toISOString()
})

document.getElementById("qtd").value=""
document.getElementById("custo").value=""
document.getElementById("fornecedor").value=""
document.getElementById("responsavel").value=""
document.getElementById("data").value=""

carregar()
}

async function saida(){

const id = document.getElementById("produtoMov").value
const qtd = parseFloat(document.getElementById("qtdSaida").value)

if(!qtd){
alert("Digite a quantidade")
return
}

const { data } = await supabaseClient
.from("estoque_atual")
.select("saldo")
.eq("id", id)
.single()

if(qtd > data.saldo){
alert("Estoque insuficiente")
return
}

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,
tipo:"saida",
quantidade:qtd
})

document.getElementById("qtdSaida").value=""
carregar()
}

async function zerar(id, saldo){
if(saldo <= 0){ alert("Já está zerado"); return }

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,
tipo:"saida",
quantidade:saldo
})

carregar()
}

async function excluir(id){
if(!confirm("Excluir material?")) return
await supabaseClient.from("produtos").delete().eq("id", id)
carregar()
}

async function editarValor(id, valorAtual){

const novo = prompt("Novo valor (R$):", valorAtual)

if(novo === null) return

await supabaseClient
.from("produtos")
.update({ valor: parseFloat(novo) || 0 })
.eq("id", id)

carregar()
}

async function exportarExcel(){

const {data} = await supabaseClient
.from("estoque_atual")
.select("*")
.order("nome")

const dados = data.map(p => ({
Nome: p.nome,
Quantidade: p.saldo,
"Valor Unitário": p.valor || 0,
"Valor Total": (p.valor || 0) * (p.saldo || 0)
}))

const ws = XLSX.utils.json_to_sheet(dados)
const wb = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb, ws, "Estoque")

XLSX.writeFile(wb, "estoque.xlsx")
}

carregar()

</script>

</body>
</html>
