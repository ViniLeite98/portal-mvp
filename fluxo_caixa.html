<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
}

.field{
display:flex;
flex-direction:column;
font-size:13px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Valor (R$)</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto (R$)</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Valor Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://SEU_PROJETO.supabase.co",
"SEU_TOKEN"
)

let dados=[]

// calcular automático
document.getElementById("valor").oninput = calcular
document.getElementById("desconto").oninput = calcular

function calcular(){
const valor = parseFloat(document.getElementById("valor").value || 0)
const desconto = parseFloat(document.getElementById("desconto").value || 0)

document.getElementById("final").value = valor - desconto
}

// carregar selects
async function carregarSelects(){

// CLIENTES
const {data:clientes, error:erroClientes} = await supabaseClient
.from("clientes")
.select("*")

console.log("CLIENTES:", clientes)

const selCliente = document.getElementById("cliente")
selCliente.innerHTML = "<option value=''>Selecione</option>"

if(clientes){
clientes.forEach(c=>{
// AJUSTE AQUI SE NOME FOR DIFERENTE
const nome = c.nome || c.nome_cliente || "Sem nome"

selCliente.innerHTML += `<option value="${c.id}">${nome}</option>`
})
}

// SERVIÇOS
const {data:servicos, error:erroServicos} = await supabaseClient
.from("servicos")
.select("*")

console.log("SERVICOS:", servicos)

const selServico = document.getElementById("servico")
selServico.innerHTML = "<option value=''>Selecione</option>"

if(servicos){
servicos.forEach(s=>{
const nome = s.nome || "Sem nome"
selServico.innerHTML += `<option value="${s.id}">${nome}</option>`
})
}

}

// salvar
async function salvar(){

const data = document.getElementById("data").value
const cliente = document.getElementById("cliente").value
const servico = document.getElementById("servico").value
const valor = parseFloat(document.getElementById("valor").value)
const desconto = parseFloat(document.getElementById("desconto").value || 0)
const final = valor - desconto

if(!data || !cliente || !servico){
alert("Preencha todos os campos")
return
}

await supabaseClient
.from("fluxo_caixa")
.insert({
data,
cliente_id:cliente,
servico_id:servico,
valor,
desconto,
valor_final:final
})

carregarLista()

}

// lista
async function carregarLista(){

const {data} = await supabaseClient
.from("fluxo_caixa")
.select(`
*,
clientes(nome),
servicos(nome)
`)
.order("data",{ascending:false})

dados = data || []

render()
}

function render(){

const tbody = document.getElementById("lista")
tbody.innerHTML = ""

dados.forEach(r=>{
tbody.innerHTML += `
<tr>
<td>${r.data}</td>
<td>${r.clientes?.nome || ""}</td>
<td>${r.servicos?.nome || ""}</td>
<td>R$ ${r.valor}</td>
<td>R$ ${r.desconto}</td>
<td><strong>R$ ${r.valor_final}</strong></td>
<td>
<button onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>
`
})

}

// excluir
async function excluir(id){

if(!confirm("Excluir?")) return

await supabaseClient
.from("fluxo_caixa")
.delete()
.eq("id",id)

carregarLista()
}

// init
carregarSelects()
carregarLista()
calcular()

</script>

</body>
</html>
