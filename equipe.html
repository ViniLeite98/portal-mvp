<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.filter{
  display:flex;
  gap:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th,td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
  font-size:14px;
  text-align:left;
}

th{background:#f9fafb;font-weight:600;}

button{
  background:#1f2937;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px 12px;
  cursor:pointer;
}

button.excluir{background:#dc2626}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
}

.modal-content{
  background:#fff;
  width:1000px;
  max-height:90vh;
  overflow:auto;
  border-radius:18px;
  padding:28px;
}

.section{margin-bottom:28px}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  color:#374151;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:14px;
}

input.error, select.error{
  border:2px solid #dc2626;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<div class="top-bar">
<button onclick="abrirNovo()">+ Novo Cadastro</button>

<div class="filter">
<select id="filtroCargo" onchange="carregar()">
<option value="">Todos os cargos</option>
<option>Terapeuta Feminina</option>
<option>Terapeuta Masculino</option>
<option>Gerente</option>
<option>Atendente</option>
<option>Recepcionista</option>
<option>Faxineira</option>
<option>Analista</option>
</select>
</div>
</div>

<table>
<thead>
<tr>
<th>Nome Profissional</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<div class="section">
<h3>Dados Pessoais</h3>
<div class="grid">

<div class="field">
<label>Nome Completo *</label>
<input id="nome_completo">
</div>

<div class="field">
<label>Nome Profissional *</label>
<input id="nome_profissional">
</div>

<div class="field">
<label>CPF *</label>
<input id="cpf">
</div>

<div class="field">
<label>Email *</label>
<input id="email">
</div>

</div>
</div>

<div class="section">
<h3>Dados Funcionais</h3>
<div class="grid">

<div class="field">
<label>Cargo *</label>
<select id="cargo">
<option value="">Selecione</option>
<option>Terapeuta Feminina</option>
<option>Terapeuta Masculino</option>
<option>Gerente</option>
<option>Atendente</option>
<option>Recepcionista</option>
<option>Faxineira</option>
<option>Analista</option>
</select>
</div>

<div class="field">
<label>Tem folga semanal?</label>
<select id="tem_folga">
<option value="">Selecione</option>
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div class="field">
<label>Dia da Folga</label>
<select id="dia_folga">
<option value="">Selecione</option>
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
<option>Sábado</option>
</select>
</div>

<div class="field">
<label>Hora de Entrada *</label>
<input type="time" id="hora_entrada" value="09:00">
</div>

<div class="field">
<label>Hora de Saída *</label>
<input type="time" id="hora_saida" value="18:00">
</div>

<div class="field">
<label>Status *</label>
<select id="status">
<option value="">Selecione</option>
<option>Ativo</option>
<option>Inativo</option>
</select>
</div>

</div>
</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="assets/sidebar/sidebar.js"></script>

<script>
const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let cpfAtual=null;

/* DESABILITAR DIA FOLGA */
document.getElementById("tem_folga").addEventListener("change", function(){
  const dia = document.getElementById("dia_folga");
  if(this.value==="Não"){
    dia.value="";
    dia.disabled=true;
  }else{
    dia.disabled=false;
  }
});

/* FILTRO POR CARGO */
async function carregar(){
  const filtro = document.getElementById("filtroCargo").value;

  let query = supabaseClient.from("terapeutas")
  .select("cpf,nome_profissional,status,cargo")
  .order("nome_profissional");

  if(filtro){
    query = query.eq("cargo",filtro);
  }

  const {data,error}=await query;
  if(error){console.error(error);return;}

  const tbody=document.getElementById("lista");
  tbody.innerHTML="";

  data.forEach(t=>{
    tbody.innerHTML+=`
    <tr>
      <td>${t.nome_profissional||""}</td>
      <td>${t.cargo||""}</td>
      <td>${t.cpf||""}</td>
      <td>${t.status||""}</td>
      <td>
        <button onclick="editar('${t.cpf}')">Editar</button>
        <button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
      </td>
    </tr>`;
  });
}

/* VALIDAÇÃO VISUAL */
function validar(){
  let valido=true;
  const obrigatorios=["nome_completo","nome_profissional","cpf","email","cargo","hora_entrada","hora_saida","status"];

  obrigatorios.forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove("error");
    if(!el.value){
      el.classList.add("error");
      valido=false;
    }
  });

  return valido;
}

async function salvar(){
  if(!validar()){
    alert("Preencha os campos obrigatórios");
    return;
  }

  const payload={
    nome_completo: nome_completo.value,
    nome_profissional: nome_profissional.value,
    cpf: cpf.value,
    email: email.value,
    cargo: cargo.value,
    tem_folga: tem_folga.value,
    dia_folga: dia_folga.value,
    hora_entrada: hora_entrada.value,
    hora_saida: hora_saida.value,
    status: status.value
  };

  if(cpfAtual){
    delete payload.cpf;
    await supabaseClient.from("terapeutas").update(payload).eq("cpf",cpfAtual);
  }else{
    await supabaseClient.from("terapeutas").insert(payload);
  }

  fecharModal();
  carregar();
}

function abrirNovo(){
  cpfAtual=null;
  document.querySelectorAll("input,select").forEach(e=>{
    if(e.id!=="hora_entrada" && e.id!=="hora_saida") e.value="";
  });
  hora_entrada.value="09:00";
  hora_saida.value="18:00";
  dia_folga.disabled=false;
  cpf.disabled=false;
  modal.style.display="flex";
}

async function editar(cpfSel){
  cpfAtual=cpfSel;
  const {data}=await supabaseClient.from("terapeutas").select("*").eq("cpf",cpfSel).single();
  Object.keys(data).forEach(k=>{
    const el=document.getElementById(k);
    if(el){
      if(k==="hora_entrada"||k==="hora_saida"){
        el.value=data[k]?.substring(0,5)||"";
      }else{
        el.value=data[k]||"";
      }
    }
  });
  cpf.disabled=true;
  modal.style.display="flex";
}

async function excluir(cpfSel){
  if(confirm("Excluir registro?")){
    await supabaseClient.from("terapeutas").delete().eq("cpf",cpfSel);
    carregar();
  }
}

function fecharModal(){
  modal.style.display="none";
}

carregar();
</script>

</body>
</html>
