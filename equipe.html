<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;}
.content{flex:1;padding:40px;}

table{
width:100%;
background:#fff;
border-radius:12px;
border-collapse:collapse;
}

th,td{padding:12px;border-bottom:1px solid #eee;}

button{
background:#1f2937;
color:#fff;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

button.excluir{background:#dc2626}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
width:1000px;
max-height:90vh;
overflow:auto;
padding:20px;
border-radius:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.field{
display:flex;
flex-direction:column;
}

.field label{
font-size:12px;
color:#6b7280;
margin-bottom:4px;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.input-error{
border:2px solid #dc2626 !important;
}

.section{margin-bottom:20px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Equipe</h1>

<button onclick="abrirNovo()">+ Novo</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Cargo</th>
<th>CPF</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<div class="section">
<h3>Dados</h3>
<div class="grid">

<div class="field"><label>Nome Completo</label><input id="nome_completo"></div>
<div class="field"><label>Nome Profissional</label><input id="nome_profissional"></div>
<div class="field"><label>CPF</label><input id="cpf"></div>

<div class="field"><label>Email</label><input id="email"></div>
<div class="field"><label>Telefone</label><input id="telefone"></div>
<div class="field"><label>Cargo</label><input id="cargo"></div>

<div class="field"><label>Status</label>
<select id="status">
<option>Ativo</option>
<option>Inativo</option>
</select>
</div>

</div>
</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>

<script>

let cpfAtual=null

// ================= VALIDAÇÕES =================

function validarEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)
}

function validarCPF(cpf){
cpf=cpf.replace(/\D/g,'')

if(cpf.length!==11 || /^(\d)\1+$/.test(cpf)) return false

let soma=0,resto

for(let i=1;i<=9;i++)
soma+=parseInt(cpf.substring(i-1,i))*(11-i)

resto=(soma*10)%11
if(resto==10||resto==11)resto=0
if(resto!=cpf.substring(9,10)) return false

soma=0
for(let i=1;i<=10;i++)
soma+=parseInt(cpf.substring(i-1,i))*(12-i)

resto=(soma*10)%11
if(resto==10||resto==11)resto=0

return resto==cpf.substring(10,11)
}

function validarFormulario(){

let valido=true

document.querySelectorAll(".input-error")
.forEach(e=>e.classList.remove("input-error"))

const nome=document.getElementById("nome_completo")
const nomeProf=document.getElementById("nome_profissional")
const cpf=document.getElementById("cpf")
const email=document.getElementById("email")

if(!nome.value){nome.classList.add("input-error");valido=false}
if(!nomeProf.value){nomeProf.classList.add("input-error");valido=false}
if(!cpf.value){cpf.classList.add("input-error");valido=false}
if(!email.value){email.classList.add("input-error");valido=false}

if(email.value && !validarEmail(email.value)){
email.classList.add("input-error")
alert("Email inválido")
return false
}

if(cpf.value && !validarCPF(cpf.value)){
cpf.classList.add("input-error")
alert("CPF inválido")
return false
}

if(!valido){
alert("Preencha os campos obrigatórios")
return false
}

return true
}

// ================= CRUD =================

function getPayload(){
return {
nome_completo:nome_completo.value,
nome_profissional:nome_profissional.value,
cpf:cpf.value,
email:email.value,
telefone:telefone.value,
cargo:cargo.value,
status:status.value
}
}

async function carregar(){
const {data}=await client.from("terapeutas").select("*")

let html=""
data.forEach(t=>{
html+=`
<tr>
<td>${t.nome_profissional}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>`
})

lista.innerHTML=html
}

function abrirNovo(){
cpfAtual=null
document.querySelectorAll("input").forEach(i=>i.value="")
modal.style.display="flex"
}

async function editar(cpf){
cpfAtual=cpf
const {data}=await client.from("terapeutas").select("*").eq("cpf",cpf).single()

nome_completo.value=data.nome_completo
nome_profissional.value=data.nome_profissional
cpf.value=data.cpf
email.value=data.email
telefone.value=data.telefone
cargo.value=data.cargo
status.value=data.status

modal.style.display="flex"
}

async function salvar(){

if(!validarFormulario()) return

let payload=getPayload()

if(cpfAtual){
delete payload.cpf
await client.from("terapeutas").update(payload).eq("cpf",cpfAtual)
}else{
await client.from("terapeutas").insert(payload)
}

fecharModal()
carregar()
}

async function excluir(cpf){
if(!confirm("Excluir?")) return
await client.from("terapeutas").delete().eq("cpf",cpf)
carregar()
}

function fecharModal(){
modal.style.display="none"
}

carregar()

</script>

</body>
</html>
