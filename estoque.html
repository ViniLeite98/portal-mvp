<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Materiais | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

.app{display:flex}
.content{flex:1;padding:40px}

.grid{
display:grid;
grid-template-columns: 320px 1fr;
gap:30px;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#334155;
color:#fff;
}

.btn-danger{background:#dc2626;}

.lista-linha{
display:flex;
align-items:center;
margin-bottom:12px;
}

.nome{white-space:nowrap;}

.pontos{
flex:1;
border-bottom:1px dashed #999;
margin:0 10px;
}

.valor{white-space:nowrap;}

.acoes{
display:flex;
gap:5px;
margin-left:10px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:12px;
width:350px;
}
</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Materiais</h1>

<div class="grid">

<div class="card">

<h3>Novo Material</h3>

<input id="nome" placeholder="Nome">
<input id="valor" type="number" step="0.01" placeholder="Valor">

<button onclick="criarProduto()">Cadastrar</button>

<hr>

<h3>Movimentar</h3>

<select id="produtoMov"></select>
<input id="qtd" type="number">

<button onclick="entrada()">Entrada</button>
<button class="btn-danger" onclick="saida()">Saida</button>

</div>

<div class="card">

<h3>Estoque</h3>

<input id="buscarMaterial" placeholder="Buscar..." oninput="filtrarLista()">

<div id="lista"></div>

</div>

</div>

</main>
</div>

<!-- MODAL EDITAR -->
<div id="modalEditar" class="modal">
<div class="modal-box">

<h3>Editar Material</h3>

<input id="editNome">
<input id="editValor" type="number">

<div style="display:flex;gap:10px;margin-top:10px;">
<button onclick="salvarEdicao()">Salvar</button>
<button class="btn-danger" onclick="fecharEditar()">Cancelar</button>
</div>

</div>
</div>

<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabase = supabase.createClient(
  "https://rymehgsoarjeecuwyhny.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let listaOriginal = []
let produtoEditando = null

async function carregar(){

const {data} = await supabaseClient
.from("estoque_atual")
.select("*")
.order("nome")

listaOriginal = data || []
renderizarLista(listaOriginal)
}

function renderizarLista(data){

const lista = document.getElementById("lista")
lista.innerHTML=""

const sel=document.getElementById("produtoMov")
sel.innerHTML=""

data.forEach(p=>{

const total = (p.valor || 0) * (p.saldo || 0)
const nomeSeguro = (p.nome || "").replace(/'/g, "")

const div = document.createElement("div")
div.className = "lista-linha"

div.innerHTML = `
<span class="nome">${p.nome}</span>
<span class="pontos"></span>
<span class="valor">${p.saldo} | R$ ${total.toFixed(2)}</span>

<div class="acoes">
<button class="btn-edit">Editar</button>
<button class="btn-danger">Excluir</button>
</div>
`

// eventos seguros (sem quebrar HTML)
div.querySelector(".btn-edit").onclick = () => abrirEditar(p.id, nomeSeguro, p.valor || 0)
div.querySelector(".btn-danger").onclick = () => excluirProduto(p.id)

lista.appendChild(div)

sel.innerHTML += `<option value="${p.id}">${p.nome}</option>`

})
}

function filtrarLista(){
const termo = document.getElementById("buscarMaterial").value.toLowerCase()

if(!termo){
renderizarLista(listaOriginal)
return
}

const filtrados = listaOriginal.filter(p =>
p.nome.toLowerCase().includes(termo)
)

renderizarLista(filtrados)
}

async function criarProduto(){

const nome=document.getElementById("nome").value
const valor=parseFloat(document.getElementById("valor").value)

await supabaseClient.from("produtos").insert({nome, valor})

carregar()
}

async function entrada(){
const id=document.getElementById("produtoMov").value
const qtd=parseFloat(document.getElementById("qtd").value)

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,tipo:"entrada",quantidade:qtd
})

carregar()
}

async function saida(){
const id=document.getElementById("produtoMov").value
const qtd=parseFloat(document.getElementById("qtd").value)

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,tipo:"saida",quantidade:qtd
})

carregar()
}

async function excluirProduto(id){

if(!confirm("Excluir material?")) return

await supabaseClient.from("movimentacoes_estoque")
.delete().eq("produto_id", id)

await supabaseClient.from("produtos")
.delete().eq("id", id)

carregar()
}

function abrirEditar(id, nome, valor){
produtoEditando = id
document.getElementById("editNome").value = nome
document.getElementById("editValor").value = valor
document.getElementById("modalEditar").style.display = "flex"
}

function fecharEditar(){
document.getElementById("modalEditar").style.display = "none"
}

async function salvarEdicao(){

const nome=document.getElementById("editNome").value
const valor=parseFloat(document.getElementById("editValor").value)

await supabaseClient
.from("produtos")
.update({nome, valor})
.eq("id", produtoEditando)

fecharEditar()
carregar()
}

carregar()

</script>

</body>
</html>
