<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}
.form-box{background:#fff;padding:20px;border-radius:10px;display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.field{display:flex;flex-direction:column;font-size:13px;gap:4px;}
input,select{padding:8px;border-radius:6px;border:1px solid #ccc;min-width:160px;font-size:13px;}
button{background:#2563eb;color:#fff;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;font-size:13px;}
button.editar{background:#f59e0b}
button.excluir{background:#dc2626}
table{width:100%;background:#fff;border-collapse:collapse;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
th,td{padding:10px;border-bottom:1px solid #eee;font-size:13px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:1000;}
.modal-box{background:#fff;padding:24px;border-radius:10px;width:380px;display:flex;flex-direction:column;gap:8px;}
.smart-search-wrap{position:relative;min-width:220px;}
.smart-search-wrap input{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;}
.ss-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;max-height:240px;overflow:auto;display:none;z-index:999;}
.ss-dropdown.open{display:block;}
.ss-option{padding:8px;cursor:pointer;}
.ss-option:hover{background:#f1f5f9;}
.ss-highlight{background:yellow;}
</style>
</head>

<body>

<div class="app">
<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<input type="date" id="data">

<div class="smart-search-wrap">
<input type="text" id="clienteSearch" placeholder="Buscar cliente">
<input type="hidden" id="cliente">
<div class="ss-dropdown" id="clienteDropdown"></div>
</div>

<select id="servico"></select>

<input type="number" id="valor" value="50">
<input type="number" id="desconto" value="0">
<input type="number" id="final" disabled>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr><th>Data</th><th>Cliente</th><th>Valor</th><th>Ações</th></tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>

<script>

let dadosClientes=[]
let dados=[]

function clienteSearchKey(c){
  const nome=(c.nome||c.nome_cliente||c.nomeCompleto||"").toLowerCase()
  const tel=(c.telefone_1||c.telefone||c.celular||"").toString().replace(/\D/g,"")
  return nome+" "+tel
}

function scoreCliente(c,tokens){
  const key=clienteSearchKey(c)
  let score=0
  for(const t of tokens){
    if(!key.includes(t)) return -1
    score++
  }
  return score
}

function highlight(str,tokens){
  let s=str
  tokens.forEach(t=>{
    const r=new RegExp(t,"gi")
    s=s.replace(r,`<span class="ss-highlight">${t}</span>`)
  })
  return s
}

function renderDropdown(list,tokens){
  const dd=document.getElementById("clienteDropdown")
  dd.innerHTML=""
  if(!list.length){dd.innerHTML="<div class='ss-option'>Nada encontrado</div>";dd.classList.add("open");return}
  list.forEach(c=>{
    const nome=c.nome||c.nome_cliente||""
    const tel=(c.telefone_1||c.telefone||c.celular||"").replace(/\D/g,"")
    const el=document.createElement("div")
    el.className="ss-option"
    el.innerHTML=highlight(nome+" "+tel.slice(-4),tokens)
    el.onclick=()=>{
      clienteSearch.value=nome+" "+tel.slice(-4)
      cliente.value=c.id
      dd.classList.remove("open")
    }
    dd.appendChild(el)
  })
  dd.classList.add("open")
}

clienteSearch.addEventListener("input",()=>{
  const q=clienteSearch.value.toLowerCase().trim()
  const tokens=q.split(/\s+/).filter(Boolean)
  if(!tokens.length) return
  const res=dadosClientes
    .map(c=>({c,s:scoreCliente(c,tokens)}))
    .filter(x=>x.s>-1)
    .sort((a,b)=>b.s-a.s)
    .map(x=>x.c)
  renderDropdown(res,tokens)
})

async function carregarClientes(){
  const {data}=await client.from("clientes").select("*")
  dadosClientes=data||[]
}

async function carregarLista(){
  const {data}=await client.from("fluxo_caixa").select("*,clientes(*)")
  dados=data||[]
  lista.innerHTML=""
  dados.forEach(r=>{
    lista.innerHTML+=`
      <tr>
        <td>${r.data}</td>
        <td>${r.clientes?.nome||""}</td>
        <td>${r.valor}</td>
        <td><button onclick="excluir('${r.id}')">Excluir</button></td>
      </tr>`
  })
}

async function salvar(){
  await client.from("fluxo_caixa").insert({
    data:data.value,
    cliente_id:cliente.value,
    valor:valor.value
  })
  carregarLista()
}

async function excluir(id){
  await client.from("fluxo_caixa").delete().eq("id",id)
  carregarLista()
}

carregarClientes()
carregarLista()

</script>

</body>
</html>
