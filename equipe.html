<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th,td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
  font-size:14px;
  text-align:left;
}

th{background:#f9fafb;font-weight:600;}

button{
  background:#1f2937;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px 12px;
  cursor:pointer;
}

button.excluir{background:#dc2626}

.top-actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-bottom:16px;
}

.top-actions input{
  padding:8px;
  border-radius:6px;
  border:1px solid #d1d5db;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
}

.modal-content{
  background:#fff;
  width:1000px;
  max-height:90vh;
  overflow:auto;
  border-radius:18px;
  padding:28px;
}

.section{margin-bottom:28px}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  color:#374151;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:14px;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<div class="top-actions">

<input 
type="text"
id="pesquisaNome"
placeholder="Pesquisar profissional..."
onkeyup="filtrarTabela()"
>

<select id="filtroStatus">
<option value="">Todos</option>
<option value="Ativo">Ativo</option>
<option value="Inativo">Inativo</option>
</select>

<button onclick="abrirNovo()">+ Novo Cadastro</button>

</div>

<table>
<thead>
<tr>
<th>Nome Profissional</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<div class="section">
<h3>Dados Pessoais</h3>
<div class="grid">

<div class="field">
<label>Nome Completo *</label>
<input id="nome_completo">
</div>

<div class="field">
<label>Nome Profissional *</label>
<input id="nome_profissional">
</div>

<div class="field">
<label>CPF *</label>
<input id="cpf">
</div>

<div class="field">
<label>RG</label>
<input type="file" id="rg_file" accept=".pdf,image/*">
</div>

<div class="field">
<label>Comprovante de Residência</label>
<input type="file" id="comprovante_file" accept=".pdf,image/*">
</div>

<div class="field">
<label>Data de Nascimento</label>
<input type="date" id="nascimento">
</div>

<div class="field">
<label>Email *</label>
<input id="email">
</div>

<div class="field">
<label>Tipo Sanguíneo</label>
<select id="tipo_sanguineo">
<option value="">Selecione</option>
<option>A+</option><option>A-</option>
<option>B+</option><option>B-</option>
<option>AB+</option><option>AB-</option>
<option>O+</option><option>O-</option>
</select>
</div>

</div>
</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let cpfAtual=null;

const campos=[
"nome_completo","nome_profissional","cpf","nascimento","email",
"tipo_sanguineo","telefone","telefone_emer","cep","rua","numero",
"complemento","bairro","cidade","uf","pix_tipo","pix_chave",
"cargo","tem_folga","dia_folga",
"hora_entrada","hora_saida","data_inicio","status"
];

function getPayload(){
const obj={};
campos.forEach(c=>{
const el=document.getElementById(c);
if(el && el.value!=="") obj[c]=el.value;
});
return obj;
}

async function uploadArquivo(file, pasta){
    if(!file) return null;

    const nome = Date.now() + "_" + file.name;

    const { error } = await supabaseClient.storage
        .from("documentos")
        .upload(`${pasta}/${nome}`, file);

    if(error){
        console.error(error);
        alert("Erro upload");
        return null;
    }

    const { data } = supabaseClient.storage
        .from("documentos")
        .getPublicUrl(`${pasta}/${nome}`);

    return data.publicUrl;
}

async function salvar(){

const payload=getPayload();

const rgFile = document.getElementById("rg_file")?.files[0];
const compFile = document.getElementById("comprovante_file")?.files[0];

if(rgFile){
    const url = await uploadArquivo(rgFile, "rg");
    if(url) payload.rg_url = url;
}

if(compFile){
    const url = await uploadArquivo(compFile, "comprovante");
    if(url) payload.comprovante_url = url;
}

if(!payload.nome_completo||!payload.nome_profissional||!payload.email){
alert("Preencha os campos obrigatórios");
return;
}

let error;

if(cpfAtual){

delete payload.cpf;

({error}=await supabaseClient
.from("terapeutas")
.update(payload)
.eq("cpf",cpfAtual));

}else{

({error}=await supabaseClient
.from("terapeutas")
.insert(payload));

}

if(error){
console.error(error);
alert("Erro ao salvar");
return;
}

fecharModal();
carregar();
}

function fecharModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
