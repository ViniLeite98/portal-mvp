<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th,td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
  font-size:14px;
}

button{
  background:#1f2937;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px 12px;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#fff;
  width:1000px;
  padding:28px;
  border-radius:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.field{
  display:flex;
  flex-direction:column;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<button onclick="abrirNovo()">+ Novo Cadastro</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Cargo</th>
<th>CPF</th>
<th>Docs</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<div class="grid">

<div class="field">
<label>Nome Profissional</label>
<input id="nome_profissional">
</div>

<div class="field">
<label>CPF</label>
<input id="cpf">
</div>

<div class="field">
<label>Cargo</label>
<input id="cargo">
</div>

<div class="field">
<label>RG</label>
<input type="file" id="rg_file">
</div>

<div class="field">
<label>Comprovante</label>
<input type="file" id="comprovante_file">
</div>

</div>

<br>

<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let cpfAtual=null;

/* upload */
async function uploadArquivo(file, pasta){
    if(!file) return null;

    const nome = Date.now()+"_"+file.name;

    const { error } = await supabaseClient.storage
        .from("documentos")
        .upload(pasta+"/"+nome, file);

    if(error){
        console.error(error);
        alert("Erro upload");
        return null;
    }

    const { data } = supabaseClient.storage
        .from("documentos")
        .getPublicUrl(pasta+"/"+nome);

    return data.publicUrl;
}

/* carregar */
async function carregar(){
    const { data } = await supabaseClient
        .from("terapeutas")
        .select("*")
        .order("nome_profissional");

    const tbody=document.getElementById("lista");
    tbody.innerHTML="";

    data.forEach(t=>{
        tbody.innerHTML+=`
        <tr>
            <td>${t.nome_profissional||""}</td>
            <td>${t.cargo||""}</td>
            <td>${t.cpf||""}</td>
            <td>
                ${t.rg_url ? `<a href="${t.rg_url}" target="_blank">RG</a>` : ""}
                ${t.comprovante_url ? `<a href="${t.comprovante_url}" target="_blank">Comp</a>` : ""}
            </td>
            <td>
                <button onclick="editar('${t.cpf}')">Editar</button>
                <button onclick="excluir('${t.cpf}')">Excluir</button>
            </td>
        </tr>`;
    });
}

/* abrir */
function abrirNovo(){
    cpfAtual=null;
    document.querySelectorAll("input").forEach(i=>i.value="");
    modal.style.display="flex";
}

/* editar */
async function editar(cpf){
    cpfAtual=cpf;

    const { data } = await supabaseClient
        .from("terapeutas")
        .select("*")
        .eq("cpf",cpf)
        .single();

    nome_profissional.value=data.nome_profissional;
    cargo.value=data.cargo;
    document.getElementById("cpf").value=data.cpf;

    modal.style.display="flex";
}

/* salvar */
async function salvar(){

    let payload={
        nome_profissional: nome_profissional.value,
        cpf: cpf.value,
        cargo: cargo.value
    };

    const rgFile = document.getElementById("rg_file").files[0];
    const compFile = document.getElementById("comprovante_file").files[0];

    if(rgFile){
        payload.rg_url = await uploadArquivo(rgFile,"rg");
    }

    if(compFile){
        payload.comprovante_url = await uploadArquivo(compFile,"comprovante");
    }

    if(cpfAtual){
        await supabaseClient
            .from("terapeutas")
            .update(payload)
            .eq("cpf",cpfAtual);
    }else{
        await supabaseClient
            .from("terapeutas")
            .insert(payload);
    }

    fecharModal();
    carregar();
}

/* excluir */
async function excluir(cpf){
    if(!confirm("Excluir?")) return;

    await supabaseClient
        .from("terapeutas")
        .delete()
        .eq("cpf",cpf);

    carregar();
}

function fecharModal(){
    modal.style.display="none";
}

carregar();

</script>

</body>
</html>
