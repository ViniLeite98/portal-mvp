<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Materiais | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

.app{display:flex}
.content{flex:1;padding:40px}

.grid{
display:grid;
grid-template-columns: 1fr 1fr;
gap:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

h1{margin-bottom:5px}
.sub{color:#555;margin-bottom:30px}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #ccc;
}

button{
margin-top:20px;
background:#334155;
color:#fff;
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
width:100%;
}

.lista-item{
display:flex;
justify-content:space-between;
margin-bottom:12px;
font-size:15px;
}

.qtd{
font-weight:bold;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Materiais</h1>
<div class="sub">Controle de utilização e estoque</div>

<div class="grid">

<!-- ESQUERDA -->
<div class="card">

<label>Material</label>
<select id="produto"></select>

<label>Data</label>
<input type="date" id="data">

<label>Profissional</label>
<input id="profissional">

<label>Quantidade</label>
<input type="number" id="quantidade">

<button onclick="registrar()">+ Adicionar</button>

</div>

<!-- DIREITA -->
<div class="card">

<h3>Estoque</h3>

<div id="lista"></div>

</div>

</div>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

async function carregarProdutos(){

const {data} = await supabaseClient
.from("produtos")
.select("id,nome")
.order("nome")

const select = document.getElementById("produto")
select.innerHTML=""

data.forEach(p=>{
select.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
})

}

async function carregarEstoque(){

const {data} = await supabaseClient
.from("estoque_atual")
.select("*")
.order("nome")

const div = document.getElementById("lista")
div.innerHTML=""

data.forEach(p=>{
div.innerHTML+=`
<div class="lista-item">
<span>${p.nome}</span>
<span class="qtd">${p.saldo} ${p.unidade || "un"}</span>
</div>
`
})

}

async function registrar(){

const produto = document.getElementById("produto").value
const quantidade = document.getElementById("quantidade").value
const profissional = document.getElementById("profissional").value

if(!produto || !quantidade){
alert("Preencha os campos")
return
}

await supabaseClient
.from("movimentacoes_estoque")
.insert({
produto_id:produto,
tipo:"saida",
quantidade,
origem:"uso",
observacao:profissional
})

document.getElementById("quantidade").value=""
document.getElementById("profissional").value=""

carregarEstoque()

}

carregarProdutos()
carregarEstoque()

</script>

</body>
</html>
