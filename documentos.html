<script>

const supabase = supabase.createClient(
  "https://rymehgsoarjeecuwyhny.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let cpfAtual=null;

function getPayload(){
return {
nome_completo: nome_completo.value,
nome_profissional: nome_profissional.value,
cpf: cpf.value,
rg: rg.value,
email: email.value
};
}

async function uploadArquivo(file, pasta) {
  const fileName = `${Date.now()}_${file.name}`;

  const { error } = await supabaseClient.storage
    .from('documentos')
    .upload(`${pasta}/${fileName}`, file);

  if (error) {
    console.error(error);
    return null;
  }

  const { data } = supabaseClient
    .storage
    .from('documentos')
    .getPublicUrl(`${pasta}/${fileName}`);

  return data.publicUrl;
}

async function salvar(){

const payload=getPayload();

const rgFile = document.getElementById("rg_file").files[0];
const compFile = document.getElementById("comprovante_file").files[0];

if(rgFile){
payload.rg_url = await uploadArquivo(rgFile,"rg");
}

if(compFile){
payload.comprovante_url = await uploadArquivo(compFile,"comprovantes");
}

let error;

if(cpfAtual){

delete payload.cpf;

({error}=await supabaseClient
.from("terapeutas")
.update(payload)
.eq("cpf",cpfAtual));

}else{

({error}=await supabaseClient
.from("terapeutas")
.insert(payload));

}

if(error){
alert("Erro ao salvar");
return;
}

fecharModal();
carregar();
}

async function carregar(){

const {data}=await supabaseClient
.from("terapeutas")
.select("*");

const tbody=document.getElementById("lista");
tbody.innerHTML="";

data.forEach(t=>{
tbody.innerHTML+=`
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>`;
});

}

function abrirNovo(){
cpfAtual=null;
document.querySelectorAll("input").forEach(i=>i.value="");
modal.style.display="flex";
}

function fecharModal(){
modal.style.display="none";
}

carregar();

</script>

</body>
