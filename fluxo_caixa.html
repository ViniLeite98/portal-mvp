<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

/* 🔥 MODAL MELHORADO */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:25px;
border-radius:16px;
width:560px;
max-width:95%;
}

/* GRID PERFEITO */
.modal-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.modal-field{
display:flex;
flex-direction:column;
}

.modal-field label{
font-size:13px;
margin-bottom:6px;
font-weight:500;
color:#444;
}

.modal-field input,
.modal-field select{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

.modal-field input:focus,
.modal-field select:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.1);
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:12px;
margin-top:25px;
}

.btn-salvar{
background:#2563eb;
color:#fff;
padding:12px 18px;
border-radius:10px;
border:none;
}

.btn-cancelar{
background:#ef4444;
color:#fff;
padding:12px 18px;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<!-- 🔥 TODO SEU SISTEMA ORIGINAL CONTINUA IGUAL -->

</main>
</div>

<!-- 🔥 MODAL EDITAR BONITO -->
<div id="modalEditar" class="modal">
<div class="modal-box">

<h3>Editar</h3>

<div class="modal-grid">

<div class="modal-field">
<label>Data</label>
<input type="date" id="editData">
</div>

<div class="modal-field">
<label>Cliente</label>
<select id="editCliente"></select>
</div>

<div class="modal-field">
<label>Serviço</label>
<select id="editServico"></select>
</div>

<div class="modal-field">
<label>Origem</label>
<select id="editOrigem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="modal-field">
<label>Valor</label>
<input type="number" id="editValor">
</div>

<div class="modal-field">
<label>Desconto</label>
<input type="number" id="editDesconto">
</div>

</div>

<div class="modal-actions">
<button class="btn-salvar" onclick="salvarEdicao()">Salvar</button>
<button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
</div>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

</body>
</html>
