<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1f2937,#111827);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:20px;width:400px;max-width:95vw;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.4);}
.hdr{background:#1f2937;padding:32px;text-align:center;color:#fff;}
.hdr .ico{font-size:36px;margin-bottom:8px;}
.hdr h1{font-size:22px;font-weight:800;margin-bottom:4px;}
.hdr p{color:#9ca3af;font-size:13px;}
.bdy{padding:32px;}
.tabs{display:flex;background:#f3f4f6;border-radius:10px;padding:4px;margin-bottom:24px;}
.tab{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;}
.tab.active{background:#fff;color:#111827;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.f{margin-bottom:16px;}
.f label{display:block;font-size:11px;font-weight:700;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.f input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;color:#111827;outline:none;}
.f input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.btn{width:100%;padding:13px;background:#1f2937;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.msg.e{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;display:block;}
.msg.s{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;display:block;}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <div class="ico">🌸</div>
    <h1>Hara Spa</h1>
    <p>Portal de Gestão</p>
  </div>
  <div class="bdy">
    <div class="tabs">
      <div class="tab active" id="t1" onclick="aba('entrar')">Entrar</div>
      <div class="tab"        id="t2" onclick="aba('cad')">Cadastrar</div>
    </div>
    <div id="msg" class="msg"></div>

    <div id="fEntrar">
      <div class="f"><label>Email</label><input type="email"    id="lEmail" placeholder="seu@email.com"></div>
      <div class="f"><label>Senha</label><input type="password" id="lSenha" placeholder="••••••••"></div>
      <button class="btn" id="bEntrar" onclick="entrar()"><i class="fa fa-sign-in-alt"></i> Entrar</button>
    </div>

    <div id="fCad" style="display:none">
      <div class="f"><label>Nome</label><input type="text"      id="cNome"  placeholder="Seu nome completo"></div>
      <div class="f"><label>Email</label><input type="email"    id="cEmail" placeholder="seu@email.com"></div>
      <div class="f"><label>Senha</label><input type="password" id="cSenha" placeholder="Mínimo 6 caracteres"></div>
      <div class="f"><label>Confirmar</label><input type="password" id="cSenha2" placeholder="Repita a senha"></div>
      <button class="btn" id="bCad" onclick="cad()"><i class="fa fa-user-plus"></i> Criar Conta</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>

function aba(t) {
  document.getElementById("t1").classList.toggle("active", t==="entrar");
  document.getElementById("t2").classList.toggle("active", t==="cad");
  document.getElementById("fEntrar").style.display = t==="entrar" ? "" : "none";
  document.getElementById("fCad").style.display    = t==="cad"    ? "" : "none";
  msg("","");
}

function msg(txt, tipo) {
  var el = document.getElementById("msg");
  el.textContent = txt;
  el.className = "msg" + (tipo ? " "+tipo : "");
}

function btn(id, carregando, label) {
  var b = document.getElementById(id);
  b.disabled = carregando;
  b.innerHTML = carregando ? '<i class="fa fa-spinner fa-spin"></i> Aguarde...' : label;
}

function traduzir(m) {
  if (m.indexOf("Invalid login") >= 0)       return "Email ou senha incorretos.";
  if (m.indexOf("Email not confirmed") >= 0) return "Confirme seu email antes de entrar.";
  if (m.indexOf("already registered") >= 0)  return "Este email já está cadastrado.";
  return m;
}

function irPara(role) {
  location.href = role === "admin" ? "dashboard.html" : "equipe.html";
}

function buscarPerfil(uid, tentativas, cb) {
  tentativas = tentativas || 0;
  client.from("perfis").select("role").eq("id", uid).single().then(function(res) {
    if (res.data) { cb(res.data); return; }
    if (tentativas < 5) {
      setTimeout(function() { buscarPerfil(uid, tentativas+1, cb); }, 500);
    } else {
      cb({ role: "operadora" });
    }
  });
}

function entrar() {
  var email = document.getElementById("lEmail").value.trim();
  var senha  = document.getElementById("lSenha").value;
  if (!email || !senha) { msg("Preencha email e senha.", "e"); return; }

  btn("bEntrar", true, '<i class="fa fa-sign-in-alt"></i> Entrar');
  msg("","");

  client.auth.signInWithPassword({ email: email, password: senha }).then(function(res) {
    if (res.error) {
      msg(traduzir(res.error.message), "e");
      btn("bEntrar", false, '<i class="fa fa-sign-in-alt"></i> Entrar');
      return;
    }
    buscarPerfil(res.data.user.id, 0, function(perfil) {
      irPara(perfil.role);
    });
  });
}

function cad() {
  var nome   = document.getElementById("cNome").value.trim();
  var email  = document.getElementById("cEmail").value.trim();
  var senha  = document.getElementById("cSenha").value;
  var senha2 = document.getElementById("cSenha2").value;
  if (!nome)           { msg("Informe seu nome.", "e"); return; }
  if (!email)          { msg("Informe seu email.", "e"); return; }
  if (senha.length < 6){ msg("Senha: mínimo 6 caracteres.", "e"); return; }
  if (senha !== senha2){ msg("As senhas não coincidem.", "e"); return; }

  btn("bCad", true, '<i class="fa fa-user-plus"></i> Criar Conta');
  msg("","");

  client.auth.signUp({ email: email, password: senha, options: { data: { nome: nome } } }).then(function(res) {
    if (res.error) {
      msg(traduzir(res.error.message), "e");
      btn("bCad", false, '<i class="fa fa-user-plus"></i> Criar Conta');
      return;
    }
    if (res.data && res.data.user) {
      client.from("perfis").upsert({ id: res.data.user.id, email: email, nome: nome, role: "operadora" });
    }
    if (res.data && res.data.session) {
      buscarPerfil(res.data.user.id, 0, function(perfil) { irPara(perfil.role); });
    } else {
      msg("Conta criada! Verifique seu email para confirmar.", "s");
      btn("bCad", false, '<i class="fa fa-user-plus"></i> Criar Conta');
    }
  });
}

// Verificar sessão existente ao carregar
client.auth.getSession().then(function(res) {
  if (res.data && res.data.session) {
    buscarPerfil(res.data.session.user.id, 0, function(perfil) {
      irPara(perfil.role);
    });
  }
});

document.addEventListener("keydown", function(e) {
  if (e.key !== "Enter") return;
  if (document.getElementById("t1").classList.contains("active")) entrar();
  else cad();
});
</script>
</body>
</html>
