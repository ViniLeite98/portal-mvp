<script>

/* BUSCA (NOME OU TELEFONE - CORRIGIDO) */
async function filtrarTabela(){

const termo = document.getElementById("buscaCliente").value.trim();

if(!termo){
carregar();
return;
}

/* limpa número */
const numero = termo.replace(/\D/g,'');

/* 🔥 OR em vez de AND */
let query = supabaseClient
.from("clientes")
.select("*")
.or(`nome.ilike.%${termo}%,telefone_1.ilike.%${numero}%`);

const { data, error } = await query.limit(50);

if(error){
console.error(error);
return;
}

render(data);
}

</script>
