<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:350px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<div class="form-box">

<div class="field">
<label>Data Inicial</label>
<input type="date" id="filtroInicio">
</div>

<div class="field">
<label>Data Final</label>
<input type="date" id="filtroFim">
</div>

<div class="field">
<label>Cliente</label>
<select id="filtroCliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="filtroServico"></select>
</div>

<button onclick="filtrar()">Filtrar</button>
<button onclick="limparFiltro()">Limpar</button>
<button onclick="exportarExcel()">Exportar Excel</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div id="modalEditar" class="modal">
<div class="modal-box">

<h3>Editar</h3>

<label>Data</label>
<input type="date" id="editData">

<label>Cliente</label>
<select id="editCliente"></select>

<label>Serviço</label>
<select id="editServico"></select>

<label>Valor</label>
<input type="number" id="editValor">

<label>Desconto</label>
<input type="number" id="editDesconto">

<br><br>

<button onclick="salvarEdicao()">Salvar</button>
<button class="excluir" onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let listaAtual=[]
let dadosClientes=[]
let dadosServicos=[]
let servicosMap={}
let editandoId=null

function nomeServico(s){
if(!s) return ""
if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo} minutos`
if(s.subgrupo) return `${s.grupo} ${s.subgrupo}`
if(s.tempo) return `${s.grupo} ${s.tempo} minutos`
return s.grupo
}

function hoje(){
const d=new Date()
const offset=d.getTimezoneOffset()
return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

data.value=hoje()

valor.oninput=calcular
desconto.oninput=calcular

function calcular(){
final.value=(parseFloat(valor.value||0)-parseFloat(desconto.value||0))
}

function formatar(v){
return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

async function carregarSelects(){

const {data:clientes}=await supabaseClient.from("clientes").select("*")
dadosClientes=clientes||[]

cliente.innerHTML="<option value=''>Selecione</option>"
filtroCliente.innerHTML="<option value=''>Todos</option>"

dadosClientes.forEach(c=>{
const nome=c.nome||c.nome_cliente
cliente.innerHTML+=`<option value="${c.id}">${nome}</option>`
filtroCliente.innerHTML+=`<option value="${c.id}">${nome}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
dadosServicos=servicos||[]

servico.innerHTML="<option value=''>Selecione</option>"
filtroServico.innerHTML="<option value=''>Todos</option>"

dadosServicos.forEach(s=>{
servicosMap[s.id]=s
servico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
filtroServico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

servico.addEventListener("change",()=>{
const s=servicosMap[servico.value]
if(s){
valor.value=s.valor||50
calcular()
}
})

}

async function carregarLista(){

const {data}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]
render(dados)
}

function render(lista){

listaAtual=lista

const tbody=document.getElementById("lista")
tbody.innerHTML=""

lista.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${r.clientes?.nome||r.clientes?.nome_cliente}</td>
<td>${nomeServico(r.servicos)}</td>
<td>${formatar(r.valor)}</td>
<td>${formatar(r.desconto)}</td>
<td><strong>${formatar(r.valor_final)}</strong></td>
<td>
<button class="editar" onclick="abrirEditar('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>
`
})
}

function filtrar(){
let lista=[...dados]

if(filtroInicio.value) lista=lista.filter(d=>d.data>=filtroInicio.value)
if(filtroFim.value) lista=lista.filter(d=>d.data<=filtroFim.value)
if(filtroCliente.value) lista=lista.filter(d=>d.cliente_id==filtroCliente.value)
if(filtroServico.value) lista=lista.filter(d=>d.servico_id==filtroServico.value)

render(lista)
}

function limparFiltro(){
filtroInicio.value=""
filtroFim.value=""
filtroCliente.value=""
filtroServico.value=""
render(dados)
}

function exportarExcel(){

if(!listaAtual.length){
alert("Nada para exportar")
return
}

const exportData=listaAtual.map(r=>({
Data:r.data,
Cliente:r.clientes?.nome||r.clientes?.nome_cliente,
Servico:nomeServico(r.servicos),
Valor:r.valor,
Desconto:r.desconto,
Final:r.valor_final
}))

const ws=XLSX.utils.json_to_sheet(exportData)
const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Fluxo de Caixa")
XLSX.writeFile(wb,"fluxo_caixa.xlsx")
}

function abrirEditar(id){

editandoId=id
const r=dados.find(d=>d.id==id)

editCliente.innerHTML="<option value=''>Selecione</option>"
dadosClientes.forEach(c=>{
const nome=c.nome||c.nome_cliente
editCliente.innerHTML+=`<option value="${c.id}">${nome}</option>`
})

editServico.innerHTML="<option value=''>Selecione</option>"
dadosServicos.forEach(s=>{
editServico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

editData.value=r.data
editCliente.value=r.cliente_id
editServico.value=r.servico_id
editValor.value=r.valor
editDesconto.value=r.desconto

modalEditar.style.display="flex"
}

async function salvarEdicao(){

await supabaseClient.from("fluxo_caixa").update({
data:editData.value,
cliente_id:editCliente.value,
servico_id:editServico.value,
valor:parseFloat(editValor.value||0),
desconto:parseFloat(editDesconto.value||0),
valor_final:parseFloat(editValor.value||0)-parseFloat(editDesconto.value||0)
}).eq("id",editandoId)

fecharModal()
carregarLista()
}

function fecharModal(){
modalEditar.style.display="none"
}

async function excluir(id){
if(!confirm("Excluir?")) return
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

carregarSelects()
carregarLista()
calcular()

</script>

</body>
</html>
