<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes | Hara Spa</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

/* ── TABELA ── */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;font-size:14px;text-align:left;}
th{background:#f9fafb;font-weight:600;}
tr:hover td{background:#f9fafb;}
tr:last-child td{border-bottom:none;}
button{background:#1f2937;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;}
button.excluir{background:#dc2626;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.left-tools input{
  padding:9px 12px;border:1px solid #d1d5db;
  border-radius:8px;width:280px;font-size:14px;
}
.left-tools input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}

/* ── MODAL ── */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:none;align-items:flex-start;justify-content:center;
  z-index:10;padding:30px 20px;overflow-y:auto;
}
.modal-content{
  background:#fff;width:760px;max-width:100%;
  border-radius:18px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 28px 0;
}
.modal-header h2{margin:0;font-size:18px;color:#111827;}
.btn-fechar{
  background:none;color:#6b7280;font-size:20px;
  border:none;cursor:pointer;padding:4px 8px;border-radius:6px;
}
.btn-fechar:hover{background:#f3f4f6;color:#111827;}
.modal-body{display:flex;min-height:400px;}
.side-nav{
  width:180px;flex-shrink:0;
  background:#f9fafb;border-right:1px solid #e5e7eb;
  padding:16px 0;display:flex;flex-direction:column;gap:2px;
}
.side-btn{
  display:flex;align-items:center;gap:10px;
  background:none;color:#6b7280;border:none;border-radius:0;
  padding:11px 20px;font-size:13px;font-weight:500;
  cursor:pointer;text-align:left;width:100%;
  border-left:3px solid transparent;transition:all .15s;
}
.side-btn i{width:16px;text-align:center;font-size:13px;}
.side-btn:hover{background:#f3f4f6;color:#111827;}
.side-btn.active{background:#eff6ff;color:#1d4ed8;border-left-color:#2563eb;font-weight:600;}
.tab-panels{flex:1;overflow-y:auto;}
.tab-panel{display:none;padding:24px 28px;}
.tab-panel.active{display:block;}
.section-title{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:#9ca3af;margin:0 0 18px;
  display:flex;align-items:center;gap:7px;
}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;}
.field{display:flex;flex-direction:column;}
.field label{font-size:12px;font-weight:600;margin-bottom:5px;color:#374151;}
input,select,textarea{
  padding:9px 11px;border-radius:8px;
  border:1px solid #d1d5db;font-size:13px;color:#111827;background:#fff;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
textarea{resize:vertical;min-height:90px;}
.span2{grid-column:span 2;}
.chave-hint{font-size:11px;color:#6b7280;margin-top:4px;display:flex;align-items:center;gap:4px;}
.chave-hint i{color:#2563eb;}
.modal-footer{
  display:flex;justify-content:flex-end;gap:10px;
  padding:14px 28px;border-top:1px solid #e5e7eb;background:#f9fafb;
}
.modal-footer button{padding:9px 20px;font-size:13px;font-weight:600;}
.btn-cancel{background:#fff;color:#374151;border:1px solid #d1d5db;}
.btn-cancel:hover{background:#f3f4f6;}
.btn-save{background:#1f2937;}
.btn-save:hover{background:#111827;}
.empty-row td{text-align:center;color:#9ca3af;padding:32px;}
</style>
</head>

<body>
<div class="app">
<aside id="sidebar"></aside>

<main class="content">
<h1>Clientes</h1>

<div class="topbar">
  <div class="left-tools">
    <input id="buscaCliente" placeholder="🔍  Buscar por nome ou telefone...">
  </div>
  <button onclick="abrirNovo()"><i class="fa fa-plus"></i> Novo Cliente</button>
</div>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Email</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody id="lista"></tbody>
</table>
</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
  <div class="modal-header">
    <h2 id="modalTitulo">Novo Cliente</h2>
    <button class="btn-fechar" onclick="fecharModal()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <nav class="side-nav">
      <button class="side-btn active" onclick="mudarTab('dados',this)"><i class="fa fa-user"></i> Dados</button>
      <button class="side-btn" onclick="mudarTab('contato',this)"><i class="fa fa-phone"></i> Contato</button>
      <button class="side-btn" onclick="mudarTab('obs',this)"><i class="fa fa-sticky-note"></i> Observações</button>
    </nav>
    <div class="tab-panels">
      <!-- Dados -->
      <div class="tab-panel active" id="tab-dados">
        <p class="section-title"><i class="fa fa-user"></i> Dados do Cliente</p>
        <div class="grid">
          <div class="field span2">
            <label>Nome *</label>
            <input id="nome" placeholder="Nome completo">
            <span class="chave-hint"><i class="fa fa-key"></i> Chave única junto ao telefone</span>
          </div>
          <div class="field"><label>Data de Nascimento</label><input type="date" id="dt_nasc"></div>
          <div class="field"><label>CPF / CNPJ</label><input id="cpf_cnpj" placeholder="000.000.000-00"></div>
          <div class="field"><label>Nacionalidade</label><input id="nacionalidade" placeholder="Brasileira"></div>
        </div>
      </div>
      <!-- Contato -->
      <div class="tab-panel" id="tab-contato">
        <p class="section-title"><i class="fa fa-phone"></i> Contato</p>
        <div class="grid-2">
          <div class="field">
            <label>Telefone 1 *</label>
            <input id="telefone_1" placeholder="(11) 99999-9999">
            <span class="chave-hint"><i class="fa fa-key"></i> Chave única junto ao nome</span>
          </div>
          <div class="field"><label>Telefone 2</label><input id="telefone_2" placeholder="(11) 99999-9999"></div>
          <div class="field span2"><label>Email</label><input id="email" type="email" placeholder="exemplo@email.com"></div>
          <div class="field span2"><label>Endereço</label><input id="endereco" placeholder="Rua, número, bairro, cidade"></div>
        </div>
      </div>
      <!-- Observações -->
      <div class="tab-panel" id="tab-obs">
        <p class="section-title"><i class="fa fa-sticky-note"></i> Observações</p>
        <div class="field">
          <label>Observação</label>
          <textarea id="observacao" placeholder="Preferências, alergias, anotações importantes..."></textarea>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
    <button class="btn-save" onclick="salvar()"><i class="fa fa-save"></i> Salvar</button>
  </div>
</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth-check.js" data-role="admin"></script>
<script>

let idAtual = null;
const camposCliente = ["nome","cpf_cnpj","telefone_1","telefone_2","dt_nasc","email","nacionalidade","endereco","observacao"];

function fmtTel(v){
  v = v.replace(/\D/g,'').substring(0,11);
  if(v.length <= 2) return v.length ? '('+v : v;
  if(v.length <= 6) return '('+v.slice(0,2)+') '+v.slice(2);
  if(v.length <= 10) return '('+v.slice(0,2)+') '+v.slice(2,6)+'-'+v.slice(6);
  return '('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);
}

function fmtCPFCNPJ(v){
  v = v.replace(/\D/g,'');
  if(v.length <= 11){
    if(v.length <= 3) return v;
    if(v.length <= 6) return v.slice(0,3)+'.'+v.slice(3);
    if(v.length <= 9) return v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);
    return v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9,11);
  } else {
    v = v.substring(0,14);
    if(v.length <= 2) return v;
    if(v.length <= 5) return v.slice(0,2)+'.'+v.slice(2);
    if(v.length <= 8) return v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5);
    if(v.length <= 12) return v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5,8)+'/'+v.slice(8);
    return v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5,8)+'/'+v.slice(8,12)+'-'+v.slice(12);
  }
}

function mascara(id, fn){
  const el = document.getElementById(id);
  if(!el) return;
  el.addEventListener('input', function(){
    const pos = this.selectionStart;
    const prev = this.value;
    this.value = fn(this.value);
    if(this.value.length === prev.length) this.setSelectionRange(pos, pos);
  });
}

function aplicarMascaras(){
  mascara('telefone_1', fmtTel);
  mascara('telefone_2', fmtTel);
  mascara('cpf_cnpj',   fmtCPFCNPJ);
}

function mudarTab(tab, btn){
  document.querySelectorAll(".tab-panel").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".side-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  btn.classList.add("active");
}

function limparTel(v){ return (v||"").replace(/\D/g,''); }

async function carregar(){
  const {data, error} = await client.from("clientes").select("*").order("nome").limit(10);
  if(error){ console.error(error); return; }
  render(data, true);
}

function render(lista, limitado){
  const tbody = document.getElementById("lista");
  tbody.innerHTML = "";
  if(!lista || lista.length === 0){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Nenhum cliente encontrado.</td></tr>`;
    return;
  }
  lista.forEach(c => {
    tbody.innerHTML += `<tr>
      <td>${c.nome||""}</td>
      <td>${fmtTel(c.telefone_1||"")}</td>
      <td>${c.email||""}</td>
      <td>
        <button onclick="editar('${c.id}')">Editar</button>
        <button class="excluir" onclick="excluir('${c.id}')">Excluir</button>
      </td>
    </tr>`;
  });
  if(limitado){
    tbody.innerHTML += `<tr class="empty-row"><td colspan="4" style="font-size:12px;color:#9ca3af;padding:12px 14px">
      <i class="fa fa-search"></i> Mostrando os 10 primeiros. Use a busca para encontrar outros.
    </td></tr>`;
  }
}

async function filtrarTabela(){
  const termo = document.getElementById("buscaCliente").value.trim();
  if(!termo){ carregar(); return; }
  const numero = termo.replace(/\D/g,'');
  let resultados = [];
  const {data: porNome} = await client.from("clientes").select("*").ilike("nome",`%${termo}%`).limit(50);
  if(porNome) resultados.push(...porNome);
  if(numero.length >= 3){
    const {data: porTel} = await client.from("clientes").select("*").ilike("telefone_1",`%${numero}%`).limit(50);
    if(porTel) porTel.forEach(t => { if(!resultados.find(r=>r.id===t.id)) resultados.push(t); });
  }
  resultados.sort((a,b)=>a.nome.localeCompare(b.nome));
  render(resultados);
}

function resetModal(){
  camposCliente.forEach(c => { const el = document.getElementById(c); if(el) el.value = ""; });
  mudarTab("dados", document.querySelector(".side-btn"));
}

function abrirNovo(){
  idAtual = null;
  resetModal();
  document.getElementById("modalTitulo").textContent = "Novo Cliente";
  document.getElementById("modal").style.display = "flex";
}

async function editar(id){
  idAtual = id;
  const {data, error} = await client.from("clientes").select("*").eq("id", id).single();
  if(error){ console.error(error); return; }
  resetModal();
  camposCliente.forEach(c => { const el = document.getElementById(c); if(el) el.value = data[c]||""; });
  ['telefone_1','telefone_2','cpf_cnpj'].forEach(id => {
    const el = document.getElementById(id);
    if(el && el.value) el.dispatchEvent(new Event('input'));
  });
  document.getElementById("modalTitulo").textContent = data.nome || "Editar Cliente";
  document.getElementById("modal").style.display = "flex";
}

function fecharModal(){ document.getElementById("modal").style.display = "none"; }

async function salvar(){
  const payload = {};
  camposCliente.forEach(c => {
    const el = document.getElementById(c);
    if(el && el.value.trim()) payload[c] = el.value.trim();
  });
  if(!payload.nome){ alert("Nome é obrigatório."); mudarTab("dados", document.querySelector(".side-btn")); return; }
  if(!payload.telefone_1){ alert("Telefone 1 é obrigatório."); mudarTab("contato", document.querySelectorAll(".side-btn")[1]); return; }

  const telLimpo = limparTel(payload.telefone_1);
  let query = client.from("clientes").select("id").eq("nome", payload.nome).eq("telefone_1", telLimpo);
  if(idAtual) query = query.neq("id", idAtual);
  const {data: existente} = await query;
  if(existente && existente.length > 0){ alert("⚠️ Já existe um cliente com esse nome e telefone."); return; }

  payload.telefone_1 = telLimpo;
  if(payload.telefone_2) payload.telefone_2 = limparTel(payload.telefone_2);

  let error;
  if(idAtual){
    ({error} = await client.from("clientes").update(payload).eq("id", idAtual));
  } else {
    ({error} = await client.from("clientes").insert(payload));
  }
  if(error){ alert("Erro ao salvar: " + error.message); return; }
  fecharModal();
  carregar();
}

async function excluir(id){
  if(!confirm("Excluir este cliente?")) return;
  const {error} = await client.from("clientes").delete().eq("id", id);
  if(error){ alert("Erro ao excluir: " + error.message); return; }
  carregar();
}

document.addEventListener('DOMContentLoaded', () => {
  aplicarMascaras();
  document.getElementById("buscaCliente").addEventListener("input", filtrarTabela);
  carregar();
});
</script>
<script src="assets/sidebar/sidebar.js"></script>
</body>
</html>
