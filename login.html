<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1f2937,#111827);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:20px;width:400px;max-width:95vw;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.4);}
.header{background:#1f2937;padding:32px;text-align:center;color:#fff;}
.header .logo{font-size:36px;margin-bottom:8px;}
.header h1{font-size:22px;font-weight:800;margin-bottom:4px;}
.header p{color:#9ca3af;font-size:13px;}
.body{padding:32px;}
.tabs{display:flex;background:#f3f4f6;border-radius:10px;padding:4px;margin-bottom:24px;}
.tab{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;}
.tab.active{background:#fff;color:#111827;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.field input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;color:#111827;outline:none;transition:border-color .15s;}
.field input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.btn{width:100%;padding:13px;background:#1f2937;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.msg.erro{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;display:block;}
.msg.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;display:block;}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">🌸</div>
    <h1>Hara Spa</h1>
    <p>Portal de Gestão</p>
  </div>
  <div class="body">
    <div class="tabs">
      <div class="tab active" id="tabEntrar"    onclick="mudarTab('entrar')">Entrar</div>
      <div class="tab"        id="tabCadastrar" onclick="mudarTab('cadastrar')">Cadastrar</div>
    </div>
    <div id="msg" class="msg"></div>
    <!-- ENTRAR -->
    <div id="formEntrar">
      <div class="field"><label>Email</label><input type="email"    id="lEmail" placeholder="seu@email.com"></div>
      <div class="field"><label>Senha</label><input type="password" id="lSenha" placeholder="••••••••"></div>
      <button class="btn" id="btnEntrar" onclick="entrar()"><i class="fa fa-sign-in-alt"></i> Entrar</button>
    </div>
    <!-- CADASTRAR -->
    <div id="formCad" style="display:none">
      <div class="field"><label>Nome</label><input type="text"      id="cNome"  placeholder="Seu nome completo"></div>
      <div class="field"><label>Email</label><input type="email"    id="cEmail" placeholder="seu@email.com"></div>
      <div class="field"><label>Senha</label><input type="password" id="cSenha" placeholder="Mínimo 6 caracteres"></div>
      <div class="field"><label>Confirmar Senha</label><input type="password" id="cSenha2" placeholder="Repita a senha"></div>
      <button class="btn" id="btnCad" onclick="cadastrar()"><i class="fa fa-user-plus"></i> Criar Conta</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>

function mudarTab(t){
  document.getElementById("tabEntrar").classList.toggle("active", t==="entrar");
  document.getElementById("tabCadastrar").classList.toggle("active", t==="cadastrar");
  document.getElementById("formEntrar").style.display = t==="entrar"    ? "" : "none";
  document.getElementById("formCad").style.display    = t==="cadastrar" ? "" : "none";
  document.getElementById("msg").className = "msg";
}

function showMsg(txt, tipo){
  const m = document.getElementById("msg");
  m.textContent = txt;
  m.className = "msg " + tipo;
}

function setBtn(id, loading, label){
  const b = document.getElementById(id);
  b.disabled = loading;
  b.innerHTML = loading ? '<i class="fa fa-spinner fa-spin"></i> Aguarde...' : label;
}

async function getPerfil(uid){
  for(let i = 0; i < 5; i++){
    const {data:p} = await client.from("perfis").select("role").eq("id", uid).single();
    if(p) return p;
    await new Promise(r => setTimeout(r, 500));
  }
  return null;
}

function ir(role){
  window.location.href = role === "admin" ? "dashboard.html" : "equipe.html";
}

async function entrar(){
  const email = document.getElementById("lEmail").value.trim();
  const senha  = document.getElementById("lSenha").value;
  if(!email || !senha){ showMsg("Preencha email e senha.", "erro"); return; }
  setBtn("btnEntrar", true, '<i class="fa fa-sign-in-alt"></i> Entrar');
  const {data, error} = await client.auth.signInWithPassword({email, password: senha});
  if(error){
    showMsg(traduzir(error.message), "erro");
    setBtn("btnEntrar", false, '<i class="fa fa-sign-in-alt"></i> Entrar');
    return;
  }
  const perfil = await getPerfil(data.user.id);
  ir(perfil?.role || "operadora");
}

async function cadastrar(){
  const nome   = document.getElementById("cNome").value.trim();
  const email  = document.getElementById("cEmail").value.trim();
  const senha  = document.getElementById("cSenha").value;
  const senha2 = document.getElementById("cSenha2").value;
  if(!nome)          { showMsg("Informe seu nome.", "erro"); return; }
  if(!email)         { showMsg("Informe seu email.", "erro"); return; }
  if(senha.length<6) { showMsg("Senha: mínimo 6 caracteres.", "erro"); return; }
  if(senha !== senha2){ showMsg("As senhas não coincidem.", "erro"); return; }
  setBtn("btnCad", true, '<i class="fa fa-user-plus"></i> Criar Conta');
  const {data, error} = await client.auth.signUp({email, password: senha, options:{data:{nome}}});
  if(error){
    showMsg(traduzir(error.message), "erro");
    setBtn("btnCad", false, '<i class="fa fa-user-plus"></i> Criar Conta');
    return;
  }
  if(data.user){
    await client.from("perfis").upsert({id: data.user.id, email, nome, role: "operadora"});
  }
  if(data.session){
    const perfil = await getPerfil(data.user.id);
    ir(perfil?.role || "operadora");
  } else {
    showMsg("Conta criada! Verifique seu email para confirmar.", "ok");
    setBtn("btnCad", false, '<i class="fa fa-user-plus"></i> Criar Conta');
  }
}

function traduzir(msg){
  if(msg.includes("Invalid login"))       return "Email ou senha incorretos.";
  if(msg.includes("Email not confirmed")) return "Confirme seu email antes de entrar.";
  if(msg.includes("already registered"))  return "Este email já está cadastrado.";
  return msg;
}

document.addEventListener("DOMContentLoaded", async () => {
  const {data:{session}} = await client.auth.getSession();
  if(session){
    const perfil = await getPerfil(session.user.id);
    ir(perfil?.role || "operadora");
  }
});

document.addEventListener("keydown", e => {
  if(e.key !== "Enter") return;
  if(document.getElementById("tabEntrar").classList.contains("active")) entrar();
  else cadastrar();
});
</script>
</body>
</html>
