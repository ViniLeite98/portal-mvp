<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
}

.content{
flex:1;
padding:40px;
}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-box div{
display:flex;
flex-direction:column;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
min-width:200px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

button.excluir{background:#dc2626}
button.editar{background:#f59e0b}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#f9fafb;
text-align:left;
}

.pagination{
margin-top:20px;
display:flex;
gap:6px;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<div class="form-box">

<div>
<label>Terapeuta</label>
<select id="cpf_terapeuta"></select>
</div>

<div>
<label>Certificação</label>
<select id="certificacao_id"></select>
</div>

<div>
<label>Data</label>
<input type="date" id="data_obtencao">
</div>

<button id="btnSalvar" onclick="salvar()">Salvar</button>

</div>

<table>

<thead>
<tr>
<th>Terapeuta</th>
<th>Certificação</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<div class="pagination" id="paginacao"></div>

</main>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let pagina=1
let editando=null
const porPagina=10

/* ================= SELECTS ================= */

async function carregarSelects(){

const selTer=document.getElementById("cpf_terapeuta")
const selCert=document.getElementById("certificacao_id")

const {data:terapeutas}=await supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional")
.eq("status","Ativo")
.order("nome_profissional")

selTer.innerHTML="<option value=''>Selecione</option>"

;(terapeutas||[]).forEach(t=>{
selTer.innerHTML+=`<option value="${t.cpf}">${t.nome_profissional}</option>`
})

const {data:cert}=await supabaseClient
.from("certificacoes")
.select("id,nome")
.order("nome")

selCert.innerHTML="<option value=''>Selecione</option>"

;(cert||[]).forEach(c=>{
selCert.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
})

}

/* ================= LISTA ================= */

async function carregarLista(){

const {data}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
cpf_terapeuta,
certificacao_id,
data_obtencao,
terapeutas(nome_profissional),
certificacoes(nome)
`)

dados=data||[]

render()

}

/* ================= RENDER ================= */

function render(){

const inicio=(pagina-1)*porPagina
const pag=dados.slice(inicio,inicio+porPagina)

const tbody=document.getElementById("lista")

tbody.innerHTML=""

pag.forEach(r=>{

tbody.innerHTML+=`
<tr>

<td>${r.terapeutas?.nome_profissional}</td>

<td>${r.certificacoes?.nome}</td>

<td>${r.data_obtencao||""}</td>

<td>

<button class="editar"
onclick="editar('${r.id}')">
Editar
</button>

<button class="excluir"
onclick="excluir('${r.id}')">
Excluir
</button>

</td>

</tr>
`

})

}

/* ================= EDITAR ================= */

function editar(id){

const item=dados.find(d=>d.id==id)

document.getElementById("cpf_terapeuta").value=item.cpf_terapeuta
document.getElementById("certificacao_id").value=item.certificacao_id
document.getElementById("data_obtencao").value=item.data_obtencao

editando=id

document.getElementById("btnSalvar").innerText="Atualizar"

}

/* ================= SALVAR ================= */

async function salvar(){

const cpf=document.getElementById("cpf_terapeuta").value
const cert=document.getElementById("certificacao_id").value
const data=document.getElementById("data_obtencao").value

if(!cpf||!cert){

alert("Selecione terapeuta e certificação")
return

}

if(editando){

await supabaseClient
.from("terapeuta_certificacoes")
.update({
cpf_terapeuta:cpf,
certificacao_id:cert,
data_obtencao:data
})
.eq("id",editando)

editando=null
document.getElementById("btnSalvar").innerText="Salvar"

}else{

await supabaseClient
.from("terapeuta_certificacoes")
.insert({
cpf_terapeuta:cpf,
certificacao_id:cert,
data_obtencao:data
})

}

limpar()

carregarLista()

}

/* ================= EXCLUIR ================= */

async function excluir(id){

if(!confirm("Excluir vínculo?"))return

await supabaseClient
.from("terapeuta_certificacoes")
.delete()
.eq("id",id)

carregarLista()

}

/* ================= LIMPAR ================= */

function limpar(){

document.getElementById("cpf_terapeuta").value=""
document.getElementById("certificacao_id").value=""
document.getElementById("data_obtencao").value=""

}

carregarSelects()
carregarLista()

</script>

</body>
</html>
