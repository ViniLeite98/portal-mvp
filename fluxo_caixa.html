<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa</title>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>

<style>
body { font-family: Arial; background:#f4f6fb; margin:0; padding:30px }
.box { background:#fff; padding:20px; border-radius:10px; margin-bottom:20px }
input, select { padding:8px; margin:5px; }
button { padding:8px 12px; cursor:pointer }
table { width:100%; background:#fff; border-collapse:collapse }
th,td { padding:10px; border-bottom:1px solid #eee }
</style>
</head>

<body>

<h2>Fluxo de Caixa</h2>

<div class="box">
  <input type="date" id="data">
  
  <select id="cliente"></select>
  
  <input type="number" id="valor" placeholder="Valor">
  <input type="number" id="desconto" placeholder="Desconto">

  <button onclick="salvar()">Adicionar</button>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Valor</th>
<th>Desconto</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

let dados = []
let clientes = []

// 🔹 carregar clientes
async function carregarClientes(){
  const {data} = await client.from("clientes").select("*")

  clientes = data || []

  cliente.innerHTML = "<option></option>"

  clientes.forEach(c=>{
    let tel = (c.telefone_1||"").replace(/\D/g,"")
    let final = tel.slice(-4)

    cliente.innerHTML += `<option value="${c.id}">
      ${c.nome} ${final}
    </option>`
  })

  $('#cliente').select2({
    placeholder:"Buscar cliente",
    width:'200px'
  })
}

// 🔹 salvar
async function salvar(){

  await client.from("fluxo_caixa").insert({
    data: data.value,
    cliente_id: cliente.value,
    valor: Number(valor.value || 0),
    desconto: Number(desconto.value || 0)
  })

  carregarLista()
}

// 🔹 listar
async function carregarLista(){

  const {data} = await client
    .from("fluxo_caixa")
    .select(`*,clientes(*)`)
    .order("data",{ascending:false})

  dados = data || []

  render()
}

// 🔹 render
function render(){

  lista.innerHTML = ""

  dados.forEach(r=>{
    lista.innerHTML += `
      <tr>
        <td>${r.data}</td>
        <td>${r.clientes?.nome || ""}</td>
        <td>${r.valor}</td>
        <td>${r.desconto}</td>
        <td>
          <button onclick="excluir('${r.id}')">Excluir</button>
        </td>
      </tr>
    `
  })
}

// 🔹 excluir
async function excluir(id){
  await client.from("fluxo_caixa").delete().eq("id",id)
  carregarLista()
}

// init
carregarClientes()
carregarLista()

</script>

</body>
</html>
