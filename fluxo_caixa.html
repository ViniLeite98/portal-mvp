<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

/* (TODO O SEU CSS ORIGINAL PERMANECE IGUAL) */
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

  <div class="field">
    <label>Data</label>
    <input type="date" id="data">
  </div>

  <div class="field">
    <label>Cliente</label>
    <div class="smart-search-wrap" id="wrapCliente">
      <input type="text" id="clienteSearch" placeholder="Buscar por nome ou nº…" autocomplete="off">
      <button class="ss-clear" id="clienteClear">✕</button>
      <input type="hidden" id="cliente">
      <div class="ss-dropdown" id="clienteDropdown"></div>
    </div>
  </div>

  <div class="field">
    <label>Serviço</label>
    <select id="servico"></select>
  </div>

  <div class="field">
    <label>Origem</label>
    <select id="origem">
      <option value="">Selecione</option>
      <option>Instagram</option>
      <option>Google</option>
      <option>Indicação</option>
      <option>Cliente antigo</option>
      <option>WhatsApp</option>
      <option>Outro</option>
    </select>
  </div>

  <div class="field">
    <label>Valor</label>
    <input type="number" id="valor" value="50">
  </div>

  <div class="field">
    <label>Desconto</label>
    <input type="number" id="desconto" value="0">
  </div>

  <div class="field">
    <label>Final</label>
    <input type="number" id="final" disabled>
  </div>

  <button onclick="salvar()">Adicionar</button>

</div>

<table>
  <tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>

<script>

function hoje(){
  const d=new Date()
  const offset=d.getTimezoneOffset()
  return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

data.value=hoje()

valor.oninput=calcular
desconto.oninput=calcular

function calcular(){
  final.value=(parseFloat(valor.value||0)-parseFloat(desconto.value||0))
}

async function salvar(){
  const clienteId = document.getElementById("cliente").value
  const servicoId = document.getElementById("servico").value
  const dataVal   = document.getElementById("data").value

  if(!clienteId){ alert("Selecione um cliente"); return }
  if(!servicoId){ alert("Selecione um serviço"); return }

  const { error } = await client.from("fluxo_caixa").insert({
    data       : dataVal,
    cliente_id : clienteId,
    servico_id : servicoId,
    valor      : parseFloat(document.getElementById("valor").value||0),
    desconto   : parseFloat(document.getElementById("desconto").value||0),
    valor_final: parseFloat(document.getElementById("valor").value||0) - parseFloat(document.getElementById("desconto").value||0),
    origem_lead: document.getElementById("origem").value || null
  })

  if(error){ 
    alert("Erro ao salvar: " + error.message); 
    return 
  }

  // 🔥 Atualiza lista
  carregarLista()

  // 🧹 LIMPA FORMULÁRIO
  if(typeof ssCliente !== "undefined") ssCliente.clearSelection()
  document.getElementById("servico").value = ""
  document.getElementById("origem").value = ""
  document.getElementById("valor").value = 50
  document.getElementById("desconto").value = 0
  document.getElementById("data").value = hoje()

  calcular()
}

async function carregarLista(){
  const {data}=await client.from("fluxo_caixa").select("*")
  console.log(data)
}

calcular()

</script>

</body>
</html>
