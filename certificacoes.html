<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpc3MiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let editId=null

/* ICONES */
function iconeCertificacao(nome){

if(!nome) return "fa-certificate"

nome = nome.toLowerCase().trim()

if(nome.includes("feminina")) return "fa-person-dress"
if(nome.includes("casais")) return "fa-user-group"
if(nome.includes("nuru")) return "fa-droplet"
if(nome.includes("viv")) return "fa-spa"
if(nome.includes("podo")) return "fa-footprints"

return "fa-certificate"
}

/* 🔥 MAPA DE ICONES POR TERAPEUTA */
function gerarMapaIcones(lista){

const mapa={}

lista.forEach(r=>{

const nome=r.terapeutas?.nome_profissional||""
const cert=r.certificacoes?.nome||""

if(!mapa[nome]) mapa[nome]=new Set()

mapa[nome].add(cert)

})

return mapa
}

/* LISTA */
async function carregarLista(){

const {data}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
cpf_terapeuta,
certificacao_id,
data_obtencao,
terapeutas(nome_profissional),
certificacoes(nome)
`)

dados=data||[]
render()
}

/* RENDER */
function render(lista=dados){

const mapaIcones = gerarMapaIcones(lista)

const tbody=document.getElementById("lista")
tbody.innerHTML=""

lista.forEach(r=>{

const nome = r.terapeutas?.nome_profissional || ""
const nomeCert = r.certificacoes?.nome || ""

const icone = iconeCertificacao(nomeCert)

const iconesTerapeuta = Array.from(mapaIcones[nome] || [])
.map(c => `<i class="fa-solid ${iconeCertificacao(c)}"></i>`)
.join(" ")

tbody.innerHTML += `
<tr>

<td>
<div>
${nome}
<div class="icones-terapeuta">
${iconesTerapeuta}
</div>
</div>
</td>

<td>
<div class="servico">
<i class="fa-solid ${icone}"></i>
${nomeCert}
</div>
</td>

<td>${r.data_obtencao || ""}</td>

<td>
<button class="editar" onclick="abrirModal('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>

</tr>
`
})

}

/* MODAL */
function abrirModal(id){
alert("Editar funcionando - ID: "+id)
}

function excluir(id){
alert("Excluir funcionando - ID: "+id)
}

carregarLista()

</script>
