<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Seletor de Ícone | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fb;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

.picker{background:#fff;border-radius:18px;width:620px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden;}

/* ── HEADER ── */
.picker-header{padding:22px 24px 0;}
.picker-header h2{font-size:17px;color:#111827;margin-bottom:16px;}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:#f3f4f6;border-radius:10px;padding:3px;margin-bottom:20px;}
.tab{flex:1;padding:8px;text-align:center;border:none;background:none;border-radius:8px;font-size:12px;font-weight:600;color:#6b7280;cursor:pointer;transition:all .15s;}
.tab.active{background:#fff;color:#111827;box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* ── PREVIEW ── */
.preview-box{
  display:flex;align-items:center;gap:14px;
  background:#f9fafb;border:2px solid #e5e7eb;border-radius:12px;
  padding:14px 18px;margin-bottom:20px;
}
.preview-icon{
  width:52px;height:52px;border-radius:12px;
  background:#fff;border:1px solid #e5e7eb;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;overflow:hidden;
}
.preview-icon img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.preview-info{flex:1;}
.preview-label{font-size:13px;font-weight:600;color:#111827;}
.preview-sub{font-size:11px;color:#9ca3af;margin-top:3px;}

/* ── PANELS ── */
.panel{display:none;padding:0 0 4px;}
.panel.active{display:block;}

/* FA grid */
.fa-search{display:flex;gap:8px;margin-bottom:12px;}
.fa-search input{flex:1;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;}
.fa-search input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fa-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;max-height:200px;overflow-y:auto;}
.fa-opt{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border:2px solid #e5e7eb;border-radius:8px;
  cursor:pointer;font-size:10px;color:#6b7280;transition:all .12s;
}
.fa-opt:hover{border-color:#2563eb;background:#eff6ff;color:#1d4ed8;}
.fa-opt.selected{border-color:#2563eb;background:#eff6ff;color:#1d4ed8;}
.fa-opt i{font-size:16px;}
.fa-custom{margin-top:12px;display:flex;gap:8px;align-items:center;}
.fa-custom input{flex:1;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;}
.fa-custom input:focus{outline:none;border-color:#2563eb;}
.fa-custom span{font-size:12px;color:#9ca3af;white-space:nowrap;}

/* Upload */
.upload-area{
  border:2px dashed #d1d5db;border-radius:12px;padding:30px;
  text-align:center;cursor:pointer;transition:all .15s;
  color:#9ca3af;font-size:13px;
}
.upload-area:hover{border-color:#2563eb;background:#f0f9ff;color:#2563eb;}
.upload-area i{font-size:28px;display:block;margin-bottom:10px;}
.upload-area input{display:none;}
.upload-preview{
  margin-top:14px;display:none;
  flex-direction:column;align-items:center;gap:8px;
}
.upload-preview img{width:80px;height:80px;object-fit:cover;border-radius:12px;border:1px solid #e5e7eb;}
.upload-preview span{font-size:12px;color:#6b7280;}
.upload-status{font-size:12px;color:#2563eb;margin-top:8px;display:none;}

/* IA */
.ia-box{display:flex;flex-direction:column;gap:12px;}
.ia-input-row{display:flex;gap:8px;}
.ia-input-row input{flex:1;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;}
.ia-input-row input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.btn-gerar{
  background:#7c3aed;color:#fff;border:none;border-radius:8px;
  padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;
  white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.btn-gerar:hover{background:#6d28d9;}
.btn-gerar:disabled{opacity:.6;cursor:default;}
.ia-result{
  display:none;
  background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;
  padding:16px;text-align:center;
}
.ia-result svg,.ia-result img{width:80px;height:80px;border-radius:10px;}
.ia-result p{font-size:12px;color:#6b7280;margin-top:8px;}
.ia-loading{display:none;text-align:center;padding:20px;color:#7c3aed;font-size:13px;}
.ia-loading i{font-size:24px;display:block;margin-bottom:8px;}
.ia-variantes{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
.ia-var{
  width:64px;height:64px;border:2px solid #e5e7eb;border-radius:10px;
  cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;
  transition:border-color .15s;
}
.ia-var:hover,.ia-var.selected{border-color:#7c3aed;}
.ia-var svg,.ia-var img{width:100%;height:100%;}
.ia-sugestoes{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.ia-chip{
  background:#f3f4f6;color:#374151;border:none;border-radius:99px;
  padding:4px 10px;font-size:11px;cursor:pointer;
}
.ia-chip:hover{background:#e5e7eb;}

/* ── FOOTER ── */
.picker-footer{
  display:flex;justify-content:flex-end;gap:10px;
  padding:16px 24px;border-top:1px solid #e5e7eb;background:#f9fafb;
}
.btn-cancel{background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-confirm{background:#1f2937;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-confirm:hover{background:#111827;}
</style>
</head>
<body>

<div class="picker">
  <div class="picker-header">
    <h2><i class="fa fa-palette" style="color:#7c3aed;margin-right:8px"></i>Selecionar Ícone</h2>

    <!-- Preview -->
    <div class="preview-box">
      <div class="preview-icon" id="previewIcon">
        <i class="fa-solid fa-certificate" id="previewFa" style="color:#8b5cf6"></i>
      </div>
      <div class="preview-info">
        <div class="preview-label" id="previewLabel">fa-certificate</div>
        <div class="preview-sub" id="previewSub">Ícone padrão</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="mudarTab('fa',this)">
        <i class="fa fa-icons"></i> Font Awesome
      </button>
      <button class="tab" onclick="mudarTab('upload',this)">
        <i class="fa fa-upload"></i> Upload
      </button>
      <button class="tab" onclick="mudarTab('ia',this)">
        <i class="fa fa-wand-magic-sparkles" style="color:#7c3aed"></i> Gerar com IA
      </button>
    </div>
  </div>

  <!-- ── PANEL FA ── -->
  <div class="panel active" id="panel-fa" style="padding:0 24px;">
    <div class="fa-search">
      <input id="faBusca" placeholder="Buscar ícone... (ex: flag, star, heart)">
    </div>
    <div class="fa-grid" id="faGrid"></div>
    <div class="fa-custom">
      <span>Código manual:</span>
      <input id="faManual" placeholder="fa-flag-usa">
      <button style="background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer" onclick="aplicarManual()">Aplicar</button>
    </div>
  </div>

  <!-- ── PANEL UPLOAD ── -->
  <div class="panel" id="panel-upload" style="padding:0 24px;">
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(this)">
      <i class="fa fa-image"></i>
      Clique para selecionar uma imagem<br>
      <span style="font-size:11px">PNG, JPG, SVG, WebP — máx. 2MB</span>
    </div>
    <div class="upload-preview" id="uploadPreview">
      <img id="uploadThumb" src="">
      <span id="uploadNome"></span>
    </div>
    <div class="upload-status" id="uploadStatus">
      <i class="fa fa-spinner fa-spin"></i> Fazendo upload...
    </div>
  </div>

  <!-- ── PANEL IA ── -->
  <div class="panel" id="panel-ia" style="padding:0 24px;">
    <div class="ia-box">
      <div class="ia-sugestoes">
        <span style="font-size:11px;color:#9ca3af;margin-right:4px">Sugestões:</span>
        <button class="ia-chip" onclick="gerarIA('bandeira do Reino Unido, ícone de inglês')">🇬🇧 Inglês</button>
        <button class="ia-chip" onclick="gerarIA('bandeira do Brasil, ícone de português')">🇧🇷 Português</button>
        <button class="ia-chip" onclick="gerarIA('bandeira da Espanha, ícone de espanhol')">🇪🇸 Espanhol</button>
        <button class="ia-chip" onclick="gerarIA('mãos fazendo massagem relaxante')">💆 Massagem</button>
        <button class="ia-chip" onclick="gerarIA('pés sendo massageados, podologia')">🦶 Podologia</button>
        <button class="ia-chip" onclick="gerarIA('casal junto, massagem a dois')">👫 Casais</button>
        <button class="ia-chip" onclick="gerarIA('gota de óleo essencial')">💧 Óleo</button>
        <button class="ia-chip" onclick="gerarIA('flor de spa, lotus')">🌸 Spa</button>
      </div>
      <div class="ia-input-row">
        <input id="iaPrompt" placeholder="Descreva o ícone... ex: bandeira do Reino Unido estilizada">
        <button class="btn-gerar" id="btnGerar" onclick="gerarIA()">
          <i class="fa fa-wand-magic-sparkles"></i> Gerar
        </button>
      </div>
      <div class="ia-loading" id="iaLoading">
        <i class="fa fa-spinner fa-spin"></i>
        Gerando ícone com IA...
      </div>
      <div class="ia-result" id="iaResult">
        <div id="iaResultContent"></div>
        <p id="iaResultDesc"></p>
        <div class="ia-variantes" id="iaVariantes"></div>
      </div>
    </div>
  </div>

  <div style="height:20px"></div>

  <!-- Footer -->
  <div class="picker-footer">
    <button class="btn-cancel" onclick="cancelar()">Cancelar</button>
    <button class="btn-confirm" onclick="confirmar()"><i class="fa fa-check"></i> Usar este ícone</button>
  </div>
</div>

<script>
/* ══════════════════════════════════
   ESTADO
══════════════════════════════════ */
let tipoSelecionado = "fa";   // "fa" | "upload" | "ia"
let valorSelecionado = "fa-certificate";
let uploadedUrl = null;
let iasvgAtual = null;

/* ══════════════════════════════════
   FONT AWESOME
══════════════════════════════════ */
const FA_ICONES = [
  {i:"fa-certificate",l:"Certificado"},{i:"fa-person-dress",l:"Feminina"},
  {i:"fa-user-group",l:"Casais"},{i:"fa-droplet",l:"Nuru"},
  {i:"fa-spa",l:"Vivência"},{i:"fa-shoe-prints",l:"Podologia"},
  {i:"fa-star",l:"Estrela"},{i:"fa-heart",l:"Coração"},
  {i:"fa-hands",l:"Mãos"},{i:"fa-leaf",l:"Folha"},
  {i:"fa-fire",l:"Fogo"},{i:"fa-snowflake",l:"Neve"},
  {i:"fa-sun",l:"Sol"},{i:"fa-moon",l:"Lua"},
  {i:"fa-bolt",l:"Raio"},{i:"fa-gem",l:"Gema"},
  {i:"fa-ribbon",l:"Fita"},{i:"fa-award",l:"Prêmio"},
  {i:"fa-flag",l:"Bandeira"},{i:"fa-globe",l:"Globo"},
  {i:"fa-language",l:"Idioma"},{i:"fa-graduation-cap",l:"Formatura"},
  {i:"fa-book",l:"Livro"},{i:"fa-music",l:"Música"},
  {i:"fa-dumbbell",l:"Fitness"},{i:"fa-seedling",l:"Planta"},
  {i:"fa-wind",l:"Vento"},{i:"fa-water",l:"Água"},
  {i:"fa-feather",l:"Pena"},{i:"fa-infinity",l:"Infinito"},
  {i:"fa-yin-yang",l:"Yin Yang"},{i:"fa-peace",l:"Paz"},
  {i:"fa-hand-holding-heart",l:"Cuidado"},{i:"fa-hand-sparkles",l:"Mágica"},
  {i:"fa-brain",l:"Mente"},{i:"fa-eye",l:"Olho"},
];

function renderFaGrid(filtro=""){
  const grid = document.getElementById("faGrid");
  const lista = filtro
    ? FA_ICONES.filter(x => x.l.toLowerCase().includes(filtro.toLowerCase()) || x.i.includes(filtro.toLowerCase()))
    : FA_ICONES;

  grid.innerHTML = lista.map(x => `
    <div class="fa-opt ${valorSelecionado===x.i&&tipoSelecionado==='fa'?'selected':''}"
      onclick="selecionarFa('${x.i}','${x.l}')">
      <i class="fa-solid ${x.i}"></i>
      <span>${x.l}</span>
    </div>`).join("");
}

function selecionarFa(icone, label){
  tipoSelecionado  = "fa";
  valorSelecionado = icone;
  atualizarPreview("fa", icone, label);
  renderFaGrid(document.getElementById("faBusca").value);
}

function aplicarManual(){
  const val = document.getElementById("faManual").value.trim();
  if(!val) return;
  const icone = val.startsWith("fa-") ? val : "fa-"+val;
  selecionarFa(icone, icone);
}

document.addEventListener("DOMContentLoaded", () => {
  renderFaGrid();
  document.getElementById("faBusca").addEventListener("input", e => renderFaGrid(e.target.value));
  document.getElementById("faManual").addEventListener("keydown", e => { if(e.key==="Enter") aplicarManual(); });
  document.getElementById("iaPrompt").addEventListener("keydown", e => { if(e.key==="Enter") gerarIA(); });
});

/* ══════════════════════════════════
   UPLOAD
══════════════════════════════════ */
function handleUpload(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){ alert("Arquivo muito grande. Máximo 2MB."); return; }

  const reader = new FileReader();
  reader.onload = e => {
    const url = e.target.result;
    uploadedUrl = url; // base64 por enquanto; na integração real faz upload pro Supabase

    tipoSelecionado  = "upload";
    valorSelecionado = url;

    document.getElementById("uploadPreview").style.display = "flex";
    document.getElementById("uploadThumb").src = url;
    document.getElementById("uploadNome").textContent = file.name;

    atualizarPreview("upload", url, file.name);
  };
  reader.readAsDataURL(file);
}

/* ══════════════════════════════════
   IA — gera SVG via Claude API
══════════════════════════════════ */
async function gerarIA(promptFixo){
  const prompt = promptFixo || document.getElementById("iaPrompt").value.trim();
  if(!prompt){ alert("Descreva o ícone que deseja gerar."); return; }

  if(!promptFixo) document.getElementById("iaPrompt").value = prompt;

  document.getElementById("iaLoading").style.display = "block";
  document.getElementById("iaResult").style.display  = "none";
  document.getElementById("btnGerar").disabled = true;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `Crie um ícone SVG simples, estilizado e colorido para representar: "${prompt}".

Requisitos:
- SVG com viewBox="0 0 64 64"
- Design limpo, minimalista e reconhecível
- Use cores vibrantes e atraentes
- Pode usar formas geométricas, símbolos ou ilustrações simples
- NÃO use texto/letras dentro do SVG
- O ícone deve ser auto-explicativo visualmente
- Gere 3 variações diferentes do mesmo conceito

Responda APENAS com JSON válido, sem markdown, sem explicações:
{
  "variantes": [
    {"svg": "<svg viewBox='0 0 64 64' xmlns='http://www.w3.org/2000/svg'>...</svg>", "descricao": "descrição curta"},
    {"svg": "...", "descricao": "..."},
    {"svg": "...", "descricao": "..."}
  ]
}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || "";

    // parse JSON
    const clean = text.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean);

    document.getElementById("iaLoading").style.display = "none";
    document.getElementById("iaResult").style.display  = "block";

    // mostrar primeira variante como principal
    const primeira = parsed.variantes[0];
    document.getElementById("iaResultContent").innerHTML = primeira.svg;
    document.getElementById("iaResultDesc").textContent  = primeira.descricao;

    // mostrar variantes
    const varDiv = document.getElementById("iaVariantes");
    varDiv.innerHTML = parsed.variantes.map((v,i) => `
      <div class="ia-var ${i===0?'selected':''}" onclick="selecionarVariante(this, \`${v.svg.replace(/`/g,"\\`")}\`, '${v.descricao.replace(/'/g,"\\'")}')">
        ${v.svg}
      </div>`).join("");

    // selecionar primeira
    iasvgAtual = primeira.svg;
    tipoSelecionado  = "ia";
    valorSelecionado = primeira.svg;
    atualizarPreview("ia", primeira.svg, primeira.descricao);

  } catch(e) {
    document.getElementById("iaLoading").style.display = "none";
    alert("Erro ao gerar ícone: " + e.message);
    console.error(e);
  }

  document.getElementById("btnGerar").disabled = false;
}

function selecionarVariante(el, svg, desc){
  document.querySelectorAll(".ia-var").forEach(v => v.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("iaResultContent").innerHTML = svg;
  document.getElementById("iaResultDesc").textContent  = desc;
  iasvgAtual = svg;
  tipoSelecionado  = "ia";
  valorSelecionado = svg;
  atualizarPreview("ia", svg, desc);
}

/* ══════════════════════════════════
   PREVIEW
══════════════════════════════════ */
function atualizarPreview(tipo, valor, label){
  const iconEl = document.getElementById("previewIcon");
  const labelEl = document.getElementById("previewLabel");
  const subEl   = document.getElementById("previewSub");

  if(tipo === "fa"){
    iconEl.innerHTML = `<i class="fa-solid ${valor}" style="font-size:24px;color:#7c3aed"></i>`;
    labelEl.textContent = valor;
    subEl.textContent   = "Font Awesome";
  } else if(tipo === "upload"){
    iconEl.innerHTML = `<img src="${valor}" alt="ícone">`;
    labelEl.textContent = label;
    subEl.textContent   = "Imagem enviada";
  } else if(tipo === "ia"){
    iconEl.innerHTML = valor;
    const svgEl = iconEl.querySelector("svg");
    if(svgEl){ svgEl.style.width="44px"; svgEl.style.height="44px"; }
    labelEl.textContent = label || "Ícone gerado por IA";
    subEl.textContent   = "Gerado com IA";
  }
}

/* ══════════════════════════════════
   TABS
══════════════════════════════════ */
function mudarTab(tab, btn){
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  document.getElementById("panel-"+tab).classList.add("active");
  btn.classList.add("active");
}

/* ══════════════════════════════════
   CONFIRMAR / CANCELAR
   (integração: chame window.onIconeConfirmado)
══════════════════════════════════ */
function confirmar(){
  if(window.onIconeConfirmado){
    window.onIconeConfirmado({tipo: tipoSelecionado, valor: valorSelecionado});
  } else {
    // demo standalone
    alert(`Ícone selecionado!\nTipo: ${tipoSelecionado}\nValor: ${valorSelecionado.substring(0,80)}...`);
  }
}

function cancelar(){
  if(window.onIconeCancelado) window.onIconeCancelado();
}
</script>
</body>
</html>
