<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Materiais | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

.app{display:flex}
.content{flex:1;padding:40px}

.grid{
display:grid;
grid-template-columns: 1fr 1fr;
gap:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

h1{margin-bottom:5px}
.sub{color:#555;margin-bottom:30px}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input,select{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #ccc;
}

button{
margin-top:20px;
background:#334155;
color:#fff;
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
width:100%;
}

.lista-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
font-size:15px;
}

.qtd{
font-weight:bold;
}

.mov{
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:6px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Materiais</h1>
<div class="sub">Controle de utilização e estoque</div>

<div class="grid">

<!-- ESQUERDA -->
<div class="card">

<h3>Registrar Uso</h3>

<label>Material</label>
<select id="produto"></select>

<label>Data</label>
<input type="date" id="data">

<label>Profissional</label>
<input id="profissional">

<label>Quantidade</label>
<input type="number" id="quantidade">

<button onclick="registrar()">+ Adicionar</button>

<hr style="margin:25px 0">

<h3>Novo Produto</h3>

<input id="novo_nome" placeholder="Nome do produto">

<select id="novo_categoria">
  <option value="">Categoria</option>
  <option value="Bebida">Bebida</option>
  <option value="Higiene">Higiene</option>
  <option value="Comida">Comida</option>
  <option value="Outros">Outros</option>
</select>

<input id="novo_unidade" placeholder="Unidade (ml, un)">
<input id="novo_minimo" type="number" placeholder="Estoque mínimo">

<button onclick="criarProduto()">+ Cadastrar Produto</button>

</div>

<!-- DIREITA -->
<div class="card">

<h3>Estoque</h3>
<div id="lista"></div>

<hr style="margin:20px 0">

<h3>Movimentações</h3>
<div id="movimentacoes" style="max-height:250px;overflow:auto"></div>

</div>

</div>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

async function carregarProdutos(){

const {data} = await supabaseClient
.from("produtos")
.select("id,nome")
.order("nome")

const select = document.getElementById("produto")
select.innerHTML=""

data.forEach(p=>{
select.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
})

}

async function carregarEstoque(){

const {data} = await supabaseClient
.from("estoque_atual")
.select("*")
.order("nome")

const div = document.getElementById("lista")
div.innerHTML=""

data.forEach(p=>{
div.innerHTML+=`
<div class="lista-item">

<div>
<div>${p.nome}</div>
<div style="font-size:12px;color:#777">${p.categoria || ""}</div>
</div>

<div style="display:flex;align-items:center;gap:10px">

<span class="qtd">${p.saldo} ${p.unidade || "un"}</span>

<button onclick="excluirProduto('${p.id}')" 
style="background:#dc2626;padding:5px 10px;font-size:12px">
Excluir
</button>

</div>

</div>
`
})

}

async function carregarMovimentacoes(){

const {data} = await supabaseClient
.from("movimentacoes_estoque")
.select(`
quantidade,
tipo,
data,
produtos(nome)
`)
.order("data", { ascending: false })
.limit(20)

const div = document.getElementById("movimentacoes")
div.innerHTML=""

data.forEach(m=>{
div.innerHTML+=`
<div class="mov">
<span>${m.produtos?.nome}</span>
<span style="color:${m.tipo === 'entrada' ? 'green' : 'red'}">
${m.tipo === 'entrada' ? '+' : '-'} ${m.quantidade}
</span>
</div>
`
})

}

async function registrar(){

const produto = document.getElementById("produto").value
const quantidade = document.getElementById("quantidade").value
const profissional = document.getElementById("profissional").value
const data = document.getElementById("data").value

if(!produto || !quantidade){
alert("Preencha os campos")
return
}

await supabaseClient
.from("movimentacoes_estoque")
.insert({
produto_id:produto,
tipo:"saida",
quantidade,
origem:"uso",
observacao:profissional,
data: data || new Date()
})

document.getElementById("quantidade").value=""
document.getElementById("profissional").value=""

carregarEstoque()
carregarMovimentacoes()

}

async function criarProduto(){

const nome = document.getElementById("novo_nome").value.trim()
const categoria = document.getElementById("novo_categoria").value
const unidade = document.getElementById("novo_unidade").value
const minimo = document.getElementById("novo_minimo").value

if(!nome){
alert("Digite o nome")
return
}

const { data: existente } = await supabaseClient
.from("produtos")
.select("id")
.ilike("nome", nome)

if(existente.length > 0){
alert("Produto já existe")
return
}

await supabaseClient
.from("produtos")
.insert({
nome,
categoria,
unidade,
estoque_minimo: minimo || 0
})

document.getElementById("novo_nome").value=""
document.getElementById("novo_categoria").value=""
document.getElementById("novo_unidade").value=""
document.getElementById("novo_minimo").value=""

carregarProdutos()
carregarEstoque()

}

async function excluirProduto(id){

if(!confirm("Excluir produto? Isso apagará todo histórico.")) return

await supabaseClient
.from("produtos")
.delete()
.eq("id",id)

carregarProdutos()
carregarEstoque()
carregarMovimentacoes()

}

carregarProdutos()
carregarEstoque()
carregarMovimentacoes()

</script>

</body>
</html>
