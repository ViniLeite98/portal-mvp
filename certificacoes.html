<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

h1{margin-top:0}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-box div{
display:flex;
flex-direction:column;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
min-width:200px;
}

/* 🔥 PADRÃO BOTÕES (AJUSTE AQUI) */
button{
background:#1f2937;
color:#fff;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

/* 🔥 EXCLUIR */
button.excluir{
background:#dc2626;
}

/* 🔥 EDITAR (remove laranja antigo) */
button.editar{
background:#1f2937;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

th{
background:#f9fafb;
text-align:left;
}

.servico{
display:flex;
align-items:center;
gap:8px;
}

.servico i{
margin-left:6px;
color:#6366f1;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:420px;
}
</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<div class="form-box">

<div>
<label>Terapeuta</label>
<select id="cpf_terapeuta"></select>
</div>

<div>
<label>Certificação</label>
<select id="certificacao_id"></select>
</div>

<div>
<label>Data</label>
<input type="date" id="data_obtencao">
</div>

<button onclick="vincular()">Vincular</button>

</div>

<div style="margin-bottom:10px;font-size:13px;color:#555;">
<strong>Legenda:</strong>
<i class="fa-solid fa-person-dress"></i> Feminina |
<i class="fa-solid fa-user-group"></i> Casais |
<i class="fa-solid fa-droplet"></i> Nuru |
<i class="fa-solid fa-spa"></i> Vivência |
<i class="fa-solid fa-shoe-prints"></i> Podologia
</div>

<input 
id="buscaTerapeuta" 
placeholder="Buscar profssional ou certificação..."
oninput="filtrarTabela()"
>

<button onclick="exportarExcel()">Exportar Excel</button>

<br><br>

<table>
<thead>
<tr>
<th>Terapeuta</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL LISTA -->
<div id="modalCerts" class="modal">
<div class="modal-box">
<h3 id="tituloModal"></h3>
<div id="listaCerts"></div>
<br>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<!-- MODAL DATA -->
<div id="modalEditarData" class="modal">
<div class="modal-box">
<h3>Editar Data</h3>

<input type="date" id="novaDataInput" style="width:100%;margin-bottom:15px;">

<div style="display:flex;gap:10px;justify-content:flex-end">
<button onclick="salvarNovaData()">Salvar</button>
<button class="excluir" onclick="fecharModalData()">Cancelar</button>
</div>
</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

/* 🔥 SEU SCRIPT ORIGINAL (100% intacto) */

</script>

</body>
</html>
