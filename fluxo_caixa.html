<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

h1{margin-top:0}

/* FORM */

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-box div{
display:flex;
flex-direction:column;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
min-width:180px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#f9fafb;
text-align:left;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div>
<label>Data</label>
<input type="date" id="data">
</div>

<div>
<label>Cliente</label>
<input type="text" id="cliente">
</div>

<div>
<label>Serviço</label>
<select id="servico"></select>
</div>

<div>
<label>Valor</label>
<input type="number" id="valor">
</div>

<div>
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div>
<label>Valor Final</label>
<input type="number" id="valor_final" readonly>
</div>

<button onclick="adicionar()">Adicionar</button>

</div>

<table>

<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</main>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let registros=[]

/* DATA ATUAL */

document.getElementById("data").value =
new Date().toISOString().split("T")[0]

/* CARREGAR SERVIÇOS */

async function carregarServicos(){

const {data}=await supabaseClient
.from("servicos")
.select("id,nome,valor")
.order("nome")

const select=document.getElementById("servico")

select.innerHTML="<option value=''>Selecione</option>"

data.forEach(s=>{

select.innerHTML+=`
<option value="${s.id}" data-valor="${s.valor}">
${s.nome}
</option>
`

})

}

carregarServicos()

/* PREENCHER VALOR AUTOMÁTICO */

document
.getElementById("servico")
.addEventListener("change",function(){

const valor =
this.options[this.selectedIndex].dataset.valor

document.getElementById("valor").value = valor || ""

calcular()

})

/* CALCULAR FINAL */

function calcular(){

const valor =
parseFloat(document.getElementById("valor").value) || 0

const desconto =
parseFloat(document.getElementById("desconto").value) || 0

document.getElementById("valor_final").value =
valor - desconto

}

document
.getElementById("valor")
.addEventListener("input",calcular)

document
.getElementById("desconto")
.addEventListener("input",calcular)

/* ADICIONAR NA TABELA */

function adicionar(){

const data=document.getElementById("data").value
const cliente=document.getElementById("cliente").value
const servico=document.getElementById("servico").selectedOptions[0].text
const valor=document.getElementById("valor").value
const desconto=document.getElementById("desconto").value
const final=document.getElementById("valor_final").value

const item={
data,cliente,servico,valor,desconto,final
}

registros.push(item)

render()

}

/* RENDER */

function render(){

const tbody=document.getElementById("lista")
tbody.innerHTML=""

registros.forEach(r=>{

tbody.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${r.cliente}</td>
<td>${r.servico}</td>
<td>${r.valor}</td>
<td>${r.desconto}</td>
<td>${r.final}</td>
</tr>
`

})

}

</script>

</body>
</html>
