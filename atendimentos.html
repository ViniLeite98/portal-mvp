<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atendimentos | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.card{
background:#fff;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
width:100%;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

.linha{
display:flex;
gap:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Atendimento</h1>

<div class="card">

<select id="cliente"></select>
<select id="servico"></select>

<h3>Materiais utilizados</h3>

<div id="materiais"></div>

<button onclick="addMaterial()">+ Adicionar Material</button>

<br><br>

<button onclick="salvar()">Salvar Atendimento</button>

</div>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"SUA_ANON_KEY"
)

let produtos=[]

async function carregar(){

// clientes
const {data:clientes}=await supabaseClient.from("clientes").select("*")
cliente.innerHTML="<option>Cliente</option>"
clientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
})

// serviços
const {data:servicos}=await supabaseClient.from("servicos").select("*")
servico.innerHTML="<option>Serviço</option>"
servicos.forEach(s=>{
servico.innerHTML+=`<option value="${s.id}">${s.grupo}</option>`
})

// produtos
const {data:p}=await supabaseClient.from("produtos").select("*")
produtos=p

}

function addMaterial(){

const div=document.createElement("div")
div.className="linha"

div.innerHTML=`
<select class="produto"></select>
<input type="number" class="qtd" placeholder="Qtd">
`

const select=div.querySelector(".produto")

produtos.forEach(p=>{
select.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
})

document.getElementById("materiais").appendChild(div)
}

async function salvar(){

// 1️⃣ cria atendimento
const {data, error} = await supabaseClient
.from("atendimentos")
.insert({
cliente_id: cliente.value,
servico_id: servico.value,
data: new Date().toISOString()
})
.select()
.single()

const atendimentoId = data.id

// 2️⃣ materiais
const linhas=document.querySelectorAll(".linha")

for(const l of linhas){

const produto = l.querySelector(".produto").value
const qtd = parseFloat(l.querySelector(".qtd").value)

if(!qtd) continue

// salva relação
await supabaseClient.from("atendimento_materiais").insert({
atendimento_id: atendimentoId,
produto_id: produto,
quantidade: qtd
})

// baixa estoque
await supabaseClient.from("movimentacoes_estoque").insert({
produto_id: produto,
tipo: "saida",
quantidade: qtd
})

}

// 3️⃣ fluxo de caixa automático

const {data:serv} = await supabaseClient
.from("servicos")
.select("valor")
.eq("id", servico.value)
.single()

await supabaseClient.from("fluxo_caixa").insert({
data: new Date().toISOString().split("T")[0],
cliente_id: cliente.value,
servico_id: servico.value,
valor: serv.valor,
desconto: 0,
valor_final: serv.valor
})

alert("Atendimento salvo com sucesso!")

}

carregar()

</script>

</body>
</html>
