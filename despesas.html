<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Despesas | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{flex-shrink:0;}
.content{flex:1;padding:40px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.topbar h1{margin:0;}
.topbar-btns{display:flex;gap:10px;align-items:center;}
button{background:#1f2937;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
button:hover{opacity:.9;}
button.btn-green{background:#16a34a;}
button.btn-red{background:#dc2626;}
button.btn-blue{background:#2563eb;}
button.btn-yellow{background:#d97706;}
button.btn-ghost{background:#fff;color:#374151;border:1px solid #d1d5db;}
button.btn-ghost:hover{background:#f9fafb;}
.filtros-card{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:20px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;font-weight:600;color:#374151;}
.field input,.field select,.field textarea{padding:8px 11px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;color:#111827;background:#fff;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.totais{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
.total-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.t-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:4px;}
.t-valor{font-size:20px;font-weight:800;color:#111827;}
.table-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
table{width:100%;border-collapse:collapse;}
th,td{padding:13px 16px;border-bottom:1px solid #e5e7eb;font-size:13px;text-align:left;}
th{background:#f9fafb;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-pago{background:#dcfce7;color:#16a34a;}
.badge-apagar{background:#fef3c7;color:#d97706;}
.badge-vencido{background:#fee2e2;color:#dc2626;}
.badge-pendente-apr{background:#ede9fe;color:#7c3aed;}
.badge-reprovado{background:#fee2e2;color:#dc2626;}
.badge-recorrente{background:#ede9fe;color:#7c3aed;font-size:10px;padding:2px 7px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:10;padding:30px 20px;overflow-y:auto;}
.modal-content{background:#fff;width:580px;max-width:100%;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;}
.modal-header h2{margin:0;font-size:18px;color:#111827;}
.btn-fechar{background:none;color:#6b7280;font-size:20px;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.btn-fechar:hover{background:#f3f4f6;}
.modal-body{padding:24px;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid #e5e7eb;background:#f9fafb;}
.modal-footer button{padding:9px 20px;}
.btn-cancel{background:#fff;color:#374151;border:1px solid #d1d5db;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.span2{grid-column:span 2;}
.modal-body .field{margin-bottom:12px;}
.modal-body .field:last-child{margin-bottom:0;}
.modal-body input,.modal-body select,.modal-body textarea{width:100%;padding:9px 11px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.modal-body textarea{resize:vertical;min-height:70px;}
.pagar-info{background:#f9fafb;border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.7;}
.nf-atual{display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;font-size:12px;margin-top:6px;}
.nf-atual a{color:#16a34a;text-decoration:none;font-weight:600;}
.upload-status{font-size:12px;color:#2563eb;margin-top:6px;display:none;}
/* Toast de recorrências geradas */
.toast-recorrencia{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;border-radius:12px;padding:14px 22px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:999;opacity:0;transition:opacity .3s;}
.toast-recorrencia.show{opacity:1;}
.toast-recorrencia i{color:#34d399;font-size:16px;}
</style>
</head>
<body>
<div class="app">
<aside id="sidebar"></aside>
<main class="content">
  <div class="topbar">
    <h1>Despesas</h1>
    <div class="topbar-btns" id="topbarBtns"></div>
  </div>
  <div class="filtros-card">
    <div class="field"><label>Vencimento de</label><input type="date" id="filtroInicio"></div>
    <div class="field"><label>Vencimento até</label><input type="date" id="filtroFim"></div>
    <div class="field"><label>Status</label>
      <select id="filtroStatus">
        <option value="">Todos</option>
        <option value="Pendente Aprovação">Pendente Aprovação</option>
        <option value="Aprovado">Aprovado</option>
        <option value="Reprovado">Reprovado</option>
        <option value="A pagar">A pagar</option>
        <option value="Pago">Pago</option>
        <option value="Vencido">Vencido</option>
      </select>
    </div>
    <div class="field"><label>Categoria</label><select id="filtroCategoria"><option value="">Todas</option></select></div>
    <div class="field"><label>Centro de Custo</label><select id="filtroCentro"><option value="">Todos</option></select></div>
    <button class="btn-blue" onclick="aplicarFiltro()"><i class="fa fa-filter"></i> Filtrar</button>
    <button class="btn-ghost" onclick="limparFiltro()"><i class="fa fa-times"></i> Limpar</button>
  </div>
  <div class="totais">
    <div class="total-card"><div class="t-label">Total</div><div class="t-valor" id="totalCount">—</div></div>
    <div class="total-card" style="border-left:3px solid #7c3aed"><div class="t-label" style="color:#7c3aed">Pend. Aprovação</div><div class="t-valor" id="totalPendApr" style="color:#7c3aed">—</div></div>
    <div class="total-card" style="border-left:3px solid #d97706"><div class="t-label" style="color:#d97706">A Pagar</div><div class="t-valor" id="totalAPagar" style="color:#d97706">—</div></div>
    <div class="total-card" style="border-left:3px solid #dc2626"><div class="t-label" style="color:#dc2626">Vencido</div><div class="t-valor" id="totalVencido" style="color:#dc2626">—</div></div>
    <div class="total-card" style="border-left:3px solid #16a34a"><div class="t-label" style="color:#16a34a">Pago</div><div class="t-valor" id="totalPago" style="color:#16a34a">—</div></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Descrição</th><th>Categoria</th><th>Centro de Custo</th><th>Vencimento</th><th>Valor</th><th>Status</th><th>NF</th><th>Ações</th></tr></thead>
      <tbody id="lista"></tbody>
    </table>
  </div>
</main>
</div>

<!-- MODAL NOVA/EDITAR DESPESA -->
<div class="modal" id="modalDespesa">
<div class="modal-content">
  <div class="modal-header"><h2 id="modalTitulo">Nova Despesa</h2><button class="btn-fechar" onclick="fecharModal()"><i class="fa fa-times"></i></button></div>
  <div class="modal-body">
    <div class="grid-2">
      <div class="field span2"><label>Descrição *</label><input id="descricao" placeholder="Ex: Aluguel de maio"></div>
      <div class="field"><label>Categoria</label><select id="categoria"><option value="">Selecione</option></select></div>
      <div class="field"><label>Centro de Custo</label><select id="centro_custo"><option value="">Selecione</option></select></div>
      <div class="field"><label>Valor (R$) *</label><input type="number" id="valor" step="0.01" min="0" placeholder="0,00"></div>
      <div class="field"><label>Data de Vencimento *</label><input type="date" id="data_vencimento"></div>
      <div class="field" id="campoStatus"><label>Status</label>

          <option value="Vencido">Vencido</option>

      <div class="field"><label>Recorrente?</label>

        <select id="recorrencia">

          <option value="anual">Anual</option>

      </div>
      <div class="field span2" id="campoRecorrenteInfo" style="display:none">

        </div>

<!-- MODAL REGISTRAR PAGAMENTO -->
<div class="modal" id="modalPagar">
<div class="modal-content" style="width:420px">
  <div class="modal-header"><h2>Registrar Pagamento</h2><button class="btn-fechar" onclick="fecharModalPagar()"><i class="fa fa-times"></i></button></div>
  <div class="modal-body">
    <div class="pagar-info" id="pagarInfo"></div>
    <div class="field"><label>Data de Pagamento *</label><input type="date" id="pagarData"></div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharModalPagar()">Cancelar</button>

</div>

<div class="toast-recorrencia" id="toastRecorrencia">
  <i class="fa fa-rotate"></i>
  <span id="toastRecorrenteMsg"></span>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/sidebar/sidebar.js"></script>
<script>
let dados=[], listaFiltrada=[], editandoId=null, pagarId=null;
let nfAtualUrl=null, nfAtualNome=null;
let isAdmin=false;

const CATEGORIAS_DEFAULT=[
  "Aluguel","Água","Luz / Energia","Internet","Telefone",
  "Marketing / Publicidade","Site / Domínio / Hospedagem",
  "Material de Limpeza","Material de Escritório","Equipamentos",
  "Manutenção","Contabilidade / Jurídico","Impostos / Taxas",
  "Software / Assinaturas","Transporte / Logística","Alimentação","Outros"
];
const CENTROS_DEFAULT=["Operacional","Estrutura","Marketing","Administrativo","Outros"];

function fmtMoeda(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});}
function fmtData(v){if(!v)return"—";const[y,m,d]=v.split("-");return`${d}/${m}/${y}`;}
function hoje(){const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().split("T")[0];}
function anoMesHoje(){const h=hoje();return h.substring(0,7);} // "2026-05"
function isVencido(vencimento,status){if(["Pago","Pendente Aprovação","Aprovado","Reprovado"].includes(status))return false;return vencimento<hoje();}
function limparNome(nome){return nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9.\-_]/g,"_");}
function getUser(cb,n=20){if(window.usuarioLogado)return cb(window.usuarioLogado);if(n<=0)return cb(null);setTimeout(()=>getUser(cb,n-1),100);}

// ── GERAR RECORRÊNCIAS DO MÊS ATUAL ─────────────────────────────────────────
// Para cada despesa recorrente, verifica se já existe uma cópia no mês atual.
// Se não existir, cria com status "A pagar".
async function gerarRecorrencias(todasDespesas){
  const recorrentes = todasDespesas.filter(d => d.recorrente && d.recorrencia === "mensal");
  if(!recorrentes.length) return 0;

  const mesAtual = anoMesHoje(); // "2026-05"
  let geradas = 0;
  const novas = [];

  for(const d of recorrentes){
    // Verifica se já tem uma despesa com mesma descrição neste mês
    const jaExiste = todasDespesas.some(x =>
      x.descricao === d.descricao &&
      x.data_vencimento &&
      x.data_vencimento.substring(0,7) === mesAtual &&
      x.id !== d.id
    );
    if(jaExiste) continue;

    // Monta vencimento: mesmo dia do mês original, mas no mês atual
    const diaOriginal = d.data_vencimento ? d.data_vencimento.split("-")[2] : "10";
    const [anoAtual, mesAtualNum] = mesAtual.split("-");
    // Garante que o dia não exceda o último dia do mês
    const ultimoDia = new Date(parseInt(anoAtual), parseInt(mesAtualNum), 0).getDate();
    const dia = String(Math.min(parseInt(diaOriginal), ultimoDia)).padStart(2,"0");
    const novoVencimento = `${anoAtual}-${mesAtualNum}-${dia}`;

    // Não gerar se o mês do original já é o mês atual (evita duplicar a própria despesa)
    if(d.data_vencimento && d.data_vencimento.substring(0,7) === mesAtual) continue;

    novas.push({
      descricao:    d.descricao,
      categoria:    d.categoria,
      centro_custo: d.centro_custo,
      valor:        d.valor,
      data_vencimento: novoVencimento,
      status:       "A pagar",
      recorrente:   true,
      recorrencia:  d.recorrencia,
      observacao:   d.observacao,
      nf_url:       null,
      nf_nome:      null,
    });
    geradas++;
  }

  if(novas.length){
    const {error} = await client.from("despesas").insert(novas);
    if(error){ console.error("Erro ao gerar recorrências:", error); return 0; }
  }
  return geradas;
}

function mostrarToastRecorrencia(qtd){
  if(!qtd) return;
  const el = document.getElementById("toastRecorrencia");
  document.getElementById("toastRecorrenteMsg").textContent =
    `${qtd} despesa${qtd>1?"s":""} recorrente${qtd>1?"s":""} gerada${qtd>1?"s":""} para este mês`;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 4000);
}

// ── RENDERIZAR ───────────────────────────────────────────────────────────────
function renderTopbar(u){
  isAdmin = u && u.role === "admin";
  const btns = document.getElementById("topbarBtns");
  btns.innerHTML =
    (isAdmin ? `<button onclick="exportarExcel()"><i class="fa fa-file-excel"></i> Exportar</button>` : "") +
    `<button class="btn-green" onclick="abrirNovo()"><i class="fa fa-plus"></i> Nova Despesa</button>`;
}

async function carregarParametros(){
  const{data}=await client.from("parametros").select("tipo,valor")
    .in("tipo",["categorias_despesa","centros_custo"]).eq("ativo",true).order("valor");
  const cats    = data?.filter(p=>p.tipo==="categorias_despesa").map(p=>p.valor)||[];
  const centros = data?.filter(p=>p.tipo==="centros_custo").map(p=>p.valor)||[];
  const listaC  = cats.length    ? cats    : CATEGORIAS_DEFAULT;
  const listaCC = centros.length ? centros : CENTROS_DEFAULT;
  ["categoria","filtroCategoria"].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML=(id.startsWith("filtro")?"<option value=''>Todas</option>":"<option value=''>Selecione</option>");
    listaC.forEach(c=>sel.innerHTML+=`<option>${c}</option>`);
  });
  ["centro_custo","filtroCentro"].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML=(id.startsWith("filtro")?"<option value=''>Todos</option>":"<option value=''>Selecione</option>");
    listaCC.forEach(c=>sel.innerHTML+=`<option>${c}</option>`);
  });
}

async function carregar(){
  const{data,error}=await client.from("despesas").select("*").order("data_vencimento");
  if(error){console.error(error);return;}
  const todas = data||[];

  // Gera recorrências antes de renderizar
  const qtdGeradas = await gerarRecorrencias(todas);

  // Se gerou alguma, recarrega do banco para pegar as novas
  if(qtdGeradas > 0){
    const{data:atualizado}=await client.from("despesas").select("*").order("data_vencimento");
    dados=(atualizado||[]).map(d=>({...d,status:isVencido(d.data_vencimento,d.status)?"Vencido":d.status}));
    mostrarToastRecorrencia(qtdGeradas);
  } else {
    dados=todas.map(d=>({...d,status:isVencido(d.data_vencimento,d.status)?"Vencido":d.status}));
  }

  listaFiltrada=[...dados];
  render();
}

function render(){
  const tbody=document.getElementById("lista");
  tbody.innerHTML="";
  if(!listaFiltrada.length){
    tbody.innerHTML=`<tr><td colspan="8" style="text-align:center;color:#9ca3af;padding:32px">Nenhuma despesa encontrada.</td></tr>`;
    atualizarTotais([]);return;
  }
  listaFiltrada.forEach(d=>{
    const badgeClass=d.status==="Pago"?"badge-pago":d.status==="Vencido"?"badge-vencido":d.status==="Pendente Aprovação"?"badge-pendente-apr":d.status==="Reprovado"?"badge-reprovado":"badge-apagar";
    const iconeStatus=d.status==="Pago"?"fa-check":d.status==="Vencido"?"fa-exclamation-circle":d.status==="Pendente Aprovação"?"fa-clock":d.status==="Reprovado"?"fa-times":"fa-clock";
    const recBadge=d.recorrente?`<span class="badge badge-recorrente"><i class="fa fa-rotate"></i> ${d.recorrencia||"mensal"}</span>`:"";
    const nfCol=d.nf_url?`<a href="${d.nf_url}" target="_blank" style="color:#2563eb;font-size:12px;text-decoration:none"><i class="fa fa-receipt"></i> Ver</a>`:`<span style="color:#d1d5db;font-size:12px">—</span>`;
    let btnsAcao="";
    if(isAdmin&&!["Pago","Pendente Aprovação","Reprovado"].includes(d.status)){
      btnsAcao+=`<button class="btn-green" style="padding:5px 10px;font-size:12px" onclick="abrirPagar('${d.id}')"><i class="fa fa-check"></i> Pagar</button>`;
    }
    if(isAdmin&&d.status==="Pendente Aprovação"){
      btnsAcao+=`<button class="btn-green" style="padding:5px 10px;font-size:12px" onclick="aprovar('${d.id}')"><i class="fa fa-check"></i> Aprovar</button>`;
      btnsAcao+=`<button class="btn-red" style="padding:5px 10px;font-size:12px" onclick="reprovar('${d.id}')"><i class="fa fa-times"></i> Reprovar</button>`;
    }
    btnsAcao+=`<button class="btn-yellow" style="padding:5px 10px;font-size:12px" onclick="abrirEditar('${d.id}')"><i class="fa fa-pencil"></i></button>`;
    if(isAdmin){btnsAcao+=`<button class="btn-red" style="padding:5px 10px;font-size:12px" onclick="excluir('${d.id}')"><i class="fa fa-trash"></i></button>`;}
    tbody.innerHTML+=`<tr>
      <td>
        <div style="font-weight:600;color:#111827">${d.descricao}</div>
        ${d.observacao?`<div style="font-size:11px;color:#9ca3af;margin-top:2px">${d.observacao}</div>`:""}
        ${recBadge}
      </td>
      <td>${d.categoria||"—"}</td>
      <td>${d.centro_custo||"—"}</td>
      <td style="${d.status==="Vencido"?"color:#dc2626;font-weight:600":""}">
        ${fmtData(d.data_vencimento)}
        ${d.data_pagamento?`<div style="font-size:11px;color:#16a34a">Pago em ${fmtData(d.data_pagamento)}</div>`:""}
      </td>
      <td><strong>${fmtMoeda(d.valor)}</strong></td>
      <td><span class="badge ${badgeClass}"><i class="fa ${iconeStatus}"></i> ${d.status}</span></td>
      <td>${nfCol}</td>
      <td style="display:flex;gap:5px;flex-wrap:wrap">${btnsAcao}</td>
    </tr>`;
  });
  atualizarTotais(listaFiltrada);
}

function atualizarTotais(lista){
  const pendApr=lista.filter(d=>d.status==="Pendente Aprovação");
  const aPagar =lista.filter(d=>["A pagar","Aprovado"].includes(d.status));
  const vencido=lista.filter(d=>d.status==="Vencido");
  const pago   =lista.filter(d=>d.status==="Pago");
  const soma=arr=>arr.reduce((s,d)=>s+(d.valor||0),0);
  document.getElementById("totalCount").textContent=lista.length;
  document.getElementById("totalPendApr").textContent=fmtMoeda(soma(pendApr));
  document.getElementById("totalAPagar").textContent=fmtMoeda(soma(aPagar));
  document.getElementById("totalVencido").textContent=fmtMoeda(soma(vencido));
  document.getElementById("totalPago").textContent=fmtMoeda(soma(pago));
}

function aplicarFiltro(){
  const ini=document.getElementById("filtroInicio").value;
  const fim=document.getElementById("filtroFim").value;
  const status=document.getElementById("filtroStatus").value;
  const cat=document.getElementById("filtroCategoria").value;
  const centro=document.getElementById("filtroCentro").value;
  listaFiltrada=dados.filter(d=>{
    if(ini&&d.data_vencimento<ini)return false;
    if(fim&&d.data_vencimento>fim)return false;
    if(status&&d.status!==status)return false;
    if(cat&&d.categoria!==cat)return false;
    if(centro&&d.centro_custo!==centro)return false;
    return true;
  });
  render();
}

function limparFiltro(){
  ["filtroInicio","filtroFim"].forEach(id=>document.getElementById(id).value="");
  ["filtroStatus","filtroCategoria","filtroCentro"].forEach(id=>document.getElementById(id).value="");
  listaFiltrada=[...dados];render();
}

function toggleDataPagamento(){
  const s=document.getElementById("status").value;
  document.getElementById("campoPagamento").style.display=s==="Pago"?"":"none";
  if(s==="Pago"&&!document.getElementById("data_pagamento").value)document.getElementById("data_pagamento").value=hoje();
}
function toggleRecorrencia(){
  const rec=document.getElementById("recorrente").value==="true";
  document.getElementById("campoRecorrencia").style.display=rec?"":"none";
  document.getElementById("campoRecorrenteInfo").style.display=rec?"":"none";
}
function removerNF(){
  nfAtualUrl=null;nfAtualNome=null;
  document.getElementById("nfAtual").style.display="none";
  document.getElementById("nfArquivo").value="";
}

function resetModal(){
  document.getElementById("descricao").value="";
  document.getElementById("categoria").value="";
  document.getElementById("centro_custo").value="";
  document.getElementById("valor").value="";
  document.getElementById("data_vencimento").value=hoje();
  document.getElementById("recorrente").value="false";
  document.getElementById("recorrencia").value="mensal";
  document.getElementById("observacao").value="";
  document.getElementById("campoPagamento").style.display="none";
  document.getElementById("campoRecorrencia").style.display="none";
  document.getElementById("campoRecorrenteInfo").style.display="none";
  document.getElementById("nfAtual").style.display="none";
  try{document.getElementById("nfArquivo").value="";}catch(e){}
  nfAtualUrl=null;nfAtualNome=null;
  const campoStatus=document.getElementById("campoStatus");
  const selStatus=document.getElementById("status");
  if(isAdmin){campoStatus.style.display="";selStatus.value="A pagar";}
  else{campoStatus.style.display="none";selStatus.value="Pendente Aprovação";}
}

function abrirNovo(){
  editandoId=null;resetModal();
  document.getElementById("modalTitulo").textContent="Nova Despesa";
  document.getElementById("modalDespesa").style.display="flex";
}

function abrirEditar(id){
  editandoId=id;
  const d=dados.find(x=>String(x.id)===String(id));if(!d)return;
  document.getElementById("modalTitulo").textContent="Editar Despesa";
  document.getElementById("modalDespesa").style.display="flex";
  setTimeout(()=>{
    document.getElementById("descricao").value=d.descricao||"";
    document.getElementById("categoria").value=d.categoria||"";
    document.getElementById("centro_custo").value=d.centro_custo||"";
    document.getElementById("valor").value=d.valor||"";
    document.getElementById("data_vencimento").value=d.data_vencimento||"";
    document.getElementById("recorrente").value=d.recorrente?"true":"false";
    document.getElementById("recorrencia").value=d.recorrencia||"mensal";
    document.getElementById("observacao").value=d.observacao||"";
    const campoStatus=document.getElementById("campoStatus");
    const selStatus=document.getElementById("status");
    if(isAdmin){campoStatus.style.display="";selStatus.value=d.status||"A pagar";}
    else{campoStatus.style.display="none";selStatus.value=d.status||"Pendente Aprovação";}
    document.getElementById("data_pagamento").value=d.data_pagamento||"";
    toggleDataPagamento();toggleRecorrencia();
    if(d.nf_url){
      nfAtualUrl=d.nf_url;nfAtualNome=d.nf_nome||"Ver nota fiscal";
      document.getElementById("nfAtual").style.display="flex";
      document.getElementById("nfLink").href=d.nf_url;
      document.getElementById("nfLink").textContent=d.nf_nome||"Ver nota fiscal";
    }
  },30);
}

function fecharModal(){document.getElementById("modalDespesa").style.display="none";}

async function salvar(){
  const descricao=document.getElementById("descricao").value.trim();
  const valor=parseFloat(document.getElementById("valor").value||0);
  const data_vencimento=document.getElementById("data_vencimento").value;
  if(!descricao){alert("Descrição obrigatória.");return;}
  if(!valor||valor<=0){alert("Informe um valor válido.");return;}
  if(!data_vencimento){alert("Informe a data de vencimento.");return;}
  const status=document.getElementById("status").value;
  const file=document.getElementById("nfArquivo").files[0];
  const payload={
    descricao,
    categoria:document.getElementById("categoria").value||null,
    centro_custo:document.getElementById("centro_custo").value||null,
    valor,data_vencimento,status,
    data_pagamento:status==="Pago"?(document.getElementById("data_pagamento").value||hoje()):null,
    recorrente:document.getElementById("recorrente").value==="true",
    recorrencia:document.getElementById("recorrente").value==="true"?document.getElementById("recorrencia").value:null,
    observacao:document.getElementById("observacao").value.trim()||null,
    nf_url:nfAtualUrl||null,nf_nome:nfAtualNome||null
  };
  if(file){
    const statusEl=document.getElementById("nfUploadStatus");statusEl.style.display="block";
    const fileName=`notas_fiscais/${Date.now()}_${limparNome(file.name)}`;
    const{error:upErr}=await client.storage.from("documentos").upload(fileName,file);
    if(upErr){statusEl.style.display="none";alert("Erro no upload da NF: "+upErr.message);return;}
    const{data:urlData}=client.storage.from("documentos").getPublicUrl(fileName);
    payload.nf_url=urlData.publicUrl;payload.nf_nome=file.name;
    statusEl.style.display="none";
  }
  let error;
  if(editandoId){({error}=await client.from("despesas").update(payload).eq("id",editandoId));}
  else{({error}=await client.from("despesas").insert(payload));}
  if(error){alert("Erro ao salvar: "+error.message);return;}
  fecharModal();carregar();
}

async function aprovar(id){if(!confirm("Aprovar esta despesa?"))return;await client.from("despesas").update({status:"A pagar"}).eq("id",id);carregar();}
async function reprovar(id){if(!confirm("Reprovar esta despesa?"))return;await client.from("despesas").update({status:"Reprovado"}).eq("id",id);carregar();}
async function excluir(id){if(!confirm("Excluir esta despesa?"))return;await client.from("despesas").delete().eq("id",id);carregar();}

function abrirPagar(id){
  pagarId=id;
  const d=dados.find(x=>String(x.id)===String(id));if(!d)return;
  document.getElementById("pagarInfo").innerHTML=`<strong>${d.descricao}</strong><br>Vencimento: ${fmtData(d.data_vencimento)}<br>Valor: <strong>${fmtMoeda(d.valor)}</strong>${d.categoria?`<br>Categoria: ${d.categoria}`:""}`;
  document.getElementById("pagarData").value=hoje();
  document.getElementById("modalPagar").style.display="flex";
}
function fecharModalPagar(){document.getElementById("modalPagar").style.display="none";}
async function confirmarPagamento(){
  const data=document.getElementById("pagarData").value;
  if(!data){alert("Informe a data de pagamento.");return;}
  const{error}=await client.from("despesas").update({status:"Pago",data_pagamento:data}).eq("id",pagarId);
  if(error){alert("Erro: "+error.message);return;}
  fecharModalPagar();carregar();
}

function exportarExcel(){
  if(!listaFiltrada.length){alert("Nada para exportar.");return;}
  const exportData=listaFiltrada.map(d=>({"Descrição":d.descricao,"Categoria":d.categoria||"","Centro de Custo":d.centro_custo||"","Vencimento":fmtData(d.data_vencimento),"Pagamento":fmtData(d.data_pagamento),"Valor":Number(d.valor||0),"Status":d.status,"Recorrente":d.recorrente?`Sim (${d.recorrencia})`:"Não","NF":d.nf_url?"Sim":"Não","Observação":d.observacao||""}));
  const ws=XLSX.utils.json_to_sheet(exportData);
  ws["!cols"]=Object.keys(exportData[0]).map(col=>({wch:Math.max(col.length,...exportData.map(r=>String(r[col]||"").length))+2}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Despesas");
  XLSX.writeFile(wb,"despesas.xlsx");
}

document.addEventListener('DOMContentLoaded',()=>{
  getUser(u=>{renderTopbar(u);carregarParametros();carregar();});
});
</script>
