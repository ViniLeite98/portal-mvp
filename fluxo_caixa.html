<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;padding:20px;border-radius:10px;
display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;border-radius:6px;border:1px solid #ccc;min-width:160px;
}

button{
background:#2563eb;color:#fff;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;
}

table{
width:100%;background:#fff;border-collapse:collapse;border-radius:10px;
overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{padding:10px;border-bottom:1px solid #eee;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<input type="date" id="data">

<select id="cliente"></select>
<select id="servico"></select>

<input type="number" id="valor" placeholder="Valor">
<input type="number" id="desconto" placeholder="Desconto">
<input type="number" id="final" disabled placeholder="Final">

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

// 🔥 COLE SUA ANON KEY AQUI
const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"SUA_ANON_KEY_AQUI"
)

let dados=[],servicosMap={}

function nomeCliente(c){
let tel=(c.telefone_1||"").replace(/\D/g,"")
return `${c.nome} ${tel.slice(-4)}`
}

function nomeServico(s){
if(!s) return ""
if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo} min`
return s.grupo
}

valor.oninput=calc
desconto.oninput=calc

function calc(){
final.value=(valor.value||0)-(desconto.value||0)
}

async function carregarSelects(){

const {data:clientes}=await supabaseClient.from("clientes").select("*")
cliente.innerHTML="<option></option>"

clientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${nomeCliente(c)}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
servico.innerHTML="<option></option>"

servicos.forEach(s=>{
servicosMap[s.id]=s
servico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

$('#cliente').select2()
$('#servico').select2()

$('#servico').on('select2:select', function (e) {
const s=servicosMap[e.params.data.id]
if(s){
valor.value=s.valor||0
calc()
}
})

}

async function carregarLista(){
const {data}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]
render(dados)
}

function render(lista){
const tbody=document.getElementById("lista")
tbody.innerHTML=""

lista.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${nomeCliente(r.clientes)}</td>
<td>${nomeServico(r.servicos)}</td>
<td>${r.valor}</td>
<td>${r.valor_final}</td>
<td>
<button onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>`
})
}

async function salvar(){

if(!data.value || !cliente.value || !servico.value){
alert("Preencha os campos")
return
}

const payload={
data:data.value,
cliente_id:Number(cliente.value),
servico_id:Number(servico.value),
valor:Number(valor.value||0),
desconto:Number(desconto.value||0),
valor_final:Number(valor.value||0)-Number(desconto.value||0)
}

const {error}=await supabaseClient
.from("fluxo_caixa")
.insert(payload)

if(error){
alert(error.message)
return
}

carregarLista()
}

async function excluir(id){
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

carregarSelects()
carregarLista()

</script>

</body>
</html>
