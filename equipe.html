<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f5f7fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:14px;
overflow:hidden;
}

th,td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
text-align:left;
}

th{
background:#f9fafb;
font-weight:600;
}

button{
background:#1f2937;
color:#fff;
border:none;
border-radius:6px;
padding:6px 12px;
cursor:pointer;
}

button.excluir{
background:#dc2626;
}

.top-actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.filters{
display:flex;
gap:10px;
align-items:center;
}

.search-box{
position:relative;
}

.search-box input{
padding:10px 40px 10px 14px;
border-radius:8px;
border:1px solid #d1d5db;
width:260px;
}

.search-box i{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
color:#6b7280;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.modal-content{
background:#fff;
width:900px;
max-height:90vh;
overflow:auto;
border-radius:18px;
padding:28px;
}

.section{
margin-bottom:28px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

.field{
display:flex;
flex-direction:column;
}

.field label{
font-size:13px;
font-weight:600;
margin-bottom:6px;
color:#374151;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<div class="top-actions">

<div class="filters">

<div class="search-box">
<input type="text" id="pesquisa" placeholder="Pesquisar profissional...">
<i class="fa fa-search"></i>
</div>

<select id="filtroStatus">
<option value="">Todos</option>
<option value="Ativo">Ativo</option>
<option value="Inativo">Inativo</option>
</select>

</div>

<button onclick="abrirNovo()">+ Novo Cadastro</button>

</div>

<table>

<thead>
<tr>
<th>Nome Profissional</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</main>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<div class="section">

<h3>Dados Pessoais</h3>

<div class="grid">

<div class="field">
<label>Nome Completo *</label>
<input id="nome_completo">
</div>

<div class="field">
<label>Nome Profissional *</label>
<input id="nome_profissional">
</div>

<div class="field">
<label>CPF *</label>
<input id="cpf">
</div>

<div class="field">
<label>Email *</label>
<input id="email">
</div>

<div class="field">
<label>Cargo</label>
<select id="cargo">
<option value="">Selecione</option>
<option>Terapeuta Feminina</option>
<option>Terapeuta Masculino</option>
<option>Gerente</option>
<option>Atendente</option>
<option>Recepcionista</option>
<option>Faxineira</option>
<option>Analista</option>
</select>
</div>

<div class="field">
<label>Status</label>
<select id="status">
<option value="">Selecione</option>
<option>Ativo</option>
<option>Inativo</option>
</select>
</div>

</div>

</div>

<div class="modal-actions">

<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>

</div>

</div>

</div>

<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let cpfAtual=null;

async function carregar(){

const statusFiltro=document.getElementById("filtroStatus").value;
const pesquisa=document.getElementById("pesquisa").value.toLowerCase();

let query=supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional,status,cargo")
.order("nome_profissional");

if(statusFiltro) query=query.eq("status",statusFiltro);

const {data,error}=await query;

if(error){
console.error(error);
return;
}

const tbody=document.getElementById("lista");
tbody.innerHTML="";

data
.filter(t=>{
const texto=(t.nome_profissional+" "+t.cargo+" "+t.cpf).toLowerCase();
return texto.includes(pesquisa);
})
.forEach(t=>{

tbody.innerHTML+=`
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>
`;

});

}

function abrirNovo(){

cpfAtual=null;

document.getElementById("nome_completo").value="";
document.getElementById("nome_profissional").value="";
document.getElementById("cpf").value="";
document.getElementById("email").value="";
document.getElementById("cargo").value="";
document.getElementById("status").value="";

document.getElementById("cpf").disabled=false;

document.getElementById("modal").style.display="flex";

}

async function editar(cpf){

cpfAtual=cpf;

const {data,error}=await supabaseClient
.from("terapeutas")
.select("*")
.eq("cpf",cpf)
.single();

if(error){
console.error(error);
return;
}

document.getElementById("nome_completo").value=data.nome_completo||"";
document.getElementById("nome_profissional").value=data.nome_profissional||"";
document.getElementById("cpf").value=data.cpf||"";
document.getElementById("email").value=data.email||"";
document.getElementById("cargo").value=data.cargo||"";
document.getElementById("status").value=data.status||"";

document.getElementById("cpf").disabled=true;

document.getElementById("modal").style.display="flex";

}

async function salvar(){

const payload={
nome_completo:document.getElementById("nome_completo").value,
nome_profissional:document.getElementById("nome_profissional").value,
cpf:document.getElementById("cpf").value,
email:document.getElementById("email").value,
cargo:document.getElementById("cargo").value,
status:document.getElementById("status").value
};

if(!payload.nome_completo || !payload.nome_profissional || !payload.email){
alert("Preencha os campos obrigatórios");
return;
}

let error;

if(cpfAtual){

delete payload.cpf;

({error}=await supabaseClient
.from("terapeutas")
.update(payload)
.eq("cpf",cpfAtual));

}else{

({error}=await supabaseClient
.from("terapeutas")
.insert(payload));

}

if(error){
console.error(error);
alert("Erro ao salvar");
return;
}

fecharModal();
carregar();

}

async function excluir(cpf){

if(!confirm("Excluir registro?")) return;

await supabaseClient
.from("terapeutas")
.delete()
.eq("cpf",cpf);

carregar();

}

function fecharModal(){
document.getElementById("modal").style.display="none";
}

document.getElementById("filtroStatus").addEventListener("change",carregar);
document.getElementById("pesquisa").addEventListener("input",carregar);

carregar();

</script>

</body>
</html>
