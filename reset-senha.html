<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Redefinir Senha | Hara Spa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#fdf8f3;
  --stone:#2c2420;
  --rose:#c4826a;
  --rose-light:#f0d5c8;
  --gold:#b8986a;
  --muted:#8a7b72;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}

.card{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:20px;
  padding:40px;
  box-shadow:0 8px 40px rgba(44,36,32,.1);
}

.logo{
  text-align:center;
  margin-bottom:32px;
}

.logo-icon{
  width:56px;height:56px;
  background:linear-gradient(135deg,var(--rose),var(--gold));
  border-radius:16px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:26px;
  margin-bottom:12px;
}

.logo-name{
  font-family:'Playfair Display',serif;
  font-size:20px;
  color:var(--stone);
  display:block;
}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:22px;
  color:var(--stone);
  margin-bottom:6px;
  text-align:center;
}

.card-sub{
  font-size:13px;
  color:var(--muted);
  text-align:center;
  margin-bottom:28px;
  line-height:1.6;
}

.field{
  margin-bottom:18px;
}

.field label{
  display:block;
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.07em;
  color:var(--muted);
  margin-bottom:8px;
}

.field-wrap{
  position:relative;
}

.field input{
  width:100%;
  padding:13px 44px 13px 16px;
  border:1.5px solid #e8e2db;
  border-radius:10px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  color:var(--stone);
  background:#fff;
  outline:none;
  transition:border-color .2s;
}

.field input:focus{
  border-color:var(--rose);
  box-shadow:0 0 0 4px rgba(196,130,106,.1);
}

.field input::placeholder{
  color:#c8bfb8;
}

.eye-btn{
  position:absolute;
  right:12px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;
  cursor:pointer;color:#c8bfb8;
  padding:4px;display:flex;
}

.btn-main{
  width:100%;
  padding:14px;
  background:var(--stone);
  color:#fff;
  border:none;
  border-radius:10px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
  margin-top:4px;
}

.btn-main:hover{
  background:#1a1410;
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(44,36,32,.2);
}

.btn-main:disabled{
  opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;
}

.msg{
  padding:11px 14px;
  border-radius:8px;
  font-size:13px;
  margin-bottom:20px;
  display:none;
  text-align:center;
}

.msg.e{background:#fdf2f0;border:1px solid #f5c4b8;color:#a0402a;display:block;}
.msg.s{background:#f0faf5;border:1px solid #b8dfc8;color:#2a6644;display:block;}

.voltar{
  text-align:center;
  margin-top:20px;
}

.voltar a{
  font-size:13px;
  color:var(--muted);
  text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
  transition:color .2s;
}

.voltar a:hover{
  color:var(--stone);
}

/* estado de sucesso */
.success-state{
  text-align:center;
  display:none;
}

.success-icon{
  width:64px;height:64px;
  background:#f0faf5;
  border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:28px;
  color:#2a6644;
  margin-bottom:16px;
}

.success-title{
  font-family:'Playfair Display',serif;
  font-size:20px;
  color:var(--stone);
  margin-bottom:8px;
}

.success-sub{
  font-size:13px;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:24px;
}

/* requisitos de senha */
.req-list{
  margin:10px 0 16px;
  display:flex;flex-direction:column;gap:5px;
}

.req-item{
  display:flex;align-items:center;gap:7px;
  font-size:12px;
  color:#9ca3af;
  transition:color .2s;
}

.req-item.ok{color:#16a34a;}
.req-item .req-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:#d1d5db;
  flex-shrink:0;
  transition:background .2s;
}
.req-item.ok .req-dot{background:#16a34a;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🌸</div>
    <span class="logo-name">Hara Spa</span>
  </div>

  <div id="msg" class="msg"></div>

  <!-- FORM NOVA SENHA -->
  <div id="formReset">
    <h2 class="card-title">Nova Senha</h2>
    <p class="card-sub">Escolha uma senha segura para sua conta.</p>

    <div class="field">
      <label>Nova Senha</label>
      <div class="field-wrap">
        <input type="password" id="novaSenha" placeholder="••••••••" oninput="checarReqs()">
        <button type="button" class="eye-btn" onclick="toggleSenha('novaSenha','eye1')">
          <svg id="eye1" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
      <div class="req-list">
        <div class="req-item" id="req-len"><span class="req-dot"></span> Mínimo 6 caracteres</div>
        <div class="req-item" id="req-upper"><span class="req-dot"></span> Uma letra maiúscula</div>
        <div class="req-item" id="req-num"><span class="req-dot"></span> Um número</div>
      </div>
    </div>

    <div class="field">
      <label>Confirmar Senha</label>
      <div class="field-wrap">
        <input type="password" id="confirmarSenha" placeholder="••••••••">
        <button type="button" class="eye-btn" onclick="toggleSenha('confirmarSenha','eye2')">
          <svg id="eye2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-main" id="btnSalvar" onclick="salvarSenha()">
      Salvar nova senha
    </button>
  </div>

  <!-- SUCESSO -->
  <div class="success-state" id="successState">
    <div class="success-icon">✓</div>
    <h2 class="success-title">Senha atualizada!</h2>
    <p class="success-sub">Sua senha foi redefinida com sucesso. Você já pode entrar com a nova senha.</p>
    <a href="login.html" class="btn-main" style="text-decoration:none;display:inline-flex">
      Ir para o login
    </a>
  </div>

  <div class="voltar" id="voltarLink">
    <a href="login.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Voltar para o login
    </a>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>

function showMsg(txt, tipo) {
  var el = document.getElementById("msg");
  el.textContent = txt;
  el.className = "msg " + tipo;
}

function btn(id, loading, label) {
  var b = document.getElementById(id);
  b.disabled = loading;
  b.textContent = loading ? "Aguarde..." : label;
}

function toggleSenha(inputId, eyeId) {
  var input = document.getElementById(inputId);
  var eye   = document.getElementById(eyeId);
  var show  = input.type === "password";
  input.type = show ? "text" : "password";
  eye.innerHTML = show
    ? '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>'
    : '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
}

function checarReqs() {
  var senha = document.getElementById("novaSenha").value;
  setReq("req-len",   senha.length >= 6);
  setReq("req-upper", /[A-Z]/.test(senha));
  setReq("req-num",   /[0-9]/.test(senha));
}

function setReq(id, ok) {
  var el = document.getElementById(id);
  el.classList.toggle("ok", ok);
}

function senhaValida(senha) {
  return senha.length >= 6 && /[A-Z]/.test(senha) && /[0-9]/.test(senha);
}

async function salvarSenha() {
  var senha     = document.getElementById("novaSenha").value;
  var confirmar = document.getElementById("confirmarSenha").value;

  if (!senha) { showMsg("Informe a nova senha.", "e"); return; }
  if (!senhaValida(senha)) { showMsg("A senha não atende aos requisitos.", "e"); return; }
  if (senha !== confirmar) { showMsg("As senhas não coincidem.", "e"); return; }

  btn("btnSalvar", true, "Salvar nova senha");
  document.getElementById("msg").className = "msg";

  var res = await client.auth.updateUser({ password: senha });

  if (res.error) {
    showMsg(res.error.message, "e");
    btn("btnSalvar", false, "Salvar nova senha");
    return;
  }

  // Sucesso
  document.getElementById("formReset").style.display  = "none";
  document.getElementById("voltarLink").style.display = "none";
  document.getElementById("successState").style.display = "block";
}

// Verificar se tem sessão ativa (via link do email)
window.addEventListener("load", async function() {
  // O Supabase processa o token da URL automaticamente
  var { data: { session } } = await client.auth.getSession();

  if (!session) {
    showMsg("Link inválido ou expirado. Solicite um novo link de redefinição.", "e");
    document.getElementById("btnSalvar").disabled = true;
  }
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") salvarSenha();
});
</script>
</body>
</html>
