<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

h1{margin-top:0}

/* FORM */

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-box div{
display:flex;
flex-direction:column;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
min-width:200px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

button.excluir{background:#dc2626}
button.editar{background:#f59e0b}

/* SKILLS */

.skills-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
margin-bottom:30px;
}

.skill-card{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.skill-nome{
font-weight:600;
margin-bottom:8px;
}

.skill-icons{
display:flex;
gap:8px;
font-size:18px;
}

/* ICONES */

.cert{
margin-right:6px;
font-size:15px;
}

.cert.rosa{color:#ec4899}
.cert.azul{color:#3b82f6}
.cert.verde{color:#22c55e}
.cert.laranja{color:#f59e0b}
.cert.cinza{color:#6b7280}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#f9fafb;
text-align:left;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<div class="form-box">

<div>
<label>Terapeuta</label>
<select id="cpf_terapeuta"></select>
</div>

<div>
<label>Certificação</label>
<select id="certificacao_id"></select>
</div>

<div>
<label>Data</label>
<input type="date" id="data_obtencao">
</div>

<button onclick="vincular()">Vincular</button>

</div>

<h2>Habilidades da equipe</h2>

<div id="skillsEquipe" class="skills-grid"></div>

<table>

<thead>
<tr>
<th>Terapeuta</th>
<th>Certificação</th>
<th>Data</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</main>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"SUA_ANON_KEY_AQUI"
)

let dados=[]

/* ICONES */

const iconesCertificacao={

"Massagem Feminina":"<i class='fa-solid fa-venus cert rosa'></i>",

"Massagem Nuru":"<i class='fa-solid fa-water cert azul'></i>",

"Massagem Vivência":"<i class='fa-solid fa-spa cert verde'></i>",

"Massagem Casais":"<i class='fa-solid fa-people-arrows cert laranja'></i>",

"Podolatria":"<i class='fa-solid fa-shoe-prints cert cinza'></i>"

}

/* SELECTS */

async function carregarSelects(){

const selTer=document.getElementById("cpf_terapeuta")
const selCert=document.getElementById("certificacao_id")

const {data:terapeutas}=await supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional")

selTer.innerHTML="<option>Selecione</option>"

;(terapeutas||[]).forEach(t=>{
selTer.innerHTML+=`<option value="${t.cpf}">${t.nome_profissional}</option>`
})

const {data:cert}=await supabaseClient
.from("certificacoes")
.select("id,nome")

selCert.innerHTML="<option>Selecione</option>"

;(cert||[]).forEach(c=>{
selCert.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
})

}

/* LISTA */

async function carregarLista(){

const {data}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
cpf_terapeuta,
certificacao_id,
data_obtencao,
terapeutas(nome_profissional),
certificacoes(nome)
`)

dados=data||[]

render()
renderSkills()

}

/* SKILLS */

function renderSkills(){

const mapa={}

dados.forEach(d=>{

const nome=d.terapeutas?.nome_profissional
const cert=d.certificacoes?.nome

if(!mapa[nome]) mapa[nome]=[]

mapa[nome].push(cert)

})

const div=document.getElementById("skillsEquipe")
div.innerHTML=""

Object.keys(mapa).forEach(nome=>{

let icons=""

mapa[nome].forEach(c=>{

const icon=iconesCertificacao[c]||""

icons+=icon

})

div.innerHTML+=`
<div class="skill-card">

<div class="skill-nome">
${nome}
</div>

<div class="skill-icons">
${icons}
</div>

</div>
`

})

}

/* RENDER TABELA */

function render(){

const tbody=document.getElementById("lista")
tbody.innerHTML=""

dados.forEach(r=>{

const nomeCert=r.certificacoes?.nome||""
const icon=iconesCertificacao[nomeCert]||""

tbody.innerHTML+=`
<tr>
<td>${r.terapeutas?.nome_profissional}</td>
<td>${icon} ${nomeCert}</td>
<td>${r.data_obtencao||""}</td>
</tr>
`

})

}

/* VINCULAR */

async function vincular(){

const cpf=document.getElementById("cpf_terapeuta").value
const cert=document.getElementById("certificacao_id").value
const data=document.getElementById("data_obtencao").value

if(!cpf||!cert){
alert("Selecione terapeuta e certificação")
return
}

await supabaseClient
.from("terapeuta_certificacoes")
.insert({
cpf_terapeuta:cpf,
certificacao_id:cert,
data_obtencao:data||null
})

carregarLista()

}

carregarSelects()
carregarLista()

</script>

</body>
</html>
