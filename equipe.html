<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Equipe | Hara Spa</title>

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
.app{display:flex}
.content{flex:1;padding:30px}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:#fff;
}

button.excluir{background:#dc2626}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
width:1000px;
padding:20px;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.field{
display:flex;
flex-direction:column;
}

label{
font-size:12px;
color:#555;
}

input,select{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

.input-error{
border:2px solid red;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<div class="content">

<h2>Equipe</h2>
<button onclick="abrirNovo()">+ Novo</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Cargo</th>
<th>CPF</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<div class="grid">

<div class="field"><label>Nome Completo</label><input id="nome_completo"></div>
<div class="field"><label>Nome Profissional</label><input id="nome_profissional"></div>
<div class="field"><label>CPF</label><input id="cpf"></div>

<div class="field"><label>Email</label><input id="email"></div>
<div class="field"><label>Telefone</label><input id="telefone"></div>
<div class="field"><label>Cargo</label><input id="cargo"></div>

<div class="field">
<label>Status</label>
<select id="status">
<option>Ativo</option>
<option>Inativo</option>
</select>
</div>

</div>

<br>

<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>

<script>

let idAtual = null

// ================= VALIDAÇÃO =================

function validarEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)
}

function validarCPF(cpf){
cpf=cpf.replace(/\D/g,'')
if(cpf.length!==11 || /^(\d)\1+$/.test(cpf)) return false
return true
}

function validar(){
let ok=true

document.querySelectorAll("input").forEach(i=>{
i.classList.remove("input-error")
})

if(!nome_completo.value){nome_completo.classList.add("input-error");ok=false}
if(!nome_profissional.value){nome_profissional.classList.add("input-error");ok=false}
if(!cpf.value){cpf.classList.add("input-error");ok=false}

if(email.value && !validarEmail(email.value)){
email.classList.add("input-error")
alert("Email inválido")
return false
}

if(cpf.value && !validarCPF(cpf.value)){
cpf.classList.add("input-error")
alert("CPF inválido")
return false
}

if(!ok){
alert("Preencha os obrigatórios")
return false
}

return true
}

// ================= CRUD =================

function getPayload(){
return {
nome_completo:nome_completo.value,
nome_profissional:nome_profissional.value,
cpf:cpf.value,
email:email.value,
telefone:telefone.value,
cargo:cargo.value,
status:status.value
}
}

async function carregar(){
const {data}=await client.from("terapeutas").select("*")

let html=""
data.forEach(t=>{
html+=`
<tr>
<td>${t.nome_profissional}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf}</td>
<td>
<button onclick="editar('${t.id}')">Editar</button>
<button class="excluir" onclick="excluir('${t.id}')">Excluir</button>
</td>
</tr>`
})

lista.innerHTML=html
}

function abrirNovo(){
idAtual=null
document.querySelectorAll("input").forEach(i=>i.value="")
modal.style.display="flex"
}

async function editar(id){
idAtual=id

const {data}=await client
.from("terapeutas")
.select("*")
.eq("id",id)
.single()

nome_completo.value=data.nome_completo
nome_profissional.value=data.nome_profissional
cpf.value=data.cpf
email.value=data.email
telefone.value=data.telefone
cargo.value=data.cargo
status.value=data.status

modal.style.display="flex"
}

async function salvar(){

if(!validar()) return

let payload=getPayload()

if(idAtual){
await client
.from("terapeutas")
.update(payload)
.eq("id",idAtual)
}else{
await client
.from("terapeutas")
.insert(payload)
}

fecharModal()
carregar()
}

async function excluir(id){
if(!confirm("Excluir?")) return

await client
.from("terapeutas")
.delete()
.eq("id",id)

carregar()
}

function fecharModal(){
modal.style.display="none"
}

carregar()

</script>

</body>
</html>
