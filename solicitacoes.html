<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Solicitações | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:'Segoe UI';background:#f5f7fb;}
.app{display:flex}
#sidebar{width:260px}
.content{flex:1;padding:40px}
.card{background:#fff;padding:30px;border-radius:20px;margin-bottom:20px}
input,select{width:100%;padding:8px;margin-bottom:10px}
button{padding:8px 12px;margin-right:5px;cursor:pointer}
.btn-aprovar{background:#16a34a;color:#fff}
.btn-reprovar{background:#dc2626;color:#fff}
.btn-danger{background:#000;color:#fff}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<div class="card">
<h2>Nova Solicitação</h2>

<select id="terapeuta"></select>
<select id="tipo">
<option>Falta</option>
<option>Férias</option>
<option>Atestado</option>
</select>

<input type="date" id="data_inicio">
<input type="date" id="data_fim">
<input id="justificativa">

<!-- 🔥 NOVO -->
<input type="file" id="atestado" multiple>

<button onclick="salvar()">Salvar</button>
</div>

<button onclick="toggleLista()">Lista</button>

<div id="cardLista" class="card" style="display:none;">
<table>
<thead>
<tr>
<th>Nome</th>
<th>Tipo</th>
<th>Período</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ✅ CORRETO
const supabase = supabase.createClient(
  "https://rymehgsoarjeecuwyhny.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let idEdicao=null;

window.toggleLista=function(){
  const c=document.getElementById("cardLista");
  c.style.display=c.style.display==="none"?"block":"none";
  carregar();
};

async function carregarTerapeutas(){
  const {data}=await supabaseClient.from("terapeutas").select("*");
  const select=document.getElementById("terapeuta");
  select.innerHTML="<option value=''>Selecione</option>";

  data.forEach(t=>{
    select.innerHTML+=`<option value="${t.cpf}">${t.nome_profissional}</option>`;
  });
}

window.salvar=async function(){

  const dataInicio=document.getElementById("data_inicio").value;
  const dataFim=document.getElementById("data_fim").value;

  if(!dataInicio || !dataFim){
    alert("Preencha datas");
    return;
  }

  const tipo=document.getElementById("tipo").value;
  const files=document.getElementById("atestado").files;

  let urls=[];

  // 🔥 UPLOAD
  if(tipo==="Atestado" && files.length){
    for(let file of files){

      const nome=Date.now()+"_"+file.name;

      const {error}=await supabaseClient.storage
        .from("atestados")
        .upload(nome,file,{upsert:true});

      if(error){
        alert(error.message);
        return;
      }

      const {data}=supabaseClient.storage
        .from("atestados")
        .getPublicUrl(nome);

      urls.push(data.publicUrl);
    }
  }

  const payload={
    terapeuta_cpf:document.getElementById("terapeuta").value,
    tipo,
    data_inicio:dataInicio,
    data_fim:dataFim,
    justificativa:document.getElementById("justificativa").value,
    atestado_url: urls.length?JSON.stringify(urls):null
  };

  if(idEdicao){
    await supabaseClient.from("solicitacoes").update(payload).eq("id",idEdicao);
  }else{
    payload.status="Pendente";
    await supabaseClient.from("solicitacoes").insert(payload);
  }

  idEdicao=null;
  carregar();
};

async function carregar(){

  const {data}=await supabaseClient.from("solicitacoes").select("*");
  const tbody=document.getElementById("lista");
  tbody.innerHTML="";

  data.forEach(s=>{

    let arquivos="";
    if(s.atestado_url){
      JSON.parse(s.atestado_url).forEach((u,i)=>{
        arquivos+=`<button onclick="window.open('${u}')">👁 ${i+1}</button>`;
      });
    }

    tbody.innerHTML+=`
      <tr>
        <td>${s.terapeuta_cpf}</td>
        <td>${s.tipo}</td>
        <td>${s.data_inicio} - ${s.data_fim}</td>
        <td>${s.status}</td>
        <td>
          ${arquivos}
          <button onclick="editar('${s.id}')">Editar</button>
          <button onclick="status('${s.id}','Aprovado')" class="btn-aprovar">✔</button>
          <button onclick="status('${s.id}','Reprovado')" class="btn-reprovar">✖</button>
          <button onclick="excluir('${s.id}')" class="btn-danger">Excluir</button>
        </td>
      </tr>
    `;
  });
}

window.editar=async function(id){
  const {data}=await supabaseClient.from("solicitacoes").select("*").eq("id",id).single();
  idEdicao=id;
  document.getElementById("data_inicio").value=data.data_inicio;
  document.getElementById("data_fim").value=data.data_fim;
};

window.excluir=async function(id){
  await supabaseClient.from("solicitacoes").delete().eq("id",id);
  carregar();
};

window.status=async function(id,s){
  await supabaseClient.from("solicitacoes").update({status:s}).eq("id",id);
  carregar();
};

carregarTerapeutas();

});
</script>

</body>
</html>
