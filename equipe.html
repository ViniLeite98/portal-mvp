<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;}
.content{flex:1;padding:40px;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
}

th,td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
}

th{background:#f9fafb;}

button{
  background:#1f2937;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px 12px;
  cursor:pointer;
}

button.excluir{background:#dc2626}
button.anexar{background:#4b5563}

button:hover{opacity:.9}

.top-actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-bottom:16px;
}

input,select{
  padding:8px;
  border-radius:6px;
  border:1px solid #d1d5db;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<div class="top-actions">
<input type="text" id="pesquisaNome" placeholder="Pesquisar..." onkeyup="filtrarTabela()">

<select id="filtroStatus">
<option value="">Todos</option>
<option value="Ativo">Ativo</option>
<option value="Inativo">Inativo</option>
</select>

<button onclick="abrirNovo()">+ Novo Cadastro</button>
</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<input type="file" id="inputDocumento" style="display:none">

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let cpfDocumento = null;

async function carregar(){

const { data, error } = await supabaseClient
.from("terapeutas")
.select("*")
.order("nome_profissional");

if(error){
console.error(error);
return;
}

const tbody = document.getElementById("lista");
tbody.innerHTML="";

data.forEach(t=>{

tbody.innerHTML += `
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
<button class="anexar" onclick="anexarDocumento('${t.cpf}')">📎</button>
${t.documento_url ? `<button onclick="window.open('${t.documento_url}')">👁</button>` : ""}
</td>
</tr>
`;
});

}

function anexarDocumento(cpf){
cpfDocumento = cpf;
document.getElementById("inputDocumento").click();
}

document.getElementById("inputDocumento").addEventListener("change", async (e)=>{

const file = e.target.files[0];
if(!file) return;

if(file.type !== "application/pdf"){
alert("Somente PDF");
return;
}

const nome = `${cpfDocumento}_${Date.now()}_${file.name}`;

const { error: uploadError } = await supabaseClient.storage
.from("documentos")
.upload(nome, file);

if(uploadError){
console.error(uploadError);
alert("Erro upload");
return;
}

const { data } = supabaseClient.storage
.from("documentos")
.getPublicUrl(nome);

if(!data.publicUrl){
alert("Erro URL");
return;
}

const { error: updateError } = await supabaseClient
.from("terapeutas")
.update({ documento_url: data.publicUrl })
.eq("cpf", cpfDocumento);

if(updateError){
console.error(updateError);
alert("Erro ao salvar");
return;
}

alert("Documento anexado!");
carregar();

});

async function excluir(cpf){
if(!confirm("Excluir?")) return;

await supabaseClient
.from("terapeutas")
.delete()
.eq("cpf", cpf);

carregar();
}

function filtrarTabela(){
const filtro = document.getElementById("pesquisaNome").value.toLowerCase();
const linhas = document.querySelectorAll("#lista tr");

linhas.forEach(l=>{
l.style.display = l.innerText.toLowerCase().includes(filtro) ? "" : "none";
});
}

function editar(cpf){
alert("Editar ainda está no seu código original");
}

function abrirNovo(){
alert("Novo cadastro continua no seu código original");
}

document.getElementById("filtroStatus").addEventListener("change", carregar);

carregar();

</script>

</body>
</html>
