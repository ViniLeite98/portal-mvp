<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th,td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
  font-size:14px;
  text-align:left;
}

th{background:#f9fafb;font-weight:600;}

button{
  background:#1f2937;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px 12px;
  cursor:pointer;
}

button.excluir{background:#dc2626}

.top-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.search-box{
  position:relative;
}

.search-box input{
  padding:10px 35px 10px 12px;
  border-radius:8px;
  border:1px solid #d1d5db;
  width:260px;
}

.search-box i{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  color:#6b7280;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
}

.modal-content{
  background:#fff;
  width:1000px;
  max-height:90vh;
  overflow:auto;
  border-radius:18px;
  padding:28px;
}

.section{margin-bottom:28px}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  color:#374151;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:14px;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<div class="top-actions">

<div style="display:flex;gap:10px;align-items:center">

<div class="search-box">
<input id="pesquisa" placeholder="Pesquisar nome, cargo ou CPF">
<i class="fa fa-search"></i>
</div>

<select id="filtroStatus">
<option value="">Todos</option>
<option value="Ativo">Ativo</option>
<option value="Inativo">Inativo</option>
</select>

</div>

<button onclick="abrirNovo()">+ Novo Cadastro</button>

</div>

<table>
<thead>
<tr>
<th>Nome Profissional</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<div class="section">
<h3>Dados Pessoais</h3>
<div class="grid">

<div class="field">
<label>Nome Completo *</label>
<input id="nome_completo">
</div>

<div class="field">
<label>Nome Profissional *</label>
<input id="nome_profissional">
</div>

<div class="field">
<label>CPF *</label>
<input id="cpf">
</div>

<div class="field">
<label>RG</label>
<input id="rg">
</div>

<div class="field">
<label>Data de Nascimento</label>
<input type="date" id="nascimento">
</div>

<div class="field">
<label>Email *</label>
<input id="email">
</div>

<div class="field">
<label>Tipo Sanguíneo</label>
<select id="tipo_sanguineo">
<option value="">Selecione</option>
<option>A+</option><option>A-</option>
<option>B+</option><option>B-</option>
<option>AB+</option><option>AB-</option>
<option>O+</option><option>O-</option>
</select>
</div>

</div>
</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let cpfAtual=null;

async function carregar(){

const statusFiltro=document.getElementById("filtroStatus").value
const pesquisa=document.getElementById("pesquisa").value.toLowerCase()

let query=supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional,status,cargo")
.order("nome_profissional")

if(statusFiltro) query=query.eq("status",statusFiltro)

const {data,error}=await query

if(error){
console.error(error)
return
}

const tbody=document.getElementById("lista")
tbody.innerHTML=""

data
.filter(t=>{
const texto=(t.nome_profissional+" "+t.cargo+" "+t.cpf).toLowerCase()
return texto.includes(pesquisa)
})
.forEach(t=>{

tbody.innerHTML+=`
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>`

})

}

document.getElementById("filtroStatus").addEventListener("change",carregar)
document.getElementById("pesquisa").addEventListener("input",carregar)

carregar()

</script>

</body>
</html>
