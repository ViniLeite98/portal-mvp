<script>

document.addEventListener("DOMContentLoaded", function(){

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let dados = []
let idAtual = null
let paginaAtual = 1
let porPagina = 10

// ================== CARREGAR ==================
async function carregar(){
const {data} = await supabaseClient.from("servicos").select("*")
dados = data || []
render()
}

// ================== RENDER ==================
function render(lista = dados){

const tbody = document.getElementById("lista")
tbody.innerHTML = ""

const inicio = (paginaAtual-1)*porPagina
const pag = lista.slice(inicio, inicio+porPagina)

pag.forEach(s=>{
tbody.innerHTML += `
<tr>
<td>${s.grupo||""}</td>
<td>${s.tempo ? s.tempo + " min" : "-"}</td>
<td>R$ ${Number(s.valor||0).toFixed(2)}</td>
<td>R$ ${Number(s.comissao||0).toFixed(2)}</td>
<td>${s.status||""}</td>
<td>
<button class="btn-editar" onclick="editar('${s.id}')">Editar</button>
<button class="btn-excluir" onclick="excluir('${s.id}')">Excluir</button>
</td>
</tr>`
})

}

// ================== EDITAR ==================
window.editar = function(id){

const s = dados.find(x => x.id == id)
if(!s) return

idAtual = id

document.getElementById("grupo").value = s.grupo || ""
document.getElementById("tempo").value = s.tempo || ""
document.getElementById("valor").value = s.valor || ""
document.getElementById("comissao").value = s.comissao || ""
document.getElementById("status").value = s.status || "ativo"

document.getElementById("modal").style.display = "flex"
}

// ================== NOVO ==================
window.abrirNovo = function(){

idAtual = null

document.getElementById("grupo").value = ""
document.getElementById("tempo").value = ""
document.getElementById("valor").value = ""
document.getElementById("comissao").value = ""
document.getElementById("status").value = "ativo"

document.getElementById("modal").style.display = "flex"
}

// ================== FECHAR ==================
window.fecharModal = function(){
document.getElementById("modal").style.display = "none"
}

// ================== SALVAR ==================
window.salvar = async function(){

const payload = {
grupo: document.getElementById("grupo").value,
tempo: document.getElementById("tempo").value
? parseInt(document.getElementById("tempo").value)
: null,
valor: parseFloat(document.getElementById("valor").value),
comissao: parseFloat(document.getElementById("comissao").value),
status: document.getElementById("status").value
}

if(!payload.grupo){
alert("Grupo é obrigatório")
return
}

if(idAtual){

await supabaseClient
.from("servicos")
.update(payload)
.eq("id", idAtual)

}else{

await supabaseClient
.from("servicos")
.insert(payload)

}

fecharModal()
carregar()

}

// ================== EXCLUIR ==================
window.excluir = async function(id){

if(!confirm("Excluir serviço?")) return

await supabaseClient
.from("servicos")
.delete()
.eq("id", id)

carregar()

}

// ================== FILTRO ==================
window.filtrarTabela = function(){

const termo = document
.getElementById("buscaServico")
.value
.toLowerCase()

const filtrado = dados.filter(s =>
(s.grupo||"").toLowerCase().includes(termo)
)

render(filtrado)

}

// ================== EXPORTAR ==================
window.exportarExcel = function(){

const ws = XLSX.utils.json_to_sheet(dados)
const wb = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb, ws, "Serviços")

XLSX.writeFile(wb, "servicos.xlsx")

}

// INIT
carregar()

})

</script>
