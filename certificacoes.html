<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

h1{margin-top:0}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
min-width:200px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

button.excluir{background:#dc2626}
button.editar{background:#f59e0b}

.servico{
display:flex;
align-items:center;
gap:8px;
}

.servico i{
color:#6366f1;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#f9fafb;
text-align:left;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<table>

<thead>
<tr>
<th>Terapeuta</th>
<th>Certificação</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</main>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]

const icones={
"Aromaterapia":"fa-leaf",
"Reflexologia":"fa-footprints",
"Drenagem":"fa-water",
"Massagem":"fa-spa",
"Shiatsu":"fa-hands"
}

function pegarIcone(nome){

for(const chave in icones){
if(nome?.toLowerCase().includes(chave.toLowerCase())){
return icones[chave]
}
}

return "fa-certificate"

}

async function carregarLista(){

const {data,error}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
data_obtencao,
terapeutas(nome_profissional),
certificacoes(nome)
`)

if(error){
console.error(error)
return
}

dados=data||[]

render()

}

function render(){

const tbody=document.getElementById("lista")
tbody.innerHTML=""

dados.forEach(r=>{

const cert=r.certificacoes?.nome||""
const icone=pegarIcone(cert)

tbody.innerHTML+=`
<tr>
<td>${r.terapeutas?.nome_profissional||""}</td>

<td>
<div class="servico">
<i class="fa-solid ${icone}"></i>
${cert}
</div>
</td>

<td>${r.data_obtencao||""}</td>

<td>
<button class="editar">Editar</button>
<button class="excluir">Excluir</button>
</td>

</tr>
`

})

}

carregarLista()

</script>

</body>
</html>
