<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}
.form-box{background:#fff;padding:20px;border-radius:10px;display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.field{display:flex;flex-direction:column;font-size:13px;}
input,select{padding:8px;border-radius:6px;border:1px solid #ccc;min-width:160px;}
button{background:#2563eb;color:#fff;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;}
button.editar{background:#f59e0b}
button.excluir{background:#dc2626}
table{width:100%;background:#fff;border-collapse:collapse;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
th,td{padding:10px;border-bottom:1px solid #eee;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;}
.modal-box{background:#fff;padding:20px;border-radius:10px;width:350px;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">
<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

function nomeCliente(c){
  let tel=(c.telefone_1||"").replace(/\D/g,"")
  let final=tel.slice(-4)
  return final ? `${c.nome} ${final}` : c.nome
}

async function carregarClientes(){

const {data}=await client.from("clientes").select("*")

cliente.innerHTML="<option></option>"

data.forEach(c=>{
let tel=(c.telefone_1||"").replace(/\D/g,"")
let final=tel.slice(-4)

cliente.innerHTML+=`<option value="${c.id}" data-tel="${final}">
${nomeCliente(c)}
</option>`
})

setTimeout(()=>{

function matcher(params,data){

if(!params.term) return data

const busca=params.term.toLowerCase()

const numero=(busca.match(/\d+/g)||[]).join("")
const texto=busca.replace(/\d+/g,"").trim()

const nome=data.text.toLowerCase()
const tel=data.element.dataset.tel || ""

if(texto && numero){
return (nome.includes(texto) && tel.includes(numero.slice(-4))) ? data : null
}

if(texto) return nome.includes(texto)?data:null
if(numero) return tel.includes(numero.slice(-4))?data:null

return null
}

$('#cliente').select2({
placeholder:"Buscar cliente",
width:'200px',
matcher:matcher
})

},200)

}

carregarClientes()

</script>

</body>
</html>
