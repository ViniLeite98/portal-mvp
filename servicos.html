<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviços | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f5f7fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:14px;
overflow:hidden;
}

th,td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
text-align:left;
}

th{
background:#f9fafb;
font-weight:600;
cursor:pointer;
}

button{
background:#1f2937;
color:#fff;
border:none;
border-radius:6px;
padding:6px 12px;
cursor:pointer;
}

button.excluir{background:#dc2626}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.busca input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
width:250px;
}

.pagination{
margin-top:20px;
display:flex;
gap:8px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.modal-content{
background:#fff;
width:600px;
border-radius:16px;
padding:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
width:100%;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Serviços</h1>

<div class="topbar">

<div class="busca">
<input
id="buscaServico"
placeholder="Buscar serviço..."
oninput="filtrarTabela()">
</div>

<div style="display:flex;gap:10px">

<button onclick="exportarExcel()">
<i class="fa-solid fa-file-excel"></i> Exportar
</button>

<button onclick="abrirNovo()">+ Novo Serviço</button>

Mostrar

<select id="porPaginaSelect" onchange="mudarPorPagina()">
<option value="5">5</option>
<option value="10" selected>10</option>
<option value="20">20</option>
</select>

</div>

</div>

<table>

<thead>
<tr>
<th onclick="ordenar('nome')">Nome ⬍</th>
<th onclick="ordenar('valor')">Valor ⬍</th>
<th onclick="ordenar('comissao')">Comissão ⬍</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<div class="pagination" id="paginacao"></div>

</main>
</div>

<div class="modal" id="modal">

<div class="modal-content">

<h3>Cadastro Serviço</h3>

<div class="grid">
<input id="nome" placeholder="Nome do serviço">
<input id="valor" type="number" step="0.01" placeholder="Valor">
<input id="comissao" type="number" step="0.01" placeholder="Comissão">

<select id="status">
<option value="">Status</option>
<option value="ativo">ativo</option>
<option value="inativo">inativo</option>
</select>
</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let idAtual=null;
let dados=[];
let listaAtual=[];
let paginaAtual=1;
let porPagina=10;
let totalRegistros=0;

let ordemAtual={campo:"nome",asc:true};

async function carregar(){

const {data}=await supabaseClient
.from("servicos")
.select("*");

dados=data||[];

render();

}

function render(lista=dados){

listaAtual=lista;

const inicio=(paginaAtual-1)*porPagina;
const fim=inicio+porPagina;

const pag=lista.slice(inicio,fim);

const tbody=document.getElementById("lista");

tbody.innerHTML="";

pag.forEach(s=>{

tbody.innerHTML+=`
<tr>
<td>${s.nome}</td>
<td>R$ ${Number(s.valor||0).toFixed(2)}</td>
<td>R$ ${Number(s.comissao||0).toFixed(2)}</td>
<td>${s.status||""}</td>
<td>
<button onclick="editar('${s.id}')">Editar</button>
<button class="excluir" onclick="excluir('${s.id}')">Excluir</button>
</td>
</tr>
`;

});

renderPaginacao(lista.length);

}

function renderPaginacao(total){

const totalPaginas=Math.ceil(total/porPagina);

const div=document.getElementById("paginacao");

div.innerHTML="";

for(let i=1;i<=totalPaginas;i++){

div.innerHTML+=`
<button onclick="irPagina(${i})"
${i===paginaAtual?"style='background:#4f6fb3'":""}>
${i}
</button>
`;

}

}

window.irPagina=function(p){
paginaAtual=p;
render(listaAtual);
};

window.mudarPorPagina=function(){

porPagina=parseInt(
document.getElementById("porPaginaSelect").value
);

paginaAtual=1;

render(listaAtual);

};

window.filtrarTabela=function(){

const termo=document
.getElementById("buscaServico")
.value
.toLowerCase();

const filtrado=dados.filter(s=>
s.nome.toLowerCase().includes(termo)
);

paginaAtual=1;

render(filtrado);

};

window.ordenar=function(campo){

ordemAtual.asc=
ordemAtual.campo===campo?!ordemAtual.asc:true;

ordemAtual.campo=campo;

dados.sort((a,b)=>{

let v1=a[campo];
let v2=b[campo];

if(v1<v2) return ordemAtual.asc?-1:1;
if(v1>v2) return ordemAtual.asc?1:-1;
return 0;

});

render();

};

window.exportarExcel=function(){

const inicio=(paginaAtual-1)*porPagina;
const fim=inicio+porPagina;

const visivel=listaAtual.slice(inicio,fim);

const exportData=visivel.map(s=>({

Nome:s.nome,
Valor:s.valor,
Comissao:s.comissao,
Status:s.status

}));

const ws=XLSX.utils.json_to_sheet(exportData);
const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Servicos");

XLSX.writeFile(wb,"servicos.xlsx");

};

window.abrirNovo=function(){

idAtual=null;

document.getElementById("nome").value="";
document.getElementById("valor").value="";
document.getElementById("comissao").value="";
document.getElementById("status").value="";

document.getElementById("modal").style.display="flex";

};

window.fecharModal=function(){
document.getElementById("modal").style.display="none";
};

window.salvar=async function(){

const payload={
nome:document.getElementById("nome").value,
valor:parseFloat(document.getElementById("valor").value),
comissao:parseFloat(document.getElementById("comissao").value),
status:document.getElementById("status").value
};

if(!payload.nome){
alert("Nome é obrigatório");
return;
}

if(idAtual){

await supabaseClient
.from("servicos")
.update(payload)
.eq("id",idAtual);

}else{

await supabaseClient
.from("servicos")
.insert(payload);

}

fecharModal();

carregar();

};

window.editar=async function(id){

idAtual=id;

const {data}=await supabaseClient
.from("servicos")
.select("*")
.eq("id",id)
.single();

document.getElementById("nome").value=data.nome||"";
document.getElementById("valor").value=data.valor||"";
document.getElementById("comissao").value=data.comissao||"";
document.getElementById("status").value=data.status||"";

document.getElementById("modal").style.display="flex";

};

window.excluir=async function(id){

if(!confirm("Excluir serviço?"))return;

await supabaseClient
.from("servicos")
.delete()
.eq("id",id);

carregar();

};

carregar();

});
</script>

</body>
</html>
