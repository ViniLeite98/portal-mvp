<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<div class="form-box">

<div class="field">
<label>Serviço (Filtro)</label>
<select id="filtroServico"></select>
</div>

<button onclick="filtrar()">Filtrar</button>
<button onclick="limparFiltro()">Limpar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let dadosClientes=[]
let dadosServicos=[]

function limparNumero(n){
  return (n || "").replace(/\D/g,"")
}

function nomeCliente(c){
  if(!c) return ""

  const nome = c.nome || c.nome_cliente || ""

  const telefone =
    c.telefone ||
    c.celular ||
    c.phone ||
    c.whatsapp ||
    c.fone ||
    ""

  const numero = limparNumero(telefone)

  const final = numero ? numero.slice(-4) : ""

  return final ? `${nome} ${final}` : nome
}

function hoje(){
const d=new Date()
const offset=d.getTimezoneOffset()
return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

data.value=hoje()

valor.oninput=calcular
desconto.oninput=calcular

function calcular(){
final.value=(parseFloat(valor.value||0)-parseFloat(desconto.value||0))
}

async function carregarTudo(){

// fluxo
const {data:fluxo}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=fluxo||[]

// clientes
const {data:clientes}=await supabaseClient.from("clientes").select("*")
dadosClientes=clientes||[]

// serviços (somente os usados)
const servicosUnicos = [...new Set(dados.map(d=>d.servico_id).filter(Boolean))]

const {data:servicos}=await supabaseClient
.from("servicos")
.select("*")
.in("id", servicosUnicos.length ? servicosUnicos : [0])

dadosServicos=servicos||[]

montarSelects()
render(dados)

}

function montarSelects(){

cliente.innerHTML="<option value=''>Selecione</option>"
dadosClientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${nomeCliente(c)}</option>`
})

servico.innerHTML="<option value=''>Selecione</option>"
dadosServicos.forEach(s=>{
servico.innerHTML+=`<option value="${s.id}">${s.grupo}</option>`
})

filtroServico.innerHTML="<option value=''>Todos</option>"
dadosServicos.forEach(s=>{
filtroServico.innerHTML+=`<option value="${s.id}">${s.grupo}</option>`
})

}

function render(lista){

listaAtual=lista
listaHTML=""

lista.forEach(r=>{
listaHTML+=`
<tr>
<td>${r.data}</td>
<td>${nomeCliente(r.clientes)}</td>
<td>${r.servicos?.grupo || ""}</td>
<td>${r.valor_final}</td>
</tr>
`
})

document.getElementById("lista").innerHTML=listaHTML
}

function filtrar(){

let lista=[...dados]

if(filtroServico.value)
lista=lista.filter(d=>d.servico_id==filtroServico.value)

render(lista)

}

function limparFiltro(){
filtroServico.value=""
render(dados)
}

async function salvar(){

await supabaseClient.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:parseFloat(valor.value||0),
desconto:parseFloat(desconto.value||0),
valor_final:parseFloat(final.value||0)
})

carregarTudo()

}

carregarTudo()
calcular()

</script>

</body>
</html>
