<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th,td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
  font-size:14px;
  text-align:left;
}

th{background:#f9fafb;font-weight:600;}

button{
  background:#1f2937;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px 12px;
  cursor:pointer;
}

button.excluir{background:#dc2626}

.top-actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-bottom:16px;
}

.top-actions input{
  padding:8px;
  border-radius:6px;
  border:1px solid #d1d5db;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
}

.modal-content{
  background:#fff;
  width:1000px;
  max-height:90vh;
  overflow:auto;
  border-radius:18px;
  padding:28px;
}

.section{margin-bottom:28px}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  color:#374151;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:14px;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<div class="top-actions">

<input 
type="text"
id="pesquisaNome"
placeholder="Pesquisar profissional..."
onkeyup="filtrarTabela()"
>

<select id="filtroStatus">
<option value="">Todos</option>
<option value="Ativo">Ativo</option>
<option value="Inativo">Inativo</option>
</select>

<button onclick="abrirNovo()">+ Novo Cadastro</button>

</div>

<table>
<thead>
<tr>
<th>Nome Profissional</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Dados</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<!-- (modal permanece igual, não alterei nada aqui) -->

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let cpfAtual=null;

function temPendencia(t){
  return !t.email || !t.telefone || !t.pix_chave;
}

async function carregar(){

const statusFiltro = document.getElementById("filtroStatus").value;

let query = supabaseClient
.from("terapeutas")
.select("*")
.order("nome_profissional");

if(statusFiltro) query = query.eq("status", statusFiltro);

const {data,error}=await query;

if(error){ console.error(error); return; }

const tbody=document.getElementById("lista");
tbody.innerHTML="";

data.forEach(t=>{

const pendente = temPendencia(t);

const icone = pendente 
  ? '<i class="fa-solid fa-triangle-exclamation" style="color:#f59e0b" title="Dados incompletos"></i>'
  : '<i class="fa-solid fa-check" style="color:#10b981" title="Cadastro completo"></i>';

tbody.innerHTML+=`
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>${icone}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>`;
});

filtrarTabela();
}

function filtrarTabela(){

const filtro = document.getElementById("pesquisaNome").value.toLowerCase();
const linhas = document.querySelectorAll("#lista tr");

linhas.forEach(linha=>{
const nome = linha.children[0].innerText.toLowerCase();

if(nome.includes(filtro)){
linha.style.display="";
}else{
linha.style.display="none";
}
});
}

function abrirNovo(){
cpfAtual=null;
document.getElementById("modal").style.display="flex";
}

async function editar(cpf){

cpfAtual=cpf;

const {data,error}=await supabaseClient
.from("terapeutas")
.select("*")
.eq("cpf",cpf)
.single();

if(error){console.error(error);return;}

Object.keys(data).forEach(c=>{
const el=document.getElementById(c);
if(el) el.value=data[c]||"";
});

document.getElementById("cpf").disabled=true;
document.getElementById("modal").style.display="flex";
}

async function salvar(){

const inputs=document.querySelectorAll("input, select");
const payload={};

inputs.forEach(i=>{
if(i.id && i.value!=="") payload[i.id]=i.value;
});

if(!payload.nome_completo||!payload.nome_profissional||!payload.email){
alert("Preencha os campos obrigatórios");
return;
}

let error;

if(cpfAtual){
delete payload.cpf;

({error}=await supabaseClient
.from("terapeutas")
.update(payload)
.eq("cpf",cpfAtual));

}else{

({error}=await supabaseClient
.from("terapeutas")
.insert(payload));

}

if(error){
console.error(error);
alert("Erro ao salvar");
return;
}

fecharModal();
carregar();
}

async function excluir(cpf){
if(!confirm("Excluir registro?"))return;

await supabaseClient
.from("terapeutas")
.delete()
.eq("cpf",cpf);

carregar();
}

function fecharModal(){
document.getElementById("modal").style.display="none";
}

document.getElementById("filtroStatus").addEventListener("change", carregar);

carregar();

</script>

</body>
</html>
