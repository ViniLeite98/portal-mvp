<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

h1{
margin-top:0;
}

/* FORM NOVO */

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-box div{
display:flex;
flex-direction:column;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
min-width:200px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

button.excluir{background:#dc2626}
button.editar{background:#f59e0b}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#f9fafb;
text-align:left;
}

/* PAGINAÇÃO */

.pagination{
margin-top:20px;
display:flex;
gap:6px;
}

.pagination button{
background:#e5e7eb;
color:#111;
}

.pagination button.active{
background:#2563eb;
color:#fff;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:25px;
border-radius:10px;
width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.modal-form{
display:flex;
flex-direction:column;
gap:15px;
margin-top:15px;
}

.modal-actions{
margin-top:20px;
display:flex;
gap:10px;
}

.modal-actions button{
flex:1;
}

.cancelar{
background:#6b7280;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<!-- FORM NOVO -->

<div class="form-box">

<div>
<label>Terapeuta</label>
<select id="cpf_terapeuta"></select>
</div>

<div>
<label>Certificação</label>
<select id="certificacao_id"></select>
</div>

<div>
<label>Data</label>
<input type="date" id="data_obtencao">
</div>

<button onclick="vincular()">Vincular</button>

</div>

<!-- TABELA -->

<table>

<thead>
<tr>
<th>Terapeuta</th>
<th>Certificação</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<div class="pagination" id="paginacao"></div>

</main>

</div>

<!-- MODAL EDITAR -->

<div id="modalEditar" class="modal">

<div class="modal-box">

<h2>Editar Certificação</h2>

<div class="modal-form">

<div>
<label>Terapeuta</label>
<select id="edit_cpf"></select>
</div>

<div>
<label>Certificação</label>
<select id="edit_cert"></select>
</div>

<div>
<label>Data</label>
<input type="date" id="edit_data">
</div>

</div>

<div class="modal-actions">

<button onclick="atualizar()">Atualizar</button>
<button class="cancelar" onclick="fecharModal()">Cancelar</button>

</div>

</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let pagina=1
let editId=null
const porPagina=10

/* ================= SELECTS ================= */

async function carregarSelects(){

const selTer=document.getElementById("cpf_terapeuta")
const selCert=document.getElementById("certificacao_id")

const {data:terapeutas}=await supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional")
.eq("status","Ativo")
.order("nome_profissional")

selTer.innerHTML="<option value=''>Selecione</option>"

;(terapeutas||[]).forEach(t=>{
selTer.innerHTML+=`<option value="${t.cpf}">${t.nome_profissional}</option>`
})

const {data:cert}=await supabaseClient
.from("certificacoes")
.select("id,nome")
.order("nome")

selCert.innerHTML="<option value=''>Selecione</option>"

;(cert||[]).forEach(c=>{
selCert.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
})

/* DUPLICAR SELECTS PARA MODAL */

document.getElementById("edit_cpf").innerHTML=selTer.innerHTML
document.getElementById("edit_cert").innerHTML=selCert.innerHTML

}

/* ================= LISTA ================= */

async function carregarLista(){

const {data}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
cpf_terapeuta,
certificacao_id,
data_obtencao,
terapeutas(nome_profissional),
certificacoes(nome)
`)

dados=data||[]

render()

}

/* ================= RENDER ================= */

function render(){

const inicio=(pagina-1)*porPagina
const pag=dados.slice(inicio,inicio+porPagina)

const tbody=document.getElementById("lista")

tbody.innerHTML=""

pag.forEach(r=>{

tbody.innerHTML+=`
<tr>

<td>${r.terapeutas?.nome_profissional||""}</td>

<td>${r.certificacoes?.nome||""}</td>

<td>${r.data_obtencao||""}</td>

<td>

<button class="editar"
onclick="abrirModal('${r.id}')">
Editar
</button>

<button class="excluir"
onclick="excluir('${r.id}')">
Excluir
</button>

</td>

</tr>
`

})

}

/* ================= MODAL ================= */

function abrirModal(id){

const item=dados.find(d=>d.id==id)

editId=id

document.getElementById("edit_cpf").value=item.cpf_terapeuta
document.getElementById("edit_cert").value=item.certificacao_id
document.getElementById("edit_data").value=item.data_obtencao

document.getElementById("modalEditar").style.display="flex"

}

function fecharModal(){

document.getElementById("modalEditar").style.display="none"

}

/* ================= ATUALIZAR ================= */

async function atualizar(){

const cpf=document.getElementById("edit_cpf").value
const cert=document.getElementById("edit_cert").value
const data=document.getElementById("edit_data").value

const duplicado=dados.find(d=>
d.cpf_terapeuta==cpf &&
d.certificacao_id==cert &&
d.id!=editId
)

if(duplicado){

alert("Essa certificação já está vinculada")
return

}

await supabaseClient
.from("terapeuta_certificacoes")
.update({
cpf_terapeuta:cpf,
certificacao_id:cert,
data_obtencao:data
})
.eq("id",editId)

fecharModal()
carregarLista()

}

/* ================= NOVO ================= */

async function vincular(){

const cpf=document.getElementById("cpf_terapeuta").value
const cert=document.getElementById("certificacao_id").value
const data=document.getElementById("data_obtencao").value

if(!cpf||!cert){

alert("Selecione terapeuta e certificação")
return

}

const duplicado=dados.find(d=>
d.cpf_terapeuta==cpf &&
d.certificacao_id==cert
)

if(duplicado){

alert("Essa certificação já existe")
return

}

await supabaseClient
.from("terapeuta_certificacoes")
.insert({
cpf_terapeuta:cpf,
certificacao_id:cert,
data_obtencao:data||null
})

document.getElementById("data_obtencao").value=""

carregarLista()

}

/* ================= EXCLUIR ================= */

async function excluir(id){

if(!confirm("Excluir vínculo?"))return

await supabaseClient
.from("terapeuta_certificacoes")
.delete()
.eq("id",id)

carregarLista()

}

carregarSelects()
carregarLista()

</script>

</body>
</html>
