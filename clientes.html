<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes | Hara Spa</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0}
.content{padding:40px}
table{width:100%;background:#fff;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #ddd}
button{padding:6px 10px;border:none;background:#111;color:#fff;border-radius:6px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center}
.modal-content{background:#fff;padding:20px;width:600px;border-radius:10px}
input{width:100%;padding:8px;margin-bottom:10px}
</style>
</head>

<body>

<div class="content">

<h2>Clientes</h2>
<button onclick="abrirNovo()">+ Novo</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Docs</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>

<div class="modal" id="modal">
<div class="modal-content">

<input id="nome" placeholder="Nome">
<input id="telefone_1" placeholder="Telefone">

<label>RG</label>
<input type="file" id="rg" accept=".pdf,image/*">

<label>Comprovante</label>
<input type="file" id="comprovante" accept=".pdf,image/*">

<button onclick="salvar()">Salvar</button>
<button onclick="fechar()">Cancelar</button>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

const modal = document.getElementById("modal");
let idAtual = null;

/* upload */
async function uploadArquivo(file, pasta){
    const nome = Date.now()+"_"+file.name;

    const { error } = await supabaseClient.storage
        .from("documentos")
        .upload(pasta+"/"+nome, file);

    if(error){
        alert("Erro upload");
        return null;
    }

    const { data } = supabaseClient.storage
        .from("documentos")
        .getPublicUrl(pasta+"/"+nome);

    return data.publicUrl;
}

/* carregar */
async function carregar(){
    const { data } = await supabaseClient
        .from("clientes")
        .select("*")
        .order("nome");

    render(data);
}

function render(lista){
    const tbody = document.getElementById("lista");
    tbody.innerHTML="";

    lista.forEach(c=>{
        tbody.innerHTML+=`
        <tr>
            <td>${c.nome}</td>
            <td>${c.telefone_1||""}</td>
            <td>
                ${c.rg_url ? `<a href="${c.rg_url}" target="_blank">RG</a>` : ""}
                ${c.comprovante_url ? `<a href="${c.comprovante_url}" target="_blank">Comp</a>` : ""}
            </td>
            <td>
                <button onclick="editar('${c.id}')">Editar</button>
            </td>
        </tr>`;
    });
}

/* abrir */
function abrirNovo(){
    idAtual=null;
    document.querySelectorAll("input").forEach(i=>i.value="");
    modal.style.display="flex";
}

/* editar */
async function editar(id){
    idAtual=id;
    const { data } = await supabaseClient.from("clientes").select("*").eq("id",id).single();

    nome.value=data.nome;
    telefone_1.value=data.telefone_1;

    modal.style.display="flex";
}

/* salvar */
async function salvar(){

    let payload={
        nome: nome.value,
        telefone_1: telefone_1.value
    };

    const rgFile = document.getElementById("rg").files[0];
    const compFile = document.getElementById("comprovante").files[0];

    if(rgFile){
        payload.rg_url = await uploadArquivo(rgFile,"rg");
    }

    if(compFile){
        payload.comprovante_url = await uploadArquivo(compFile,"comprovante");
    }

    if(idAtual){
        await supabaseClient.from("clientes").update(payload).eq("id",idAtual);
    }else{
        await supabaseClient.from("clientes").insert(payload);
    }

    fechar();
    carregar();
}

function fechar(){
    modal.style.display="none";
}

carregar();

</script>

</body>
</html>
