<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

/* ===== MODAL NOVO ===== */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#fff;
padding:30px;
border-radius:16px;
width:520px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
animation:fadeIn .2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.modal-box h3{
margin:0 0 20px;
font-size:20px;
font-weight:600;
}

.modal-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.modal-box label{
font-size:12px;
color:#555;
margin-bottom:4px;
display:block;
}

.modal-box input,
.modal-box select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

.modal-box input:focus,
.modal-box select:focus{
border-color:#2563eb;
outline:none;
box-shadow:0 0 0 2px rgba(37,99,235,0.1);
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}

.btn{
padding:10px 16px;
border-radius:8px;
border:none;
cursor:pointer;
font-weight:500;
}

.btn-primary{
background:#2563eb;
color:#fff;
}

.btn-danger{
background:#ef4444;
color:#fff;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL -->
<div id="modalEditar" class="modal">
  <div class="modal-box">

    <h3>✏️ Editar lançamento</h3>

    <div class="modal-grid">

      <div>
        <label>Data</label>
        <input type="date" id="editData">
      </div>

      <div>
        <label>Cliente</label>
        <select id="editCliente"></select>
      </div>

      <div>
        <label>Serviço</label>
        <select id="editServico"></select>
      </div>

      <div>
        <label>Origem</label>
        <select id="editOrigem">
          <option value="">Selecione</option>
          <option>Instagram</option>
          <option>Google</option>
          <option>Indicação</option>
          <option>Cliente antigo</option>
          <option>WhatsApp</option>
          <option>Outro</option>
        </select>
      </div>

      <div>
        <label>Valor</label>
        <input type="number" id="editValor">
      </div>

      <div>
        <label>Desconto</label>
        <input type="number" id="editDesconto">
      </div>

    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" onclick="salvarEdicao()">💾 Salvar</button>
      <button class="btn btn-danger" onclick="fecharModal()">Cancelar</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

let dados=[]
let dadosClientes=[]
let dadosServicos=[]
let editandoId=null

function hoje(){
const d=new Date()
const offset=d.getTimezoneOffset()
return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

data.value=hoje()

valor.oninput=calcular
desconto.oninput=calcular

function calcular(){
final.value=(parseFloat(valor.value||0)-parseFloat(desconto.value||0))
}

async function carregarSelects(){

const {data:clientes}=await supabaseClient.from("clientes").select("*")
dadosClientes=clientes||[]

cliente.innerHTML="<option value=''>Selecione</option>"
dadosClientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${c.nome||c.nome_cliente}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
dadosServicos=servicos||[]

servico.innerHTML="<option value=''>Selecione</option>"
dadosServicos.forEach(s=>{
servico.innerHTML+=`<option value="${s.id}">${s.grupo}</option>`
})

}

async function carregarLista(){

const {data}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]

const tbody=document.getElementById("lista")
tbody.innerHTML=""

dados.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${r.clientes?.nome||""}</td>
<td>${r.origem_lead||"-"}</td>
<td>${r.servicos?.grupo||""}</td>
<td>${r.valor}</td>
<td>${r.desconto}</td>
<td>${r.valor_final}</td>
<td>
<button class="editar" onclick="abrirEditar('${r.id}')">Editar</button>
</td>
</tr>
`
})
}

function abrirEditar(id){

editandoId=id
const r=dados.find(d=>d.id==id)

editData.value=r.data
editCliente.value=r.cliente_id
editServico.value=r.servico_id
editValor.value=r.valor
editDesconto.value=r.desconto
editOrigem.value=r.origem_lead||""

modalEditar.style.display="flex"
}

async function salvar(){

await supabaseClient.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:parseFloat(valor.value||0),
desconto:parseFloat(desconto.value||0),
valor_final:parseFloat(valor.value||0)-parseFloat(desconto.value||0),
origem_lead: origem.value || null
})

carregarLista()
}

async function salvarEdicao(){

await supabaseClient.from("fluxo_caixa").update({
data:editData.value,
cliente_id:editCliente.value,
servico_id:editServico.value,
valor:parseFloat(editValor.value||0),
desconto:parseFloat(editDesconto.value||0),
valor_final:parseFloat(editValor.value||0)-parseFloat(editDesconto.value||0),
origem_lead: editOrigem.value || null
}).eq("id",editandoId)

fecharModal()
carregarLista()
}

function fecharModal(){
modalEditar.style.display="none"
}

carregarSelects()
carregarLista()
calcular()

</script>

</body>
</html>
