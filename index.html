<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Filtros | Hara Spa</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fb;padding:30px;}
h1{margin-bottom:20px;font-size:20px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:30px;}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.card h3{font-size:12px;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:10px;}
.num{font-size:26px;font-weight:900;color:#111827;}
.sub{font-size:12px;color:#9ca3af;margin-top:4px;}
.green{color:#16a34a;} .red{color:#dc2626;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
th,td{padding:10px 14px;border-bottom:1px solid #f3f4f6;font-size:13px;text-align:left;}
th{background:#f9fafb;font-size:11px;font-weight:700;text-transform:uppercase;color:#6b7280;}
tr:last-child td{border-bottom:none;}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.tag-ok{background:#dcfce7;color:#16a34a;}
.tag-diff{background:#fef3c7;color:#92400e;}
.tag-err{background:#fee2e2;color:#dc2626;}
button{background:#1f2937;color:#fff;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:20px;}
button:hover{opacity:.9;}
.log{background:#1f2937;color:#86efac;border-radius:8px;padding:16px;font-family:monospace;font-size:12px;white-space:pre-wrap;margin-top:20px;max-height:300px;overflow-y:auto;}
select{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;margin-right:10px;}
</style>
</head>
<body>

<h1>🔬 Teste de Filtros — Legado Atendimentos</h1>

<div style="margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
  <select id="ano">
    <option value="2025" selected>2025</option>
    <option value="2024">2024</option>
    <option value="2023">2023</option>
    <option value="2022">2022</option>
    <option value="2021">2021</option>
    <option value="">Todos os anos</option>
  </select>
  <button onclick="rodar()">▶ Rodar Comparação</button>
  <span id="status" style="font-size:13px;color:#6b7280"></span>
</div>

<div class="grid" id="cards"></div>

<table id="tbl">
  <thead>
    <tr>
      <th>Critério</th>
      <th>Atendimentos</th>
      <th>Receita</th>
      <th>vs Power BI (10.945 / R$4.755.935)</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="log" id="log">Aguardando...</div>

<script>
const PBI_ATEND  = 10945;
const PBI_RECEITA = 4755935;

const fmtM = v => Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtN = v => Number(v||0).toLocaleString("pt-BR");

function log(msg){ document.getElementById("log").textContent += "\n" + msg; }

async function fetchAll(filtros){
  let todos=[], from=0;
  while(true){
    let q = client.from("legado_atendimentos").select("situacao,valor");
    const {ano} = filtros;
    if(ano) q = q.gte("data",`${ano}-01-01`).lte("data",`${ano}-12-31`);

    // aplicar filtro de situação
    if(filtros.situacao === "not_nc_ac"){
      q = q.not("situacao","in","(\"Não comparecimento\",\"À confirmar\")");
    } else if(filtros.situacao === "or_explicit"){
      q = q.or("situacao.is.null,situacao.eq.-,situacao.eq.Confirmado,situacao.eq.Nenhum");
    } else if(filtros.situacao === "none"){
      // sem filtro de situação
    }

    // aplicar filtro de valor
    if(filtros.valor === "gt0")    q = q.gt("valor",0);
    if(filtros.valor === "gte0")   q = q.gte("valor",0);
    if(filtros.valor === "notnull")q = q.not("valor","is",null);

    q = q.range(from, from+999);
    const {data, error} = await q;
    if(error){ log("ERRO: "+JSON.stringify(error)); break; }
    if(!data||!data.length) break;
    todos = todos.concat(data);
    if(data.length < 1000) break;
    from += 1000;
  }
  return todos;
}

async function testar(label, filtros){
  log(`\n→ Testando: ${label}`);
  const data = await fetchAll(filtros);
  const atend = data.length;
  const receita = data.reduce((s,r)=>s+(r.valor||0),0);
  log(`  Atendimentos: ${atend} | Receita: ${fmtM(receita)}`);
  return {label, atend, receita};
}

async function rodar(){
  const ano = document.getElementById("ano").value;
  document.getElementById("log").textContent = `Ano: ${ano||"Todos"}\nRodando testes...\n`;
  document.getElementById("status").textContent = "Carregando...";
  document.querySelector("#tbl tbody").innerHTML = "";
  document.getElementById("cards").innerHTML = "";

  const testes = [
    {label:"1. Sem nenhum filtro",                      situacao:"none",        valor:"none"},
    {label:"2. Situacao: NOT IN (NC, AC)",               situacao:"not_nc_ac",   valor:"none"},
    {label:"3. Situacao: OR explícito (null,-,conf,nenhum)", situacao:"or_explicit",valor:"none"},
    {label:"4. NOT IN (NC,AC) + valor > 0",              situacao:"not_nc_ac",   valor:"gt0"},
    {label:"5. NOT IN (NC,AC) + valor >= 0",             situacao:"not_nc_ac",   valor:"gte0"},
    {label:"6. NOT IN (NC,AC) + valor not null",         situacao:"not_nc_ac",   valor:"notnull"},
    {label:"7. OR explícito + valor > 0",                situacao:"or_explicit",  valor:"gt0"},
    {label:"8. OR explícito + valor not null",           situacao:"or_explicit",  valor:"notnull"},
  ];

  const resultados = [];
  for(const t of testes){
    const r = await testar(t.label, {...t, ano});
    resultados.push(r);
  }

  // Renderizar tabela
  const tbody = document.querySelector("#tbl tbody");
  resultados.forEach(r=>{
    const diffA = r.atend - PBI_ATEND;
    const diffR = r.receita - PBI_RECEITA;
    const match = diffA === 0;
    const tag = match
      ? `<span class="tag tag-ok">✓ Bate!</span>`
      : `<span class="tag tag-diff">Δ ${diffA>0?'+':''}${diffA} atend</span>`;
    tbody.innerHTML += `<tr>
      <td>${r.label}</td>
      <td><strong>${fmtN(r.atend)}</strong></td>
      <td>${fmtM(r.receita)}</td>
      <td>${tag} ${fmtM(diffR)} receita</td>
    </tr>`;
  });

  // Cards com melhor resultado
  const melhor = resultados.find(r=>r.atend===PBI_ATEND) || resultados[0];
  document.getElementById("cards").innerHTML = `
    <div class="card">
      <h3>Power BI (referência)</h3>
      <div class="num">${fmtN(PBI_ATEND)}</div>
      <div class="sub">${fmtM(PBI_RECEITA)}</div>
    </div>
    <div class="card">
      <h3>Sem nenhum filtro</h3>
      <div class="num">${fmtN(resultados[0].atend)}</div>
      <div class="sub">${fmtM(resultados[0].receita)}</div>
    </div>
    <div class="card">
      <h3>Melhor resultado encontrado</h3>
      <div class="num ${melhor.atend===PBI_ATEND?'green':'red'}">${fmtN(melhor.atend)}</div>
      <div class="sub">${melhor.label}</div>
    </div>
  `;

  document.getElementById("status").textContent = "Concluído!";
  log("\nFinalizado.");
}
</script>
</body>
</html>
