<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.left-tools input{padding:8px;border:1px solid #d1d5db;border-radius:6px;width:260px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;font-size:14px;text-align:left;}
th{background:#f9fafb;font-weight:600;}
button{background:#1f2937;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;}
button.excluir{background:#dc2626;}
.top-actions{display:flex;gap:10px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:10;}
.modal-content{background:#fff;width:900px;max-height:90vh;overflow:auto;border-radius:16px;padding:24px;}
.section{margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
label{font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;display:block;}
input,textarea{padding:8px;border-radius:6px;border:1px solid #d1d5db;width:100%;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Clientes</h1>

<div class="topbar">

<div class="left-tools">
<input id="buscaCliente" placeholder="Buscar cliente..." oninput="filtrarTabela()">
</div>

<div class="top-actions">
<button onclick="exportarExcel()">📊 Exportar Excel</button>
<button onclick="abrirNovo()">+ Novo Cliente</button>
</div>

</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Email</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<div class="section">
<h3>Dados do Cliente</h3>

<div class="grid">

<div><label>Nome *</label><input id="nome"></div>
<div><label>CPF/CNPJ</label><input id="cpf_cnpj"></div>
<div><label>Telefone 1 *</label><input id="telefone_1"></div>
<div><label>Telefone 2</label><input id="telefone_2"></div>
<div><label>Data de Nascimento</label><input type="date" id="dt_nasc"></div>
<div><label>Email</label><input id="email"></div>
<div><label>Nacionalidade</label><input id="nacionalidade"></div>
<div><label>Endereço</label><input id="endereco"></div>

</div>
</div>

<div class="section">
<label>Observação</label>
<textarea id="observacao"></textarea>
</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

const modal = document.getElementById("modal");

let idAtual=null;

/* ================= LOAD ================= */
async function carregar(){
const {data,error}=await supabaseClient
.from("clientes")
.select("*")
.order("nome")
.limit(50);

if(error){
console.error(error);
return;
}

render(data);
}

/* ================= RENDER ================= */
function render(lista){
const tbody=document.getElementById("lista");
tbody.innerHTML="";

lista.forEach(c=>{
tbody.innerHTML+=`
<tr>
<td>${c.nome}</td>
<td>${c.telefone_1||""}</td>
<td>${c.email||""}</td>
<td>
<button onclick="editar('${c.id}')">Editar</button>
<button class="excluir" onclick="excluir('${c.id}')">Excluir</button>
</td>
</tr>
`;
});
}

/* ================= BUSCA ================= */
async function filtrarTabela(){

const termo = document.getElementById("buscaCliente").value.trim();

if(!termo){
carregar();
return;
}

const partes = termo.split(" ");
let nomeBusca = partes.filter(p => isNaN(p)).join(" ");
let numeroBusca = partes.join("").replace(/\D/g,'');

let query = supabaseClient.from("clientes").select("*");

if(nomeBusca){
query = query.ilike("nome", `%${nomeBusca}%`);
}

if(numeroBusca.length >= 3){
query = query.ilike("telefone_1", `%${numeroBusca}%`);
}

const { data } = await query.limit(50);

render(data);
}

/* ================= EXPORTAR EXCEL ================= */
async function exportarExcel(){

const { data, error } = await supabaseClient
.from("clientes")
.select("*")
.order("nome");

if(error){
console.error(error);
alert("Erro ao exportar");
return;
}

const formatado = data.map(c => ({
Nome: c.nome,
Telefone: c.telefone_1,
Email: c.email,
CPF_CNPJ: c.cpf_cnpj,
Nascimento: c.dt_nasc,
Nacionalidade: c.nacionalidade,
Endereco: c.endereco,
Observacao: c.observacao
}));

const ws = XLSX.utils.json_to_sheet(formatado);
const wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, ws, "Clientes");

XLSX.writeFile(wb, "clientes.xlsx");
}

/* ================= CRUD ================= */

function abrirNovo(){
idAtual=null;
document.querySelectorAll("input, textarea").forEach(i=>i.value="");
modal.style.display="flex";
}

async function editar(id){
idAtual=id;
const {data}=await supabaseClient.from("clientes").select("*").eq("id",id).single();

Object.keys(data).forEach(k=>{
const el=document.getElementById(k);
if(el) el.value=data[k];
});

modal.style.display="flex";
}

async function salvar(){

let payload={};

document.querySelectorAll("input, textarea").forEach(i=>{
if(i.id && i.value) payload[i.id]=i.value;
});

if(!payload.nome){
alert("Nome obrigatório");
return;
}

if(!payload.telefone_1){
alert("Telefone obrigatório");
return;
}

payload.telefone_1 = payload.telefone_1.replace(/\D/g,'');

/* valida duplicado */
let query = supabaseClient
.from("clientes")
.select("id")
.eq("nome", payload.nome)
.eq("telefone_1", payload.telefone_1);

if(idAtual){
query = query.neq("id", idAtual);
}

const { data: existente } = await query;

if(existente && existente.length > 0){
alert("⚠️ Cliente já cadastrado!");
return;
}

if(idAtual){
await supabaseClient.from("clientes").update(payload).eq("id",idAtual);
}else{
await supabaseClient.from("clientes").insert(payload);
}

fecharModal();
carregar();
}

async function excluir(id){
if(!confirm("Excluir cliente?")) return;

await supabaseClient.from("clientes").delete().eq("id",id);
carregar();
}

function fecharModal(){
modal.style.display="none";
}

/* ================= INIT ================= */

carregar();

</script>

</body>
</html>
