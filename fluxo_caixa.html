<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:350px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<div style="display:flex; gap:5px;">
<select id="cliente"></select>
<button type="button" onclick="abrirNovoCliente()">+ Novo</button>
</div>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<!-- TABELA -->
<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL NOVO CLIENTE -->
<div id="modalCliente" class="modal">
<div class="modal-box">

<h3>Novo Cliente</h3>

<label>Nome</label>
<input type="text" id="novoNome">

<label>Telefone 1</label>
<input type="text" id="novoTelefone1">

<label>Telefone 2</label>
<input type="text" id="novoTelefone2">

<br><br>

<button onclick="criarCliente()">Salvar</button>
<button class="excluir" onclick="fecharModalCliente()">Cancelar</button>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

function nomeCliente(c){
  if(!c) return ""
  const nome = c.nome || c.nome_cliente || ""
  let telefone = (c.telefone_1 || "").replace(/\D/g,"")
  const final = telefone.slice(-4)
  return final ? `${nome} ${final}` : nome
}

function nomeServico(s){
if(!s) return ""
if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo} minutos`
if(s.subgrupo) return `${s.grupo} ${s.subgrupo}`
if(s.tempo) return `${s.grupo} ${s.tempo} minutos`
return s.grupo
}

let dadosClientes=[]
let dadosServicos=[]
let servicosMap={}

valor.oninput=calcular
desconto.oninput=calcular

function calcular(){
final.value=(valor.value||0)-(desconto.value||0)
}

async function carregar(){

const {data:clientes}=await supabaseClient.from("clientes").select("*")
dadosClientes=clientes||[]

cliente.innerHTML="<option value=''>Selecione</option>"
dadosClientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${nomeCliente(c)}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
dadosServicos=servicos||[]

servico.innerHTML="<option value=''>Selecione</option>"
dadosServicos.forEach(s=>{
servicosMap[s.id]=s
servico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

$('#cliente').select2({placeholder:"Buscar cliente"})
$('#servico').select2({placeholder:"Buscar serviço"})

servico.addEventListener("change",()=>{
const s=servicosMap[servico.value]
if(s){
valor.value=s.valor||0
calcular()
}
})

}

async function salvar(){

await supabaseClient.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:parseFloat(valor.value||0),
desconto:parseFloat(desconto.value||0),
valor_final:(valor.value||0)-(desconto.value||0),
origem_lead: origem.value
})

alert("Salvo!")
}

function abrirNovoCliente(){
modalCliente.style.display="flex"
}

function fecharModalCliente(){
modalCliente.style.display="none"
}

async function criarCliente(){

const nome=novoNome.value
const t1=novoTelefone1.value
const t2=novoTelefone2.value

if(!nome){
alert("Digite o nome")
return
}

const {data,error}=await supabaseClient
.from("clientes")
.insert({
nome:nome,
telefone_1:t1,
telefone_2:t2
})
.select()

if(error){
console.error(error)
alert("Erro ao salvar cliente")
return
}

const novo=data[0]

dadosClientes.push(novo)

const option=new Option(nomeCliente(novo),novo.id,true,true)
$('#cliente').append(option).trigger('change')

novoNome.value=""
novoTelefone1.value=""
novoTelefone2.value=""

fecharModalCliente()
}

carregar()

</script>

</body>
</html>
