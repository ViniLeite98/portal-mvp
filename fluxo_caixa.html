<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{padding:10px;border-bottom:1px solid #eee;}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:350px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label style="display:flex;justify-content:space-between;align-items:center;">
Cliente
<button type="button" onclick="abrirCadastroCliente()" 
style="padding:4px 8px;font-size:12px;background:#16a34a;">
Cadastro Cliente
</button>
</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<div class="form-box">

<div class="field">
<label>Data Inicial</label>
<input type="date" id="filtroInicio">
</div>

<div class="field">
<label>Data Final</label>
<input type="date" id="filtroFim">
</div>

<div class="field">
<label>Cliente</label>
<select id="filtroCliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="filtroServico"></select>
</div>

<button onclick="filtrar()">Filtrar</button>
<button onclick="limparFiltro()">Limpar</button>
<button onclick="exportarExcel()">Exportar Excel</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL EDITAR -->
<div id="modalEditar" class="modal">
<div class="modal-box">

<h3>Editar</h3>

<input type="date" id="editData">
<select id="editCliente"></select>
<select id="editServico"></select>
<select id="editOrigem"></select>
<input type="number" id="editValor">
<input type="number" id="editDesconto">

<br><br>

<button onclick="salvarEdicao()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)


function abrirCadastroCliente(){
window.open("clientes.html","_blank")
}

function nomeCliente(c){
if(!c) return ""
let tel=(c.telefone_1||"").replace(/\D/g,"")
return `${c.nome} ${tel.slice(-4)}`
}

function nomeServico(s){
if(!s) return ""
if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo} min`
return s.grupo
}

valor.oninput=calc
desconto.oninput=calc

function calc(){
final.value=(valor.value||0)-(desconto.value||0)
}

let dados=[],dadosClientes=[],dadosServicos=[],servicosMap={},editandoId=null

async function carregarSelects(){

const {data:clientes}=await supabaseClient.from("clientes").select("*")
dadosClientes=clientes||[]

cliente.innerHTML="<option>Selecione</option>"
filtroCliente.innerHTML="<option>Todos</option>"

clientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${nomeCliente(c)}</option>`
filtroCliente.innerHTML+=`<option value="${c.id}">${nomeCliente(c)}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
dadosServicos=servicos||[]

servico.innerHTML="<option>Selecione</option>"
filtroServico.innerHTML="<option>Todos</option>"

servicos.forEach(s=>{
servicosMap[s.id]=s
servico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
filtroServico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

servico.onchange=()=>{
const s=servicosMap[servico.value]
if(s){
valor.value=s.valor||50
calc()
}
}
}

async function carregarLista(){
const {data}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]
render(dados)
}

function render(lista){
lista.innerHTML=""
dados.forEach(r=>{
lista.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${nomeCliente(r.clientes)}</td>
<td>${r.origem_lead||"-"}</td>
<td>${nomeServico(r.servicos)}</td>
<td>${r.valor}</td>
<td>${r.desconto}</td>
<td>${r.valor_final}</td>
<td>
<button class="editar" onclick="abrirEditar('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>`
})
}

function abrirEditar(id){
editandoId=id
const r=dados.find(d=>d.id==id)

editData.value=r.data
editValor.value=r.valor
editDesconto.value=r.desconto

modalEditar.style.display="flex"
}

function fecharModal(){modalEditar.style.display="none"}

async function salvar(){
await supabaseClient.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:valor.value,
desconto:desconto.value,
valor_final:valor.value-desconto.value,
origem_lead: origem.value||null
})
carregarLista()
}

async function salvarEdicao(){
await supabaseClient.from("fluxo_caixa").update({
data:editData.value,
valor:editValor.value,
desconto:editDesconto.value,
valor_final:editValor.value-editDesconto.value
}).eq("id",editandoId)

fecharModal()
carregarLista()
}

async function excluir(id){
if(!confirm("Excluir?"))return
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

function filtrar(){
let lista=[...dados]

if(filtroInicio.value) lista=lista.filter(d=>d.data>=filtroInicio.value)
if(filtroFim.value) lista=lista.filter(d=>d.data<=filtroFim.value)
if(filtroCliente.value) lista=lista.filter(d=>d.cliente_id==filtroCliente.value)
if(filtroServico.value) lista=lista.filter(d=>d.servico_id==filtroServico.value)

render(lista)
}

function limparFiltro(){
filtroInicio.value=""
filtroFim.value=""
filtroCliente.value=""
filtroServico.value=""
render(dados)
}

function exportarExcel(){
const ws=XLSX.utils.json_to_sheet(dados)
const wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Fluxo")
XLSX.writeFile(wb,"fluxo.xlsx")
}

carregarSelects()
carregarLista()
calc()

</script>

</body>
</html>
