<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

let dados=[]
let dadosClientes=[]
let dadosServicos=[]
let servicosMap={}

function hoje(){
const d=new Date()
const offset=d.getTimezoneOffset()
return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

data.value=hoje()

valor.oninput=calcular
desconto.oninput=calcular

function calcular(){
final.value=(parseFloat(valor.value||0)-parseFloat(desconto.value||0))
}

function formatar(v){
return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

// 🔥 CLIENTE SIMPLES (melhor busca)
function nomeCliente(c){
  if(!c) return ""
  return c.nome || c.nome_cliente || ""
}

function nomeServico(s){
  if(!s) return ""
  return s.grupo || ""
}

async function carregarSelects(){

const {data:clientes}=await client.from("clientes").select("id,nome,telefone_1")
dadosClientes=clientes||[]

cliente.innerHTML="<option value=''>Selecione</option>"

dadosClientes.forEach(c=>{
let tel = (c.telefone_1 || "").slice(-4)
cliente.innerHTML+=`
<option value="${c.id}">
${c.nome} ${tel ? '('+tel+')':''}
</option>`
})

const {data:servicos}=await client.from("servicos").select("id,grupo,valor")
dadosServicos=servicos||[]

servico.innerHTML="<option value=''>Selecione</option>"

dadosServicos.forEach(s=>{
servicosMap[s.id]=s
servico.innerHTML+=`<option value="${s.id}">${s.grupo}</option>`
})

servico.addEventListener("change",()=>{
const s=servicosMap[servico.value]
if(s){
valor.value=s.valor||50
calcular()
}
})

// 🔥 SELECT2 MELHORADO
$('#cliente').select2({
  placeholder:"Buscar cliente...",
  width:'200px',
  matcher: function(params, data) {
    if ($.trim(params.term) === '') return data
    const termo = params.term.toLowerCase()
    const texto = (data.text || "").toLowerCase()
    return texto.includes(termo) ? data : null
  }
})

}

async function carregarLista(){

const {data}=await client
.from("fluxo_caixa")
.select(`id,data,valor,desconto,valor_final,clientes(nome),servicos(grupo)`)
.order("data",{ascending:false})
.limit(200)

dados=data||[]
render(dados)
}

// 🔥 RENDER OTIMIZADO
function render(lista){

let html=""

lista.forEach(r=>{
html+=`
<tr>
<td>${r.data}</td>
<td>${r.clientes?.nome || ""}</td>
<td>${r.servicos?.grupo || ""}</td>
<td>${formatar(r.valor)}</td>
<td><strong>${formatar(r.valor_final)}</strong></td>
<td>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>
`
})

document.getElementById("lista").innerHTML=html
}

async function salvar(){

await client.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:parseFloat(valor.value||0),
desconto:parseFloat(desconto.value||0),
valor_final:parseFloat(valor.value||0)-parseFloat(desconto.value||0)
})

carregarLista()
}

async function excluir(id){
if(!confirm("Excluir?")) return
await client.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

carregarSelects()
carregarLista()
calcular()

</script>

</body>
</html>
