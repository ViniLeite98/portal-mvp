<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

/* 🔥 MODAL MELHORADO */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#fff;
padding:25px;
border-radius:14px;
width:520px;
max-width:95%;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.modal-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.modal-field{
display:flex;
flex-direction:column;
}

.modal-field label{
font-size:12px;
margin-bottom:4px;
color:#555;
}

.modal-field input,
.modal-field select{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.modal-actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.modal-right{
display:flex;
gap:10px;
}

.btn-excluir{
background:#dc2626;
color:#fff;
padding:10px 16px;
border-radius:8px;
border:none;
cursor:pointer;
}

.btn-salvar{
background:#2563eb;
color:#fff;
padding:10px 16px;
border-radius:8px;
border:none;
}

.btn-cancelar{
background:#ef4444;
color:#fff;
padding:10px 16px;
border-radius:8px;
border:none;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<!-- resto do sistema igual... -->

</main>
</div>

<!-- 🔥 MODAL NOVO -->
<div id="modalEditar" class="modal">
<div class="modal-box">

<h3>Editar</h3>

<div class="modal-grid">

<div class="modal-field">
<label>Data</label>
<input type="date" id="editData">
</div>

<div class="modal-field">
<label>Cliente</label>
<select id="editCliente"></select>
</div>

<div class="modal-field">
<label>Serviço</label>
<select id="editServico"></select>
</div>

<div class="modal-field">
<label>Origem</label>
<select id="editOrigem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="modal-field">
<label>Valor</label>
<input type="number" id="editValor">
</div>

<div class="modal-field">
<label>Desconto</label>
<input type="number" id="editDesconto">
</div>

</div>

<div class="modal-actions">

<button class="btn-excluir" onclick="excluir(editandoId)">
🗑 Excluir
</button>

<div class="modal-right">
<button class="btn-salvar" onclick="salvarEdicao()">Salvar</button>
<button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
</div>

</div>

</div>
</div>

<script>

// 🔥 AJUSTE PRINCIPAL AQUI (SERVIÇO)
function abrirEditar(id){

editandoId=id
const r=dados.find(d=>d.id==id)

editCliente.innerHTML="<option value=''>Selecione</option>"
dadosClientes.forEach(c=>{
editCliente.innerHTML+=`<option value="${c.id}">${c.nome||c.nome_cliente}</option>`
})

/* ✅ CORREÇÃO DO SERVIÇO */
editServico.innerHTML="<option value=''>Selecione</option>"
dadosServicos.forEach(s=>{
editServico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

editData.value=r.data
editCliente.value=r.cliente_id
editServico.value=r.servico_id
editValor.value=r.valor
editDesconto.value=r.desconto
editOrigem.value=r.origem_lead || ""

modalEditar.style.display="flex"
}

</script>

</body>
</html>
