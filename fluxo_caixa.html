<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;padding:20px;border-radius:10px;
display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;border-radius:6px;border:1px solid #ccc;min-width:160px;
}

button{
background:#2563eb;color:#fff;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;background:#fff;border-collapse:collapse;border-radius:10px;
overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{padding:10px;border-bottom:1px solid #eee;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label style="display:flex;justify-content:space-between;">
Cliente
<button onclick="abrirCadastroCliente()" style="background:#16a34a;padding:4px 8px;font-size:12px;">
Cadastro Cliente
</button>
</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

function abrirCadastroCliente(){
window.open("clientes.html","_blank")
}

function nomeCliente(c){
let tel=(c.telefone_1||"").replace(/\D/g,"")
return `${c.nome} ${tel.slice(-4)}`
}

function nomeServico(s){
if(!s) return ""
if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo}min`
return s.grupo
}

let dados=[],servicosMap={}

valor.oninput=calc
desconto.oninput=calc

function calc(){
final.value=(valor.value||0)-(desconto.value||0)
}

async function carregarSelects(){

const {data:clientes}=await supabaseClient.from("clientes").select("*")
cliente.innerHTML="<option></option>"

clientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${nomeCliente(c)}</option>`
})

const {data:servicos}=await supabaseClient.from("servicos").select("*")
servico.innerHTML="<option></option>"

servicos.forEach(s=>{
servicosMap[s.id]=s
servico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

$('#cliente').select2({placeholder:"Buscar cliente...",width:'180px'})
$('#servico').select2({placeholder:"Buscar serviço...",width:'200px'})

/* 🔥 EVENTO CORRETO */
$('#servico').on('select2:select', function (e) {
const id=e.params.data.id
const s=servicosMap[id]

if(s){
valor.value=s.valor||50
calc()
}
})

}

async function carregarLista(){
const {data}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]
render()
}

function render(){
lista.innerHTML=""
dados.forEach(r=>{
lista.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${nomeCliente(r.clientes)}</td>
<td>${nomeServico(r.servicos)}</td>
<td>${r.valor}</td>
<td>${r.valor_final}</td>
<td>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>`
})
}

async function salvar(){
await supabaseClient.from("fluxo_caixa").insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:valor.value,
desconto:desconto.value,
valor_final:valor.value-desconto.value
})
carregarLista()
}

async function excluir(id){
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

carregarSelects()
carregarLista()
calc()

</script>

</body>
</html>
