<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Documentos</title>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; display:flex; }

    /* SIDEBAR */
    .sidebar {
      width:220px;
      background:#111;
      color:#fff;
      height:100vh;
      padding:20px;
    }

    .sidebar a {
      display:block;
      color:#ccc;
      text-decoration:none;
      margin:10px 0;
    }

    .sidebar a:hover { color:#fff; }

    /* CONTENT */
    .content { flex:1; padding:20px; }

    .header { display:flex; justify-content:space-between; align-items:center; }

    .btn { background:#007bff; color:#fff; border:none; padding:10px 15px; cursor:pointer; border-radius:6px; }

    .card { background:#fff; padding:15px; border-radius:10px; margin-top:15px; }

    .doc-item { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee; }

    input, select { padding:8px; margin-right:10px; }

    .tag { font-size:12px; background:#eee; padding:3px 8px; border-radius:5px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Hara Spa</h3>
  <a href="index.html">Dashboard</a>
  <a href="clientes.html">Clientes</a>
  <a href="documentos.html">Documentos</a>
</div>

<!-- CONTEÚDO -->
<div class="content">

  <div class="header">
    <h2>📄 Documentos</h2>
    <button class="btn" onclick="abrirModal()">+ Documento</button>
  </div>

  <div class="card">
    <input type="text" id="search" placeholder="Buscar..." onkeyup="filtrar()">
  </div>

  <div id="lista" class="card"></div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
  <div style="background:#fff; padding:20px; margin:100px auto; width:320px; border-radius:10px;">

    <h3>Novo Documento</h3>

    <input type="text" id="nome" placeholder="Nome"><br><br>

    <select id="tipo">
      <option value="">Tipo</option>
      <option>RG</option>
      <option>CPF</option>
      <option>Comprovante</option>
      <option>Contrato</option>
    </select><br><br>

    <input type="file" id="file"><br><br>

    <button class="btn" onclick="salvar()">Salvar</button>
    <button onclick="fecharModal()">Cancelar</button>

  </div>
</div>

<script>

// 🔑 CONFIG SUPABASE
// ⚠️ EVITA DUPLICAR VARIÁVEL
const supabaseClient = supabase.createClient(
  "SUA_URL",
  "SUA_ANON_KEY"
);

let documentos = [];

function abrirModal(){
  document.getElementById('modal').style.display = 'block';
}

function fecharModal(){
  document.getElementById('modal').style.display = 'none';
}

// 🚀 SALVAR
async function salvar(){
  const nome = document.getElementById('nome').value;
  const tipo = document.getElementById('tipo').value;
  const file = document.getElementById('file').files[0];

  if(!nome || !tipo || !file){
    alert('Preencha tudo');
    return;
  }

  const fileName = Date.now() + '-' + file.name;

  // upload storage
  const { error: uploadError } = await supabaseClient.storage
    .from('documentos')
    .upload(fileName, file);

  if(uploadError){
    alert('Erro upload');
    return;
  }

  const url = supabaseClient.storage
    .from('documentos')
    .getPublicUrl(fileName).data.publicUrl;

  // salvar banco
  await supabaseClient.from('documentos').insert([
    { nome, tipo, url }
  ]);

  fecharModal();
  carregar();
}

// 📥 CARREGAR
async function carregar(){
  const { data } = await supabaseClient.from('documentos').select('*');
  documentos = data || [];
  render();
}

function render(){
  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  documentos.forEach(doc => {
    lista.innerHTML += `
      <div class="doc-item">
        <div>
          <strong>${doc.nome}</strong><br>
          <span class="tag">${doc.tipo}</span>
        </div>
        <div>
          <a href="${doc.url}" target="_blank">📂</a>
        </div>
      </div>
    `;
  });
}

function filtrar(){
  const termo = document.getElementById('search').value.toLowerCase();

  const filtrados = documentos.filter(d =>
    d.nome.toLowerCase().includes(termo) ||
    d.tipo.toLowerCase().includes(termo)
  );

  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  filtrados.forEach(doc => {
    lista.innerHTML += `
      <div class="doc-item">
        <div>
          <strong>${doc.nome}</strong><br>
          <span class="tag">${doc.tipo}</span>
        </div>
      </div>
    `;
  });
}

carregar();

</script>

</body>
</html>
