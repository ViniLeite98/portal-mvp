<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviços | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f5f7fb;
}

.app{
display:flex;
min-height:100vh;
}

.content{
flex:1;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:14px;
overflow:hidden;
}

th,td{
padding:14px;
border-bottom:1px solid #e5e7eb;
}

th{
background:#f9fafb;
cursor:pointer;
}

.btn-editar{
background:#f59e0b;
color:#fff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.btn-excluir{
background:#dc2626;
color:#fff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
width:500px;
border-radius:16px;
padding:24px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
width:100%;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="app">

<main class="content">

<h1>Serviços</h1>

<button onclick="abrirNovo()">+ Novo Serviço</button>

<table>

<thead>
<tr>
<th>Grupo</th>
<th>Tempo</th>
<th>Valor</th>
<th>Comissão</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</main>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h3>Cadastro Serviço</h3>

<div class="grid">

<select id="grupo">

<option value="">Grupo</option>

<option>Nuru</option>
<option>Vivencia</option>
<option>Four Hands</option>
<option>Fetiche</option>
<option>Podolatria</option>
<option>Pspot</option>
<option>Voyeur</option>
<option>Experiência simultânea no Tantra</option>
<option>Mini Curso Sessão Vivência</option>

</select>

<select id="tempo">

<option value="">Tempo</option>
<option value="60">60</option>
<option value="90">90</option>
<option value="120">120</option>

</select>

<input id="valor" type="number" placeholder="Valor">

<input id="comissao" type="number" placeholder="Comissão">

<select id="status">
<option value="ativo">ativo</option>
<option value="inativo">inativo</option>
</select>

</div>

<div class="modal-actions">

<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"SUA_ANON_KEY"
)

let dados=[]
let idAtual=null

async function carregar(){

const {data,error}=await supabaseClient
.from("servicos")
.select("*")
.order("grupo",{ascending:true})

dados=data||[]

render()

}

function render(){

const tbody=document.getElementById("lista")

tbody.innerHTML=""

dados.forEach(s=>{

tbody.innerHTML+=`

<tr>

<td>${s.grupo||""}</td>
<td>${s.tempo||""} min</td>
<td>R$ ${Number(s.valor||0).toFixed(2)}</td>
<td>R$ ${Number(s.comissao||0).toFixed(2)}</td>
<td>${s.status||""}</td>

<td>

<button class="btn-editar" onclick="editar('${s.id}')">
Editar
</button>

<button class="btn-excluir" onclick="excluir('${s.id}')">
Excluir
</button>

</td>

</tr>

`

})

}

function abrirNovo(){

idAtual=null

document.getElementById("grupo").value=""
document.getElementById("tempo").value=""
document.getElementById("valor").value=""
document.getElementById("comissao").value=""
document.getElementById("status").value="ativo"

document.getElementById("modal").style.display="flex"

}

function fecharModal(){

document.getElementById("modal").style.display="none"

}

async function salvar(){

const payload={

grupo:document.getElementById("grupo").value,
tempo:parseInt(document.getElementById("tempo").value),
valor:parseFloat(document.getElementById("valor").value),
comissao:parseFloat(document.getElementById("comissao").value),
status:document.getElementById("status").value

}

if(!payload.grupo || !payload.tempo){

alert("Preencha grupo e tempo")

return

}

if(idAtual){

await supabaseClient
.from("servicos")
.update(payload)
.eq("id",idAtual)

}else{

await supabaseClient
.from("servicos")
.insert(payload)

}

fecharModal()

carregar()

}

async function editar(id){

idAtual=id

const {data}=await supabaseClient
.from("servicos")
.select("*")
.eq("id",id)
.single()

document.getElementById("grupo").value=data.grupo
document.getElementById("tempo").value=data.tempo
document.getElementById("valor").value=data.valor
document.getElementById("comissao").value=data.comissao
document.getElementById("status").value=data.status

document.getElementById("modal").style.display="flex"

}

async function excluir(id){

if(!confirm("Excluir serviço?")) return

await supabaseClient
.from("servicos")
.delete()
.eq("id",id)

carregar()

}

carregar()

</script>

</body>
</html>
