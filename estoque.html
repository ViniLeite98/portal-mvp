<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Materiais | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

.app{display:flex}
.content{flex:1;padding:40px}

.grid{
display:grid;
grid-template-columns: 320px 1fr;
gap:30px;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

label{
font-size:13px;
margin-bottom:3px;
display:block;
color:#555;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#334155;
color:#fff;
cursor:pointer;
}

.btn-danger{background:#dc2626;margin-top:5px;}

.lista-linha{
display:flex;
align-items:center;
margin-bottom:12px;
font-size:15px;
}

.nome{white-space:nowrap;}

.pontos{
flex:1;
border-bottom:1px dashed #999;
margin:0 10px;
}

.valor{
white-space:nowrap;
font-weight:500;
}

.acoes{
display:flex;
gap:10px;
margin-left:10px;
}

.btn-acao{
cursor:pointer;
opacity:0;
transition:0.2s;
}

.lista-linha:hover .btn-acao{
opacity:1;
}

.btn-edit{color:#2563eb;}
.btn-zerar{color:#f59e0b;}
.btn-delete{color:#dc2626;}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:12px;
width:350px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Materiais</h1>
<p>Controle simples</p>

<div class="grid">

<div class="card">

<h3>Novo Material</h3>

<input id="nome" placeholder="Nome">
<input id="valor" type="number" step="0.01" placeholder="Valor da unidade (R$)">

<button onclick="criarProduto()">Cadastrar</button>

<hr style="margin:15px 0">

<h3>Movimentar</h3>

<select id="produtoMov"></select>
<input id="qtd" type="number" placeholder="Quantidade">

<button onclick="entrada()">+ Entrada</button>
<button class="btn-danger" onclick="abrirModalSaida()">- Saída</button>

</div>

<div class="card">

<div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
  <h3>Estoque</h3>

  <div style="display:flex; gap:10px; align-items:center;">
    <strong>Qtd | Valor</strong>
    <button onclick="exportarExcel()" style="width:auto; padding:6px 12px; font-size:13px;">
      <i class="fa-solid fa-file-excel"></i> Exportar
    </button>
  </div>
</div>

<div id="lista"></div>

</div>

</div>

</main>
</div>

<!-- MODAL -->
<div id="modalSaida" class="modal">
<div class="modal-box">

<h3>Registrar Saída</h3>

<label>Produto</label>
<select id="produtoSaida"></select>

<label>Quantidade</label>
<input id="qtdModal" type="number">

<label>Quem usou</label>
<select id="responsavelSaida"></select>

<label>Data</label>
<input id="dataSaida" type="date">

<div style="display:flex; gap:10px; margin-top:10px;">
<button onclick="confirmarSaida()">Salvar</button>
<button class="btn-danger" onclick="fecharModal()">Cancelar</button>
</div>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"SEU_ANON_KEY_AQUI"
)

async function criarProduto(){

const nome = document.getElementById("nome").value.trim()
const valor = parseFloat(document.getElementById("valor").value) || 0

if(!nome){
alert("Digite o nome")
return
}

await supabaseClient.from("produtos").insert({ nome, valor })

document.getElementById("nome").value=""
document.getElementById("valor").value=""

carregar()
}

async function carregar(){

const {data} = await supabaseClient
.from("estoque_atual")
.select("*")
.order("nome")

const lista = document.getElementById("lista")
lista.innerHTML=""

const sel=document.getElementById("produtoMov")
const selModal=document.getElementById("produtoSaida")

sel.innerHTML=""
selModal.innerHTML=""

data.forEach(p=>{

const total = (p.valor || 0) * (p.saldo || 0)

lista.innerHTML+=`
<div class="lista-linha">
<span class="nome">${p.nome}</span>
<span class="pontos"></span>
<span class="valor">${p.saldo} | R$ ${total.toFixed(2)}</span>
</div>
`

sel.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
selModal.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
})

}

async function carregarFuncionarios(){

const { data } = await supabaseClient
.from("funcionarios")
.select("id,nome")
.order("nome")

const select = document.getElementById("responsavelSaida")

select.innerHTML = "<option value=''>Selecione</option>"

;(data || []).forEach(f=>{
select.innerHTML += `<option value="${f.nome}">${f.nome}</option>`
})

}

function abrirModalSaida(){

document.getElementById("modalSaida").style.display="flex"

const hoje = new Date().toISOString().split("T")[0]
document.getElementById("dataSaida").value = hoje

}

function fecharModal(){
document.getElementById("modalSaida").style.display="none"
}

async function confirmarSaida(){

const id = document.getElementById("produtoSaida").value
const qtd = parseFloat(document.getElementById("qtdModal").value)
const responsavel = document.getElementById("responsavelSaida").value
const data = document.getElementById("dataSaida").value

if(!qtd){
alert("Digite a quantidade")
return
}

const { data: estoque } = await supabaseClient
.from("estoque_atual")
.select("saldo")
.eq("id", id)
.single()

if(qtd > estoque.saldo){
alert("Estoque insuficiente")
return
}

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,
tipo:"saida",
quantidade:qtd,
responsavel:responsavel,
data:data
})

document.getElementById("qtdModal").value=""
document.getElementById("responsavelSaida").value=""

fecharModal()
carregar()
}

async function entrada(){
const id=document.getElementById("produtoMov").value
const qtd=parseFloat(document.getElementById("qtd").value)
if(!qtd) return

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,
tipo:"entrada",
quantidade:qtd
})

document.getElementById("qtd").value=""
carregar()
}

async function exportarExcel(){

const {data} = await supabaseClient
.from("estoque_atual")
.select("*")

const dados = data.map(p => ({
Nome: p.nome,
Quantidade: p.saldo,
Valor: p.valor
}))

const ws = XLSX.utils.json_to_sheet(dados)
const wb = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb, ws, "Estoque")

XLSX.writeFile(wb, "estoque.xlsx")
}

carregar()
carregarFuncionarios()

</script>

</body>
</html>
