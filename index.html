<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

.card{
  background:#fff;
  border-radius:25px;
  padding:30px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.top-cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
  margin-bottom:40px;
}

.big-number{
  font-size:60px;
  font-weight:bold;
  margin-top:10px;
}

.workforce{
  background:#fff;
  border-radius:25px;
  padding:30px;
  display:flex;
  gap:40px;
  margin-bottom:40px;
}

.chart-wrapper{
  display:flex;
  align-items:flex-end;
  gap:16px;
  height:260px;
  margin-top:30px;
}

.bar-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:40px;
}

.bar{
  width:100%;
  background:linear-gradient(180deg,#6a8fd6,#4f6fb3);
  border-radius:8px 8px 0 0;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<div class="top-cards">
  <div class="card">
    <h3>Equipe</h3>
    <div class="big-number" id="totalEquipe">0</div>
  </div>

  <div class="card">
    <h3>Clientes</h3>
    <div class="big-number" id="totalClientes">0</div>
  </div>

  <div class="card">
    <h3>Serviços</h3>
    <div class="big-number" id="totalServicos">0</div>
  </div>
</div>

<div class="workforce">
  <div>
    <h3>Força de Trabalho</h3>
    <div class="chart-wrapper" id="bars"></div>
  </div>
</div>

<div>
  <h3>Folgas</h3>
  <div id="listaFolgas"></div>
</div>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function(){

const supabaseClient = supabase.createClient(
  "https://rymehgsoarjeecuwyhny.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

/* ================= TERAPEUTAS ================= */

const { data: terapeutas } = await supabaseClient
  .from("terapeutas")
  .select("*")
  .eq("status", "Ativo");

/* ================= CLIENTES ================= */

const { count } = await supabaseClient
  .from("clientes")
  .select("*", { count: "exact", head: true });

/* ================= SERVIÇOS ================= */

const { data: servicos } = await supabaseClient
  .from("servicos")
  .select("*");

/* ================= TOTALS ================= */

document.getElementById("totalEquipe").innerText = terapeutas?.length || 0;
document.getElementById("totalClientes").innerText = count || 0;
document.getElementById("totalServicos").innerText = servicos?.length || 0;

/* ================= FORÇA DE TRABALHO DINÂMICA ================= */

let contagem = {};
let menorHora = 23;
let maiorHora = 0;

(terapeutas||[]).forEach(t=>{
  if(!t.hora_entrada || !t.hora_saida) return;

  const hEntrada = parseInt(t.hora_entrada.substring(0,2));
  const hSaida = parseInt(t.hora_saida.substring(0,2));

  if(hEntrada < menorHora) menorHora = hEntrada;
  if(hSaida > maiorHora) maiorHora = hSaida;
});

if(menorHora > maiorHora){
  menorHora = 9;
  maiorHora = 18;
}

for(let h=menorHora; h<=maiorHora; h++){
  contagem[h]=0;
}

(terapeutas||[]).forEach(t=>{
  if(!t.hora_entrada || !t.hora_saida) return;

  const h1=parseInt(t.hora_entrada.substring(0,2));
  const h2=parseInt(t.hora_saida.substring(0,2));

  for(let h=menorHora; h<=maiorHora; h++){
    if(h>=h1 && h<=h2){
      contagem[h]++;
    }
  }
});

const barsDiv=document.getElementById("bars");
const maxValor=Math.max(...Object.values(contagem));

for(let h=menorHora; h<=maiorHora; h++){
  const valor=contagem[h];
  if(valor===0) continue;

  const altura=maxValor? (valor/maxValor)*200 : 0;

  barsDiv.innerHTML+=`
    <div class="bar-container">
      <div>${valor}</div>
      <div class="bar" style="height:${altura}px"></div>
      <div>${h}:00</div>
    </div>
  `;
}

/* ================= FOLGAS ================= */

const hoje=new Date();
const inicioAno=new Date(2026,0,1);
const folgaDiv=document.getElementById("listaFolgas");

for(const t of (terapeutas||[])){

  let contador=0;

  const { data: solicitacoes } = await supabaseClient
    .from("solicitacoes")
    .select("*")
    .eq("terapeuta_cpf",t.cpf);

  (solicitacoes||[]).forEach(s=>{
    if(s.status==="aprovado"){
      contador++;
    }
  });

  folgaDiv.innerHTML+=`
    <div>${t.nome_profissional}: ${contador}</div>
  `;
}

});
</script>

</body>
</html>
