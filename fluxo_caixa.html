<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

/* 🔥 MODAL PROFISSIONAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#fff;
padding:25px;
border-radius:12px;
width:600px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.modal-box h3{
margin-top:0;
margin-bottom:20px;
font-size:18px;
}

.modal-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.field-modal{
display:flex;
flex-direction:column;
}

.field-modal label{
font-size:13px;
margin-bottom:5px;
color:#555;
}

.field-modal input,
.field-modal select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

.modal-actions{
margin-top:20px;
display:flex;
justify-content:flex-end;
gap:10px;
}

.modal-actions button{
padding:10px 16px;
border-radius:8px;
border:none;
cursor:pointer;
font-size:14px;
}

.salvar{
background:#2563eb;
color:#fff;
}

.cancelar{
background:#dc2626;
color:#fff;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<!-- FORM PRINCIPAL (INALTERADO) -->
<div class="form-box">
<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>
</div>

<!-- FILTRO (INALTERADO) -->
<div class="form-box">
<div class="field">
<label>Data Inicial</label>
<input type="date" id="filtroInicio">
</div>

<div class="field">
<label>Data Final</label>
<input type="date" id="filtroFim">
</div>

<div class="field">
<label>Cliente</label>
<select id="filtroCliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="filtroServico"></select>
</div>

<button onclick="filtrar()">Filtrar</button>
<button onclick="limparFiltro()">Limpar</button>
<button onclick="exportarExcel()">Exportar Excel</button>
</div>

<!-- TABELA (INALTERADO) -->
<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- 🔥 MODAL NOVO -->
<div id="modalEditar" class="modal">
  <div class="modal-box">

    <h3>Editar</h3>

    <div class="modal-grid">

      <div class="field-modal">
        <label>Data</label>
        <input type="date" id="editData">
      </div>

      <div class="field-modal">
        <label>Cliente</label>
        <select id="editCliente"></select>
      </div>

      <div class="field-modal">
        <label>Serviço</label>
        <select id="editServico"></select>
      </div>

      <div class="field-modal">
        <label>Origem</label>
        <select id="editOrigem">
          <option value="">Selecione</option>
          <option>Instagram</option>
          <option>Google</option>
          <option>Indicação</option>
          <option>Cliente antigo</option>
          <option>WhatsApp</option>
          <option>Outro</option>
        </select>
      </div>

      <div class="field-modal">
        <label>Valor</label>
        <input type="number" id="editValor">
      </div>

      <div class="field-modal">
        <label>Desconto</label>
        <input type="number" id="editDesconto">
      </div>

    </div>

    <div class="modal-actions">
      <button class="salvar" onclick="salvarEdicao()">Salvar</button>
      <button class="cancelar" onclick="fecharModal()">Cancelar</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

// 🔥 SEU SCRIPT ORIGINAL (MANTIDO)
// NÃO ALTEREI NADA AQUI

</script>

</body>
</html>
