<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviços | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;}
.content{flex:1;padding:40px;}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.left-tools input{
padding:8px;
border:1px solid #d1d5db;
border-radius:6px;
width:240px;
}

.right-tools{
display:flex;
gap:10px;
align-items:center;
}

.right-tools button{
background:#2563eb;
color:#fff;
border:none;
border-radius:6px;
padding:7px 12px;
cursor:pointer;
}

.btn-novo{background:#1f2937;}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:14px;
overflow:hidden;
}

th, td{
padding:14px;
border-bottom:1px solid #e5e7eb;
vertical-align:middle;
}

th{
background:#f9fafb;
cursor:pointer;
font-weight:600;
}

/* 🎯 ALINHAMENTO PROFISSIONAL */
td:nth-child(2),
td:nth-child(3),
td:nth-child(4),
td:nth-child(5),
td:nth-child(6){
text-align:center;
}

/* hover */
tr:hover{
background:#f9fafb;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
width:600px;
border-radius:16px;
padding:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
width:100%;
}

label{
font-size:12px;
color:#6b7280;
margin-bottom:4px;
display:block;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Serviços</h1>

<div class="topbar">
<div class="left-tools">
<input id="buscaServico" placeholder="Buscar..." oninput="filtrarTabela()">
</div>

<div class="right-tools">
<button onclick="exportarExcel()">
<i class="fa-solid fa-file-excel"></i> Exportar
</button>

<button class="btn-novo" onclick="abrirNovo()">
+ Novo
</button>

<select id="porPaginaSelect" onchange="mudarPorPagina()">
<option value="5">5</option>
<option value="10" selected>10</option>
<option value="20">20</option>
<option value="todos">Todos</option>
</select>
</div>
</div>

<table>
<thead>
<tr>
<th onclick="ordenar('servico')">Serviço</th>
<th onclick="ordenar('tempo')">Tempo</th>
<th onclick="ordenar('valor')">Valor</th>
<th onclick="ordenar('comissao')">Comissão</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Cadastro Serviço</h3>

<div class="grid">

<div>
<label>Grupo</label>
<select id="grupo">
<option value="">Selecione</option>
<option>Nuru</option>
<option>Vivencia</option>
<option>Four Hands</option>
<option>Podolatria</option>
</select>
</div>

<div>
<label>Subgrupo</label>
<input id="subgrupo" placeholder="Ex: Nay">
</div>

<div>
<label>Tempo</label>
<select id="tempo">
<option value="">Sem tempo</option>
<option value="30">30</option>
<option value="60">60</option>
<option value="90">90</option>
<option value="120">120</option>
</select>
</div>

<div>
<label>Valor</label>
<input id="valor" type="number">
</div>

<div>
<label>Comissão</label>
<input id="comissao" type="number">
</div>

<div>
<label>Status</label>
<select id="status">
<option value="ativo">Ativo</option>
<option value="inativo">Inativo</option>
</select>
</div>

</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let dados=[]
let idAtual=null
let porPagina=10
let ordem={campo:null,asc:true}

function nomeServico(s){
if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo} minutos`
if(s.subgrupo) return `${s.grupo} ${s.subgrupo}`
if(s.tempo) return `${s.grupo} ${s.tempo} minutos`
return s.grupo
}

function moeda(valor){
return Number(valor||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

async function carregar(){
const {data}=await supabaseClient.from("servicos").select("*")
dados=data||[]
render()
}

function render(lista=dados){

if(ordem.campo){
lista.sort((a,b)=>{
let valA,valB

switch(ordem.campo){
case "servico":
valA=`${a.grupo} ${a.subgrupo||""}`
valB=`${b.grupo} ${b.subgrupo||""}`
break
case "tempo": valA=a.tempo||0; valB=b.tempo||0; break
case "valor": valA=a.valor||0; valB=b.valor||0; break
case "comissao": valA=a.comissao||0; valB=b.comissao||0; break
}

if(typeof valA==="string"){valA=valA.toLowerCase();valB=valB.toLowerCase()}

if(valA>valB)return ordem.asc?1:-1
if(valA<valB)return ordem.asc?-1:1
return 0
})
}

const tbody=document.getElementById("lista")
tbody.innerHTML=""

lista.slice(0,porPagina).forEach(s=>{
tbody.innerHTML+=`
<tr>
<td>${nomeServico(s)}</td>
<td>${s.tempo? s.tempo+" min":"-"}</td>
<td>R$ ${moeda(s.valor)}</td>
<td>R$ ${moeda(s.comissao)}</td>
<td>${s.status}</td>
<td>
<button onclick="editar('${s.id}')">Editar</button>
<button onclick="excluir('${s.id}')">Excluir</button>
</td>
</tr>`
})
}

window.filtrarTabela=function(){
const termo=document.getElementById("buscaServico").value.toLowerCase()
render(dados.filter(s=>nomeServico(s).toLowerCase().includes(termo)))
}

window.mudarPorPagina=function(){
const v=document.getElementById("porPaginaSelect").value
porPagina=v==="todos"?dados.length:parseInt(v)
render()
}

window.salvar=async function(){

const payload={
grupo:grupo.value,
subgrupo:subgrupo.value||null,
tempo:tempo.value?parseInt(tempo.value):null,
valor:parseFloat(valor.value),
comissao:parseFloat(comissao.value),
status:status.value
}

const duplicado=dados.find(s =>
s.grupo===payload.grupo &&
(s.subgrupo||"")===(payload.subgrupo||"") &&
(s.tempo||null)===(payload.tempo||null) &&
s.id!==idAtual
)

if(duplicado){
alert("Serviço já existe!")
return
}

if(idAtual){
await supabaseClient.from("servicos").update(payload).eq("id",idAtual)
}else{
await supabaseClient.from("servicos").insert(payload)
}

fecharModal()
carregar()
}

window.abrirNovo=function(){
idAtual=null
grupo.value=""
subgrupo.value=""
tempo.value=""
valor.value=""
comissao.value=""
status.value="ativo"
modal.style.display="flex"
}

window.fecharModal=function(){
modal.style.display="none"
}

window.editar=function(id){
idAtual=id
const d=dados.find(s=>s.id==id)
grupo.value=d.grupo
subgrupo.value=d.subgrupo||""
tempo.value=d.tempo||""
valor.value=d.valor
comissao.value=d.comissao
status.value=d.status
modal.style.display="flex"
}

window.excluir=async function(id){
await supabaseClient.from("servicos").delete().eq("id",id)
carregar()
}

window.exportarExcel=function(){
const dadosExcel=dados.map(s=>({
Serviço:nomeServico(s),
Tempo:s.tempo?`${s.tempo} min`:"-",
Valor:s.valor,
Comissão:s.comissao,
Status:s.status
}))
const ws=XLSX.utils.json_to_sheet(dadosExcel)
const wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Serviços")
XLSX.writeFile(wb,"servicos.xlsx")
}

carregar()

</script>

</body>
</html>
