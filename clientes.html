<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;}
.content{flex:1;padding:40px;}

.topbar{display:flex;justify-content:space-between;margin-bottom:20px;}
input{padding:8px;border-radius:6px;border:1px solid #ccc;}

table{width:100%;background:#fff;border-collapse:collapse;}
th,td{padding:12px;border-bottom:1px solid #eee;}

button{background:#1f2937;color:#fff;border:none;padding:6px 12px;border-radius:6px;}
.excluir{background:#dc2626;}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:10px;
width:500px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Clientes</h1>

<input id="buscaCliente" placeholder="Buscar..." oninput="filtrarTabela()">

<button onclick="abrirNovo()">+ Novo Cliente</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Email</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

<br>

<button onclick="paginaAnterior()">⬅️</button>
<button onclick="proximaPagina()">➡️</button>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<input id="nome" placeholder="Nome"><br><br>
<input id="telefone_1" placeholder="Telefone"><br><br>
<input id="email" placeholder="Email"><br><br>

<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

const modal = document.getElementById("modal");

let idAtual = null;
let pagina = 0;
const limite = 50;

/* ================= LOAD ================= */

async function carregar(){

const {data,error}=await supabaseClient
.from("clientes")
.select("*")
.order("nome")
.range(pagina*limite, (pagina+1)*limite-1);

if(error){
console.error(error);
return;
}

render(data);
}

/* ================= RENDER ================= */

function render(lista){
const tbody=document.getElementById("lista");
tbody.innerHTML="";

lista.forEach(c=>{
tbody.innerHTML+=`
<tr>
<td>${c.nome}</td>
<td>${c.telefone_1||""}</td>
<td>${c.email||""}</td>
<td>
<button onclick="editar('${c.id}')">Editar</button>
<button class="excluir" onclick="excluir('${c.id}')">Excluir</button>
</td>
</tr>
`;
});
}

/* ================= BUSCA ================= */

async function filtrarTabela(){

const termo=document.getElementById("buscaCliente").value;

if(!termo){
pagina=0;
carregar();
return;
}

const {data}=await supabaseClient
.from("clientes")
.select("*")
.ilike("nome", `%${termo}%`)
.limit(50);

render(data);
}

/* ================= PAGINA ================= */

function proximaPagina(){
pagina++;
carregar();
}

function paginaAnterior(){
if(pagina>0){
pagina--;
carregar();
}
}

/* ================= MODAL ================= */

function abrirNovo(){
idAtual=null;

document.getElementById("nome").value="";
document.getElementById("telefone_1").value="";
document.getElementById("email").value="";

modal.style.display="flex";
}

function fecharModal(){
modal.style.display="none";
}

/* ================= EDITAR ================= */

async function editar(id){

idAtual=id;

const {data,error}=await supabaseClient
.from("clientes")
.select("*")
.eq("id",id)
.single();

if(error){
console.error(error);
return;
}

document.getElementById("nome").value=data.nome||"";
document.getElementById("telefone_1").value=data.telefone_1||"";
document.getElementById("email").value=data.email||"";

modal.style.display="flex";
}

/* ================= SALVAR ================= */

async function salvar(){

let nome=document.getElementById("nome").value;
let telefone=document.getElementById("telefone_1").value;
let email=document.getElementById("email").value;

if(!nome || !telefone){
alert("Nome e telefone obrigatórios");
return;
}

telefone = telefone.replace(/\D/g,'');

let payload={nome,telefone_1:telefone,email};

let error;

if(idAtual){
({error}=await supabaseClient
.from("clientes")
.update(payload)
.eq("id",idAtual));
}else{
({error}=await supabaseClient
.from("clientes")
.insert(payload));
}

if(error){
console.error(error);
alert("Erro ao salvar");
return;
}

fecharModal();
carregar();
}

/* ================= EXCLUIR ================= */

async function excluir(id){
if(!confirm("Excluir?")) return;

await supabaseClient
.from("clientes")
.delete()
.eq("id",id);

carregar();
}

/* ================= INIT ================= */

window.onclick = function(e){
if(e.target === modal){
modal.style.display="none";
}
}

carregar();

</script>

</body>
</html>
