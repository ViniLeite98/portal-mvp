<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<button onclick="abrirNovo()">+ Novo Cadastro</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal" style="display:none;">
<div>

<input id="nome_completo" placeholder="Nome">
<input id="nome_profissional" placeholder="Nome Profissional">
<input id="cpf" placeholder="CPF">
<input id="email" placeholder="Email">
<input id="telefone" placeholder="Telefone">

<select id="cargo">
<option>Terapeuta Feminina</option>
<option>Terapeuta Masculino</option>
</select>

<select id="status">
<option>Ativo</option>
<option>Inativo</option>
</select>

<button onclick="salvar()">Salvar</button>

</div>
</div>

<!-- 🔥 ORDEM IGUAL AO DASHBOARD -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

let cpfAtual = null;

/* ================= CARREGAR ================= */

async function carregar(){

const { data, error } = await client
  .from("terapeutas")
  .select("cpf,nome_profissional,status,cargo");

if(error){
console.error(error);
return;
}

const tbody = document.getElementById("lista");
tbody.innerHTML = "";

(data || []).forEach(t=>{
tbody.innerHTML += `
<tr>
<td>${t.nome_profissional || ""}</td>
<td>${t.cargo || ""}</td>
<td>${t.cpf || ""}</td>
<td>${t.status || ""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>`;
});

}

/* ================= ABRIR ================= */

window.abrirNovo = function(){
cpfAtual = null;

["nome_completo","nome_profissional","cpf","email","telefone","cargo","status"]
.forEach(id => document.getElementById(id).value = "");

document.getElementById("modal").style.display="block";
}

/* ================= EDITAR ================= */

window.editar = async function(cpf){

cpfAtual = cpf;

const { data } = await client
  .from("terapeutas")
  .select("*")
  .eq("cpf", cpf)
  .single();

Object.keys(data || {}).forEach(k=>{
const el = document.getElementById(k);
if(el) el.value = data[k] || "";
});

document.getElementById("modal").style.display="block";
}

/* ================= SALVAR ================= */

window.salvar = async function(){

const payload = {
nome_completo: document.getElementById("nome_completo").value,
nome_profissional: document.getElementById("nome_profissional").value,
cpf: document.getElementById("cpf").value,
email: document.getElementById("email").value,
telefone: document.getElementById("telefone").value,
cargo: document.getElementById("cargo").value,
status: document.getElementById("status").value
};

let error;

if(cpfAtual){
delete payload.cpf;

({ error } = await client
  .from("terapeutas")
  .update(payload)
  .eq("cpf", cpfAtual));

}else{

({ error } = await client
  .from("terapeutas")
  .insert(payload));

}

if(error){
console.error(error);
alert("Erro ao salvar");
return;
}

document.getElementById("modal").style.display="none";
carregar();

}

/* ================= EXCLUIR ================= */

window.excluir = async function(cpf){

await client
.from("terapeutas")
.delete()
.eq("cpf", cpf);

carregar();
}

/* ================= INIT ================= */

carregar();

});

</script>

</body>
</html>
