<script>
document.addEventListener("DOMContentLoaded", async function(){

/* ================= TERAPEUTAS ================= */

const { data: terapeutas } = await client
  .from("terapeutas")
  .select("*")
  .eq("status", "Ativo")
  .in("cargo", ["Terapeuta Feminina", "Terapeuta Masculino"]);

/* ================= CLIENTES ================= */

const clientesPromise = client
  .from("clientes")
  .select("*", { count: "exact", head: true });

/* ================= SERVIÇOS ================= */

const { data: servicos } = await client
  .from("servicos")
  .select("*")
  .ilike("status","ativo");

const { count: totalClientes } = await clientesPromise;

document.getElementById("totalEquipe").innerText = terapeutas?.length || 0;
document.getElementById("totalClientes").innerText = totalClientes || 0;
document.getElementById("totalServicos").innerText = servicos?.length || 0;

/* ================= FORÇA DE TRABALHO ================= */

let ranking = [];
let menorHora = 23;
let maiorHora = 0;

(terapeutas||[]).forEach(t=>{
  if(!t.hora_entrada || !t.hora_saida) return;

  const hEntrada = parseInt(t.hora_entrada.substring(0,2));
  const hSaida = parseInt(t.hora_saida.substring(0,2));

  if(hEntrada < menorHora) menorHora = hEntrada;
  if(hSaida > maiorHora) maiorHora = hSaida;
});

if(menorHora > maiorHora){
  menorHora = 9;
  maiorHora = 18;
}

let contagem = {};
for(let h=menorHora; h<=maiorHora; h++) contagem[h]=0;

(terapeutas||[]).forEach(t=>{
  if(!t.hora_entrada || !t.hora_saida) return;

  const [h1,m1]=t.hora_entrada.substring(0,5).split(":").map(Number);
  const [h2,m2]=t.hora_saida.substring(0,5).split(":").map(Number);

  const inicioMin = h1*60+m1;
  const fimMin = h2*60+m2;

  const totalMin=fimMin-inicioMin;
  ranking.push({nome:t.nome_profissional,minutos:totalMin});

  for(let h=menorHora; h<=maiorHora; h++){
    const horaInicio = h * 60;
    const horaFim = (h+1) * 60;

    if(inicioMin <= horaFim && fimMin >= horaInicio){
      contagem[h]++;
    }
  }
});

const barsDiv=document.getElementById("bars");
barsDiv.innerHTML="";

const maxValor=Math.max(...Object.values(contagem));

for(let h=menorHora;h<=maiorHora;h++){
  const valor=contagem[h];
  if(valor === 0) continue;

  const altura=maxValor? (valor/maxValor)*200 : 0;

  barsDiv.innerHTML+=`
    <div class="bar-container">
      <div class="bar-value">${valor}</div>
      <div class="bar" style="height:${altura}px"></div>
      <div class="bar-hour">${h}:00</div>
    </div>
  `;
}

/* ================= RANKING ================= */

ranking.sort((a,b)=>b.minutos-a.minutos);

const rankDiv=document.getElementById("ranking");

ranking.forEach(r=>{
  const horas=Math.floor(r.minutos/60);
  const minutos=r.minutos%60;

  rankDiv.innerHTML+=`
    <div class="rank-item">
      ${r.nome} — ${horas}h ${minutos}m
    </div>
  `;
});

/* ================= FOLGAS ================= */

const hoje=new Date();
const inicioAno=new Date(2026,0,1);

const mapaDia={
  "domingo":0,"segunda":1,"terça":2,"terca":2,
  "quarta":3,"quinta":4,"sexta":5,
  "sábado":6,"sabado":6
};

const folgaDiv=document.getElementById("listaFolgas");
folgaDiv.innerHTML="";

for(const t of (terapeutas||[])){

  let contadorSemanal=0;

  if(t.tem_folga && String(t.tem_folga).trim().toLowerCase()==="sim" && t.dia_folga){
    const diaNumero=mapaDia[t.dia_folga.toLowerCase()];
    if(diaNumero!==undefined){
      const admissao=new Date(t.data_inicio);
      const dataBase=admissao>inicioAno?admissao:inicioAno;
      let dataLoop=new Date(dataBase);

      while(dataLoop<=hoje){
        if(dataLoop.getDay()===diaNumero) contadorSemanal++;
        dataLoop.setDate(dataLoop.getDate()+1);
      }
    }
  }

  const { data: solicitacoes } = await client
    .from("solicitacoes")
    .select("data_inicio,data_fim,status")
    .eq("terapeuta_cpf",t.cpf);

  let diasAprovados=0;

  (solicitacoes||[]).forEach(s=>{
    if(String(s.status).trim().toLowerCase()!=="aprovado") return;

    const inicio=new Date(s.data_inicio);
    const fim=new Date(s.data_fim);
    const inicioConsiderado=inicio<inicioAno?inicioAno:inicio;
    const diff=Math.floor((fim-inicioConsiderado)/(1000*60*60*24))+1;

    if(diff>0) diasAprovados+=diff;
  });

  const total=contadorSemanal+diasAprovados;

  folgaDiv.innerHTML+=`
    <div class="folga-item">
      ${t.nome_profissional} —
      <span class="folga-dia">${total} folgas</span>
    </div>
  `;
}

});
</script>
