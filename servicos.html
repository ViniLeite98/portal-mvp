<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviços | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;}
.content{flex:1;padding:40px;}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.left-tools input{
padding:8px;
border:1px solid #d1d5db;
border-radius:6px;
width:240px;
}

.right-tools{
display:flex;
gap:10px;
align-items:center;
}

.right-tools button{
background:#2563eb;
color:#fff;
border:none;
border-radius:6px;
padding:7px 12px;
cursor:pointer;
}

.btn-novo{background:#1f2937;}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:14px;
overflow:hidden;
}

th,td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
text-align:left;
}

th{
background:#f9fafb;
}

.btn-editar{
background:#f59e0b;
color:#fff;
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

.btn-excluir{
background:#dc2626;
color:#fff;
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
width:600px;
border-radius:16px;
padding:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

label{
font-size:12px;
font-weight:600;
margin-bottom:4px;
display:block;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
width:100%;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Serviços</h1>

<div class="topbar">

<div class="left-tools">
<input id="buscaServico" placeholder="Buscar serviço..." oninput="filtrarTabela()">
</div>

<div class="right-tools">
<button onclick="abrirNovo()">+ Novo Serviço</button>
</div>

</div>

<table>
<thead>
<tr>
<th>Serviço</th>
<th>Tempo</th>
<th>Valor</th>
<th>Comissão</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Cadastro Serviço</h3>

<div class="grid">

<div>
<label>Grupo</label>
<select id="grupo">
<option value="">Selecione</option>
<option>Nuru</option>
<option>Vivencia</option>
<option>Four Hands</option>
<option>Fetiche</option>
<option>Podolatria</option>
<option>Pspot</option>
<option>Voyeur</option>
<option>Experiência simultânea no Tantra</option>
<option>Mini Curso Sessão Vivência</option>
</select>
</div>

<div>
<label>Tempo</label>
<select id="tempo">
<option value="">Sem tempo</option>
<option value="30">30</option>
<option value="45">45</option>
<option value="60">60</option>
<option value="90">90</option>
<option value="120">120</option>
</select>
</div>

<div>
<label>Valor</label>
<input id="valor" type="number">
</div>

<div>
<label>Comissão</label>
<input id="comissao" type="number">
</div>

<div>
<label>Status</label>
<select id="status">
<option value="ativo">ativo</option>
<option value="inativo">inativo</option>
</select>
</div>

</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI":"anon","iat":1770657485,"exp":2086233485}.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let dados = []
let idAtual = null

async function carregar(){
const {data,error} = await supabaseClient.from("servicos").select("*")
if(error){console.error(error);return}
dados = data || []
render(dados)
}

function render(lista){

const tbody = document.getElementById("lista")
tbody.innerHTML = ""

lista.forEach(s=>{

const nomeServico = s.tempo 
  ? `${s.grupo} ${s.tempo} minutos`
  : s.grupo

tbody.innerHTML += `
<tr>
<td>${nomeServico || ""}</td>
<td>${s.tempo ? s.tempo + " minutos" : "-"}</td>
<td>R$ ${Number(s.valor || 0).toFixed(2)}</td>
<td>R$ ${Number(s.comissao || 0).toFixed(2)}</td>
<td>${s.status || ""}</td>
<td>
<button class="btn-editar" onclick="editar('${s.id}')">Editar</button>
<button class="btn-excluir" onclick="excluir('${s.id}')">Excluir</button>
</td>
</tr>
`
})

}

function filtrarTabela(){

const termo = document.getElementById("buscaServico").value.toLowerCase()

const filtrado = dados.filter(s =>
`${s.grupo || ""} ${s.tempo || ""}`.toLowerCase().includes(termo)
)

render(filtrado)

}

async function salvar(){

const payload = {
grupo: grupo.value,
tempo: tempo.value ? parseInt(tempo.value) : null,
valor: parseFloat(valor.value),
comissao: parseFloat(comissao.value),
status: status.value
}

if(!payload.grupo){
alert("Grupo obrigatório")
return
}

if(idAtual){
await supabaseClient.from("servicos").update(payload).eq("id", idAtual)
}else{
await supabaseClient.from("servicos").insert(payload)
}

fecharModal()
carregar()

}

function editar(id){
idAtual = id
const s = dados.find(x => x.id == id)
if(!s)return

grupo.value = s.grupo || ""
tempo.value = s.tempo || ""
valor.value = s.valor || ""
comissao.value = s.comissao || ""
status.value = s.status || ""

modal.style.display = "flex"
}

async function excluir(id){
if(!confirm("Excluir serviço?")) return
await supabaseClient.from("servicos").delete().eq("id", id)
carregar()
}

function abrirNovo(){
idAtual = null
grupo.value = ""
tempo.value = ""
valor.value = ""
comissao.value = ""
status.value = "ativo"
modal.style.display = "flex"
}

function fecharModal(){
modal.style.display = "none"
}

carregar()

</script>

</body>
</html>
