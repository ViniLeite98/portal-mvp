<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviços | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/sidebar/sidebar.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}
.topbar{margin-bottom:20px;}
.topbar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.collab-counter{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:7px 16px;font-size:13px;color:#374151;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.collab-counter i{color:#2563eb;}
.collab-counter .count{font-weight:700;color:#111827;font-size:16px;}
.collab-counter .label{color:#6b7280;font-size:12px;}
.filters-row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;}
.filter-group input,.filter-group select{padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;background:#fff;color:#111827;}
.filter-group input{width:220px;}
.filter-group input:focus,.filter-group select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.filter-group select{min-width:150px;}
.btn-limpar{height:38px;background:#fff;color:#6b7280;border:1px solid #d1d5db;border-radius:8px;padding:0 14px;font-size:13px;cursor:pointer;white-space:nowrap;display:none;align-items:center;gap:6px;align-self:flex-end;}
.btn-limpar:hover{background:#f3f4f6;}
.btn-limpar.visible{display:inline-flex;}

/* Grupos card */
.grupos-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.grupo-card{background:#fff;border-radius:12px;padding:10px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.grupo-card:hover{border-color:#e5e7eb;}
.grupo-card.editando{border-color:#2563eb;}
.grupo-swatch{width:22px;height:22px;border-radius:6px;border:1px solid rgba(0,0,0,.1);flex-shrink:0;}
.grupo-nome{font-size:13px;font-weight:600;color:#111827;}
.grupo-qtd{font-size:11px;color:#6b7280;}
.grupo-sem-cor{font-size:10px;color:#f59e0b;font-weight:600;}

.table-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
table{width:100%;border-collapse:collapse;}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;font-size:14px;text-align:left;}
th{background:#f9fafb;font-weight:600;}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap;}
th.sortable:hover{background:#f3f4f6;color:#1d4ed8;}
th.sortable .sort-icon{margin-left:5px;font-size:11px;color:#9ca3af;}
th.sortable.asc .sort-icon,th.sortable.desc .sort-icon{color:#2563eb;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}
button{background:#1f2937;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:5px;}
button.excluir{background:#dc2626;}
button.exportar{background:#16a34a;}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-ativo{background:#dcfce7;color:#16a34a;}
.badge-inativo{background:#fee2e2;color:#dc2626;}
.empty-row td{text-align:center;color:#9ca3af;padding:32px;}
.cor-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;}
.cor-swatch-sm{width:14px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,.1);flex-shrink:0;}

.paginacao{display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px;}
.paginacao-info{font-size:13px;color:#6b7280;}
.paginacao-info strong{color:#111827;}
.paginacao-controles{display:flex;align-items:center;gap:6px;}
.pag-btn{background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:7px;padding:6px 11px;font-size:13px;cursor:pointer;min-width:34px;text-align:center;transition:all .15s;}
.pag-btn:hover:not(:disabled){background:#f3f4f6;border-color:#9ca3af;}
.pag-btn:disabled{opacity:.4;cursor:default;}
.pag-btn.ativo{background:#1f2937;color:#fff;border-color:#1f2937;font-weight:700;}
.pag-btn.ellipsis{border:none;background:none;cursor:default;color:#9ca3af;}
.pag-btn.ellipsis:hover{background:none;}
.por-pagina-wrap{display:flex;align-items:center;gap:7px;font-size:13px;color:#6b7280;}
.por-pagina-wrap select{padding:5px 8px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;background:#fff;color:#111827;}

/* Modais */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:30px 20px;overflow-y:auto;}
.modal-content{background:#fff;width:560px;max-width:100%;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-content.sm{width:420px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;}
.modal-header h2{margin:0;font-size:18px;color:#111827;}
.btn-fechar{background:none;color:#6b7280;font-size:20px;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.btn-fechar:hover{background:#f3f4f6;}
.modal-body{padding:24px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;font-weight:600;color:#374151;}
input,select{padding:9px 11px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;color:#111827;background:#fff;}
input:focus,select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.span2{grid-column:span 2;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid #e5e7eb;background:#f9fafb;}
.modal-footer button{padding:9px 20px;font-size:13px;font-weight:600;}
.btn-cancel{background:#fff;color:#374151;border:1px solid #d1d5db;}
.btn-cancel:hover{background:#f3f4f6;}
.btn-save{background:#1f2937;}

/* Paleta */
.paleta-grid{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;}
.paleta-item{width:34px;height:34px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:transform .1s,border-color .15s;position:relative;flex-shrink:0;}
.paleta-item:hover{transform:scale(1.12);}
.paleta-item.sel{border-color:#111827;box-shadow:0 0 0 2px #fff,0 0 0 4px #111827;}
.paleta-item .ck{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:12px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);}
.paleta-item.sel .ck{display:flex;}
.cor-preview-wrap{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:#6b7280;}
.cor-preview-box{width:28px;height:28px;border-radius:6px;border:1px dashed #d1d5db;flex-shrink:0;}
</style>
</head>
<body>
<div class="app">
<aside id="sidebar"></aside>
<main class="content">
<h1>Serviços</h1>

<div class="topbar">
  <div class="topbar-top">
    <div class="collab-counter">
      <i class="fa fa-spa"></i>
      <span class="count" id="collabCount">—</span>
      <span class="label" id="collabLabel">serviços</span>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="abrirGrupos()" style="background:#6366f1"><i class="fa fa-palette"></i> Cores dos Grupos</button>
      <button class="exportar" onclick="exportarExcel()"><i class="fa fa-file-excel"></i> Exportar</button>
      <button onclick="abrirNovo()"><i class="fa fa-plus"></i> Novo Serviço</button>
    </div>
  </div>
  <div class="filters-row">
    <div class="filter-group">
      <span class="filter-label"><i class="fa fa-search" style="margin-right:3px"></i> Busca</span>
      <input id="buscaServico" placeholder="Buscar serviço...">
    </div>
    <div class="filter-group">
      <span class="filter-label"><i class="fa fa-circle-dot" style="margin-right:3px"></i> Status</span>
      <select id="filtroStatus">
        <option value="">Todos os status</option>
        <option value="ativo">Ativo</option>
        <option value="inativo">Inativo</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label"><i class="fa fa-layer-group" style="margin-right:3px"></i> Grupo</span>
      <select id="filtroGrupo"><option value="">Todos os grupos</option></select>
    </div>
    <button class="btn-limpar" id="btnLimparFiltros" onclick="limparFiltros()">
      <i class="fa fa-times"></i> Limpar filtros
    </button>
  </div>
</div>

<!-- GRUPOS COM CORES (visual) -->
<div class="grupos-bar" id="gruposBar"></div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th class="sortable" onclick="ordenar('servico')" id="th-servico">Serviço <i class="fa fa-sort sort-icon"></i></th>
      <th>Cor do Grupo</th>
      <th class="sortable" onclick="ordenar('tempo')" id="th-tempo">Tempo <i class="fa fa-sort sort-icon"></i></th>
      <th class="sortable" onclick="ordenar('valor')" id="th-valor">Valor <i class="fa fa-sort sort-icon"></i></th>
      <th class="sortable" onclick="ordenar('comissao')" id="th-comissao">Comissão <i class="fa fa-sort sort-icon"></i></th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody id="lista"></tbody>
</table>
</div>

<div class="paginacao">
  <div class="por-pagina-wrap">
    Exibir
    <select id="porPagina" onchange="paginaAtual=0;renderTabela()">
      <option value="10" selected>10</option>
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="9999">Todos</option>
    </select>
    por página
  </div>
  <div class="paginacao-info" id="paginacaoInfo"></div>
  <div class="paginacao-controles" id="paginacaoControles"></div>
</div>

</main>
</div>

<!-- MODAL SERVIÇO -->
<div class="modal" id="modal">
<div class="modal-content">
  <div class="modal-header">
    <h2 id="modalTitulo">Novo Serviço</h2>
    <button class="btn-fechar" onclick="fecharModal()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="grid">
      <div class="field"><label>Grupo *</label><select id="grupo"><option value="">Selecione</option></select></div>
      <div class="field"><label>Subgrupo</label><input id="subgrupo" placeholder="Ex: Nay"></div>
      <div class="field"><label>Tempo (minutos)</label>
        <select id="tempo">
          <option value="">Sem tempo</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
          <option value="90">90 min</option>
          <option value="120">120 min</option>
          <option value="180">180 min</option>
        </select>
      </div>
      <div class="field"><label>Status</label>
        <select id="status"><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select>
      </div>
      <div class="field"><label>Valor (R$)</label><input id="valor" placeholder="0,00"></div>
      <div class="field"><label>Comissão (R$)</label><input id="comissao" placeholder="0,00"></div>
      <div class="field span2" id="corGrupoInfo" style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px;display:none">
        <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px"><i class="fa fa-palette" style="color:#6366f1;margin-right:5px"></i>Cor na agenda</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#6b7280">
          <span id="corGrupoSwatch" style="width:20px;height:20px;border-radius:5px;border:1px solid rgba(0,0,0,.1);display:inline-block"></span>
          <span id="corGrupoLabel">Selecione um grupo para ver a cor</span>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
    <button class="btn-save" onclick="salvar()"><i class="fa fa-save"></i> Salvar</button>
  </div>
</div>
</div>

<!-- MODAL CORES DOS GRUPOS -->
<div class="modal" id="modalGrupos">
<div class="modal-content sm">
  <div class="modal-header">
    <h2><i class="fa fa-palette" style="color:#6366f1;margin-right:8px"></i>Cores dos Grupos</h2>
    <button class="btn-fechar" onclick="fecharGrupos()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body" id="gruposBody"></div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharGrupos()">Fechar</button>
    <button class="btn-save" onclick="salvarCoresGrupos()"><i class="fa fa-save"></i> Salvar Cores</button>
  </div>
</div>
</div>

<script>
/* ══════ PALETA ══════ */
const PALETA = [
  {hex:"#29B6F6",nome:"Azul (Nuru)"},
  {hex:"#8BE000",nome:"Verde neon (Vivência)"},
  {hex:"#8E44AD",nome:"Roxo (Four Hands Nuru)"},
  {hex:"#69C5A0",nome:"Verde água (Four Hands Vivência)"},
  {hex:"#FB8C00",nome:"Laranja (Podolatria)"},
  {hex:"#F48FB1",nome:"Rosa (P-Spot)"},
  {hex:"#E53935",nome:"Vermelho (Casal)"},
  {hex:"#8E2440",nome:"Vinho"},
  {hex:"#00BCD4",nome:"Ciano"},
  {hex:"#26C6DA",nome:"Azul claro"},
  {hex:"#66BB6A",nome:"Verde"},
  {hex:"#FFA726",nome:"Âmbar"},
  {hex:"#EF5350",nome:"Vermelho vivo"},
  {hex:"#AB47BC",nome:"Lilás"},
  {hex:"#5C6BC0",nome:"Índigo"},
  {hex:"#78909C",nome:"Cinza azulado"},
  {hex:"#4CAF50",nome:"Verde escuro"},
  {hex:"#FF7043",nome:"Laranja averm."},
  {hex:"#EC407A",nome:"Rosa forte"},
  {hex:"#7E57C2",nome:"Roxo médio"},
];

function corTexto(hex){
  if(!hex)return"#374151";
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>150?"#1f2937":"#fff";
}

let dados=[], gruposMap={}, idAtual=null;
let ordemCol='servico', ordemDir='asc', paginaAtual=0, dadosFiltrados=[];

const nomeS=s=>[s.grupo,s.subgrupo,s.tempo?s.tempo+" min":""].filter(Boolean).join(" ");
const moeda=v=>Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});
const parseMoeda=v=>parseFloat((v||"0").replace(/\./g,"").replace(",","."))||0;
const corDoGrupo=g=>gruposMap[g]||null;

/* ══════ CARGA ══════ */
async function carregarGrupos(){
  // Busca grupos com cor da tabela parametros
  const{data}=await client.from("parametros")
    .select("valor,cor")
    .eq("tipo","grupos_servico")
    .eq("ativo",true)
    .order("valor");
  gruposMap={};
  (data||[]).forEach(p=>{gruposMap[p.valor]=p.cor||null;});
}

async function carregarServicos(){
  const{data,error}=await client.from("servicos").select("*");
  if(error){console.error(error);return;}
  dados=data||[];
}

async function carregar(){
  await Promise.all([carregarGrupos(),carregarServicos()]);
  popularSelectGrupo();
  renderGruposBar();
  paginaAtual=0;
  aplicarFiltroEOrdem();
}

function popularSelectGrupo(){
  // Grupos: união dos que existem em parametros + os que existem nos serviços
  const doParams=Object.keys(gruposMap);
  const dosServicos=[...new Set(dados.map(s=>s.grupo).filter(Boolean))];
  const todos=[...new Set([...doParams,...dosServicos])].sort();

  const selModal=document.getElementById("grupo");
  const selFiltro=document.getElementById("filtroGrupo");
  selModal.innerHTML="<option value=''>Selecione</option>";
  selFiltro.innerHTML="<option value=''>Todos os grupos</option>";
  todos.forEach(g=>{
    selModal.innerHTML+=`<option value="${g}">${g}</option>`;
    selFiltro.innerHTML+=`<option value="${g}">${g}</option>`;
  });
}

/* ══════ BARRA DE GRUPOS ══════ */
function renderGruposBar(){
  const bar=document.getElementById("gruposBar");
  const grupos=[...new Set(dados.map(s=>s.grupo).filter(Boolean))].sort();
  bar.innerHTML="";
  grupos.forEach(g=>{
    const cor=corDoGrupo(g);
    const qtd=dados.filter(s=>s.grupo===g).length;
    const card=document.createElement("div");
    card.className="grupo-card";
    card.title="Clique para editar a cor deste grupo";
    card.innerHTML=`
      <span class="grupo-swatch" style="background:${cor||"#e5e7eb"}"></span>
      <div>
        <div class="grupo-nome">${g}</div>
        <div class="grupo-qtd">${qtd} serviço${qtd!==1?"s":""}</div>
        ${!cor?'<div class="grupo-sem-cor">⚠ Sem cor</div>':""}
      </div>`;
    card.onclick=()=>abrirGruposDirect(g);
    bar.appendChild(card);
  });
}

/* ══════ FILTROS / ORDENAÇÃO ══════ */
function limparFiltros(){
  document.getElementById("buscaServico").value="";
  document.getElementById("filtroStatus").value="";
  document.getElementById("filtroGrupo").value="";
  checarBtnLimpar();paginaAtual=0;aplicarFiltroEOrdem();
}
function checarBtnLimpar(){
  const b=document.getElementById("buscaServico").value;
  const s=document.getElementById("filtroStatus").value;
  const g=document.getElementById("filtroGrupo").value;
  document.getElementById("btnLimparFiltros").classList.toggle("visible",!!(b||s||g));
}
function ordenar(col){
  if(ordemCol===col)ordemDir=ordemDir==="asc"?"desc":"asc";
  else{ordemCol=col;ordemDir="asc";}
  atualizarIcones();paginaAtual=0;aplicarFiltroEOrdem();
}
function atualizarIcones(){
  ["servico","tempo","valor","comissao"].forEach(c=>{
    const th=document.getElementById("th-"+c);if(!th)return;
    const icon=th.querySelector(".sort-icon");th.classList.remove("asc","desc");
    if(ordemCol===c){th.classList.add(ordemDir);icon.className="fa sort-icon "+(ordemDir==="asc"?"fa-sort-up":"fa-sort-down");}
    else icon.className="fa fa-sort sort-icon";
  });
}
function aplicarFiltroEOrdem(){
  const termo=(document.getElementById("buscaServico").value||"").toLowerCase();
  const status=document.getElementById("filtroStatus").value;
  const grupo=document.getElementById("filtroGrupo").value;
  dadosFiltrados=dados.filter(s=>{
    return nomeS(s).toLowerCase().includes(termo)
      &&(!status||s.status===status)
      &&(!grupo||s.grupo===grupo);
  });
  dadosFiltrados.sort((a,b)=>{
    let va,vb;
    if(ordemCol==="servico"){va=nomeS(a).toLowerCase();vb=nomeS(b).toLowerCase();}
    else if(ordemCol==="tempo"){va=Number(a.tempo||0);vb=Number(b.tempo||0);}
    else if(ordemCol==="valor"){va=Number(a.valor||0);vb=Number(b.valor||0);}
    else if(ordemCol==="comissao"){va=Number(a.comissao||0);vb=Number(b.comissao||0);}
    if(va<vb)return ordemDir==="asc"?-1:1;
    if(va>vb)return ordemDir==="asc"?1:-1;
    return 0;
  });
  document.getElementById("collabCount").textContent=dadosFiltrados.length;
  let label=dadosFiltrados.length===1?"serviço":"serviços";
  const partes=[];
  if(status==="ativo")partes.push("ativos");else if(status==="inativo")partes.push("inativos");
  if(grupo)partes.push("· "+grupo);
  document.getElementById("collabLabel").textContent=label+(partes.length?" "+partes.join(" "):"");
  checarBtnLimpar();renderTabela();
}

/* ══════ TABELA ══════ */
function renderTabela(){
  const porPag=parseInt(document.getElementById("porPagina").value)||10;
  const total=dadosFiltrados.length;
  const totalPags=porPag>=9999?1:Math.max(1,Math.ceil(total/porPag));
  if(paginaAtual>=totalPags)paginaAtual=totalPags-1;
  const inicio=porPag>=9999?0:paginaAtual*porPag;
  const fim=porPag>=9999?total:Math.min(inicio+porPag,total);
  const tbody=document.getElementById("lista");
  tbody.innerHTML="";
  const pagina=dadosFiltrados.slice(inicio,fim);
  if(!pagina.length){
    tbody.innerHTML="<tr class='empty-row'><td colspan='7'>Nenhum serviço encontrado.</td></tr>";
  } else {
    pagina.forEach(s=>{
      const cor=corDoGrupo(s.grupo);
      const badge=s.status==="ativo"
        ?"<span class='badge badge-ativo'>Ativo</span>"
        :"<span class='badge badge-inativo'>Inativo</span>";
      const corCell=cor
        ?`<span class="cor-chip"><span class="cor-swatch-sm" style="background:${cor}"></span><span style="color:#374151">${s.grupo}</span></span>`
        :`<span style="color:#f59e0b;font-size:12px;font-weight:600">⚠ ${s.grupo||"—"}</span>`;
      tbody.innerHTML+="<tr>"
        +`<td><strong>${nomeS(s)}</strong></td>`
        +`<td>${corCell}</td>`
        +`<td style="text-align:center">${s.tempo?s.tempo+" min":"-"}</td>`
        +`<td style="text-align:center">R$ ${moeda(s.valor)}</td>`
        +`<td style="text-align:center">R$ ${moeda(s.comissao)}</td>`
        +`<td>${badge}</td>`
        +`<td style="display:flex;gap:6px">
            <button onclick="editar('${s.id}')"><i class='fa fa-pencil'></i> Editar</button>
            <button class='excluir' onclick="excluir('${s.id}')"><i class='fa fa-trash'></i></button>
          </td>`
        +"</tr>";
    });
  }
  // paginação
  const infoEl=document.getElementById("paginacaoInfo");
  const ctrlEl=document.getElementById("paginacaoControles");
  if(total===0){infoEl.innerHTML="Nenhum resultado.";ctrlEl.innerHTML="";return;}
  if(porPag>=9999){infoEl.innerHTML="Exibindo <strong>todos os "+total+"</strong> serviços";ctrlEl.innerHTML="";return;}
  infoEl.innerHTML="Exibindo <strong>"+(inicio+1)+"–"+fim+"</strong> de <strong>"+total+"</strong>";
  ctrlEl.innerHTML="";
  const addBtn=(label,pg,ativo,desab,ellipsis)=>{
    const b=document.createElement("button");
    b.className="pag-btn"+(ativo?" ativo":"")+(ellipsis?" ellipsis":"");
    b.innerHTML=label;b.disabled=desab;
    if(!desab&&!ellipsis)b.onclick=()=>{paginaAtual=pg;renderTabela();};
    ctrlEl.appendChild(b);
  };
  addBtn('<i class="fa fa-chevron-left"></i>',paginaAtual-1,false,paginaAtual===0);
  const pages=[];
  for(let i=0;i<totalPags;i++){
    if(i===0||i===totalPags-1||Math.abs(i-paginaAtual)<=1)pages.push(i);
    else if(pages[pages.length-1]!=="...")pages.push("...");
  }
  pages.forEach(p=>{
    if(p==="...")addBtn("…",null,false,false,true);
    else addBtn(p+1,p,p===paginaAtual,false);
  });
  addBtn('<i class="fa fa-chevron-right"></i>',paginaAtual+1,false,paginaAtual>=totalPags-1);
}

/* ══════ MODAL SERVIÇO ══════ */
function resetModal(){
  ["grupo","subgrupo","valor","comissao"].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value="";
  });
  document.getElementById("tempo").value="";
  document.getElementById("status").value="ativo";
  document.getElementById("corGrupoInfo").style.display="none";
}

document.getElementById("grupo").addEventListener("change",function(){
  const g=this.value;
  const cor=corDoGrupo(g);
  const info=document.getElementById("corGrupoInfo");
  const swatch=document.getElementById("corGrupoSwatch");
  const label=document.getElementById("corGrupoLabel");
  if(g){
    info.style.display="";
    swatch.style.background=cor||"#e5e7eb";
    swatch.style.border=cor?"1px solid rgba(0,0,0,.1)":"1px dashed #d1d5db";
    label.textContent=cor?`Cor do grupo "${g}"`:`Grupo "${g}" ainda não tem cor — configure em Cores dos Grupos`;
    label.style.color=cor?"#111827":"#f59e0b";
  } else {
    info.style.display="none";
  }
});

function abrirNovo(){
  idAtual=null;resetModal();
  document.getElementById("modalTitulo").textContent="Novo Serviço";
  document.getElementById("modal").style.display="flex";
}
function fecharModal(){document.getElementById("modal").style.display="none";}

async function editar(id){
  idAtual=id;const s=dados.find(d=>d.id===id);if(!s)return;
  document.getElementById("grupo").value=s.grupo||"";
  document.getElementById("subgrupo").value=s.subgrupo||"";
  document.getElementById("tempo").value=s.tempo||"";
  document.getElementById("valor").value=s.valor?moeda(s.valor):"";
  document.getElementById("comissao").value=s.comissao?moeda(s.comissao):"";
  document.getElementById("status").value=s.status||"ativo";
  document.getElementById("grupo").dispatchEvent(new Event("change"));
  document.getElementById("modalTitulo").textContent=nomeS(s)||"Editar Serviço";
  document.getElementById("modal").style.display="flex";
}

async function salvar(){
  const payload={
    grupo:document.getElementById("grupo").value,
    subgrupo:document.getElementById("subgrupo").value||null,
    tempo:document.getElementById("tempo").value||null,
    valor:parseMoeda(document.getElementById("valor").value),
    comissao:parseMoeda(document.getElementById("comissao").value),
    status:document.getElementById("status").value,
  };
  if(!payload.grupo){alert("Selecione o grupo do serviço.");return;}
  let error;
  if(idAtual){({error}=await client.from("servicos").update(payload).eq("id",idAtual));}
  else{({error}=await client.from("servicos").insert(payload));}
  if(error){alert("Erro ao salvar: "+error.message);return;}
  fecharModal();carregar();
}

async function excluir(id){
  if(!confirm("Excluir este serviço?"))return;
  const{error}=await client.from("servicos").delete().eq("id",id);
  if(error){alert("Erro: "+error.message);return;}
  carregar();
}

/* ══════ MODAL CORES DOS GRUPOS ══════ */
let grupoFoco=null; // grupo que está sendo editado no modal

function abrirGrupos(){grupoFoco=null;renderModalGrupos();document.getElementById("modalGrupos").style.display="flex";}
function abrirGruposDirect(g){grupoFoco=g;renderModalGrupos();document.getElementById("modalGrupos").style.display="flex";}
function fecharGrupos(){document.getElementById("modalGrupos").style.display="none";}

function renderModalGrupos(){
  const grupos=[...new Set([...Object.keys(gruposMap),...dados.map(s=>s.grupo).filter(Boolean)])].sort();
  const body=document.getElementById("gruposBody");
  body.innerHTML="";

  grupos.forEach(g=>{
    const corAtual=gruposMap[g]||"";
    const sec=document.createElement("div");
    sec.style="margin-bottom:20px";
    sec.innerHTML=`
      <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:8px;display:flex;align-items:center;gap:8px">
        <span style="width:16px;height:16px;border-radius:4px;background:${corAtual||"#e5e7eb"};border:1px solid rgba(0,0,0,.1);display:inline-block"></span>
        ${g}
      </div>
      <div class="paleta-grid" id="paleta_${g.replace(/\s/g,"_")}"></div>
      <div class="cor-preview-wrap">
        <span class="cor-preview-box" id="prev_${g.replace(/\s/g,"_")}" style="background:${corAtual||"transparent"};border:${corAtual?"1px solid rgba(0,0,0,.1)":"1px dashed #d1d5db"}"></span>
        <span id="prevLabel_${g.replace(/\s/g,"_")}" style="color:${corAtual?"#111827":"#9ca3af"}">${corAtual?nomeCor(corAtual):"Nenhuma cor selecionada"}</span>
      </div>`;
    body.appendChild(sec);

    const grid=sec.querySelector(".paleta-grid");
    PALETA.forEach(p=>{
      const div=document.createElement("div");
      div.className="paleta-item"+(p.hex===corAtual?" sel":"");
      div.style.background=p.hex;
      div.title=p.nome;
      div.innerHTML='<span class="ck"><i class="fa fa-check"></i></span>';
      div.dataset.grupo=g;
      div.dataset.hex=p.hex;
      div.dataset.nome=p.nome;
      div.onclick=()=>selecionarCorGrupo(g,p.hex,p.nome);
      grid.appendChild(div);
    });

    // Scroll para o grupo clicado diretamente
    if(grupoFoco===g) setTimeout(()=>sec.scrollIntoView({behavior:"smooth",block:"start"}),100);
  });
}

function selecionarCorGrupo(grupo,hex,nome){
  const key=grupo.replace(/\s/g,"_");
  // atualiza UI da paleta
  document.querySelectorAll(`[data-grupo="${grupo}"]`).forEach(el=>{
    el.classList.toggle("sel",el.dataset.hex===hex);
  });
  // atualiza preview
  const prev=document.getElementById(`prev_${key}`);
  const label=document.getElementById(`prevLabel_${key}`);
  if(prev){prev.style.background=hex;prev.style.border="1px solid rgba(0,0,0,.1)";}
  if(label){label.textContent=nome;label.style.color="#111827";}
  // atualiza mapa local (ainda não salvo)
  gruposMap[grupo]=hex;
}

async function salvarCoresGrupos(){
  // Busca todos os parametros de grupos_servico para ter os IDs
  const{data:params,error:eGet}=await client.from("parametros")
    .select("id,valor").eq("tipo","grupos_servico");
  if(eGet){alert("Erro ao buscar grupos: "+eGet.message);return;}

  const updates=[];
  const grupos=[...new Set([...Object.keys(gruposMap),...dados.map(s=>s.grupo).filter(Boolean)])];
  for(const g of grupos){
    const cor=gruposMap[g]||null;
    const param=params?.find(p=>p.valor===g);
    if(param){
      updates.push(client.from("parametros").update({cor}).eq("id",param.id));
    } else {
      // Grupo existe nos serviços mas não em parametros — cria
      updates.push(client.from("parametros").insert({tipo:"grupos_servico",valor:g,cor,ativo:true}));
    }
  }
  const results=await Promise.all(updates);
  const erros=results.map(r=>r.error).filter(Boolean);
  if(erros.length){alert("Erro ao salvar: "+erros[0].message);return;}
  fecharGrupos();
  await carregar();
}

function nomeCor(hex){
  return PALETA.find(p=>p.hex===hex)?.nome||hex;
}

/* ══════ EXPORTAR ══════ */
function exportarExcel(){
  const exp=dados.map(s=>({
    "Serviço":nomeS(s),"Grupo":s.grupo||"","Subgrupo":s.subgrupo||"",
    "Tempo (min)":s.tempo?Number(s.tempo):"","Valor (R$)":Number(s.valor||0),
    "Comissão (R$)":Number(s.comissao||0),"Status":s.status||"",
    "Cor do Grupo":corDoGrupo(s.grupo)||""
  }));
  const ws=XLSX.utils.json_to_sheet(exp);
  const cols=Object.keys(exp[0]);
  ws["!cols"]=cols.map(c=>({wch:Math.max(c.length,...exp.map(r=>String(r[c]??"").length))+2}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Serviços");
  XLSX.writeFile(wb,"servicos.xlsx");
}
