<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Documentos</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; margin:0; display:flex; background:#f5f5f5; }

    .sidebar {
      width:220px;
      background:#111;
      color:#fff;
      height:100vh;
      padding:20px;
    }

    .sidebar a {
      display:block;
      color:#ccc;
      text-decoration:none;
      margin:10px 0;
    }

    .sidebar a:hover { color:#fff; }

    .content { flex:1; padding:20px; }

    .btn {
      background:#007bff;
      color:#fff;
      border:none;
      padding:10px;
      border-radius:6px;
      cursor:pointer;
    }

    .card {
      background:#fff;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }

    .doc {
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #eee;
      padding:10px 0;
    }

    .tag {
      font-size:12px;
      background:#eee;
      padding:3px 8px;
      border-radius:5px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Hara Spa</h3>
  <a href="#">Dashboard</a>
  <a href="#">Clientes</a>
  <a href="#">Documentos</a>
</div>

<div class="content">

  <h2>📄 Documentos</h2>
  <button class="btn" onclick="abrir()">+ Documento</button>

  <div class="card">
    <input type="text" id="busca" placeholder="Buscar..." onkeyup="filtrar()">
  </div>

  <div id="lista" class="card"></div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);">
  <div style="background:#fff; padding:20px; margin:100px auto; width:300px; border-radius:10px;">
    <h3>Novo Documento</h3>

    <input id="nome" placeholder="Nome"><br><br>

    <select id="tipo">
      <option value="">Tipo</option>
      <option>RG</option>
      <option>CPF</option>
      <option>Comprovante</option>
      <option>Contrato</option>
    </select><br><br>

    <input type="file" id="file"><br><br>

    <button class="btn" onclick="salvar()">Salvar</button>
    <button onclick="fechar()">Cancelar</button>
  </div>
</div>

<script>

// 🔴 COLE AQUI SUAS CREDENCIAIS
const supabase = supabase.createClient(
  "https://rymehgsoarjeecuwyhny.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);
  
let documentos = [];

function abrir(){ modal.style.display = 'block'; }
function fechar(){ modal.style.display = 'none'; }

// SALVAR
async function salvar(){
  const nome = nomeInput.value;
  const tipo = tipoInput.value;
  const file = fileInput.files[0];

  if(!nome || !tipo || !file){
    alert("Preencha tudo");
    return;
  }

  const fileName = Date.now() + "-" + file.name;

  const { error } = await supabaseClient.storage
    .from("documentos")
    .upload(fileName, file);

  if(error){
    console.log(error);
    alert("Erro no upload");
    return;
  }

  const url = supabaseClient.storage
    .from("documentos")
    .getPublicUrl(fileName).data.publicUrl;

  await supabaseClient.from("documentos").insert([
    { nome, tipo, url }
  ]);

  fechar();
  carregar();
}

// CARREGAR
async function carregar(){
  const { data } = await supabaseClient
    .from("documentos")
    .select("*")
    .order("created_at", { ascending:false });

  documentos = data || [];
  render();
}

// RENDER
function render(){
  lista.innerHTML = "";

  documentos.forEach(d => {
    lista.innerHTML += `
      <div class="doc">
        <div>
          <strong>${d.nome}</strong><br>
          <span class="tag">${d.tipo}</span>
        </div>
        <div>
          <a href="${d.url}" target="_blank">👁️</a>
          <a href="${d.url}" download>⬇️</a>
        </div>
      </div>
    `;
  });
}

// BUSCA
function filtrar(){
  const termo = busca.value.toLowerCase();

  const filtrados = documentos.filter(d =>
    d.nome.toLowerCase().includes(termo) ||
    d.tipo.toLowerCase().includes(termo)
  );

  lista.innerHTML = "";

  filtrados.forEach(d => {
    lista.innerHTML += `
      <div class="doc">
        <strong>${d.nome}</strong>
      </div>
    `;
  });
}

// atalhos DOM
const modal = document.getElementById("modal");
const nomeInput = document.getElementById("nome");
const tipoInput = document.getElementById("tipo");
const fileInput = document.getElementById("file");
const lista = document.getElementById("lista");
const busca = document.getElementById("busca");

carregar();

</script>

</body>
</html>
