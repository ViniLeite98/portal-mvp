<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Solicitações | Hara Spa</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

/* ── TOPBAR ── */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.topbar h1{margin:0;}
.left-tools{display:flex;gap:10px;align-items:center;}
.left-tools input,.left-tools select{
  padding:9px 12px;border:1px solid #d1d5db;
  border-radius:8px;font-size:14px;
}
.left-tools input{width:240px;}
.left-tools input:focus,.left-tools select:focus{
  outline:none;border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}

/* ── TABELA ── */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;font-size:13px;text-align:left;}
th{background:#f9fafb;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}

button{background:#1f2937;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;}
button:hover{opacity:.9;}
.btn-aprovar{background:#16a34a;}
.btn-reprovar{background:#dc2626;}
.btn-excluir{background:#dc2626;}
.btn-novo{background:#1f2937;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-pendente{background:#fef3c7;color:#d97706;}
.badge-aprovado{background:#dcfce7;color:#16a34a;}
.badge-reprovado{background:#fee2e2;color:#dc2626;}

.arquivo-link{font-size:12px;color:#2563eb;text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.arquivo-link:hover{text-decoration:underline;}

/* ── MODAL ── */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:none;align-items:flex-start;justify-content:center;
  z-index:10;padding:30px 20px;overflow-y:auto;
}
.modal-content{
  background:#fff;width:600px;max-width:100%;
  border-radius:18px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px 0;
}
.modal-header h2{margin:0;font-size:18px;color:#111827;}
.btn-fechar{background:none;color:#6b7280;font-size:20px;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.btn-fechar:hover{background:#f3f4f6;color:#111827;}
.modal-body{padding:24px;}
.modal-footer{
  display:flex;justify-content:flex-end;gap:10px;
  padding:14px 24px;border-top:1px solid #e5e7eb;background:#f9fafb;
}
.modal-footer button{padding:9px 20px;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;}
.btn-cancel{background:#fff;color:#374151;border:1px solid #d1d5db!important;}
.btn-cancel:hover{background:#f3f4f6;}
.btn-save{background:#1f2937;color:#fff;}
.btn-save:hover{background:#111827;}

/* ── FORM ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{display:flex;flex-direction:column;margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.field label{font-size:12px;font-weight:600;margin-bottom:5px;color:#374151;}
input,select,textarea{
  padding:9px 11px;border-radius:8px;
  border:1px solid #d1d5db;font-size:13px;color:#111827;background:#fff;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
textarea{resize:vertical;min-height:70px;}
.span2{grid-column:span 2;}

.arquivo-atual{
  display:flex;align-items:center;gap:8px;
  background:#f0fdf4;border:1px solid #bbf7d0;
  border-radius:8px;padding:8px 12px;font-size:12px;
  margin-top:6px;
}
.arquivo-atual a{color:#16a34a;text-decoration:none;font-weight:600;}
.arquivo-atual button{
  background:none;color:#dc2626;border:none;
  cursor:pointer;padding:2px 6px;font-size:12px;
}
.upload-status{font-size:12px;color:#2563eb;margin-top:6px;display:none;}

.empty-row td{text-align:center;color:#9ca3af;padding:32px;}
</style>
</head>

<body>
<div class="app">
<aside id="sidebar"></aside>

<main class="content">
<h1 style="margin-bottom:20px">Solicitações</h1>

<div class="topbar">
  <div class="left-tools">
    <input type="text" id="buscaNome" placeholder="🔍  Buscar profissional...">
    <select id="filtroStatus">
      <option value="">Todos os status</option>
      <option value="Pendente">Pendente</option>
      <option value="Aprovado">Aprovado</option>
      <option value="Reprovado">Reprovado</option>
    </select>
    <select id="filtroTipo">
      <option value="">Todos os tipos</option>
      <option>Falta</option>
      <option>Férias</option>
      <option>Atestado</option>
      <option>Viagem</option>
    </select>
  </div>
  <button class="btn-novo" onclick="abrirNovo()"><i class="fa fa-plus"></i> Nova Solicitação</button>
</div>

<table>
  <thead>
    <tr>
      <th>Profissional</th>
      <th>Tipo</th>
      <th>Período</th>
      <th>Status</th>
      <th>Aprovado / Rejeitado por</th>
      <th>Atestado</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody id="lista"></tbody>
</table>
</main>
</div>

<!-- ══ MODAL CONFIRMAÇÃO STATUS ══ -->
<div class="modal" id="modalConfirmar">
<div class="modal-content" style="width:420px">
  <div class="modal-header">
    <h2 id="confirmarTitulo">Aprovar Solicitação</h2>
    <button class="btn-fechar" onclick="fecharConfirmar()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div id="confirmarInfo" style="background:#f9fafb;border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:#374151;line-height:1.6"></div>
    <div class="field">
      <label>Seu nome *</label>
      <input id="confirmarNome" placeholder="Quem está aprovando / reprovando...">
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharConfirmar()">Cancelar</button>
    <button id="confirmarBtn" onclick="confirmarStatus()"><i class="fa fa-check"></i> Confirmar</button>
  </div>
</div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal" id="modal">
<div class="modal-content">
  <div class="modal-header">
    <h2 id="modalTitulo">Nova Solicitação</h2>
    <button class="btn-fechar" onclick="fecharModal()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="grid-2">

      <div class="field span2">
        <label>Profissional *</label>
        <select id="terapeuta"></select>
      </div>

      <div class="field">
        <label>Tipo *</label>
        <select id="tipo">
          <option>Falta</option>
          <option>Férias</option>
          <option>Atestado</option>
          <option>Viagem</option>
        </select>
      </div>

      <div class="field">
        <label>Status</label>
        <select id="status" onchange="toggleAprovadoPor()">
          <option value="Pendente">Pendente</option>
          <option value="Aprovado">Aprovado</option>
          <option value="Reprovado">Reprovado</option>
        </select>
      </div>

      <div class="field">
        <label>Data Início *</label>
        <input type="date" id="data_inicio">
      </div>

      <div class="field">
        <label>Data Fim *</label>
        <input type="date" id="data_fim">
      </div>

      <div class="field span2">
        <label>Justificativa</label>
        <textarea id="justificativa" placeholder="Descreva o motivo..."></textarea>
      </div>

      <div class="field span2">
        <label>
          Atestado / Documento
          <span style="color:#9ca3af;font-weight:400"> — opcional</span>
        </label>
        <input type="file" id="arquivo" accept="image/*,.pdf,.doc,.docx">
        <div class="arquivo-atual" id="arquivoAtual" style="display:none">
          <i class="fa fa-paperclip" style="color:#16a34a"></i>
          <a id="arquivoLink" href="#" target="_blank"></a>
          <button onclick="removerArquivo()" title="Remover"><i class="fa fa-times"></i></button>
        </div>
        <div class="upload-status" id="uploadStatus">
          <i class="fa fa-spinner fa-spin"></i> Enviando arquivo...
        </div>
      </div>

    </div>
  </div>
  <div class="modal-footer" style="flex-wrap:wrap;gap:10px;">
    <div style="flex:1;min-width:180px;" id="wrapAprovadoPor">
      <input id="aprovado_por" placeholder="Seu nome (quem aprova/reprova)"
        style="width:100%;font-size:12px;padding:7px 10px">
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-save" onclick="salvar()"><i class="fa fa-save"></i> Salvar</button>
    </div>
  </div>
</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>

<script>
// função global chamada pelo onchange do select
function toggleAprovadoPor(){
  const status = document.getElementById("status").value;
  const wrap   = document.getElementById("wrapAprovadoPor");
  if(wrap) wrap.style.display = (status === "Aprovado" || status === "Reprovado") ? "block" : "none";
}

document.addEventListener("DOMContentLoaded", function(){

// usa o client global de assets/js/supabase.js


let idEdicao       = null;
let arquivoAtualUrl  = null;
let arquivoAtualNome = null;
let mapaTerapeutas   = {};
let todasSolicitacoes = [];

/* ── HELPERS ── */
function fmtData(v){
  if(!v) return "—";
  const [y,m,d] = v.split("-");
  return `${d}/${m}/${y}`;
}

function limparNome(nome){
  return nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9.\-_]/g,"_");
}

/* ── TERAPEUTAS ── */
async function carregarTerapeutas(){
  const {data} = await client
    .from("terapeutas").select("cpf,nome_profissional")
    .eq("status","Ativo").order("nome_profissional");

  mapaTerapeutas = {};
  (data||[]).forEach(t => { mapaTerapeutas[t.cpf] = t.nome_profissional; });

  const sel = document.getElementById("terapeuta");
  sel.innerHTML = "<option value=''>Selecione</option>";
  (data||[]).forEach(t => {
    sel.innerHTML += `<option value="${t.cpf}">${t.nome_profissional}</option>`;
  });
}

/* ── CARREGAR LISTA ── */
async function carregar(){
  const u = window.usuarioLogado;
  const isAdmin = u && u.role === "admin";

  let q = client.from("solicitacoes").select("*").order("created_at",{ascending:false});

  // Operadora só vê as próprias solicitações
  if(!isAdmin && u && u.cpf) q = q.eq("terapeuta_cpf", u.cpf);

  const {data} = await q;
  todasSolicitacoes = data || [];

  // Ocultar filtros de terapeuta e botão novo para operadora (ela só pode ver as próprias)
  const btnNovo = document.querySelector(".btn-novo");
  if(btnNovo) btnNovo.style.display = isAdmin ? "" : "none";

  render();
}

/* ── RENDER ── */
function render(){
  const busca       = (document.getElementById("buscaNome").value||"").toLowerCase();
  const filtStatus  = document.getElementById("filtroStatus").value;
  const filtTipo    = document.getElementById("filtroTipo").value;

  const lista = todasSolicitacoes.filter(s => {
    const nome = (mapaTerapeutas[s.terapeuta_cpf]||"").toLowerCase();
    return nome.includes(busca)
      && (!filtStatus || s.status === filtStatus)
      && (!filtTipo   || s.tipo   === filtTipo);
  });

  const tbody = document.getElementById("lista");
  tbody.innerHTML = "";

  if(lista.length === 0){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Nenhuma solicitação encontrada.</td></tr>`;
    return;
  }

  lista.forEach(s => {
    const nome = mapaTerapeutas[s.terapeuta_cpf] || s.terapeuta_cpf;
    const badgeClass = s.status === "Aprovado" ? "badge-aprovado"
                     : s.status === "Reprovado" ? "badge-reprovado"
                     : "badge-pendente";

    const iconeStatus = s.status === "Aprovado" ? "fa-check"
                      : s.status === "Reprovado" ? "fa-times"
                      : "fa-clock";

    const arquivoCol = s.arquivo_url
      ? `<a class="arquivo-link" href="${s.arquivo_url}" target="_blank">
           <i class="fa fa-paperclip"></i> Ver
         </a>`
      : `<span style="color:#d1d5db;font-size:12px">—</span>`;

    tbody.innerHTML += `
    <tr>
      <td><strong>${nome}</strong></td>
      <td>${s.tipo}</td>
      <td style="white-space:nowrap">${fmtData(s.data_inicio)} → ${fmtData(s.data_fim)}</td>
      <td><span class="badge ${badgeClass}"><i class="fa ${iconeStatus}"></i> ${s.status}</span></td>
      <td style="font-size:12px;color:#6b7280">${s.aprovado_por ? `<i class="fa fa-user"></i> ${s.aprovado_por}` : "—"}</td>
      <td>${arquivoCol}</td>
      <td style="white-space:nowrap;display:flex;gap:4px">
        <button onclick="abrirEditar('${s.id}')"><i class="fa fa-pencil"></i></button>
        ${s.status !== "Aprovado"  ? `<button class="btn-aprovar"  onclick="abrirConfirmar('${s.id}','Aprovado')"><i class="fa fa-check"></i></button>` : ""}
        ${s.status !== "Reprovado" ? `<button class="btn-reprovar" onclick="abrirConfirmar('${s.id}','Reprovado')"><i class="fa fa-times"></i></button>` : ""}
        <button class="btn-excluir" onclick="excluir('${s.id}','${(s.arquivo_url||"").replace(/'/g,"\\'")}')"><i class="fa fa-trash"></i></button>
      </td>
    </tr>`;
  });
}

/* ── MODAL ── */
function resetModal(){
  document.getElementById("terapeuta").value    = "";
  document.getElementById("tipo").value         = "Falta";
  document.getElementById("status").value       = "Pendente";
  document.getElementById("status").disabled    = false;
  document.getElementById("data_inicio").value  = "";
  document.getElementById("data_fim").value     = "";
  document.getElementById("justificativa").value= "";
  document.getElementById("aprovado_por").value = "";
  document.getElementById("arquivo").value      = "";
  arquivoAtualUrl  = null;
  arquivoAtualNome = null;
  document.getElementById("arquivoAtual").style.display    = "none";
  document.getElementById("wrapAprovadoPor").style.display = "none";
}

window.abrirNovo = function(){
  idEdicao = null;
  resetModal();
  document.getElementById("modalTitulo").textContent = "Nova Solicitação";
  // novo cadastro: status sempre Pendente e bloqueado
  const selStatus = document.getElementById("status");
  selStatus.value    = "Pendente";
  selStatus.disabled = true;
  document.getElementById("modal").style.display = "flex";
};

window.abrirEditar = async function(id){
  idEdicao = id;
  const {data: s} = await client.from("solicitacoes").select("*").eq("id",id).single();
  if(!s) return;

  resetModal();
  document.getElementById("terapeuta").value    = s.terapeuta_cpf || "";
  document.getElementById("tipo").value         = s.tipo          || "Falta";
  document.getElementById("status").value       = s.status        || "Pendente";
  document.getElementById("data_inicio").value  = s.data_inicio   || "";
  document.getElementById("data_fim").value     = s.data_fim      || "";
  document.getElementById("justificativa").value= s.justificativa || "";

  if(s.arquivo_url){
    arquivoAtualUrl  = s.arquivo_url;
    arquivoAtualNome = s.arquivo_nome || "Ver arquivo";
    const el = document.getElementById("arquivoAtual");
    el.style.display = "flex";
    document.getElementById("arquivoLink").href        = s.arquivo_url;
    document.getElementById("arquivoLink").textContent = s.arquivo_nome || "Ver arquivo";
  }

  document.getElementById("modalTitulo").textContent = mapaTerapeutas[s.terapeuta_cpf] || "Editar Solicitação";
  // na edição permite alterar status
  document.getElementById("status").disabled = false;
  document.getElementById("modal").style.display = "flex";
};

window.fecharModal = function(){
  document.getElementById("modal").style.display = "none";
};

window.removerArquivo = function(){
  arquivoAtualUrl  = null;
  arquivoAtualNome = null;
  document.getElementById("arquivoAtual").style.display = "none";
  document.getElementById("arquivo").value = "";
};

/* ── SALVAR ── */
window.salvar = async function(){
  const terapeuta  = document.getElementById("terapeuta").value;
  const tipo       = document.getElementById("tipo").value;
  const status     = document.getElementById("status").value;
  const dataInicio = document.getElementById("data_inicio").value;
  const dataFim    = document.getElementById("data_fim").value;
  const justif     = document.getElementById("justificativa").value.trim();
  const file       = document.getElementById("arquivo").files[0];

  if(!terapeuta){ alert("Selecione o profissional."); return; }
  if(!dataInicio || !dataFim){ alert("Preencha as datas."); return; }
  if(dataFim < dataInicio){ alert("Data fim não pode ser menor que data início."); return; }

  // verificar impacto na escala (mesma lógica do escalas.html)
  if(status === "Aprovado"){
    const {data: todasAprovadas} = await client
      .from("solicitacoes")
      .select("terapeuta_cpf, data_inicio, data_fim")
      .eq("status", "Aprovado")
      .neq("terapeuta_cpf", terapeuta); // excluir o próprio terapeuta

    const {data: todosTerapeutas} = await client
      .from("terapeutas")
      .select("cpf, tem_folga, dia_folga")
      .eq("status", "Ativo")
      .in("cargo", ["Terapeuta Feminina", "Terapeuta Masculino"]);

    const totalTerapeutas = (todosTerapeutas||[]).length;
    const DIAS_SEMANA = ["domingo","segunda","terça","quarta","quinta","sexta","sábado"];

    // iterar cada dia do período solicitado
    let diaMaisCritico = null;
    let maxAusentes = 0;

    const inicio = new Date(dataInicio + "T00:00:00");
    const fim    = new Date(dataFim    + "T00:00:00");

    for(let d = new Date(inicio); d <= fim; d.setDate(d.getDate()+1)){
      if(d.getDay() === 0) continue; // pula domingo

      const dStr = d.toISOString().split("T")[0];
      const diaSem = DIAS_SEMANA[d.getDay()];

      let ausentes = 0;

      // contar folgas semanais
      (todosTerapeutas||[]).forEach(t => {
        if(t.tem_folga === "Sim" && (t.dia_folga||"").toLowerCase() === diaSem) ausentes++;
      });

      // contar aprovados no dia (excluindo o terapeuta atual)
      (todasAprovadas||[]).forEach(s => {
        if(dStr >= s.data_inicio && dStr <= s.data_fim) ausentes++;
      });

      // incluir o terapeuta desta solicitação
      ausentes++;

      if(ausentes > maxAusentes){
        maxAusentes = ausentes;
        diaMaisCritico = new Date(d);
      }
    }

    if(diaMaisCritico && maxAusentes >= 4){
      const dFmt = diaMaisCritico.toLocaleDateString("pt-BR");
      const confirm1 = confirm(`🔴 ATENÇÃO: No dia ${dFmt}, ${maxAusentes} terapeutas estarão ausentes (escala crítica).\n\nDeseja aprovar mesmo assim?`);
      if(!confirm1) return;
    } else if(diaMaisCritico && maxAusentes >= 2){
      const dFmt = diaMaisCritico.toLocaleDateString("pt-BR");
      const confirm2 = confirm(`🟡 Atenção: No dia ${dFmt}, ${maxAusentes} terapeutas estarão ausentes.\n\nDeseja aprovar mesmo assim?`);
      if(!confirm2) return;
    }
  }

  // verificar sobreposição de período
  let query = client
    .from("solicitacoes")
    .select("id, tipo, data_inicio, data_fim, status")
    .eq("terapeuta_cpf", terapeuta)
    .neq("status", "Reprovado")
    .lte("data_inicio", dataFim)
    .gte("data_fim",    dataInicio);

  if(idEdicao) query = query.neq("id", idEdicao);

  const {data: conflitos} = await query;

  if(conflitos && conflitos.length > 0){
    const c = conflitos[0];
    const de = fmtData(c.data_inicio);
    const ate = fmtData(c.data_fim);
    alert(`⚠️ Já existe uma solicitação de "${c.tipo}" para este profissional no período ${de} → ${ate} (${c.status}).\nRevise as datas antes de continuar.`);
    return;
  }

  const aprovadoPor = (document.getElementById("aprovado_por").value||"").trim();
  const statusOriginal = idEdicao
    ? (todasSolicitacoes.find(s => s.id === idEdicao)||{}).status
    : "Pendente";
  const statusMudou = status !== statusOriginal;

  const payload = {
    terapeuta_cpf: terapeuta,
    tipo, status,
    data_inicio:   dataInicio,
    data_fim:      dataFim,
    justificativa: justif || null,
    arquivo_url:   arquivoAtualUrl  || null,
    arquivo_nome:  arquivoAtualNome || null,
    aprovado_por:  (statusMudou && aprovadoPor) ? aprovadoPor : undefined
  };

  // limpar aprovado_por se voltou para Pendente
  if(status === "Pendente") payload.aprovado_por = null;

  // remover undefined
  Object.keys(payload).forEach(k => payload[k] === undefined && delete payload[k]);

  // upload de novo arquivo
  if(file){
    const statusEl = document.getElementById("uploadStatus");
    statusEl.style.display = "block";

    const fileName = `solicitacoes/${Date.now()}_${limparNome(file.name)}`;
    const {error: upErr} = await client.storage.from("documentos").upload(fileName, file);

    if(upErr){ statusEl.style.display = "none"; alert("Erro no upload: " + upErr.message); return; }

    const {data: urlData} = client.storage.from("documentos").getPublicUrl(fileName);
    payload.arquivo_url  = urlData.publicUrl;
    payload.arquivo_nome = file.name;
    statusEl.style.display = "none";
  }

  let error;
  if(idEdicao){
    ({error} = await client.from("solicitacoes").update(payload).eq("id", idEdicao));
  } else {
    ({error} = await client.from("solicitacoes").insert(payload));
  }

  if(error){ console.error(error); alert("Erro ao salvar: " + error.message); return; }

  fecharModal();
  carregar();
};

/* ── ALTERAR STATUS ── */
window.alterarStatus = async function(id, novoStatus, aprovadoPor){
  await client.from("solicitacoes")
    .update({status: novoStatus, aprovado_por: aprovadoPor || null})
    .eq("id", id);
  carregar();
};

let _confirmarId     = null;
let _confirmarStatus = null;

window.abrirConfirmar = function(id, novoStatus){
  _confirmarId     = id;
  _confirmarStatus = novoStatus;

  const s    = todasSolicitacoes.find(x => x.id === id);
  const nome = s ? (mapaTerapeutas[s.terapeuta_cpf] || s.terapeuta_cpf) : "";
  const de   = s ? fmtData(s.data_inicio) : "";
  const ate  = s ? fmtData(s.data_fim)    : "";

  const cor    = novoStatus === "Aprovado" ? "#16a34a" : "#dc2626";
  const icone  = novoStatus === "Aprovado" ? "fa-check-circle" : "fa-times-circle";
  const acao   = novoStatus === "Aprovado" ? "Aprovar" : "Reprovar";

  document.getElementById("confirmarTitulo").innerHTML =
    `<i class="fa ${icone}" style="color:${cor}"></i> ${acao} Solicitação`;

  document.getElementById("confirmarInfo").innerHTML = `
    <strong>${nome}</strong><br>
    Tipo: ${s?.tipo || "—"}<br>
    Período: ${de} → ${ate}<br>
    Justificativa: ${s?.justificativa || "—"}
  `;

  const btn = document.getElementById("confirmarBtn");
  btn.style.background = cor;
  btn.innerHTML = `<i class="fa ${icone}"></i> ${acao}`;

  document.getElementById("confirmarNome").value = "";
  document.getElementById("modalConfirmar").style.display = "flex";
};

window.fecharConfirmar = function(){
  document.getElementById("modalConfirmar").style.display = "none";
};

window.confirmarStatus = async function(){
  const nome = document.getElementById("confirmarNome").value.trim();
  if(!nome){ alert("Digite seu nome para confirmar."); return; }

  await alterarStatus(_confirmarId, _confirmarStatus, nome);
  fecharConfirmar();
};

/* ── EXCLUIR ── */
window.excluir = async function(id, arquivoUrl){
  if(!confirm("Excluir esta solicitação?")) return;

  if(arquivoUrl){
    const path = arquivoUrl.split("/storage/v1/object/public/documentos/")[1];
    if(path) await client.storage.from("documentos").remove([decodeURIComponent(path)]);
  }

  await client.from("solicitacoes").delete().eq("id", id);
  carregar();
};

/* ── FILTROS ── */
document.getElementById("buscaNome").addEventListener("input", render);
document.getElementById("filtroStatus").addEventListener("change", render);
document.getElementById("filtroTipo").addEventListener("change", render);

/* ── INIT ── */
carregarTerapeutas().then(carregar);

});
</script>
