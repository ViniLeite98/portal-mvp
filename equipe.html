<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let cpfAtual=null;

const campos=[
"nome_completo","nome_profissional","cpf","rg","nascimento","email",
"tipo_sanguineo","telefone","telefone_emer","cep","rua","numero",
"complemento","bairro","cidade","uf","pix_tipo","pix_chave",
"cargo","tem_folga","dia_folga",
"hora_entrada","hora_saida","data_inicio","status"
];

function getPayload(){
const obj={};
campos.forEach(c=>{
const el=document.getElementById(c);
if(el && el.value!=="") obj[c]=el.value;
});
return obj;
}

function setForm(data){
campos.forEach(c=>{
const el=document.getElementById(c);
if(el){
if(c==="hora_entrada" || c==="hora_saida"){
el.value=data[c]?data[c].substring(0,5):"";
}else{
el.value=data[c]||"";
}
}
});
}

// 🚀 UPLOAD
async function uploadDocumento(file, cpf){

if(!file || !cpf) return null;

const nome = `${cpf}_${Date.now()}_${file.name}`;

const { error } = await supabaseClient
.storage
.from("documentos")
.upload(nome, file);

if(error){
console.error(error);
alert("Erro ao enviar documento");
return null;
}

const { data } = supabaseClient
.storage
.from("documentos")
.getPublicUrl(nome);

return data.publicUrl;
}

// 📄 LISTAR DOCS
async function carregarDocumentos(cpf){

const { data, error } = await supabaseClient
.from("documentos")
.select("*")
.eq("cpf", cpf);

const div=document.getElementById("listaDocumentos");

if(error || !data || data.length===0){
div.innerHTML="Nenhum documento anexado";
return;
}

div.innerHTML=data.map(d=>`
<div style="margin-bottom:5px;">
📄 ${d.tipo || "Doc"} -
<a href="${d.url}" target="_blank">Ver</a>
</div>
`).join("");
}

// 🔄 CARREGAR TABELA (COM PROTEÇÃO DE ERRO)
async function carregar(){

const {data,error}=await supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional,status,cargo")
.order("nome_profissional");

if(error){
console.error("ERRO:",error);
alert("Erro ao carregar dados (provável problema na key ou RLS)");
return;
}

const tbody=document.getElementById("lista");
tbody.innerHTML="";

(data || []).forEach(t=>{
tbody.innerHTML+=`
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>`;
});
}

function abrirNovo(){
cpfAtual=null;

campos.forEach(c=>{
const el=document.getElementById(c);
if(el) el.value="";
});

document.getElementById("listaDocumentos").innerHTML="Nenhum documento anexado";

document.getElementById("cpf").disabled=false;

document.getElementById("modal").style.display="flex";
}

async function editar(cpf){

cpfAtual=cpf;

const {data,error}=await supabaseClient
.from("terapeutas")
.select("*")
.eq("cpf",cpf)
.single();

if(error){
console.error(error);
return;
}

setForm(data);

await carregarDocumentos(cpf);

document.getElementById("cpf").disabled=true;
document.getElementById("modal").style.display="flex";
}

// 💾 SALVAR (COM DOCUMENTO)
async function salvar(){

const payload=getPayload();

if(!payload.nome_completo||!payload.nome_profissional||!payload.email){
alert("Preencha os campos obrigatórios");
return;
}

let error;

if(cpfAtual){
delete payload.cpf;

({error}=await supabaseClient
.from("terapeutas")
.update(payload)
.eq("cpf",cpfAtual));

}else{

({error}=await supabaseClient
.from("terapeutas")
.insert(payload));

}

if(error){
console.error(error);
alert("Erro ao salvar");
return;
}

// 📎 upload documento
const file=document.getElementById("documento_file").files[0];
const tipo=document.getElementById("documento_tipo").value;

if(file){

const cpfRef = payload.cpf || cpfAtual;

const url = await uploadDocumento(file, cpfRef);

if(url){

await supabaseClient
.from("documentos")
.insert({
cpf: cpfRef,
tipo: tipo,
url: url
});

}

}

fecharModal();
carregar();
}

async function excluir(cpf){
if(!confirm("Excluir registro?"))return;

await supabaseClient
.from("terapeutas")
.delete()
.eq("cpf",cpf);

carregar();
}

function fecharModal(){
document.getElementById("modal").style.display="none";
}

document.getElementById("filtroStatus").addEventListener("change", carregar);

carregar();

</script>
