<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Pessoal | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{flex-shrink:0;}
.content{flex:1;padding:40px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;font-size:14px;text-align:left;}
th{background:#f9fafb;font-weight:600;}
button{background:#1f2937;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;}
button.excluir{background:#dc2626}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.left-tools{display:flex;gap:10px;align-items:center;}
.left-tools input{padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;width:260px;font-size:14px;}
.left-tools input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.left-tools select{padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:10;padding:30px 20px;overflow-y:auto;}
.modal-content{background:#fff;width:860px;max-width:100%;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 28px 0;}
.modal-header h2{margin:0;font-size:18px;color:#111827;}
.btn-fechar{background:none;color:#6b7280;font-size:20px;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.btn-fechar:hover{background:#f3f4f6;color:#111827;}
.modal-body{display:flex;min-height:480px;}
.side-nav{width:190px;flex-shrink:0;background:#f9fafb;border-right:1px solid #e5e7eb;padding:16px 0;display:flex;flex-direction:column;gap:2px;}
.side-btn{display:flex;align-items:center;gap:10px;background:none;color:#6b7280;border:none;border-radius:0;padding:11px 20px;font-size:13px;font-weight:500;cursor:pointer;text-align:left;width:100%;border-left:3px solid transparent;transition:all .15s;}
.side-btn i{width:16px;text-align:center;font-size:13px;}
.side-btn:hover{background:#f3f4f6;color:#111827;}
.side-btn.active{background:#eff6ff;color:#1d4ed8;border-left-color:#2563eb;font-weight:600;}
.tab-badge{margin-left:auto;background:#2563eb;color:#fff;font-size:10px;border-radius:99px;padding:1px 6px;font-weight:700;}
.tab-panels{flex:1;overflow-y:auto;}
.tab-panel{display:none;padding:24px 28px;}
.tab-panel.active{display:block;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin:0 0 18px;display:flex;align-items:center;gap:7px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;}
.field{display:flex;flex-direction:column;}
.field label{font-size:12px;font-weight:600;margin-bottom:5px;color:#374151;}
input,select{padding:9px 11px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;color:#111827;background:#fff;}
input:focus,select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
input[readonly]{background:#f3f4f6;color:#6b7280;cursor:not-allowed;}
.span2{grid-column:span 2;}
.span3{grid-column:span 3;}
.progress-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;cursor:default;}
.progress-circle{width:42px;height:42px;transform:rotate(-90deg);}
.progress-circle .bg{fill:none;stroke:#e5e7eb;stroke-width:4;}
.progress-circle .fill{fill:none;stroke:#22c55e;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .4s ease,stroke .3s;}
.progress-pct{position:absolute;font-size:10px;font-weight:700;color:#111827;}
.progress-tooltip{display:none;position:absolute;top:calc(100% + 8px);right:0;background:#1f2937;color:#fff;border-radius:10px;padding:12px 14px;font-size:12px;width:220px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.2);line-height:1.6;}
.progress-tooltip::before{content:"";position:absolute;top:-6px;right:14px;border:6px solid transparent;border-bottom-color:#1f2937;border-top:none;}
.progress-wrap:hover .progress-tooltip{display:block;}
.tooltip-item{display:flex;align-items:center;gap:6px;padding:2px 0;}
.tooltip-item.done{color:#86efac;}
.tooltip-item.missing{color:#fca5a5;}
.cpf-aviso{font-size:11px;color:#d97706;margin-top:4px;display:flex;align-items:center;gap:5px;}
.btn-editar-cpf{background:none;color:#2563eb;border:none;padding:0;font-size:11px;font-weight:600;cursor:pointer;text-decoration:underline;display:inline;margin-left:6px;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:14px 28px;border-top:1px solid #e5e7eb;background:#f9fafb;}
.modal-footer button{padding:9px 20px;font-size:13px;font-weight:600;}
.btn-cancel{background:#fff;color:#374151;border:1px solid #d1d5db;}
.btn-cancel:hover{background:#f3f4f6;}
.btn-save{background:#1f2937;}
.btn-save:hover{background:#111827;}
.doc-upload-box{background:#f9fafb;border:2px dashed #d1d5db;border-radius:12px;padding:18px;margin-bottom:20px;}
.doc-upload-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
.doc-upload-row .field{flex:1;min-width:140px;}
.btn-upload{height:38px;padding:0 16px;white-space:nowrap;background:#2563eb;font-size:13px;align-self:flex-end;border-radius:6px;}
.upload-status{font-size:13px;color:#2563eb;margin-top:8px;display:none;}
.doc-list{display:flex;flex-direction:column;gap:8px;}
.doc-item{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:11px 14px;}
.doc-item-left{display:flex;align-items:center;gap:11px;}
.doc-icon{width:36px;height:36px;background:#eff6ff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#2563eb;font-size:15px;flex-shrink:0;}
.doc-name{font-size:13px;font-weight:600;color:#1f2937;}
.doc-tipo{font-size:11px;color:#6b7280;margin-top:2px;}
.doc-item-right{display:flex;gap:8px;align-items:center;}
.doc-item-right a{font-size:13px;color:#2563eb;text-decoration:none;font-weight:500;}
.btn-del{background:none;color:#dc2626;border:none;cursor:pointer;font-size:14px;padding:4px 6px;}
.doc-empty{text-align:center;color:#9ca3af;font-size:13px;padding:28px 0;}
</style>
</head>
<body>
<div class="app">
<aside id="sidebar"></aside>
<main class="content">
<h1>Cadastro de Pessoal</h1>
<div class="topbar">
  <div class="left-tools">
    <input type="text" id="pesquisaNome" placeholder="🔍  Pesquisar profissional..." onkeyup="filtrarTabela()" autocomplete="off">
    <select id="filtroStatus">
      <option value="">Todos os status</option>
      <option value="Ativo" selected>Ativo</option>
      <option value="Inativo">Inativo</option>
    </select>
  </div>
  <button id="btnNovoCadastro" onclick="abrirNovo()" style="display:none"><i class="fa fa-plus"></i> Novo Cadastro</button>
</div>
<table>
  <thead><tr><th>Nome Profissional</th><th>Cargo</th><th>CPF</th><th>Status</th><th>Ações</th></tr></thead>
  <tbody id="lista"></tbody>
</table>
</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">
  <div class="modal-header">
    <h2 id="modalTitulo">Novo Cadastro</h2>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="progress-wrap" id="progressWrap" style="display:none">
        <svg class="progress-circle" viewBox="0 0 42 42">
          <circle class="bg" cx="21" cy="21" r="18"/>
          <circle class="fill" id="progressFill" cx="21" cy="21" r="18" stroke-dasharray="113" stroke-dashoffset="113"/>
        </svg>
        <span class="progress-pct" id="progressPct">0%</span>
        <div class="progress-tooltip" id="progressTooltip"></div>
      </div>
      <button class="btn-fechar" onclick="fecharModal()"><i class="fa fa-times"></i></button>
    </div>
  </div>
  <div class="modal-body">
    <nav class="side-nav">
      <button class="side-btn active" onclick="mudarTab('pessoais',this)"><i class="fa fa-id-card"></i> Dados Pessoais</button>
      <button class="side-btn" onclick="mudarTab('contatos',this)"><i class="fa fa-phone"></i> Contatos</button>
      <button class="side-btn" onclick="mudarTab('endereco',this)"><i class="fa fa-map-marker-alt"></i> Endereço</button>
      <button class="side-btn" onclick="mudarTab('pagamento',this)"><i class="fa fa-dollar-sign"></i> Pagamento</button>
      <button class="side-btn" onclick="mudarTab('funcional',this)"><i class="fa fa-briefcase"></i> Dados Funcionais</button>
      <button class="side-btn" id="tabDocsBtn" style="display:none" onclick="mudarTab('docs',this)">
        <i class="fa fa-file-alt"></i> Documentos
        <span class="tab-badge" id="docBadge" style="display:none">0</span>
      </button>
    </nav>
    <div class="tab-panels">
      <div class="tab-panel active" id="tab-pessoais">
        <p class="section-title"><i class="fa fa-id-card"></i> Dados Pessoais</p>
        <div class="grid">
          <div class="field span2"><label>Nome Completo *</label><input id="nome_completo"></div>
          <div class="field"><label>Nome Profissional *</label><input id="nome_profissional"></div>
          <div class="field" id="campo_cpf_wrapper">
            <label>CPF *</label>
            <input id="cpf" placeholder="000.000.000-00">
            <div id="cpf_aviso" style="display:none" class="cpf-aviso">
              <i class="fa fa-triangle-exclamation"></i>
              Alterar o CPF substituirá o registro completo.
              <button class="btn-editar-cpf" onclick="habilitarEdicaoCPF()">Editar mesmo assim</button>
            </div>
          </div>
          <div class="field"><label>RG</label><input id="rg"></div>
          <div class="field"><label>Data de Nascimento</label><input type="date" id="nascimento"></div>
          <div class="field"><label>Email *</label><input id="email" type="email"></div>
          <div class="field">
            <label>Tipo Sanguíneo</label>
            <select id="tipo_sanguineo">
              <option value="">Selecione</option>
              <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
            </select>
          </div>
        </div>
      </div>
      <div class="tab-panel" id="tab-contatos">
        <p class="section-title"><i class="fa fa-phone"></i> Contatos</p>
        <div class="grid-2">
          <div class="field"><label>Telefone *</label><input id="telefone" placeholder="(11) 99999-9999"></div>
          <div class="field"><label>Contato de Emergência</label><input id="telefone_emergencia" placeholder="(11) 99999-9999"></div>
        </div>
      </div>
      <div class="tab-panel" id="tab-endereco">
        <p class="section-title"><i class="fa fa-map-marker-alt"></i> Endereço</p>
        <div class="grid">
          <div class="field"><label>CEP</label><input id="cep" placeholder="00000-000"></div>
          <div class="field span2"><label>Rua</label><input id="rua"></div>
          <div class="field"><label>Número</label><input id="numero"></div>
          <div class="field"><label>Complemento</label><input id="complemento"></div>
          <div class="field"><label>Bairro</label><input id="bairro"></div>
          <div class="field span2"><label>Cidade</label><input id="cidade"></div>
          <div class="field"><label>UF</label><input id="uf" maxlength="2" style="text-transform:uppercase"></div>
        </div>
      </div>
      <div class="tab-panel" id="tab-pagamento">
        <p class="section-title"><i class="fa fa-dollar-sign"></i> Pagamento via PIX</p>
        <div class="grid-2">
          <div class="field">
            <label>Tipo de Chave PIX</label>
            <select id="pix_tipo">
              <option value="">Selecione</option>
              <option>CPF</option><option>Email</option><option>Telefone</option><option>Aleatória</option>
            </select>
          </div>
          <div class="field"><label>Chave PIX</label><input id="pix_chave"></div>
        </div>
      </div>
      <div class="tab-panel" id="tab-funcional">
        <p class="section-title"><i class="fa fa-briefcase"></i> Dados Funcionais</p>
        <div class="grid">
          <div class="field">
            <label>Cargo</label>
            <select id="cargo">
              <option value="">Selecione</option>
              <option>Terapeuta Feminina</option><option>Terapeuta Masculino</option>
              <option>Gerente</option><option>Atendente</option>
              <option>Recepcionista</option><option>Faxineira</option><option>Analista</option>
            </select>
          </div>
          <div class="field">
            <label>Status</label>
            <select id="status" onchange="aoMudarStatus(this)">
              <option value="">Selecione</option><option>Ativo</option><option>Inativo</option>
            </select>
          </div>
          <div class="field" id="campo_data_inativacao" style="display:none">
            <label>Data de Inativação</label><input type="date" id="data_inativacao">
          </div>
          <div class="field"><label>Data de Início no Hara</label><input type="date" id="data_inicio"></div>
          <div class="field"><label>Hora de Entrada</label><input type="time" id="hora_entrada" value="09:00"></div>
          <div class="field"><label>Hora de Saída</label><input type="time" id="hora_saida" value="18:00"></div>
          <div class="field" id="campo_role" style="display:none">
            <label style="display:flex;align-items:center;gap:6px">
              Perfil de Acesso
              <span style="font-size:10px;background:#fee2e2;color:#991b1b;border-radius:4px;padding:1px 6px;font-weight:700">
                <i class="fa fa-lock"></i> Só Admin
              </span>
            </label>
            <select id="role_usuario">
              <option value="usuario">Usuário</option>
              <option value="apoio">Apoio</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="field">
            <label>Tem folga semanal?</label>
            <select id="tem_folga"><option value="">Selecione</option><option>Sim</option><option>Não</option></select>
          </div>
          <div class="field">
            <label>Dia da Folga</label>
            <select id="dia_folga">
              <option value="">Selecione</option>
              <option>Segunda</option><option>Terça</option><option>Quarta</option>
              <option>Quinta</option><option>Sexta</option><option>Sábado</option>
            </select>
          </div>
          <div class="field">
            <label>Senha de Acesso</label>
            <div style="position:relative">
              <input type="text" id="senha_acesso" autocomplete="new-password"
                placeholder="Deixe em branco para manter"
                style="width:100%;box-sizing:border-box;padding-right:36px">
              <button type="button" onclick="toggleSenhaEquipe(this)"
                style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:14px;padding:0">
                <i class="fa fa-eye-slash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="tab-panel" id="tab-docs">
        <p class="section-title"><i class="fa fa-file-alt"></i> Documentos Anexados</p>
        <div class="doc-upload-box">
          <div class="doc-upload-row">
            <div class="field">
              <label>Tipo</label>
              <select id="doc_tipo">
                <option>RG</option><option>CPF</option><option>Comprovante de Residência</option>
                <option>Contrato</option><option>Certidão de Nascimento</option>
                <option>Diploma / Certificado</option><option>Outro</option>
              </select>
            </div>
            <div class="field" style="flex:2"><label>Arquivo</label><input type="file" id="doc_arquivo" accept="image/*,.pdf,.doc,.docx"></div>
            <button class="btn-upload" onclick="uploadDoc()"><i class="fa fa-upload"></i> Enviar</button>
          </div>
          <div class="upload-status" id="uploadStatus"><i class="fa fa-spinner fa-spin"></i> Enviando...</div>
        </div>
        <div id="docLista" class="doc-list"><div class="doc-empty">Nenhum documento anexado.</div></div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
    <button class="btn-save" onclick="salvar()"><i class="fa fa-save"></i> Salvar</button>
  </div>
</div>
</div>

<script>
let cpfAtual = null;
let cpfEdicaoHabilitada = false;

const campos = [
  "nome_completo","nome_profissional","cpf","rg","nascimento","email",
  "tipo_sanguineo","telefone","telefone_emergencia","cep","rua","numero",
  "complemento","bairro","cidade","uf","pix_tipo","pix_chave",
  "cargo","tem_folga","dia_folga","hora_entrada","hora_saida","data_inicio","status","data_inativacao"
];

function mascara(id, fn){
  const el = document.getElementById(id); if(!el) return;
  el.addEventListener('input', function(){
    const pos = this.selectionStart, prev = this.value;
    this.value = fn(this.value);
    if(this.value.length === prev.length) this.setSelectionRange(pos, pos);
  });
}
function fmtCPF(v){ v=v.replace(/\D/g,'').substring(0,11); if(v.length<=3)return v; if(v.length<=6)return v.slice(0,3)+'.'+v.slice(3); if(v.length<=9)return v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6); return v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9); }
function fmtRG(v){ v=v.replace(/\D/g,'').substring(0,9); if(v.length<=2)return v; if(v.length<=5)return v.slice(0,2)+'.'+v.slice(2); if(v.length<=8)return v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5); return v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5,8)+'-'+v.slice(8); }
function fmtTel(v){ v=v.replace(/\D/g,'').substring(0,11); if(v.length<=2)return v.length?'('+v:v; if(v.length<=6)return '('+v.slice(0,2)+') '+v.slice(2); if(v.length<=10)return '('+v.slice(0,2)+') '+v.slice(2,6)+'-'+v.slice(6); return '('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7); }
function fmtCEP(v){ v=v.replace(/\D/g,'').substring(0,8); if(v.length<=5)return v; return v.slice(0,5)+'-'+v.slice(5); }
function fmtCPFDisplay(v){ v=(v||"").replace(/\D/g,""); if(v.length!==11)return v; return v.slice(0,3)+"."+v.slice(3,6)+"."+v.slice(6,9)+"-"+v.slice(9); }
function limparCPF(v){ return (v||"").replace(/\D/g,""); }

function aplicarMascaras(){
  mascara('cpf',fmtCPF); mascara('rg',fmtRG); mascara('telefone',fmtTel);
  mascara('telefone_emergencia',fmtTel); mascara('cep',fmtCEP);
  const uf=document.getElementById('uf');
  if(uf) uf.addEventListener('input',function(){ this.value=this.value.replace(/[^a-zA-Z]/g,'').toUpperCase().substring(0,2); });
}

function bloquearCPF(){ document.getElementById("cpf").readOnly=true; document.getElementById("cpf_aviso").style.display="flex"; cpfEdicaoHabilitada=false; }
function habilitarEdicaoCPF(){
  if(!confirm("Alterar o CPF ira:\n- Criar novo registro\n- Migrar documentos\n- Excluir registro antigo\n\nDeseja continuar?")) return;
  const el=document.getElementById("cpf"); el.readOnly=false; el.focus(); el.select();
  document.getElementById("cpf_aviso").style.display="none"; cpfEdicaoHabilitada=true;
}
function desbloquearCPF(){ document.getElementById("cpf").readOnly=false; document.getElementById("cpf_aviso").style.display="none"; cpfEdicaoHabilitada=false; }

function mudarTab(tab, btn){
  document.querySelectorAll(".tab-panel").forEach(function(el){ el.classList.remove("active"); });
  document.querySelectorAll(".side-btn").forEach(function(el){ el.classList.remove("active"); });
  document.getElementById("tab-"+tab).classList.add("active");
  btn.classList.add("active"); abaAtiva=tab; atualizarProgresso();
}

function getPayload(){
  const obj={};
  campos.forEach(function(c){ const el=document.getElementById(c); if(el&&el.value!=="")obj[c]=el.value; });
  return obj;
}

function setForm(data){
  campos.forEach(function(c){ const el=document.getElementById(c); if(!el)return; el.value=(c==="hora_entrada"||c==="hora_saida")?(data[c]?data[c].substring(0,5):""):(data[c]||""); });
  const campo=document.getElementById("campo_data_inativacao"); if(campo) campo.style.display=data.status==="Inativo"?"":"none";
  ['cpf','rg','telefone','telefone_emergencia','cep'].forEach(function(id){ const el=document.getElementById(id); if(el&&el.value) el.dispatchEvent(new Event('input')); });
}

function toggleSenhaEquipe(btn){
  const el = document.getElementById("senha_acesso");
  const ocultar = el.type === "text";
  el.type = ocultar ? "password" : "text";
  btn.querySelector("i").className = ocultar ? "fa fa-eye" : "fa fa-eye-slash";
}

async function salvarSenhaBackend(cpfV, senhaV, emailV){
  // Buscar email do perfil se não veio
  var emailBusca = emailV ? emailV.trim().toLowerCase() : "";
  if(!emailBusca){
    var rp = await client.from("perfis").select("email").eq("cpf_terapeuta", cpfV).limit(1);
    if(rp.data && rp.data.length > 0) emailBusca = rp.data[0].email || "";
  }
  if(!emailBusca){
    alert("Email não encontrado para este profissional.");
    return;
  }

  var res = await client.functions.invoke("manage-auth", {
    body: { acao: "atualizar_senha", email: emailBusca, password: senhaV }
  });

  if(res.error){
    alert("Erro: " + (res.error.message || JSON.stringify(res.error)));
    return;
  }
  if(res.data && res.data.error){
    alert("Erro: " + res.data.error);
    return;
  }
  alert("Senha atualizada! O profissional já pode logar com a nova senha.");
}

async function carregar(){
  if(!window.usuarioLogado){ setTimeout(carregar,100); return; }
  const u=window.usuarioLogado;
  const podeNovo=u&&(u.role==="admin"||u.role==="apoio");
  const btnNovo=document.getElementById("btnNovoCadastro");
  if(btnNovo) btnNovo.style.display=podeNovo?"":"none";
  const statusFiltro=document.getElementById("filtroStatus").value;
  let query=client.from("terapeutas").select("cpf,nome_profissional,status,cargo").order("nome_profissional");
  if(statusFiltro) query=query.eq("status",statusFiltro);
  if(u&&u.role==="usuario"&&u.cpf) query=query.eq("cpf",u.cpf);
  const res=await query;
  if(res.error){ console.error(res.error); return; }
  const tbody=document.getElementById("lista"); tbody.innerHTML="";
  res.data.forEach(function(t){
    const podeExcluir=u&&(u.role==="admin"||u.role==="apoio");
    const acoes=podeExcluir?'<button onclick="editar(\''+t.cpf+'\')">Editar</button><button class="excluir" onclick="excluir(\''+t.cpf+'\')">Excluir</button>':`<button onclick="editar('${t.cpf}')">Ver / Editar</button>`;
    tbody.innerHTML+='<tr><td>'+(t.nome_profissional||"")+'</td><td>'+(t.cargo||"")+'</td><td>'+fmtCPFDisplay(t.cpf)+'</td><td>'+(t.status||"")+'</td><td>'+acoes+'</td></tr>';
  });
  filtrarTabela();
}

function filtrarTabela(){
  const filtro=document.getElementById("pesquisaNome").value.toLowerCase();
  document.querySelectorAll("#lista tr").forEach(function(linha){ linha.style.display=linha.children[0].innerText.toLowerCase().includes(filtro)?"":"none"; });
}

function resetModal(){
  campos.forEach(function(c){ const el=document.getElementById(c); if(el) el.value=""; });
  document.getElementById("hora_entrada").value="09:00";
  document.getElementById("hora_saida").value="18:00";
  const elSenha=document.getElementById("senha_acesso");
  if(elSenha){ elSenha.value=""; elSenha.type="text"; const btnOlho=elSenha.parentNode.querySelector("button"); if(btnOlho) btnOlho.querySelector("i").className="fa fa-eye-slash"; }
  const campoRole=document.getElementById("campo_role");
  const roleEl=document.getElementById("role_usuario");
  const isAdmin=window.usuarioLogado && window.usuarioLogado.role==="admin";
  if(campoRole) campoRole.style.display=isAdmin?"":"none";
  if(roleEl){ roleEl.disabled=!isAdmin; }
  mudarTab("pessoais",document.querySelector(".side-btn"));
}

function abrirNovo(){
  cpfAtual=null; cpfEdicaoHabilitada=false; resetModal(); desbloquearCPF();
  const isAdm = window.usuarioLogado && window.usuarioLogado.role === "admin";
  document.getElementById("campo_role").style.display = isAdm ? "" : "none";
  document.getElementById("role_usuario").disabled = !isAdm;
  document.getElementById("role_usuario").value = "usuario";
  document.getElementById("modalTitulo").textContent="Novo Cadastro";
  document.getElementById("tabDocsBtn").style.display="none";
  document.getElementById("progressWrap").style.display="inline-flex";
  abaAtiva="pessoais"; atualizarProgresso();
  document.getElementById("modal").style.display="flex";
}

async function editar(cpf){
  cpfAtual=cpf; cpfEdicaoHabilitada=false;
  const res=await client.from("terapeutas").select("*").eq("cpf",cpf).single();
  if(res.error){ console.error(res.error); return; }
  const data=res.data;
  resetModal(); setForm(data); bloquearCPF();
  document.getElementById("modalTitulo").textContent=data.nome_profissional||"Editar Cadastro";
  document.getElementById("tabDocsBtn").style.display="";
  document.getElementById("progressWrap").style.display="inline-flex";
  abaAtiva="pessoais"; setTimeout(atualizarProgresso,50); carregarDocs(cpf);
  const u=window.usuarioLogado;

  // Busca perfil sempre — para preencher role E senha
  (async function(){
    let perfil=null;

    // 1. tenta por cpf_terapeuta
    const rp1=await client.from("perfis").select("email,role,senha_plain,cpf_terapeuta").eq("cpf_terapeuta",cpf).limit(1);
    console.log("[PERFIL] busca cpf_terapeuta="+cpf+":", rp1.data, rp1.error);
    if(rp1.data&&rp1.data.length>0){
      perfil=rp1.data[0];
    }

    // 2. tenta por email
    if(!perfil&&data.email){
      const rp2=await client.from("perfis").select("email,role,senha_plain,cpf_terapeuta").eq("email",data.email.toLowerCase()).limit(1);
      console.log("[PERFIL] busca email="+data.email+":", rp2.data, rp2.error);
      if(rp2.data&&rp2.data.length>0) perfil=rp2.data[0];
    }

    // 3. tenta buscar TODOS os perfis e filtrar (caso cpf_terapeuta seja int e cpf seja string)
    if(!perfil){
      const rp3=await client.from("perfis").select("email,role,senha_plain,cpf_terapeuta").ilike("email", data.email||"").limit(5);
      console.log("[PERFIL] busca ilike email:", rp3.data, rp3.error);
      if(rp3.data&&rp3.data.length>0) perfil=rp3.data[0];
    }

    console.log("[PERFIL] resultado final:", perfil);

    // Role (só admin vê o campo)
    if(u&&u.role==="admin"){
      document.getElementById("campo_role").style.display="";
      document.getElementById("role_usuario").disabled=false;
      const elRole=document.getElementById("role_usuario");
      if(elRole) elRole.value=perfil?(perfil.role||"usuario"):"usuario";
    }

    // Senha — sempre preenche se existir
    const elSenha=document.getElementById("senha_acesso");
    if(elSenha){
      elSenha.value = (perfil&&perfil.senha_plain) ? perfil.senha_plain : "";
      const btnOlho=elSenha.parentNode.querySelector("button");
      if(btnOlho) btnOlho.querySelector("i").className="fa fa-eye-slash";
    }
  })();

  document.getElementById("modal").style.display="flex";
}

function fecharModal(){ document.getElementById("modal").style.display="none"; }

async function salvar(){
  const u=window.usuarioLogado;
  const payload=getPayload();
  if(!payload.nome_completo||!payload.nome_profissional||!payload.email){ alert("Preencha os campos obrigatorios: Nome Completo, Nome Profissional e Email."); return; }

  let cpfParaVincular = cpfAtual;

  if(!cpfAtual){
    if(!payload.cpf){ alert("CPF e obrigatorio."); return; }
    const cpfNovo=limparCPF(payload.cpf);
    const re=await client.from("terapeutas").select("cpf").eq("cpf",cpfNovo).limit(1);
    if(re.data&&re.data.length>0){ alert("CPF ja cadastrado."); return; }
    const ri=await client.from("terapeutas").insert(Object.assign({},payload,{cpf:cpfNovo}));
    if(ri.error){ alert("Erro ao salvar: "+ri.error.message); return; }
    cpfAtual=cpfNovo; cpfParaVincular=cpfNovo;
    document.getElementById("tabDocsBtn").style.display=""; carregarDocs(cpfAtual);

    // Criar login no Auth se email e senha informados
    var senhaEl2=document.getElementById("senha_acesso");
    var senha2=senhaEl2?senhaEl2.value.trim():"";
    if(payload.email && senha2){
      var rc=await client.functions.invoke("manage-auth",{
        body:{ acao:"criar", email:payload.email.trim().toLowerCase(), password:senha2, nome:payload.nome_completo||payload.nome_profissional||"", cpf:cpfNovo }
      });
      if(rc.data && rc.data.error){
        alert("Cadastro salvo, mas erro ao criar login: " + rc.data.error);
      } else if(!rc.error){
        if(senhaEl2) senhaEl2.value = senha2; // mantém visível
      }
    }
  } else if(cpfEdicaoHabilitada&&limparCPF(payload.cpf)!==limparCPF(cpfAtual)){
    const cpfAntigo=limparCPF(cpfAtual); const cpfNovo=limparCPF(payload.cpf);
    if(!cpfNovo||cpfNovo.length!==11){ alert("CPF invalido."); return; }
    const re=await client.from("terapeutas").select("cpf").eq("cpf",cpfNovo).limit(1);
    if(re.data&&re.data.length>0){ alert("CPF ja pertence a outro cadastro."); return; }
    const rd=await client.from("terapeutas").select("*").eq("cpf",cpfAntigo).single();
    const novoRegistro=Object.assign({},rd.data,payload,{cpf:cpfNovo}); delete novoRegistro.created_at;
    const ri=await client.from("terapeutas").insert(novoRegistro);
    if(ri.error){ alert("Erro ao criar registro: "+ri.error.message); return; }
    await client.from("documentos").update({equipe_id:cpfNovo}).eq("equipe_id",cpfAntigo);
    await client.from("solicitacoes").update({terapeuta_cpf:cpfNovo}).eq("terapeuta_cpf",cpfAntigo);
    await client.from("perfis").update({cpf_terapeuta:cpfNovo}).eq("cpf_terapeuta",cpfAntigo);
    const rdel=await client.from("terapeutas").delete().eq("cpf",cpfAntigo);
    if(rdel.error){ alert("Erro ao remover registro antigo: "+rdel.error.message); return; }
    cpfAtual=cpfNovo; cpfParaVincular=cpfNovo; cpfEdicaoHabilitada=false; bloquearCPF();
    document.getElementById("cpf").value=fmtCPF(cpfNovo);
  } else {
    if(u&&u.role==="usuario"&&u.cpf&&u.cpf!==cpfAtual){ alert("Sem permissao."); return; }
    const updatePayload=Object.assign({},payload); delete updatePayload.cpf;
    const ru=await client.from("terapeutas").update(updatePayload).eq("cpf",cpfAtual);
    if(ru.error){ alert("Erro ao salvar: "+ru.error.message); return; }
  }

  // Role
  const isAdminU=u&&u.role==="admin";
  const roleEl=document.getElementById("role_usuario");
  const roleManual=isAdminU&&roleEl&&!roleEl.disabled?roleEl.value:null;
  const cargo=payload.cargo||""; let roleAutomatico=null;
  if(cargo==="Terapeuta Feminina"||cargo==="Terapeuta Masculino") roleAutomatico="usuario";
  else if(cargo==="Recepcionista") roleAutomatico="apoio";
  const novoRole=roleManual||roleAutomatico;
  if(cpfParaVincular&&novoRole){
    let perfilId=null;
    const rp1=await client.from("perfis").select("id,role,cpf_terapeuta").eq("cpf_terapeuta",cpfParaVincular).limit(1);
    if(rp1.data&&rp1.data.length>0) perfilId=rp1.data[0].id;
    if(!perfilId&&payload.email){
      const rp2=await client.from("perfis").select("id,role,email").eq("email",payload.email.trim().toLowerCase()).limit(1);
      if(rp2.data&&rp2.data.length>0) perfilId=rp2.data[0].id;
    }
    if(perfilId){
      await client.from("perfis").update({cpf_terapeuta:cpfParaVincular,role:novoRole}).eq("id",perfilId);
    }
  }

  // Senha
  const senhaEl=document.getElementById("senha_acesso");
  const senha=senhaEl?senhaEl.value.trim():"";
  if(senha){
    if(senha.length<6){ alert("Senha deve ter pelo menos 6 caracteres."); return; }
    await salvarSenhaBackend(cpfParaVincular, senha, payload.email);
  }

  carregar(); fecharModal();
}

async function excluir(cpf){
  if(!confirm("Excluir este registro e todos os documentos vinculados?")) return;
  const rd=await client.from("documentos").select("id,url").eq("equipe_id",cpf);
  if(rd.data&&rd.data.length>0){
    const paths=rd.data.map(function(d){ return d.url.split("/storage/v1/object/public/documentos/")[1]; }).filter(Boolean).map(decodeURIComponent);
    if(paths.length>0) await client.storage.from("documentos").remove(paths);
    await client.from("documentos").delete().eq("equipe_id",cpf);
  }
  await client.from("solicitacoes").delete().eq("terapeuta_cpf",cpf);
  const re=await client.from("terapeutas").delete().eq("cpf",cpf);
  if(re.error){ alert("Erro ao excluir: "+re.error.message); return; }
  carregar();
}

function limparNome(nome){ return nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9.\-_]/g,"_"); }
function iconeDoc(nome){ const ext=(nome||"").split(".").pop().toLowerCase(); if(["jpg","jpeg","png","gif","webp"].includes(ext))return "fa-image"; if(ext==="pdf")return "fa-file-pdf"; if(["doc","docx"].includes(ext))return "fa-file-word"; return "fa-file-alt"; }

async function carregarDocs(cpf){
  const res=await client.from("documentos").select("*").eq("equipe_id",cpf).order("created_at",{ascending:false});
  const lista=document.getElementById("docLista"); const badge=document.getElementById("docBadge");
  if(res.error||!res.data||res.data.length===0){ lista.innerHTML='<div class="doc-empty">Nenhum documento anexado.</div>'; badge.style.display="none"; return; }
  badge.textContent=res.data.length; badge.style.display="";
  lista.innerHTML = res.data.map(function(d){
    var ext = (d.nome_arquivo||'').split('.').pop().toLowerCase();
    var ico = ['jpg','jpeg','png','gif','webp'].includes(ext)?'fa-image':ext==='pdf'?'fa-file-pdf':['doc','docx'].includes(ext)?'fa-file-word':'fa-file-alt';
    return '<div class="doc-item"><div class="doc-item-left">'
      +'<div class="doc-icon"><i class="fa '+ico+'"></i></div>'
      +'<div><div class="doc-name">'+d.nome_arquivo+'</div>'
      +'<div class="doc-tipo">'+d.tipo+'</div></div></div>'
      +'<div class="doc-item-right">'
      +'<a href="'+d.url+'" target="_blank"><i class="fa fa-external-link-alt"></i> Abrir</a>'
      +'<button class="btn-del" onclick="excluirDoc(this.dataset.id,this.dataset.url)" data-id="'+d.id+'" data-url="'+d.url+'"><i class="fa fa-trash"></i></button>'
      +'</div></div>';
  }).join('');
}

async function uploadDoc(){
  if(!cpfAtual){ alert("Salve o cadastro antes de anexar documentos."); return; }
  const tipo=document.getElementById("doc_tipo").value; const file=document.getElementById("doc_arquivo").files[0];
  if(!file){ alert("Selecione um arquivo."); return; }
  const statusEl=document.getElementById("uploadStatus"); statusEl.style.display="block";
  const fileName=cpfAtual+"/"+Date.now()+"_"+limparNome(file.name);
  const ru=await client.storage.from("documentos").upload(fileName,file);
  if(ru.error){ statusEl.style.display="none"; alert("Erro no upload: "+ru.error.message); return; }
  const urlData=client.storage.from("documentos").getPublicUrl(fileName);
  const ri=await client.from("documentos").insert({equipe_id:cpfAtual,tipo:tipo,nome_arquivo:file.name,url:urlData.data.publicUrl});
  statusEl.style.display="none";
  if(ri.error){ alert("Erro ao salvar: "+ri.error.message); return; }
  document.getElementById("doc_arquivo").value=""; carregarDocs(cpfAtual);
}

async function excluirDoc(btn,id,url){
  if(!confirm("Excluir este documento?")) return;
  const _id = id || btn.dataset.id;
  const _url = url || btn.dataset.url;
  const path=_url.split("/storage/v1/object/public/documentos/")[1];
  if(path) await client.storage.from("documentos").remove([decodeURIComponent(path)]);
  await client.from("documentos").delete().eq("id",_id); carregarDocs(cpfAtual);
}

function aoMudarStatus(select){
  const campo=document.getElementById("campo_data_inativacao"); const input=document.getElementById("data_inativacao");
  if(select.value==="Inativo"){ campo.style.display=""; if(!input.value) input.value=new Date().toISOString().split("T")[0]; }
  else { campo.style.display="none"; input.value=""; }
}

const CAMPOS_POR_ABA={
  pessoais:[{id:"nome_completo",label:"Nome Completo"},{id:"nome_profissional",label:"Nome Profissional"},{id:"cpf",label:"CPF"},{id:"email",label:"Email"}],
  contatos:[{id:"telefone",label:"Telefone"}],
  endereco:[{id:"cep",label:"CEP"},{id:"rua",label:"Rua"},{id:"cidade",label:"Cidade"},{id:"uf",label:"UF"}],
  pagamento:[{id:"pix_tipo",label:"Tipo PIX"},{id:"pix_chave",label:"Chave PIX"}],
  funcional:[{id:"cargo",label:"Cargo"},{id:"status",label:"Status"},{id:"data_inicio",label:"Data de Inicio"}],
  docs:[],
};
const TODOS_CAMPOS=Object.values(CAMPOS_POR_ABA).flat();
let abaAtiva="pessoais";

function atualizarProgresso(){
  const wrap=document.getElementById("progressWrap"); if(!wrap||wrap.style.display==="none") return;
  const total=TODOS_CAMPOS.length;
  const feitos=TODOS_CAMPOS.filter(function(c){ const el=document.getElementById(c.id); return el&&el.value&&el.value.trim()!==""; });
  const pct=total>0?Math.round((feitos.length/total)*100):0;
  const circum=113; const offset=circum-(circum*pct/100);
  const cor=pct===100?"#22c55e":pct>=50?"#f59e0b":"#ef4444";
  document.getElementById("progressPct").textContent=pct+"%"; document.getElementById("progressPct").style.color=cor;
  const fill=document.getElementById("progressFill"); fill.style.strokeDashoffset=offset; fill.style.stroke=cor;
  const camposAba=CAMPOS_POR_ABA[abaAtiva]||[]; const feitosIds=feitos.map(function(c){ return c.id; });
  const tooltip=document.getElementById("progressTooltip");
  if(camposAba.length===0){ tooltip.innerHTML="<div style='color:#e5e7eb;font-size:12px'>Nenhum campo nesta aba.</div>"; }
  else {
    const abaFeitos=camposAba.filter(function(c){ return feitosIds.includes(c.id); });
    const abaPct=Math.round((abaFeitos.length/camposAba.length)*100);
    tooltip.innerHTML="<div style='font-weight:700;margin-bottom:6px;color:#e5e7eb'>Esta aba: "+abaPct+"% · Geral: "+pct+"%</div>"
      +camposAba.map(function(c){ const ok=feitosIds.includes(c.id); return "<div class='tooltip-item "+(ok?"done":"missing")+"'><i class='fa "+(ok?"fa-check-circle":"fa-times-circle")+"'></i> "+c.label+"</div>"; }).join("")
      +"<div style='border-top:1px solid #374151;margin-top:8px;padding-top:8px;color:#9ca3af;font-size:11px'>Passe para outras abas para ver os campos delas.</div>";
  }
}

document.addEventListener('DOMContentLoaded',function(){
  aplicarMascaras();
  TODOS_CAMPOS.forEach(function(c){ const el=document.getElementById(c.id); if(el){ el.addEventListener("input",atualizarProgresso); el.addEventListener("change",atualizarProgresso); } });
  document.getElementById("filtroStatus").addEventListener("change",carregar);
  carregar();
});
</script>
