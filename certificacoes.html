<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

h1{margin-top:0}

.servico{
display:flex;
align-items:center;
gap:8px;
}

.servico i{
margin-left:6px;
color:#6366f1;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

button.excluir{background:#dc2626}
button.editar{background:#f59e0b}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:420px;
}
</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<input id="buscaTerapeuta" placeholder="Buscar terapeuta..." oninput="filtrarTabela()">

<button onclick="exportarExcel()">Exportar Excel</button>

<table>
<thead>
<tr>
<th>Terapeuta</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>

</div>

<!-- MODAL -->
<div id="modalCerts" class="modal">
<div class="modal-box">
<h3 id="tituloModal"></h3>
<div id="listaCerts"></div>
<br>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let listaFiltrada=[]

function iconeCertificacao(nome){
if(!nome) return "fa-certificate"
nome = nome.toLowerCase()

if(nome.includes("massagem feminina")) return "fa-person-dress"
if(nome.includes("massagem casais")) return "fa-user-group"
if(nome.includes("massagem nuru")) return "fa-droplet"
if(nome.includes("massagem vivência")) return "fa-spa"
if(nome.includes("podologia") || nome.includes("podolatria")) return "fa-shoe-prints"

return "fa-certificate"
}

async function carregarLista(){

const {data,error}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
data_obtencao,
certificacoes(nome),
terapeutas(nome_profissional)
`)

if(error){
console.error(error)
return
}

dados = data || []
listaFiltrada = [...dados]

render(listaFiltrada)

}

function render(lista){

const agrupado={}

lista.forEach(r=>{
const nome=r.terapeutas?.nome_profissional||"Sem nome"

if(!agrupado[nome]){
agrupado[nome]={nome,certs:[]}
}

agrupado[nome].certs.push(r)
})

const tbody=document.getElementById("lista")
tbody.innerHTML=""

Object.values(agrupado).forEach(t=>{

let icones=""

t.certs.forEach(c=>{
icones+=`<i class="fa-solid ${iconeCertificacao(c.certificacoes?.nome)}"></i>`
})

tbody.innerHTML+=`
<tr>
<td>
<div class="servico">
<strong>${t.nome}</strong>
${icones}
</div>
</td>

<td>
<button class="editar" onclick="abrirModal('${t.nome}')">Editar</button>
</td>
</tr>
`
})
}

function filtrarTabela(){

const termo=document.getElementById("buscaTerapeuta").value.toLowerCase()

if(!termo){
listaFiltrada = [...dados]
render(listaFiltrada)
return
}

listaFiltrada = dados.filter(d =>
(d.terapeutas?.nome_profissional||"")
.toLowerCase()
.includes(termo)
)

render(listaFiltrada)

}

function abrirModal(nome){

const registros = dados.filter(d =>
d.terapeutas?.nome_profissional === nome
)

document.getElementById("tituloModal").innerText = nome

let html=""

registros.forEach(r=>{
html+=`
<div style="display:flex;justify-content:space-between;margin-bottom:10px">
<span>
${r.certificacoes?.nome} - ${r.data_obtencao || "Sem data"}
</span>
<div>
<button onclick="editarCert('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</div>
</div>
`
})

document.getElementById("listaCerts").innerHTML=html
document.getElementById("modalCerts").style.display="flex"
}

function fecharModal(){
document.getElementById("modalCerts").style.display="none"
}

async function editarCert(id){

const novaData = prompt("Nova data (YYYY-MM-DD):")
if(!novaData) return

await supabaseClient
.from("terapeuta_certificacoes")
.update({data_obtencao:novaData})
.eq("id",id)

carregarLista()
}

async function excluir(id){

if(!confirm("Excluir vínculo?")) return

await supabaseClient
.from("terapeuta_certificacoes")
.delete()
.eq("id",id)

carregarLista()
}

function exportarExcel(){

const exportData = dados.map(r => ({
Terapeuta: r.terapeutas?.nome_profissional,
Certificacao: r.certificacoes?.nome,
Data: r.data_obtencao
}))

const ws = XLSX.utils.json_to_sheet(exportData)
const wb = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb, ws, "Certificacoes")

XLSX.writeFile(wb, "certificacoes.xlsx")
}

carregarLista()

</script>

</body>
</html>
