<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Materiais</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
}

.container{
display:flex;
gap:40px;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
width:350px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#334155;
color:#fff;
cursor:pointer;
width:100%;
}

.lista{
background:#fff;
padding:20px;
border-radius:16px;
flex:1;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:15px;
}

.qtd{
font-weight:bold;
}
</style>
</head>

<body>

<h1>Materiais</h1>
<p>Controle simples</p>

<div class="container">

<!-- FORM -->
<div class="card">

<input id="nome" placeholder="Material">
<input id="quantidade" type="number" placeholder="Quantidade">
<input id="unidade" placeholder="Unidade (un, ml)">

<button onclick="salvar()">+ Adicionar</button>

</div>

<!-- LISTA -->
<div class="lista">
<h3>Estoque</h3>
<div id="lista"></div>
</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"SUA_ANON_KEY"
)

async function salvar(){

const nome = document.getElementById("nome").value
const quantidade = document.getElementById("quantidade").value
const unidade = document.getElementById("unidade").value

if(!nome) return alert("Digite o nome")

await supabaseClient
.from("materiais")
.insert({
nome,
quantidade,
unidade
})

document.getElementById("nome").value=""
document.getElementById("quantidade").value=""
document.getElementById("unidade").value=""

carregar()
}

async function carregar(){

const {data} = await supabaseClient
.from("materiais")
.select("*")
.order("nome")

const div = document.getElementById("lista")
div.innerHTML=""

data.forEach(m=>{

div.innerHTML+=`
<div class="item">
<span>${m.nome}</span>
<span class="qtd">${m.quantidade} ${m.unidade || ""}</span>
</div>
`
})

}

carregar()

</script>

</body>
</html>
