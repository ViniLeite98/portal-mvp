<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

/* 🔥 MODAL CORRIGIDO */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(4px);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#fff;
padding:25px;
border-radius:14px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.modal-box h3{
margin-bottom:15px;
font-size:18px;
}

.modal-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.modal-grid .full{
grid-column:span 2;
}

.modal-field{
display:flex;
flex-direction:column;
}

.modal-field label{
font-size:12px;
margin-bottom:4px;
color:#555;
}

.modal-box input,
.modal-box select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Origem</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- 🔥 MODAL -->
<div id="modalEditar" class="modal">
<div class="modal-box">

<h3>Editar Lançamento</h3>

<div class="modal-grid">

<div class="modal-field">
<label>Data</label>
<input type="date" id="editData">
</div>

<div class="modal-field">
<label>Cliente</label>
<select id="editCliente"></select>
</div>

<div class="modal-field full">
<label>Serviço</label>
<select id="editServico"></select>
</div>

<div class="modal-field">
<label>Origem</label>
<select id="editOrigem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="modal-field">
<label>Valor</label>
<input type="number" id="editValor">
</div>

<div class="modal-field">
<label>Desconto</label>
<input type="number" id="editDesconto">
</div>

<div class="modal-field full">
<label>Valor Final</label>
<input type="number" id="editFinal" disabled>
</div>

</div>

<div class="modal-actions">
<button class="excluir" onclick="fecharModal()">Cancelar</button>
<button onclick="salvarEdicao()">Salvar</button>
</div>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

function calcularEdit(){
editFinal.value = (parseFloat(editValor.value||0) - parseFloat(editDesconto.value||0))
}

editValor.addEventListener("input", calcularEdit)
editDesconto.addEventListener("input", calcularEdit)

// 🔥 SUA FUNÇÃO ORIGINAL AJUSTADA
function abrirEditar(id){

editandoId=id
const r=dados.find(d=>d.id==id)

editCliente.innerHTML="<option value=''>Selecione</option>"
dadosClientes.forEach(c=>{
const nome=c.nome||c.nome_cliente
editCliente.innerHTML+=`<option value="${c.id}">${nome}</option>`
})

editServico.innerHTML="<option value=''>Selecione</option>"
dadosServicos.forEach(s=>{
editServico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
})

editData.value=r.data
editCliente.value=r.cliente_id
editServico.value=r.servico_id
editValor.value=r.valor
editDesconto.value=r.desconto
editOrigem.value=r.origem_lead || ""

// 🔥 FIX
editFinal.value = (r.valor - r.desconto)

modalEditar.style.display="flex"
}

</script>

</body>
</html>
