<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fb;color:#111827;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:36px 40px;}

/* ── HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.page-header h1{font-size:26px;font-weight:800;color:#111827;}
.btn{border:none;border-radius:10px;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:7px;transition:all .15s;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn-dark{background:#1f2937;color:#fff;}
.btn-red{background:#dc2626;color:#fff;}
.btn-green{background:#16a34a;color:#fff;}
.btn-ghost{background:#fff;color:#374151;border:1px solid #e5e7eb;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #f3f4f6;}
.stat-card .num{font-size:28px;font-weight:800;color:#111827;line-height:1;}
.stat-card .lbl{font-size:12px;color:#6b7280;margin-top:4px;font-weight:500;}
.stat-card .icon{float:right;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:240px;max-width:360px;}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;background:#fff;transition:.2s;}
.search-wrap input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:14px;}
.toolbar select{padding:10px 14px;border:1px solid #e5e7eb;border-radius:10px;font-size:13px;background:#fff;color:#374151;cursor:pointer;}
.toolbar select:focus{outline:none;border-color:#2563eb;}

/* ── TABELA ── */
.table-wrap{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #f3f4f6;}
table{width:100%;border-collapse:collapse;}
thead th{background:#f9fafb;padding:12px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;text-align:left;border-bottom:1px solid #f3f4f6;}
tbody tr{cursor:pointer;transition:background .12s;}
tbody tr:hover td{background:#f8faff;}
tbody tr:last-child td{border-bottom:none;}
td{padding:14px 18px;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151;}

.cliente-nome{font-weight:700;color:#111827;font-size:14px;}
.cliente-email{font-size:11px;color:#9ca3af;margin-top:2px;}

.avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;color:#fff;}

.badge-visits{display:inline-flex;align-items:center;gap:4px;background:#eff6ff;color:#2563eb;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;}
.badge-valor{display:inline-flex;align-items:center;gap:4px;background:#f0fdf4;color:#16a34a;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;}
.badge-nunca{background:#f9fafb;color:#9ca3af;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;}

.acoes{display:flex;gap:6px;opacity:0;transition:.15s;}
tr:hover .acoes{opacity:1;}
.btn-icon{width:30px;height:30px;border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.15s;}
.btn-icon:hover{transform:scale(1.1);}
.btn-icon.edit{background:#eff6ff;color:#2563eb;}
.btn-icon.del{background:#fef2f2;color:#dc2626;}

.empty{text-align:center;padding:60px;color:#9ca3af;}
.empty i{font-size:40px;display:block;margin-bottom:12px;color:#e5e7eb;}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:30px 20px;overflow-y:auto;backdrop-filter:blur(4px);}
.modal.open{display:flex;}
.modal-box{background:#fff;width:680px;max-width:100%;border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.2);animation:slideUp .25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Modal header colorido */
.modal-hero{padding:28px 28px 20px;background:linear-gradient(135deg,#1f2937 0%,#374151 100%);color:#fff;position:relative;}
.modal-hero .close-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.15s;}
.modal-hero .close-btn:hover{background:rgba(255,255,255,.25);}
.hero-avatar{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin-bottom:12px;border:3px solid rgba(255,255,255,.2);}
.hero-nome{font-size:22px;font-weight:800;margin-bottom:4px;}
.hero-sub{font-size:13px;opacity:.7;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{background:rgba(255,255,255,.15);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;}

/* Modal body */
.modal-body{padding:24px 28px;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.info-item{background:#f9fafb;border-radius:10px;padding:12px 14px;}
.info-item .key{font-size:11px;color:#9ca3af;font-weight:600;margin-bottom:3px;}
.info-item .val{font-size:14px;font-weight:600;color:#111827;}

/* Stats do modal */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-box{border-radius:12px;padding:16px;text-align:center;}
.stat-box .n{font-size:24px;font-weight:800;line-height:1;}
.stat-box .l{font-size:11px;font-weight:600;margin-top:4px;opacity:.8;}
.stat-box.blue{background:#eff6ff;color:#2563eb;}
.stat-box.green{background:#f0fdf4;color:#16a34a;}
.stat-box.purple{background:#f5f3ff;color:#7c3aed;}

/* Atendimentos recentes */
.atend-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;}
.atend-item{display:flex;align-items:center;justify-content:space-between;background:#f9fafb;border-radius:10px;padding:10px 14px;}
.atend-item .data{font-size:12px;color:#6b7280;}
.atend-item .serv{font-size:13px;font-weight:600;color:#111827;}
.atend-item .val{font-size:12px;font-weight:700;color:#16a34a;}

/* Modal form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;}
.field.span2{grid-column:span 2;}
.field label{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;}
.field input,.field select{padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;font-size:13px;color:#111827;transition:.2s;}
.field input:focus,.field select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}

.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 28px;border-top:1px solid #f3f4f6;background:#f9fafb;}

/* Tabs no modal */
.modal-tabs{display:flex;gap:2px;padding:0 28px;background:#fff;border-bottom:1px solid #f3f4f6;}
.modal-tab{padding:12px 16px;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;}
.modal-tab.active{color:#2563eb;border-bottom-color:#2563eb;}
.tab-panel{display:none;padding:20px 28px;}
.tab-panel.active{display:block;}

.loading-row td{text-align:center;padding:40px;color:#9ca3af;}
.paginacao{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-top:1px solid #f3f4f6;background:#f9fafb;font-size:13px;color:#6b7280;}
.paginacao-btns{display:flex;gap:6px;}
.paginacao-btns button{padding:6px 14px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#374151;}
.paginacao-btns button:hover{background:#f3f4f6;}
.paginacao-btns button:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>
<body>
<div class="app">
<aside id="sidebar"></aside>
<main class="content">

  <div class="page-header">
    <h1>Clientes</h1>
    <button class="btn btn-dark" id="btnNovo" style="display:none" onclick="abrirNovo()">
      <i class="fa fa-plus"></i> Novo Cliente
    </button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="icon" style="background:#eff6ff;color:#2563eb"><i class="fa fa-users"></i></div>
      <div class="num" id="statTotal">—</div>
      <div class="lbl">Total de clientes</div>
    </div>
    <div class="stat-card">
      <div class="icon" style="background:#f0fdf4;color:#16a34a"><i class="fa fa-calendar-check"></i></div>
      <div class="num" id="statAtivos">—</div>
      <div class="lbl">Com atendimentos</div>
    </div>
    <div class="stat-card">
      <div class="icon" style="background:#f5f3ff;color:#7c3aed"><i class="fa fa-dollar-sign"></i></div>
      <div class="num" id="statTicket">—</div>
      <div class="lbl">Ticket médio</div>
    </div>
    <div class="stat-card">
      <div class="icon" style="background:#fef3c7;color:#d97706"><i class="fa fa-clock"></i></div>
      <div class="num" id="statSemVisita">—</div>
      <div class="lbl">Sem visita +60 dias</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <i class="fa fa-search"></i>
      <input type="text" id="busca" placeholder="Buscar por nome, telefone ou email...">
    </div>
    <select id="filtroVisita">
      <option value="">Todos</option>
      <option value="sumidos">Sumidos +60 dias</option>
    </select>
    <select id="filtroOrdem">
      <option value="nome">Ordenar por nome</option>
      <option value="visitas">Mais visitas</option>
      <option value="valor">Maior valor</option>
      <option value="recente">Última visita</option>
    </select>
    <button class="btn btn-ghost" onclick="carregar()"><i class="fa fa-rotate-right"></i> Atualizar</button>
  </div>

  <!-- Tabela -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:44px"></th>
          <th>Cliente</th>
          <th>Telefone</th>
          <th>Última Visita</th>
          <th>Atendimentos</th>
          <th>Valor Total</th>
          <th style="width:80px">Ações</th>
        </tr>
      </thead>
      <tbody id="lista">
        <tr class="loading-row"><td colspan="7"><i class="fa fa-spinner fa-spin"></i> Carregando...</td></tr>
      </tbody>
    </table>
    <div class="paginacao" id="paginacao" style="display:none">
      <span id="paginacaoInfo"></span>
      <div class="paginacao-btns">
        <button id="btnAnterior" onclick="mudarPagina(-1)"><i class="fa fa-chevron-left"></i> Anterior</button>
        <button id="btnProxima"  onclick="mudarPagina(1)">Próxima <i class="fa fa-chevron-right"></i></button>
      </div>
    </div>
  </div>

</main>
</div>

<!-- ══ MODAL DETALHE / EDITAR ══ -->
<div class="modal" id="modal">
<div class="modal-box">

  <!-- Hero -->
  <div class="modal-hero" id="modalHero">
    <button class="close-btn" onclick="fecharModal()"><i class="fa fa-times"></i></button>
    <div class="hero-avatar" id="heroAvatar"></div>
    <div class="hero-nome" id="heroNome"></div>
    <div class="hero-sub" id="heroSub"></div>
    <div class="hero-badges" id="heroBadges"></div>
  </div>

  <!-- Tabs -->
  <div class="modal-tabs">
    <div class="modal-tab active" onclick="mudarTab('perfil',this)">Perfil</div>
    <div class="modal-tab" onclick="mudarTab('historico',this)">Histórico</div>
    <div class="modal-tab" onclick="mudarTab('editar',this)">Editar</div>
  </div>

  <!-- Tab Perfil -->
  <div class="tab-panel active" id="tab-perfil">
    <div class="stat-row">
      <div class="stat-box blue">
        <div class="n" id="detVisitas">—</div>
        <div class="l">Atendimentos</div>
      </div>
      <div class="stat-box green">
        <div class="n" id="detValor">—</div>
        <div class="l">Total gasto</div>
      </div>
      <div class="stat-box purple">
        <div class="n" id="detTicket">—</div>
        <div class="l">Ticket médio</div>
      </div>
    </div>
    <p class="section-title"><i class="fa fa-id-card"></i> Dados de Contato</p>
    <div class="info-grid" id="detInfo"></div>
  </div>

  <!-- Tab Histórico -->
  <div class="tab-panel" id="tab-historico">
    <p class="section-title"><i class="fa fa-calendar-check"></i> Atendimentos Recentes</p>
    <div class="atend-list" id="detAtendimentos">
      <div style="text-align:center;color:#9ca3af;padding:20px">Carregando...</div>
    </div>
  </div>

  <!-- Tab Editar -->
  <div class="tab-panel" id="tab-editar">
    <div class="form-grid">
      <div class="field span2"><label>Nome *</label><input id="eNome"></div>
      <div class="field"><label>Telefone *</label><input id="eTel" placeholder="(11) 99999-9999"></div>
      <div class="field"><label>Email</label><input id="eEmail" type="email"></div>
      <div class="field"><label>Data de Nascimento</label><input id="eNasc" type="date"></div>
      <div class="field"><label>Telefone 2</label><input id="eTel2" placeholder="Opcional"></div>
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="fecharModal()">Fechar</button>
    <button class="btn btn-red" id="btnExcluir" onclick="excluirCliente()"><i class="fa fa-trash"></i> Excluir</button>
    <button class="btn btn-dark" id="btnSalvar" onclick="salvar()"><i class="fa fa-save"></i> Salvar</button>
  </div>

</div>
</div>

<script>
let dados = [];
let clienteAtual = null;
let paginaAtual = 0;
const POR_PAGINA = 10;
let totalFiltrado = 0;
const fmtM = v => v != null ? `R$\u00a0${Number(v).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0})}` : "—";
const fmtD = v => v ? new Date(v+"T00:00:00").toLocaleDateString("pt-BR") : "—";
const fmtTel = v => {
  const d = (v||"").replace(/\D/g,"");
  if(d.length===11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  if(d.length===10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  return v||"—";
};

const CORES = ["#2563eb","#7c3aed","#db2777","#059669","#d97706","#dc2626","#0891b2"];
function corAvatar(nome){ return CORES[(nome||"A").charCodeAt(0) % CORES.length]; }
function iniciais(nome){ return (nome||"?").split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase(); }

function diasAtras(data){
  if(!data) return null;
  const diff = (new Date() - new Date(data+"T00:00:00")) / 86400000;
  return Math.floor(diff);
}

/* ── CARREGAR ── */
async function carregar(){
  if(!window.usuarioLogado){ setTimeout(carregar,100); return; }
  const u = window.usuarioLogado;
  const isAdmin = u && (u.role==="admin"||u.role==="recepcionista");

  const btnNovo = document.getElementById("btnNovo");
  if(btnNovo) btnNovo.style.display = isAdmin ? "" : "none";

  // Buscar count total real (ignora limite de 1000)
  const {count: totalCount} = await client
    .from("clientes")
    .select("*", {count:"exact", head:true});

  const {count: ativosCount} = await client
    .from("clientes")
    .select("*", {count:"exact", head:true})
    .gt("total_atendimentos", 0);

  const {count: sumidosCount} = await client
    .from("clientes")
    .select("*", {count:"exact", head:true})
    .not("ultimo_atendimento","is",null)
    .lt("ultimo_atendimento", new Date(Date.now()-60*86400000).toISOString().split("T")[0]);

  // Buscar ticket medio via agregacao
  const {data: ticketData} = await client
    .from("clientes")
    .select("valor_total,total_atendimentos")
    .gt("total_atendimentos", 0)
    .limit(5000);
  const ticketMed = ticketData?.length
    ? ticketData.reduce((a,c)=>a+(c.valor_total||0),0) / ticketData.reduce((a,c)=>a+(c.total_atendimentos||0),0)
    : 0;

  document.getElementById("statTotal").textContent     = totalCount ?? "—";
  document.getElementById("statAtivos").textContent    = ativosCount ?? "—";
  document.getElementById("statTicket").textContent    = fmtM(ticketMed);
  document.getElementById("statSemVisita").textContent = sumidosCount ?? "—";

  // Carregar apenas primeira pagina
  paginaAtual = 0;
  await carregarPagina();
}

/* ── CARREGAR PAGINA DO SUPABASE ── */
async function carregarPagina(){
  const busca  = (document.getElementById("busca").value||"").toLowerCase();
  const filtro = document.getElementById("filtroVisita").value;
  const ordem  = document.getElementById("filtroOrdem").value;

  const inicio = paginaAtual * POR_PAGINA;
  const fim    = inicio + POR_PAGINA - 1;

  let q = client.from("clientes")
    .select("id,nome,telefone_1,telefone_2,email,dt_nasc,total_atendimentos,valor_total,ultimo_atendimento", {count:"exact"});

  // Filtros no banco
  if(busca)             q = q.or(`nome.ilike.%${busca}%,telefone_1.ilike.%${busca}%,email.ilike.%${busca}%`);
  if(filtro==="sumidos") q = q
    .not("ultimo_atendimento","is",null)
    .lt("ultimo_atendimento", new Date(Date.now()-60*86400000).toISOString().split("T")[0]);

  // Ordenacao
  if(ordem==="visitas") q = q.order("total_atendimentos",{ascending:false});
  else if(ordem==="valor")   q = q.order("valor_total",{ascending:false});
  else if(ordem==="recente") q = q.order("ultimo_atendimento",{ascending:false,nullsFirst:false});
  else                       q = q.order("nome");

  q = q.range(inicio, fim);

  const {data, count, error} = await q;
  if(error){ console.error(error); return; }

  dados = data || [];
  totalFiltrado = count || 0;
  render();
}

/* ── RENDER ── */
function render(){
  const lista = dados;

  const tbody = document.getElementById("lista");
  if(!lista.length){
    tbody.innerHTML=`<tr><td colspan="7"><div class="empty"><i class="fa fa-users"></i>Nenhum cliente encontrado</div></td></tr>`;
    return;
  }

  // Paginacao
  const paginacaoEl = document.getElementById("paginacao");
  const totalPags = Math.ceil(totalFiltrado / POR_PAGINA);
  if(totalFiltrado > POR_PAGINA){
    paginacaoEl.style.display = "flex";
    const inicio = paginaAtual * POR_PAGINA + 1;
    const fim    = Math.min((paginaAtual+1)*POR_PAGINA, totalFiltrado);
    document.getElementById("paginacaoInfo").textContent = `Exibindo ${inicio}–${fim} de ${totalFiltrado} clientes`;
    document.getElementById("btnAnterior").disabled = paginaAtual === 0;
    document.getElementById("btnProxima").disabled  = paginaAtual >= totalPags-1;
  } else {
    paginacaoEl.style.display = "none";
  }

  const hoje = new Date().toISOString().split("T")[0];
  tbody.innerHTML = lista.map(c => {
    const cor  = corAvatar(c.nome);
    const ini  = iniciais(c.nome);
    const dias = diasAtras(c.ultimo_atendimento);
    let ultimaLabel = "—";
    if(dias===0) ultimaLabel="Hoje";
    else if(dias===1) ultimaLabel="Ontem";
    else if(dias!=null) ultimaLabel=`${dias}d atrás`;

    const visitBadge = c.total_atendimentos
      ? `<span class="badge-visits"><i class="fa fa-calendar-check"></i>${c.total_atendimentos}</span>`
      : `<span class="badge-nunca">Nenhum</span>`;

    const valBadge = c.valor_total
      ? `<span class="badge-valor">${fmtM(c.valor_total)}</span>`
      : `<span class="badge-nunca">—</span>`;

    return `<tr onclick="abrirDetalhe('${c.id}')">
      <td><div class="avatar" style="background:${cor}">${ini}</div></td>
      <td>
        <div class="cliente-nome">${c.nome||"—"}</div>
        <div class="cliente-email">${c.email||""}</div>
      </td>
      <td>${fmtTel(c.telefone_1)}</td>
      <td style="color:${dias>60?'#dc2626':dias!=null?'#374151':'#9ca3af'}">${ultimaLabel}</td>
      <td>${visitBadge}</td>
      <td>${valBadge}</td>
      <td>
        <div class="acoes">
          <button class="btn-icon edit" onclick="event.stopPropagation();abrirDetalhe('${c.id}','editar')" title="Editar"><i class="fa fa-pencil"></i></button>
          <button class="btn-icon del"  onclick="event.stopPropagation();confirmarExcluir('${c.id}')" title="Excluir"><i class="fa fa-trash"></i></button>
        </div>
      </td>
    </tr>`;
  }).join("");
}

/* ── MODAL ── */
function mudarTab(tab, btn){
  document.querySelectorAll(".modal-tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");

  if(tab==="historico" && clienteAtual) carregarHistorico(clienteAtual.id);
}

async function abrirDetalhe(id, tabInicial="perfil"){
  clienteAtual = dados.find(c=>c.id===id) || null;
  if(!clienteAtual){
    const {data} = await client.from("clientes").select("*").eq("id",id).single();
    clienteAtual = data;
  }
  if(!clienteAtual) return;

  const c   = clienteAtual;
  const cor = corAvatar(c.nome);
  const ini = iniciais(c.nome);

  // Hero
  document.getElementById("heroAvatar").style.background = cor;
  document.getElementById("heroAvatar").textContent = ini;
  document.getElementById("heroNome").textContent   = c.nome||"—";
  document.getElementById("heroSub").textContent    = c.email || fmtTel(c.telefone_1) || "Sem contato";

  const dias = diasAtras(c.ultimo_atendimento);
  const badges = [];
  if(c.total_atendimentos) badges.push(`<span class="hero-badge"><i class="fa fa-calendar-check"></i>${c.total_atendimentos} atendimentos</span>`);
  if(c.valor_total)        badges.push(`<span class="hero-badge"><i class="fa fa-dollar-sign"></i>${fmtM(c.valor_total)}</span>`);
  if(dias!=null)           badges.push(`<span class="hero-badge"><i class="fa fa-clock"></i>Última visita: ${dias===0?"hoje":dias+"d atrás"}</span>`);
  document.getElementById("heroBadges").innerHTML = badges.join("");

  // Stats
  const ticket = c.total_atendimentos ? (c.valor_total||0)/c.total_atendimentos : 0;
  document.getElementById("detVisitas").textContent = c.total_atendimentos||0;
  document.getElementById("detValor").textContent   = fmtM(c.valor_total);
  document.getElementById("detTicket").textContent  = fmtM(ticket);

  // Info
  document.getElementById("detInfo").innerHTML = [
    {k:"Telefone",    v:fmtTel(c.telefone_1)},
    {k:"Email",       v:c.email||"—"},
    {k:"Nascimento",  v:fmtD(c.dt_nasc)},
    {k:"Tel. 2",      v:fmtTel(c.telefone_2)||"—"},
    {k:"Última visita",v:fmtD(c.ultimo_atendimento)},
    {k:"ID",          v:`<span style="font-size:11px;color:#9ca3af">#${c.id}</span>`},
  ].map(i=>`<div class="info-item"><div class="key">${i.k}</div><div class="val">${i.v}</div></div>`).join("");

  // Form editar
  document.getElementById("eNome").value  = c.nome||"";
  document.getElementById("eTel").value   = c.telefone_1||"";
  document.getElementById("eEmail").value = c.email||"";
  document.getElementById("eNasc").value  = c.dt_nasc||"";
  document.getElementById("eTel2").value  = c.telefone_2||"";

  // Tab inicial
  document.querySelectorAll(".modal-tab").forEach((t,i)=>{
    const tabs=["perfil","historico","editar"];
    t.classList.toggle("active", tabs[i]===tabInicial);
  });
  document.querySelectorAll(".tab-panel").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+tabInicial).classList.add("active");

  if(tabInicial==="historico") carregarHistorico(c.id);

  document.getElementById("modal").classList.add("open");
}

async function carregarHistorico(clienteId){
  const el = document.getElementById("detAtendimentos");
  el.innerHTML = `<div style="text-align:center;color:#9ca3af;padding:20px"><i class="fa fa-spinner fa-spin"></i> Carregando...</div>`;

  const {data} = await client
    .from("atendimentos")
    .select(`data, hora_inicio, status, valor_final,
      servicos(grupo, subgrupo),
      ter1:terapeutas!atendimentos_terapeuta1_cpf_fkey(nome_profissional),
      ter2:terapeutas!atendimentos_terapeuta2_cpf_fkey(nome_profissional)`)
    .eq("cliente_id", clienteId)
    .order("data",{ascending:false})
    .limit(30);

  if(!data||!data.length){
    el.innerHTML=`<div style="text-align:center;color:#9ca3af;padding:20px">Nenhum atendimento registrado.</div>`;
    return;
  }

  el.innerHTML = data.map(a=>{
    const serv = a.servicos ? [a.servicos.grupo,a.servicos.subgrupo].filter(Boolean).join(" ") : "—";
    const terapeutas = [a.ter1?.nome_profissional, a.ter2?.nome_profissional].filter(Boolean).join(" + ") || "—";
    const statusCor  = a.status==="Confirmado"?"#16a34a":a.status==="Cancelado"?"#dc2626":"#d97706";
    return `<div class="atend-item">
      <div style="flex:1">
        <div class="serv">${serv}</div>
        <div class="data">${fmtD(a.data)} · ${(a.hora_inicio||"").slice(0,5)}</div>
        <div class="data" style="margin-top:2px"><i class="fa fa-user" style="font-size:10px"></i> ${terapeutas} · <span style="color:${statusCor};font-weight:700">${a.status}</span></div>
      </div>
      <div class="val">${a.valor_final ? fmtM(a.valor_final) : "—"}</div>
    </div>`;
  }).join("");
}

function fecharModal(){
  document.getElementById("modal").classList.remove("open");
  clienteAtual = null;
}

/* ── NOVO ── */
function abrirNovo(){
  clienteAtual = {id:null};
  document.getElementById("heroAvatar").style.background="#1f2937";
  document.getElementById("heroAvatar").textContent="N";
  document.getElementById("heroNome").textContent="Novo Cliente";
  document.getElementById("heroSub").textContent="Preencha os dados ao lado";
  document.getElementById("heroBadges").innerHTML="";
  document.getElementById("detVisitas").textContent="0";
  document.getElementById("detValor").textContent="—";
  document.getElementById("detTicket").textContent="—";
  document.getElementById("detInfo").innerHTML="";
  document.getElementById("detAtendimentos").innerHTML="";
  ["eNome","eTel","eEmail","eNasc","eTel2"].forEach(id=>document.getElementById(id).value="");

  // Ir direto para aba editar
  document.querySelectorAll(".modal-tab").forEach((t,i)=>t.classList.toggle("active",i===2));
  document.querySelectorAll(".tab-panel").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-editar").classList.add("active");
  document.getElementById("btnExcluir").style.display="none";

  document.getElementById("modal").classList.add("open");
}

/* ── SALVAR ── */
async function salvar(){
  const nome = document.getElementById("eNome").value.trim();
  const tel  = document.getElementById("eTel").value.trim();
  if(!nome){ alert("Nome é obrigatório."); return; }
  if(!tel){ alert("Telefone é obrigatório."); return; }

  const payload = {
    nome,
    telefone_1: tel,
    email:          document.getElementById("eEmail").value.trim()||null,
    dt_nasc:document.getElementById("eNasc").value||null,
    telefone_2:     document.getElementById("eTel2").value.trim()||null,
  };

  let error;
  if(clienteAtual?.id){
    ({error} = await client.from("clientes").update(payload).eq("id", clienteAtual.id));
  } else {
    ({error} = await client.from("clientes").insert(payload));
  }

  if(error){ alert("Erro ao salvar: "+error.message); return; }
  fecharModal();
  carregar();
}

/* ── EXCLUIR ── */
async function confirmarExcluir(id){
  if(!confirm("Excluir este cliente?")) return;
  const {error} = await client.from("clientes").delete().eq("id",id);
  if(error){ alert("Erro: "+error.message); return; }
  carregar();
}

async function excluirCliente(){
  if(!clienteAtual?.id) return;
  if(!confirm("Excluir este cliente?")) return;
  const {error} = await client.from("clientes").delete().eq("id",clienteAtual.id);
  if(error){ alert("Erro: "+error.message); return; }
  fecharModal();
  carregar();
}

/* ── INIT ── */
function mudarPagina(delta){
  paginaAtual += delta;
  carregarPagina();
  window.scrollTo({top:0,behavior:"smooth"});
}

document.addEventListener("DOMContentLoaded",()=>{
  const resetPagina = () => { paginaAtual = 0; carregarPagina(); };
  document.getElementById("busca").addEventListener("input", resetPagina);
  document.getElementById("filtroVisita").addEventListener("change", resetPagina);
  document.getElementById("filtroOrdem").addEventListener("change", resetPagina);
  document.getElementById("modal").addEventListener("click", e=>{ if(e.target===document.getElementById("modal")) fecharModal(); });
  carregar();
});
</script>
