<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;

input,select{

font-size:13px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;

width:380px;

flex-direction:column;

/* ───────────────────────────────────────────
   SMART CLIENT SEARCH WIDGET
─────────────────────────────────────────── */
.smart-search-wrap {
  position: relative;
  min-width: 220px;
}

.smart-search-wrap input[type="text"] {
  width: 100%;
  box-sizing: border-box;
  padding: 8px 32px 8px 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 13px;
  transition: border-color .2s;
}

.smart-search-wrap input[type="text"]:focus {
  border-color: #2563eb;
  outline: none;
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
}

/* clear button */
.smart-search-wrap .ss-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: #9ca3af;
  font-size: 14px;
  padding: 0;
  display: none;
  line-height:1;
}

.smart-search-wrap .ss-clear.visible { display: block; }

/* hidden input that holds selected id */

/* dropdown */
.ss-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #fff;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  max-height: 240px;
  overflow-y: auto;
  z-index: 9999;
  display: none;
}

.ss-dropdown.open { display: block; }

.ss-option {
  padding: 9px 12px;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  border-bottom: 1px solid #f3f4f6;
  transition: background .1s;
}

.ss-option:last-child { border-bottom: none; }
.ss-option:hover, .ss-option.focused { background: #eff6ff; }

.ss-option .ss-name { font-weight: 600; color: #111827; }
.ss-option .ss-meta { font-size: 11px; color: #6b7280; }
.ss-option .ss-highlight { background: #fef9c3; border-radius: 2px; padding: 0 1px; }

.ss-empty {
  padding: 12px;
  color: #9ca3af;
  font-size: 13px;
  text-align: center;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
/* ═══════════════════════════════════════════════════
   SMART CLIENT SEARCH
   Matches queries like "gabriel 7002" against
   client name + last 4 digits of phone.
   ═══════════════════════════════════════════════════ */

/**
 * Build a searchable "key" from a client object.
 * Returns lowercase: "gabriel silva 7002"
 */
function clienteSearchKey(c) {
  const nome = (c.nome || c.nome_cliente || "").toLowerCase()
  const tel  = (c.telefone_1 || "").replace(/\D/g, "")
  return nome + " " + tel  // include full phone so "7002" or "47002" both work
}

/**
 * Score how well a client matches a query string.
 * Query tokens must ALL appear somewhere in the key.
 * Returns -1 if no match, else a score (higher = better).
 *
 * Strategy:
 *  - Split query into tokens
 *  - Each token must match (substring) in the key
 *  - Bonus if token matches start of a word (prefix match)
 */
function scoreCliente(c, queryTokens) {
  const key  = clienteSearchKey(c)
  const nome = (c.nome || c.nome_cliente || "").toLowerCase()
  let score  = 0
  for (const tok of queryTokens) {
    if (!key.includes(tok)) return -1
    if (nome.startsWith(tok))                        score += 4  // prefixo do 1 nome
    else if (new RegExp(`(^|\\s)${tok}`).test(key)) score += 2  // prefixo de palavra
    else                                             score += 1  // substring
  }
  return score
}

/**
 * Highlight matched tokens inside a display string.
 */
function highlight(str, tokens) {
  let out = str
  for (const tok of tokens) {
    const re = new RegExp(`(${tok.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi")
    out = out.replace(re, '<span class="ss-highlight">$1</span>')
  }
  return out
}

/**
 * Create a SmartSearch widget.
 *
 * @param {object} opts
 *   searchInput  – <input type="text"> element
 *   hiddenInput  – <input type="hidden"> element (holds selected id)
 *   dropdown     – .ss-dropdown div element
 *   clearBtn     – .ss-clear button element
 *   getClients   – () => array of client objects
 *   onSelect     – (clientObj|null) => void  (called on selection/clear)
 */
function createSmartSearch({ searchInput, hiddenInput, dropdown, clearBtn, getClients, onSelect }) {

  let focusedIndex = -1

  function getTokens() {
    return searchInput.value.trim().toLowerCase().split(/\s+/).filter(Boolean)
  }

  function openDropdown(results) {
    focusedIndex = -1
    dropdown.innerHTML = ""

    if (!results.length) {
      dropdown.innerHTML = '<div class="ss-empty">Nenhum cliente encontrado</div>'
      dropdown.classList.add("open")
      return
    }

    const tokens = getTokens()

    results.forEach((c, i) => {
      const nome = c.nome || c.nome_cliente || ""
      const tel  = (c.telefone_1 || "").replace(/\D/g, "")
      const last4 = tel.length >= 4 ? tel.slice(-4) : tel
      const full  = tel.length > 4  ? `(${tel.slice(0,-4)}) ${last4}` : tel

      const el = document.createElement("div")
      el.className = "ss-option"
      el.dataset.idx = i
      el.innerHTML = `
        <span class="ss-name">${highlight(nome, tokens)}</span>
        ${full ? `<span class="ss-meta"><i class="fa fa-phone" style="font-size:10px"></i> ${highlight(full, tokens)}</span>` : ""}
      `
      el.addEventListener("mousedown", (e) => {
        e.preventDefault()
        selectCliente(c)
      })
      dropdown.appendChild(el)
    })

    dropdown.classList.add("open")
  }

  function closeDropdown() {
    dropdown.classList.remove("open")
    focusedIndex = -1
  }

  function selectCliente(c) {
    const nome = c.nome || c.nome_cliente || ""
    const tel  = (c.telefone_1 || "").replace(/\D/g, "")
    const last4 = tel.length >= 4 ? tel.slice(-4) : tel
    searchInput.value = last4 ? `${nome}  ${last4}` : nome
    hiddenInput.value = c.id
    clearBtn.classList.add("visible")
    closeDropdown()
    if (onSelect) onSelect(c)
  }

  function clearSelection() {
    searchInput.value = ""
    hiddenInput.value = ""
    clearBtn.classList.remove("visible")
    closeDropdown()
    if (onSelect) onSelect(null)
  }

  // Set a value programmatically (e.g. when opening edit modal)
  function setValue(clientObj) {
    if (!clientObj) { clearSelection(); return }
    selectCliente(clientObj)
  }

  // ── Events ──
  searchInput.addEventListener("input", () => {
    const tokens = getTokens()
    clearBtn.classList.toggle("visible", searchInput.value.length > 0)
    hiddenInput.value = ""  // clear selection while typing

    if (!tokens.length) { closeDropdown(); return }

    const scored = getClients()
      .map(c => ({ c, s: scoreCliente(c, tokens) }))
      .filter(x => x.s > -1)
      .sort((a, b) => {
        // 1º critério: score maior primeiro
        if (b.s !== a.s) return b.s - a.s
        // 2º critério: empate → alfabético pelo nome
        const nA = (a.c.nome || a.c.nome_cliente || "").toLowerCase()
        const nB = (b.c.nome || b.c.nome_cliente || "").toLowerCase()
        return nA.localeCompare(nB, "pt-BR")
      })
      .slice(0, 50)
      .map(x => x.c)

    openDropdown(scored)
  })

  searchInput.addEventListener("keydown", (e) => {
    const items = dropdown.querySelectorAll(".ss-option")
    if (!dropdown.classList.contains("open") || !items.length) return

    if (e.key === "ArrowDown") {
      e.preventDefault()
      focusedIndex = Math.min(focusedIndex + 1, items.length - 1)
    } else if (e.key === "ArrowUp") {
      e.preventDefault()
      focusedIndex = Math.max(focusedIndex - 1, 0)
    } else if (e.key === "Enter" && focusedIndex >= 0) {
      e.preventDefault()
      items[focusedIndex].dispatchEvent(new Event("mousedown"))
      return
    } else if (e.key === "Escape") {
      closeDropdown(); return
    }

    items.forEach((el, i) => el.classList.toggle("focused", i === focusedIndex))
    if (focusedIndex >= 0) items[focusedIndex].scrollIntoView({ block: "nearest" })
  })

  searchInput.addEventListener("focus", () => {
    if (searchInput.value && !hiddenInput.value) {
      searchInput.dispatchEvent(new Event("input"))
    }
  })

  searchInput.addEventListener("blur", () => {
    // small delay so mousedown on option fires first
    setTimeout(closeDropdown, 150)
  })

  clearBtn.addEventListener("click", clearSelection)

  // Close when clicking outside
  document.addEventListener("click", (e) => {
    if (!searchInput.closest(".smart-search-wrap").contains(e.target)) closeDropdown()
  })

  return { setValue, clearSelection }
}

/* ═══════════════════════════════════════
   APP CODE (unchanged logic, new wiring)
   ═══════════════════════════════════════ */

function nomeCliente(c){
  if(!c) return ""
  const nome = c.nome || c.nome_cliente || ""
  let telefone = (c.telefone_1 || "").replace(/\D/g,"")
  const final = telefone.length >= 4 ? telefone.slice(-4) : ""
  return final ? `${nome} ${final}` : nome
}

function nomeServico(s){
  if(!s) return ""
  if(s.subgrupo && s.tempo) return `${s.grupo} ${s.subgrupo} ${s.tempo} minutos`
  if(s.subgrupo) return `${s.grupo} ${s.subgrupo}`
  if(s.tempo) return `${s.grupo} ${s.tempo} minutos`
  return s.grupo
}

let dados=[]
let listaAtual=[]
let dadosClientes=[]
let dadosServicos=[]
let servicosMap={}
let editandoId=null

// Smart search instances (set after DOM ready)
let ssCliente, ssFiltroCliente, ssEditCliente

function hoje(){
  const d=new Date()
  const offset=d.getTimezoneOffset()
  return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

data.value=hoje()

valor.oninput=calcular
desconto.oninput=calcular

function calcular(){
  final.value=(parseFloat(valor.value||0)-parseFloat(desconto.value||0))
}

function formatar(v){
  return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

async function carregarSelects(){

  const {data:clientes}=await client.from("clientes").select("*")
  dadosClientes=clientes||[]

  // Init smart search widgets now that we have clients
  ssCliente = createSmartSearch({
    searchInput : document.getElementById("clienteSearch"),
    hiddenInput : document.getElementById("cliente"),
    dropdown    : document.getElementById("clienteDropdown"),
    clearBtn    : document.getElementById("clienteClear"),
    getClients  : () => dadosClientes,
  })

  ssFiltroCliente = createSmartSearch({
    searchInput : document.getElementById("filtroClienteSearch"),
    hiddenInput : document.getElementById("filtroCliente"),
    dropdown    : document.getElementById("filtroClienteDropdown"),
    clearBtn    : document.getElementById("filtroClienteClear"),
    getClients  : () => dadosClientes,
  })

  ssEditCliente = createSmartSearch({
    searchInput : document.getElementById("editClienteSearch"),
    hiddenInput : document.getElementById("editCliente"),
    dropdown    : document.getElementById("editClienteDropdown"),
    clearBtn    : document.getElementById("editClienteClear"),
    getClients  : () => dadosClientes,
  })

  // Services
  const {data:servicos}=await client.from("servicos").select("*")
  dadosServicos=servicos||[]

  servico.innerHTML="<option value=''>Selecione</option>"
  filtroServico.innerHTML="<option value=''>Todos</option>"

  dadosServicos.forEach(s=>{
    servicosMap[s.id]=s
    servico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
    filtroServico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
  })

  servico.addEventListener("change",()=>{
    const s=servicosMap[servico.value]
    if(s){ valor.value=s.valor||50; calcular() }
  })
}

async function carregarLista(){
  const {data}=await client
    .from("fluxo_caixa")
    .select(`*,clientes(*),servicos(*)`)
    .order("data",{ascending:false})

  dados=data||[]
  render(dados)
}

function render(lista){
  listaAtual=lista
  const tbody=document.getElementById("lista")
  tbody.innerHTML=""

  lista.forEach(r=>{
    tbody.innerHTML+=`
    <tr>
      <td>${r.data}</td>
      <td>${nomeCliente(r.clientes)}</td>
      <td>${r.origem_lead || "-"}</td>
      <td>${nomeServico(r.servicos)}</td>
      <td>${formatar(r.valor)}</td>
      <td>${formatar(r.desconto)}</td>
      <td><strong>${formatar(r.valor_final)}</strong></td>
      <td>
        <button class="editar" onclick="abrirEditar('${r.id}')">Editar</button>
        <button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
      </td>
    </tr>`
  })
}

function abrirEditar(id){
  editandoId=id
  const r=dados.find(d=>d.id==id)

  // Populate services in edit modal
  editServico.innerHTML="<option value=''>Selecione</option>"
  dadosServicos.forEach(s=>{
    editServico.innerHTML+=`<option value="${s.id}">${nomeServico(s)}</option>`
  })

  editData.value=r.data
  editServico.value=r.servico_id
  editValor.value=r.valor
  editDesconto.value=r.desconto
  editOrigem.value=r.origem_lead || ""

  // Set smart search for client
  const clienteObj = dadosClientes.find(c => c.id == r.cliente_id)
  ssEditCliente.setValue(clienteObj || null)

  document.getElementById("modalEditar").style.display="flex"
}

function fecharModal(){
  document.getElementById("modalEditar").style.display="none"
}

async function salvar(){
  await client.from("fluxo_caixa").insert({
    data       : data.value,
    cliente_id : document.getElementById("cliente").value,
    servico_id : servico.value,
    valor      : parseFloat(valor.value||0),
    desconto   : parseFloat(desconto.value||0),
    valor_final: parseFloat(valor.value||0)-parseFloat(desconto.value||0),
    origem_lead: origem.value || null
  })
  carregarLista()
}

async function salvarEdicao(){
  await client.from("fluxo_caixa").update({
    data       : editData.value,
    cliente_id : document.getElementById("editCliente").value,
    servico_id : editServico.value,
    valor      : parseFloat(editValor.value||0),
    desconto   : parseFloat(editDesconto.value||0),
    valor_final: parseFloat(editValor.value||0)-parseFloat(editDesconto.value||0),
    origem_lead: editOrigem.value || null
  }).eq("id",editandoId)

  fecharModal()
  carregarLista()
}

async function excluir(id){
  if(!confirm("Excluir?")) return
  await client.from("fluxo_caixa").delete().eq("id",id)
  carregarLista()
}

function filtrar(){
  let lista=[...dados]
  if(filtroInicio.value) lista=lista.filter(d=>d.data>=filtroInicio.value)
  if(filtroFim.value)    lista=lista.filter(d=>d.data<=filtroFim.value)
  const fcId = document.getElementById("filtroCliente").value
  if(fcId)               lista=lista.filter(d=>d.cliente_id==fcId)
  if(filtroServico.value)lista=lista.filter(d=>d.servico_id==filtroServico.value)
  render(lista)
}

function limparFiltro(){
  filtroInicio.value=""
  filtroFim.value=""
  ssFiltroCliente.clearSelection()
  filtroServico.value=""
  render(dados)
}

function exportarExcel(){
  if(!listaAtual.length){ alert("Nada para exportar"); return }

  const exportData=listaAtual.map(r=>({
    Data    : r.data,
    Cliente : nomeCliente(r.clientes),
    Origem  : r.origem_lead,
    Servico : nomeServico(r.servicos),
    Valor   : r.valor,
    Desconto: r.desconto,
    Final   : r.valor_final
  }))

  const ws=XLSX.utils.json_to_sheet(exportData)
  const wb=XLSX.utils.book_new()
  XLSX.utils.book_append_sheet(wb,ws,"Fluxo de Caixa")
  XLSX.writeFile(wb,"fluxo_caixa.xlsx")
}

carregarSelects()
carregarLista()
calcular()
</script>

</body>
</html>
