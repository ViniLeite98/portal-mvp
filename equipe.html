<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Equipe | Hara Spa</title>

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form{
background:#fff;
padding:20px;
border-radius:10px;
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:#fff;
}

button.excluir{background:#dc2626}
button.editar{background:#f59e0b}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Equipe</h1>

<div class="form">

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">

<select id="status">
<option value="Ativo">Ativo</option>
<option value="Inativo">Inativo</option>
</select>

<button onclick="salvar()">Salvar</button>

</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

let dados = []
let editandoId = null

function get(id){
return document.getElementById(id)
}

async function carregar(){

const {data} = await client
.from("terapeutas")
.select("*")
.order("nome_profissional")

dados = data || []
render()
}

function render(){

let html = ""

dados.forEach(d=>{
html += `
<tr>
<td>${d.nome_profissional}</td>
<td>${d.telefone || ""}</td>
<td>${d.status}</td>
<td>
<button class="editar" onclick="editar('${d.id}')">Editar</button>
<button class="excluir" onclick="excluir('${d.id}')">Excluir</button>
</td>
</tr>
`
})

get("lista").innerHTML = html
}

async function salvar(){

const nomeEl = get("nome")
const telEl = get("telefone")
const statusEl = get("status")

if(!nomeEl){
alert("Campo nome não encontrado")
return
}

const nome = nomeEl.value.trim()
const telefone = telEl.value
const status = statusEl.value

if(!nome){
alert("Digite o nome")
return
}

if(editandoId){

await client
.from("terapeutas")
.update({
nome_profissional: nome,
telefone,
status
})
.eq("id", editandoId)

editandoId = null

}else{

await client
.from("terapeutas")
.insert({
nome_profissional: nome,
telefone,
status
})
}

nomeEl.value = ""
telEl.value = ""
statusEl.value = "Ativo"

carregar()
}

function editar(id){

const d = dados.find(x=>x.id==id)

get("nome").value = d.nome_profissional
get("telefone").value = d.telefone || ""
get("status").value = d.status

editandoId = id
}

async function excluir(id){

if(!confirm("Excluir?")) return

await client
.from("terapeutas")
.delete()
.eq("id", id)

carregar()
}

carregar()

</script>

</body>
</html>
