<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard | Hara Spa</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body { margin:0; font-family:'Segoe UI'; background:#f5f7fb; }
.app { display:flex; min-height:100vh; }

.content {
  flex:1;
  padding:40px;
  margin-left:260px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.card-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap:20px;
}

.card {
  background:#fff;
  border-radius:18px;
  padding:25px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  position:relative;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-3px);
}

.card h3 {
  margin:0;
  font-size:14px;
  color:#6b7280;
}

.card p {
  font-size:28px;
  margin:10px 0 0;
  font-weight:600;
}

.tooltip-box {
  position:absolute;
  bottom:110%;
  left:0;
  background:#111827;
  color:#fff;
  padding:14px;
  border-radius:12px;
  font-size:13px;
  min-width:240px;
  display:none;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
  z-index:10;
}

.clickable { cursor:pointer; }

button {
  background:#111827;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <div class="content">

    <div class="header">
      <h2>Dashboard</h2>
      <button onclick="logout()">Sair</button>
    </div>

    <div class="card-grid">

      <!-- EQUIPE -->
      <div class="card" id="cardEquipe">
        <h3>Equipe</h3>
        <p id="totalEquipe">0</p>
        <div class="tooltip-box" id="tooltipEquipe"></div>
      </div>

      <!-- SOLICITAÇÕES -->
      <div class="card">
        <h3>Solicitações Pendentes</h3>
        <p id="pendentes">0</p>
      </div>

      <!-- FORÇA DE TRABALHO -->
      <div class="card clickable" onclick="abrirForcaTrabalho()">
        <h3>Força de Trabalho por Hora</h3>
        <p>Visualizar</p>
      </div>

    </div>

  </div>
</div>

<script>
/* ========= SUPABASE GLOBAL ========= */
const supabaseClient = window.supabase.createClient(
  "https://rymehgsoarjeecuwyhny.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

/* ========= AUTH ========= */
async function checkAuth() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) window.location.href = "login.html";
}

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

/* ========= KPI EQUIPE ========= */
async function carregarEquipe() {

  const { data, error } = await supabaseClient
    .from("equipe")
    .select("cargo");

  if (error) {
    console.error(error);
    return;
  }

  const total = data.length;
  document.getElementById("totalEquipe").innerText = total;

  const agrupado = {};
  data.forEach(e => {
    agrupado[e.cargo] = (agrupado[e.cargo] || 0) + 1;
  });

  let html = "<strong>Distribuição por Cargo</strong><br><br>";

  Object.entries(agrupado).forEach(([cargo, qtd]) => {
    const perc = ((qtd / total) * 100).toFixed(1);
    html += `${cargo}: ${qtd} (${perc}%)<br>`;
  });

  document.getElementById("tooltipEquipe").innerHTML = html;
}

/* ========= KPI SOLICITAÇÕES ========= */
async function carregarSolicitacoes() {

  const { count, error } = await supabaseClient
    .from("solicitacoes")
    .select("*", { count:"exact", head:true })
    .eq("status","Pendente");

  if (error) {
    console.error(error);
    return;
  }

  document.getElementById("pendentes").innerText = count || 0;
}

/* ========= TOOLTIP ========= */
document.getElementById("cardEquipe")
  .addEventListener("mouseenter", () => {
    document.getElementById("tooltipEquipe").style.display = "block";
  });

document.getElementById("cardEquipe")
  .addEventListener("mouseleave", () => {
    document.getElementById("tooltipEquipe").style.display = "none";
  });

/* ========= REDIRECIONAMENTO ========= */
function abrirForcaTrabalho() {
  window.location.href = "forca-trabalho.html";
}

/* ========= INIT ========= */
checkAuth();
carregarEquipe();
carregarSolicitacoes();
</script>

</body>
</html>
