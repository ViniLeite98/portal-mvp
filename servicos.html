<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviços | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.left-tools input{padding:8px;border:1px solid #d1d5db;border-radius:6px;width:240px;}
.right-tools{display:flex;align-items:center;gap:10px;}
.right-tools button{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:7px 12px;cursor:pointer;}
.btn-novo{background:#1f2937;}
.right-tools select{padding:6px;border-radius:6px;border:1px solid #d1d5db;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;font-size:14px;text-align:left;}
th{background:#f9fafb;cursor:pointer;}
.btn-editar{background:#f59e0b;color:#fff;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;}
.btn-excluir{background:#dc2626;color:#fff;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;}
.pagination{margin-top:20px;display:flex;gap:8px;}
.pagination button{padding:6px 10px;border:none;border-radius:6px;background:#e5e7eb;cursor:pointer;}
.pagination button.active{background:#2563eb;color:#fff;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:10;}
.modal-content{background:#fff;width:600px;border-radius:16px;padding:24px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
input,select{padding:8px;border-radius:6px;border:1px solid #d1d5db;width:100%;}

label{
font-size:12px;
color:#6b7280;
margin-bottom:4px;
display:block;
}

.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Serviços</h1>

<div class="topbar">

<div class="left-tools">
<input id="buscaServico" placeholder="Buscar serviço..." oninput="filtrarTabela()">
</div>

<div class="right-tools">
<button onclick="exportarExcel()">
<i class="fa-solid fa-file-excel"></i> Exportar
</button>

<button class="btn-novo" onclick="abrirNovo()">
+ Novo Serviço
</button>

<span>Mostrar</span>

<select id="porPaginaSelect" onchange="mudarPorPagina()">
<option value="5">5</option>
<option value="10" selected>10</option>
<option value="20">20</option>
<option value="todos">Todos</option>
</select>

</div>
</div>

<table>
<thead>
<tr>
<th onclick="ordenar('grupo')">Serviço ⬍</th>
<th onclick="ordenar('tempo')">Tempo ⬍</th>
<th onclick="ordenar('valor')">Valor ⬍</th>
<th onclick="ordenar('comissao')">Comissão ⬍</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

<div class="pagination" id="paginacao"></div>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Cadastro Serviço</h3>

<div class="grid">

<div>
<label>Grupo</label>
<select id="grupo">
<option value="">Selecione</option>
<option>Nuru</option>
<option>Vivencia</option>
<option>Four Hands</option>
<option>Fetiche</option>
<option>Podolatria</option>
<option>Pspot</option>
<option>Voyeur</option>
<option>Experiência simultânea no Tantra</option>
<option>Mini Curso Sessão Vivência</option>
</select>
</div>

<div>
<label>Tempo</label>
<select id="tempo">
<option value="">Sem tempo</option>
<option value="30">30 minutos</option>
<option value="45">45 minutos</option>
<option value="60">60 minutos</option>
<option value="90">90 minutos</option>
<option value="120">120 minutos</option>
</select>
</div>

<div>
<label>Valor (R$)</label>
<input id="valor" type="number" step="0.01">
</div>

<div>
<label>Comissão (R$)</label>
<input id="comissao" type="number" step="0.01">
</div>

<div>
<label>Status</label>
<select id="status">
<option value="ativo">Ativo</option>
<option value="inativo">Inativo</option>
</select>
</div>

</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"SUA_ANON_KEY_AQUI"
);

let dados=[]
let listaAtual=[]
let paginaAtual=1
let porPagina=10
let idAtual=null

async function carregar(){
const {data}=await supabaseClient.from("servicos").select("*")
dados=data||[]
render()
}

function normalizar(texto){
return (texto || "")
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
}

function render(lista=dados){

listaAtual=lista

const inicio=(paginaAtual-1)*porPagina
const pag=lista.slice(inicio,inicio+porPagina)

const tbody=document.getElementById("lista")
tbody.innerHTML=""

pag.forEach(s=>{

const nomeServico = s.tempo 
  ? `${s.grupo} ${s.tempo} minutos`
  : s.grupo

tbody.innerHTML+=`
<tr>
<td>${nomeServico||""}</td>
<td>${s.tempo ? s.tempo + " minutos" : "-"}</td>
<td>R$ ${Number(s.valor||0).toFixed(2)}</td>
<td>R$ ${Number(s.comissao||0).toFixed(2)}</td>
<td>${s.status||""}</td>
<td>
<button class="btn-editar" onclick="editar('${s.id}')">Editar</button>
<button class="btn-excluir" onclick="excluir('${s.id}')">Excluir</button>
</td>
</tr>
`

})

}

window.filtrarTabela=function(){

const termo = normalizar(document.getElementById("buscaServico").value)

const filtrado = dados.filter(s => {

const nomeServico = s.tempo 
  ? `${s.grupo} ${s.tempo} minutos`
  : s.grupo

return (
normalizar(nomeServico).includes(termo) ||
normalizar(s.status).includes(termo)
)

})

paginaAtual=1
render(filtrado)

}

window.salvar=async function(){

const payload={
grupo:document.getElementById("grupo").value,
tempo:document.getElementById("tempo").value 
  ? parseInt(document.getElementById("tempo").value)
  : null,
valor:parseFloat(document.getElementById("valor").value),
comissao:parseFloat(document.getElementById("comissao").value),
status:document.getElementById("status").value
}

if(!payload.grupo){
alert("Grupo é obrigatório")
return
}

if(idAtual){
await supabaseClient.from("servicos").update(payload).eq("id",idAtual)
}else{
await supabaseClient.from("servicos").insert(payload)
}

fecharModal()
carregar()

}

window.editar=function(id){
idAtual=id
const data=dados.find(s=>s.id==id)
if(!data) return

document.getElementById("grupo").value=data.grupo||""
document.getElementById("tempo").value=data.tempo||""
document.getElementById("valor").value=data.valor||""
document.getElementById("comissao").value=data.comissao||""
document.getElementById("status").value=data.status||""

document.getElementById("modal").style.display="flex"
}

window.excluir=async function(id){
if(!confirm("Excluir serviço?"))return
await supabaseClient.from("servicos").delete().eq("id",id)
carregar()
}

window.abrirNovo=function(){
idAtual=null
document.getElementById("grupo").value=""
document.getElementById("tempo").value=""
document.getElementById("valor").value=""
document.getElementById("comissao").value=""
document.getElementById("status").value="ativo"
document.getElementById("modal").style.display="flex"
}

window.fecharModal=function(){
document.getElementById("modal").style.display="none"
}

carregar()

})

</script>

</body>
</html>
