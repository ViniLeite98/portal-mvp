<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#f5f7fb}
.app{display:flex}
#sidebar{width:260px}
.content{flex:1;padding:40px}

table{width:100%;background:#fff;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #ddd}

button{padding:6px 10px;border:none;border-radius:6px;color:#fff;cursor:pointer}
.excluir{background:#dc2626}
.anexar{background:#4b5563}
.ver{background:#059669}

.modal{position:fixed;inset:0;background:#0005;display:none;align-items:center;justify-content:center}
.modal-content{background:#fff;padding:20px;border-radius:12px;width:400px}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h2>Gestão da Equipe</h2>

<input id="pesquisaNome" placeholder="Pesquisar..." onkeyup="filtrarTabela()">

<table>
<thead>
<tr>
<th>Nome</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<input id="nome_profissional" placeholder="Nome"><br><br>
<input id="cargo" placeholder="Cargo"><br><br>
<input id="cpf"><br><br>
<select id="status">
<option>Ativo</option>
<option>Inativo</option>
</select>

<br><br>
<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<input type="file" id="inputDocumento" style="display:none">

<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let cpfAtual=null;
let cpfDocumento=null;

async function carregar(){

const {data,error}=await supabaseClient
.from("terapeutas")
.select("*");

if(error){console.error(error);return;}

const tbody=document.getElementById("lista");
tbody.innerHTML="";

data.forEach(t=>{
tbody.innerHTML+=`
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
<button class="anexar" onclick="anexarDocumento('${t.cpf}')">📎</button>
${t.documento_url ? `<button class="ver" onclick="window.open('${t.documento_url}')">👁</button>` : ""}
</td>
</tr>`;
});

}

function editar(cpf){
cpfAtual=cpf;

supabaseClient
.from("terapeutas")
.select("*")
.eq("cpf",cpf)
.single()
.then(({data,error})=>{
if(error){console.error(error);return;}

document.getElementById("nome_profissional").value=data.nome_profissional||"";
document.getElementById("cargo").value=data.cargo||"";
document.getElementById("cpf").value=data.cpf||"";
document.getElementById("status").value=data.status||"";

document.getElementById("modal").style.display="flex";
});

}

function salvar(){

const payload={
nome_profissional:document.getElementById("nome_profissional").value,
cargo:document.getElementById("cargo").value,
status:document.getElementById("status").value
};

supabaseClient
.from("terapeutas")
.update(payload)
.eq("cpf",cpfAtual)
.then(()=>{
fecharModal();
carregar();
});

}

function anexarDocumento(cpf){
cpfDocumento=cpf;
document.getElementById("inputDocumento").value="";
document.getElementById("inputDocumento").click();
}

document.getElementById("inputDocumento").addEventListener("change", async e=>{

const file=e.target.files[0];
if(!file) return;

const nome=`${cpfDocumento}_${Date.now()}_${file.name}`;

const {error}=await supabaseClient.storage
.from("documentos")
.upload(nome,file,{upsert:true});

if(error){
console.error(error);
alert("Erro upload");
return;
}

const {data}=supabaseClient.storage
.from("documentos")
.getPublicUrl(nome);

await supabaseClient
.from("terapeutas")
.update({documento_url:data.publicUrl})
.eq("cpf",cpfDocumento);

alert("Upload ok");
carregar();

});

function excluir(cpf){
if(!confirm("Excluir?"))return;

supabaseClient
.from("terapeutas")
.delete()
.eq("cpf",cpf)
.then(carregar);
}

function filtrarTabela(){
const filtro=document.getElementById("pesquisaNome").value.toLowerCase();
document.querySelectorAll("#lista tr").forEach(tr=>{
tr.style.display=tr.innerText.toLowerCase().includes(filtro)?"":"none";
});
}

function fecharModal(){
document.getElementById("modal").style.display="none";
}

carregar();

</script>

</body>
</html>
