<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<link rel="stylesheet"

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}

}

}

label{
font-size:12px;
color:#6b7280;
margin-bottom:4px;
display:block;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Serviços</h1>

<div class="topbar">
<div class="left-tools">
<input id="buscaServico" placeholder="Buscar..." oninput="filtrarTabela()">
</div>

<div class="right-tools">
<button onclick="exportarExcel()">
<i class="fa-solid fa-file-excel"></i> Exportar
</button>

<button onclick="abrirNovo()">
+ Novo Serviço
</button>
</div>
</div>

<table>
<thead>
<tr>
<th>Serviço</th>
<th>Tempo</th>
<th>Valor</th>
<th>Comissão</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Cadastro Serviço</h3>

<div class="grid">

<div>
<label>Serviço</label>
<input id="servico_nome" placeholder="Ex: Nuru Premium">
</div>

<div>
<label>Tempo (min)</label>
<select id="tempo">
<option value="">Selecione</option>
<option value="30">30</option>
<option value="60">60</option>
<option value="90">90</option>
<option value="120">120</option>
</select>
</div>

<div>
<label>Valor</label>
<input id="valor" type="number">
</div>

<div>
<label>Comissão</label>
<input id="comissao" type="number">
</div>

<div>
<label>Status</label>
<select id="status">
<option value="ativo">Ativo</option>
<option value="inativo">Inativo</option>
</select>
</div>

</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let dados=[]
let idAtual=null

async function carregar(){
const {data}=await supabaseClient.from("servicos").select("*")
dados=data||[]
render()
}

function moeda(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

function render(lista=dados){
const tbody=document.getElementById("lista")
tbody.innerHTML=""

lista.forEach(s=>{
tbody.innerHTML+=`
<tr>
<td>${s.servico_nome}</td>
<td>${s.tempo||"-"} min</td>
<td>R$ ${moeda(s.valor)}</td>
<td>R$ ${moeda(s.comissao)}</td>
<td>${s.status}</td>
<td>
<button onclick="editar('${s.id}')">Editar</button>
<button class="excluir" onclick="excluir('${s.id}')">Excluir</button>
</td>
</tr>`
})
}

window.filtrarTabela=function(){
const termo=document.getElementById("buscaServico").value.toLowerCase()
render(dados.filter(s=>s.servico_nome.toLowerCase().includes(termo)))
}

window.salvar=async function(){

const payload={
servico_nome:servico_nome.value,
tempo:tempo.value,
valor:valor.value,
comissao:comissao.value,
status:status.value
}

if(idAtual){
await supabaseClient.from("servicos").update(payload).eq("id",idAtual)
}else{
await supabaseClient.from("servicos").insert(payload)
}

fecharModal()
carregar()
}

window.editar=function(id){
const s=dados.find(x=>x.id==id)

servico_nome.value=s.servico_nome
tempo.value=s.tempo
valor.value=s.valor
comissao.value=s.comissao
status.value=s.status

idAtual=id
modal.style.display="flex"
}

window.abrirNovo=function(){
idAtual=null
document.querySelectorAll("input").forEach(i=>i.value="")
modal.style.display="flex"
}

window.fecharModal=function(){
modal.style.display="none"
}

window.excluir=async function(id){
await supabaseClient.from("servicos").delete().eq("id",id)
carregar()
}

window.exportarExcel=function(){
const ws=XLSX.utils.json_to_sheet(dados)
const wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Serviços")
XLSX.writeFile(wb,"servicos.xlsx")
}

carregar()

</script>

</body>
</html>
