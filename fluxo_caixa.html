<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;padding:20px;border-radius:10px;
display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;position:relative}

input{
padding:8px;border-radius:6px;border:1px solid #ccc;min-width:160px;
}

.autocomplete-list{
position:absolute;
top:100%;left:0;right:0;
background:#fff;border:1px solid #ddd;
max-height:200px;overflow:auto;
z-index:999;border-radius:6px;
}

.autocomplete-item{
padding:8px;cursor:pointer;
}
.autocomplete-item:hover{
background:#2563eb;color:#fff;
}

table{
width:100%;background:#fff;border-collapse:collapse;
border-radius:10px;overflow:hidden;
}
th,td{padding:10px;border-bottom:1px solid #eee;}

button{
background:#2563eb;color:#fff;border:none;
padding:10px 15px;border-radius:6px;cursor:pointer;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<input type="text" id="clienteInput" placeholder="Buscar cliente...">
<div id="clienteLista" class="autocomplete-list"></div>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

let clientes=[]
let clienteSelecionado=null
let dados=[]

function normalize(text){
  return text.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
}

// 🔥 AUTOCOMPLETE REAL
clienteInput.addEventListener("input", function(){

  const termo = normalize(this.value)
  const lista = document.getElementById("clienteLista")
  lista.innerHTML=""

  if(!termo) return

  const filtrados = clientes.filter(c=>{
    return normalize(c.nome).includes(termo)
  }).slice(0,20)

  filtrados.forEach(c=>{
    const div=document.createElement("div")
    div.className="autocomplete-item"
    div.innerText=c.nome

    div.onclick=()=>{
      clienteInput.value=c.nome
      clienteSelecionado=c.id
      lista.innerHTML=""
    }

    lista.appendChild(div)
  })

})

// carregar clientes
async function carregarClientes(){
  const {data}=await client.from("clientes").select("id,nome")
  clientes=data||[]
}

// carregar lista
async function carregarLista(){
  const {data}=await client
  .from("fluxo_caixa")
  .select("id,data,valor,clientes(nome)")
  .order("data",{ascending:false})
  .limit(100)

  dados=data||[]
  render()
}

// render rápido
function render(){
  let html=""
  dados.forEach(r=>{
    html+=`
    <tr>
      <td>${r.data}</td>
      <td>${r.clientes?.nome || ""}</td>
      <td>${r.valor}</td>
    </tr>`
  })
  lista.innerHTML=html
}

// salvar
async function salvar(){

  if(!clienteSelecionado){
    alert("Selecione um cliente")
    return
  }

  await client.from("fluxo_caixa").insert({
    data:data.value,
    cliente_id:clienteSelecionado,
    valor:parseFloat(valor.value||0)
  })

  clienteInput.value=""
  clienteSelecionado=null

  carregarLista()
}

// init
data.value=new Date().toISOString().split("T")[0]

carregarClientes()
carregarLista()

</script>

</body>
</html>
