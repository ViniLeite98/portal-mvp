<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
}

.content{
flex:1;
padding:40px;
}

h1{
margin-bottom:20px;
}

/* FORM */

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-box div{
display:flex;
flex-direction:column;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
min-width:200px;
}

/* FILTROS */

.filtros{
display:flex;
gap:10px;
margin-bottom:15px;
}

.filtros input,
.filtros select{
padding:7px;
border-radius:6px;
border:1px solid #ccc;
}

/* BOTÕES */

button{
background:#2563eb;
color:#fff;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

button.excluir{
background:#dc2626;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#f9fafb;
text-align:left;
}

tr:hover{
background:#f5f7ff;
}

/* PAGINAÇÃO */

.pagination{
margin-top:20px;
display:flex;
gap:6px;
}

.pagination button{
background:#e5e7eb;
color:#111;
}

.pagination button.active{
background:#2563eb;
color:#fff;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<div class="form-box">

<div>
<label>Terapeuta</label>
<select id="cpf_terapeuta"></select>
</div>

<div>
<label>Certificação</label>
<select id="certificacao_id"></select>
</div>

<div>
<label>Data</label>
<input type="date" id="data_obtencao">
</div>

<button onclick="vincular()">Vincular</button>

</div>

<div class="filtros">

<input id="buscaTerapeuta"
placeholder="Buscar terapeuta"
oninput="filtrar()">

<select id="filtroCertificacao"
onchange="filtrar()">

<option value="">Todas certificações</option>

</select>

</div>

<table>

<thead>
<tr>
<th>Terapeuta</th>
<th>Certificação</th>
<th>Data</th>
<th></th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<div class="pagination" id="paginacao"></div>

</main>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let pagina=1
const porPagina=10

/* ================= SELECTS ================= */

async function carregarSelects(){

const selTer=document.getElementById("cpf_terapeuta")
const selCert=document.getElementById("certificacao_id")
const filtroCert=document.getElementById("filtroCertificacao")

selTer.innerHTML="<option>Carregando...</option>"

const {data:terapeutas,error}=await supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional")
.eq("status","Ativo")
.order("nome_profissional")

if(error){

console.error(error)
selTer.innerHTML="<option>Erro ao carregar</option>"
return

}

selTer.innerHTML="<option value=''>Selecione</option>"

;(terapeutas||[]).forEach(t=>{

selTer.innerHTML+=`<option value="${t.cpf}">${t.nome_profissional}</option>`

})

const {data:cert}=await supabaseClient
.from("certificacoes")
.select("id,nome")
.order("nome")

selCert.innerHTML="<option value=''>Selecione</option>"
filtroCert.innerHTML="<option value=''>Todas certificações</option>"

;(cert||[]).forEach(c=>{

selCert.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
filtroCert.innerHTML+=`<option value="${c.id}">${c.nome}</option>`

})

}

/* ================= LISTA ================= */

async function carregarLista(){

const {data,error}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
cpf_terapeuta,
certificacao_id,
data_obtencao,
terapeutas(nome_profissional),
certificacoes(nome)
`)

if(error){

console.error(error)
return

}

dados=data||[]

render()

}

/* ================= RENDER ================= */

function render(){

const busca=document.getElementById("buscaTerapeuta").value.toLowerCase()
const filtroCert=document.getElementById("filtroCertificacao").value

let filtrado=dados.filter(r=>{

let ok=true

if(busca)
ok=r.terapeutas?.nome_profissional
.toLowerCase()
.includes(busca)

if(filtroCert)
ok=ok && r.certificacao_id==filtroCert

return ok

})

const inicio=(pagina-1)*porPagina
const pag=filtrado.slice(inicio,inicio+porPagina)

const tbody=document.getElementById("lista")

tbody.innerHTML=""

pag.forEach(r=>{

tbody.innerHTML+=`
<tr>

<td>${r.terapeutas?.nome_profissional||""}</td>

<td>${r.certificacoes?.nome||""}</td>

<td>${r.data_obtencao||""}</td>

<td>
<button class="excluir"
onclick="excluir('${r.id}')">
Excluir
</button>
</td>

</tr>
`

})

renderPag(filtrado.length)

}

/* ================= PAGINAÇÃO ================= */

function renderPag(total){

const paginas=Math.ceil(total/porPagina)

const div=document.getElementById("paginacao")

div.innerHTML=""

for(let i=1;i<=paginas;i++){

div.innerHTML+=`
<button
class="${i===pagina?'active':''}"
onclick="irPagina(${i})">
${i}
</button>
`

}

}

function irPagina(p){

pagina=p
render()

}

/* ================= FILTRO ================= */

function filtrar(){

pagina=1
render()

}

/* ================= VINCULAR ================= */

async function vincular(){

const cpf=document.getElementById("cpf_terapeuta").value
const cert=document.getElementById("certificacao_id").value
const data=document.getElementById("data_obtencao").value

if(!cpf||!cert){

alert("Selecione terapeuta e certificação")
return

}

/* BLOQUEAR DUPLICAÇÃO */

const existe=dados.find(d=>
d.cpf_terapeuta==cpf &&
d.certificacao_id==cert
)

if(existe){

alert("Essa certificação já está vinculada")
return

}

await supabaseClient
.from("terapeuta_certificacoes")
.insert({
cpf_terapeuta:cpf,
certificacao_id:cert,
data_obtencao:data||null
})

carregarLista()

}

/* ================= EXCLUIR ================= */

async function excluir(id){

if(!confirm("Excluir vínculo?"))return

await supabaseClient
.from("terapeuta_certificacoes")
.delete()
.eq("id",id)

carregarLista()

}

/* INIT */

carregarSelects()
carregarLista()

</script>

</body>
</html>
