<script>

document.addEventListener("DOMContentLoaded", function(){

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
);

let dados=[]
let listaAtual=[]
let paginaAtual=1
let porPagina=10
let idAtual=null

let ordem={
campo:"grupo",
asc:true
}

async function carregar(){
const {data}=await supabaseClient.from("servicos").select("*")
dados=data||[]
render()
}

function aplicarFiltros(){

const termo=document.getElementById("buscaServico").value.toLowerCase()

let filtrado=dados.filter(s=>{
const nome = `${s.grupo || ""} ${s.tempo || ""}`.toLowerCase()
return nome.includes(termo)
})

filtrado.sort((a,b)=>{
let valA=a[ordem.campo] || ""
let valB=b[ordem.campo] || ""

if(typeof valA==="string") valA=valA.toLowerCase()
if(typeof valB==="string") valB=valB.toLowerCase()

if(ordem.asc){
return valA > valB ? 1 : -1
}else{
return valA < valB ? 1 : -1
}
})

return filtrado
}

function render(){

const lista=aplicarFiltros()
listaAtual=lista

if(porPagina==="todos"){
paginaAtual=1
}

const inicio=(paginaAtual-1)*porPagina
const pag = porPagina==="todos" ? lista : lista.slice(inicio,inicio+porPagina)

const tbody=document.getElementById("lista")
tbody.innerHTML=""

pag.forEach(s=>{

const nomeServico = s.tempo 
  ? `${s.grupo} ${s.tempo} minutos`
  : s.grupo

tbody.innerHTML+=`
<tr>
<td>${nomeServico||""}</td>
<td>${s.tempo ? s.tempo + " minutos" : "-"}</td>
<td>R$ ${Number(s.valor||0).toFixed(2)}</td>
<td>R$ ${Number(s.comissao||0).toFixed(2)}</td>
<td>${s.status||""}</td>
<td>
<button class="btn-editar" onclick="editar('${s.id}')">Editar</button>
<button class="btn-excluir" onclick="excluir('${s.id}')">Excluir</button>
</td>
</tr>
`

})

renderPaginacao(lista.length)

}

function renderPaginacao(total){

const div=document.getElementById("paginacao")
div.innerHTML=""

if(porPagina==="todos") return

const totalPaginas=Math.ceil(total/porPagina)

for(let i=1;i<=totalPaginas;i++){
div.innerHTML+=`
<button class="${i===paginaAtual?'active':''}" onclick="irPagina(${i})">${i}</button>
`
}

}

window.irPagina=function(p){
paginaAtual=p
render()
}

window.filtrarTabela=function(){
paginaAtual=1
render()
}

window.ordenar=function(campo){
if(ordem.campo===campo){
ordem.asc=!ordem.asc
}else{
ordem.campo=campo
ordem.asc=true
}
render()
}

window.mudarPorPagina=function(){
const val=document.getElementById("porPaginaSelect").value
porPagina = val==="todos" ? "todos" : parseInt(val)
paginaAtual=1
render()
}

window.salvar=async function(){

const payload={
grupo:document.getElementById("grupo").value,
tempo:document.getElementById("tempo").value 
  ? parseInt(document.getElementById("tempo").value)
  : null,
valor:parseFloat(document.getElementById("valor").value),
comissao:parseFloat(document.getElementById("comissao").value),
status:document.getElementById("status").value
}

if(!payload.grupo){
alert("Grupo é obrigatório")
return
}

if(idAtual){
await supabaseClient.from("servicos").update(payload).eq("id",idAtual)
}else{
await supabaseClient.from("servicos").insert(payload)
}

fecharModal()
carregar()

}

window.editar=function(id){
idAtual=id
const data=dados.find(s=>s.id==id)
if(!data) return

document.getElementById("grupo").value=data.grupo||""
document.getElementById("tempo").value=data.tempo||""
document.getElementById("valor").value=data.valor||""
document.getElementById("comissao").value=data.comissao||""
document.getElementById("status").value=data.status||""

document.getElementById("modal").style.display="flex"
}

window.excluir=async function(id){
if(!confirm("Excluir serviço?"))return
await supabaseClient.from("servicos").delete().eq("id",id)
carregar()
}

window.abrirNovo=function(){
idAtual=null
document.getElementById("grupo").value=""
document.getElementById("tempo").value=""
document.getElementById("valor").value=""
document.getElementById("comissao").value=""
document.getElementById("status").value="ativo"
document.getElementById("modal").style.display="flex"
}

window.fecharModal=function(){
document.getElementById("modal").style.display="none"
}

carregar()

})

</script>
