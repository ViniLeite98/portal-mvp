<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

h1{margin-top:0}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#f9fafb;
text-align:left;
}

.servico{
display:flex;
align-items:center;
gap:8px;
}

.servico i{
color:#6366f1;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.editar{
background:#f59e0b;
color:white;
}

.excluir{
background:#dc2626;
color:white;
}

.pagination{
margin-top:20px;
display:flex;
gap:6px;
}

.pagination button{
background:#e5e7eb;
}

.pagination button.active{
background:#2563eb;
color:white;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<table>

<thead>
<tr>
<th>Terapeuta</th>
<th>Certificação</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<div class="pagination" id="paginacao"></div>

</main>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let pagina=1
let porPagina=10
let listaAtual=[]

/* ICONES */

function iconeCertificacao(nome){

if(!nome) return "fa-certificate"

nome=nome.toLowerCase()

if(nome.includes("aroma")) return "fa-leaf"
if(nome.includes("reflex")) return "fa-footprints"
if(nome.includes("drenagem")) return "fa-water"
if(nome.includes("shiatsu")) return "fa-hands"
if(nome.includes("massagem")) return "fa-spa"
if(nome.includes("reiki")) return "fa-hand-holding-heart"

return "fa-certificate"

}

/* CARREGAR LISTA */

async function carregarLista(){

const {data,error}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
data_obtencao,
terapeutas(nome_profissional),
certificacoes(nome)
`)

if(error){
console.error(error)
return
}

dados=data||[]

render()

}

/* RENDER */

function render(lista=dados){

listaAtual=lista

const inicio=(pagina-1)*porPagina
const pag=lista.slice(inicio,inicio+porPagina)

const tbody=document.getElementById("lista")
tbody.innerHTML=""

pag.forEach(r=>{

const nomeCert=r.certificacoes?.nome||""
const icone=iconeCertificacao(nomeCert)

tbody.innerHTML+=`
<tr>
<td>${r.terapeutas?.nome_profissional||""}</td>

<td>
<div class="servico">
<i class="fa-solid ${icone}"></i>
${nomeCert}
</div>
</td>

<td>${r.data_obtencao||""}</td>

<td>
<button class="editar">Editar</button>
<button class="excluir">Excluir</button>
</td>
</tr>
`

})

renderPaginacao(lista.length)

}

/* PAGINAÇÃO */

function renderPaginacao(total){

const div=document.getElementById("paginacao")
div.innerHTML=""

if(porPagina>=total) return

const totalPaginas=Math.ceil(total/porPagina)

for(let i=1;i<=totalPaginas;i++){

div.innerHTML+=`
<button
class="${i===pagina?'active':''}"
onclick="irPagina(${i})">
${i}
</button>
`

}

}

function irPagina(p){
pagina=p
render(listaAtual)
}

carregarLista()

</script>

</body>
</html>
