<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f4f6fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}
h1{margin-top:0}

.form-box{
background:#fff;padding:20px;border-radius:10px;
display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-box div{display:flex;flex-direction:column;}

select,input{
padding:8px;border-radius:6px;border:1px solid #d1d5db;min-width:200px;
}

button{
background:#000;color:#fff;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;
}
button.excluir{background:#dc2626;}
button.editar{background:#000;}

table{
width:100%;border-collapse:collapse;background:#fff;border-radius:10px;
overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{padding:12px;border-bottom:1px solid #eee;}
th{background:#f9fafb;}

.servico{display:flex;align-items:center;gap:8px;}
.servico i{margin-left:6px;}

.modal{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,0.4);
align-items:center;justify-content:center;
}

.modal-box{
background:#fff;padding:20px;border-radius:10px;width:420px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<div class="form-box">

<div>
<label>Funcionario</label>
<select id="cpf_terapeuta"></select>
</div>

<div>
<label>Certificação</label>
<select id="certificacao_id"></select>
</div>

<div>
<label>Data</label>
<input type="date" id="data_obtencao">
</div>

<button onclick="vincular()">Vincular</button>

</div>

<input id="buscaTerapeuta" placeholder="Buscar..." oninput="filtrarTabela()">

<button onclick="exportarExcel()">Exportar Excel</button>

<br><br>

<table>
<thead>
<tr>
<th>Terapeuta</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div id="modalCerts" class="modal">
<div class="modal-box">
<h3 id="tituloModal"></h3>
<div id="listaCerts"></div>
<br>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<div id="modalEditarData" class="modal">
<div class="modal-box">
<h3>Editar Data</h3>

<input type="date" id="novaDataInput">

<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:10px">
<button onclick="salvarNovaData()">Salvar</button>
<button class="excluir" onclick="fecharModalData()">Cancelar</button>
</div>

</div>
</div>

<!-- 🔥 ORDEM CORRETA -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

let dados=[]
let listaFiltrada=[]
let editandoId=null

async function carregarSelects(){

const {data:terapeutas}=await client
.from("terapeutas")
.select("cpf,nome_profissional")
.eq("status","Ativo")

cpf_terapeuta.innerHTML="<option value=''>Selecione</option>"
;(terapeutas||[]).forEach(t=>{
cpf_terapeuta.innerHTML+=`<option value="${t.cpf}">${t.nome_profissional}</option>`
})

const {data:cert}=await client
.from("certificacoes")
.select("id,nome")

certificacao_id.innerHTML="<option value=''>Selecione</option>"
;(cert||[]).forEach(c=>{
certificacao_id.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
})

}

async function carregarLista(){

const {data}=await client
.from("terapeuta_certificacoes")
.select(`
id,
data_obtencao,
certificacoes(nome),
terapeutas(nome_profissional)
`)

dados = data || []
listaFiltrada = [...dados]

render(listaFiltrada)
}

function render(lista){

const agrupado={}

lista.forEach(r=>{
const nome=r.terapeutas?.nome_profissional||"Sem nome"

if(!agrupado[nome]){
agrupado[nome]={nome,certs:[]}
}

agrupado[nome].certs.push(r)
})

const tbody=document.getElementById("lista")
tbody.innerHTML=""

Object.values(agrupado).forEach(t=>{
tbody.innerHTML+=`
<tr>
<td><strong>${t.nome}</strong></td>
<td>
<button onclick="abrirModal('${t.nome}')">Editar</button>
</td>
</tr>
`
})
}

function filtrarTabela(){
const termo = buscaTerapeuta.value.toLowerCase()

if(!termo){
render(dados)
return
}

render(dados.filter(d =>
(d.terapeutas?.nome_profissional||"").toLowerCase().includes(termo)
))
}

function abrirModal(nome){

const registros = dados.filter(d =>
d.terapeutas?.nome_profissional === nome
)

tituloModal.innerText = nome

let html=""

registros.forEach(r=>{
html+=`
<div style="display:flex;justify-content:space-between;margin-bottom:10px">
<span>${r.certificacoes?.nome} - ${r.data_obtencao || "Sem data"}</span>
<div>
<button onclick="editarCert('${r.id}','${r.data_obtencao || ""}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</div>
</div>
`
})

listaCerts.innerHTML=html
modalCerts.style.display="flex"
}

function fecharModal(){
modalCerts.style.display="none"
}

function editarCert(id,dataAtual){
editandoId=id
novaDataInput.value=dataAtual||""
modalEditarData.style.display="flex"
}

function fecharModalData(){
modalEditarData.style.display="none"
}

async function salvarNovaData(){

const novaData=novaDataInput.value

await client
.from("terapeuta_certificacoes")
.update({data_obtencao:novaData})
.eq("id",editandoId)

fecharModalData()
carregarLista()
}

async function vincular(){

const cpf=cpf_terapeuta.value
const cert=certificacao_id.value
const data=data_obtencao.value

await client
.from("terapeuta_certificacoes")
.insert({
cpf_terapeuta:cpf,
certificacao_id:cert,
data_obtencao:data||null
})

carregarLista()
}

async function excluir(id){

await client
.from("terapeuta_certificacoes")
.delete()
.eq("id",id)

carregarLista()
}

function exportarExcel(){

const ws = XLSX.utils.json_to_sheet(dados)
const wb = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb, ws, "Certificacoes")
XLSX.writeFile(wb, "certificacoes.xlsx")
}

carregarSelects()
carregarLista()

</script>

</body>
</html>
