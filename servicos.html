<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviços | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f5f7fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.left-tools input{
padding:8px;
border:1px solid #d1d5db;
border-radius:6px;
width:240px;
}

.right-tools{
display:flex;
align-items:center;
gap:10px;
}

.right-tools button{
background:#2563eb;
color:#fff;
border:none;
border-radius:6px;
padding:7px 12px;
cursor:pointer;
}

.btn-novo{
background:#1f2937;
}

.right-tools select{
padding:6px;
border-radius:6px;
border:1px solid #d1d5db;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:14px;
overflow:hidden;
}

th,td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
text-align:left;
}

th{
background:#f9fafb;
cursor:pointer;
}

.btn-editar{
background:#f59e0b;
color:#fff;
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

.btn-excluir{
background:#dc2626;
color:#fff;
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

.pagination{
margin-top:20px;
display:flex;
gap:8px;
}

.pagination button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#e5e7eb;
cursor:pointer;
}

.pagination button.active{
background:#2563eb;
color:#fff;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.modal-content{
background:#fff;
width:600px;
border-radius:16px;
padding:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.grid div{
display:flex;
flex-direction:column;
gap:4px;
}

label{
font-size:13px;
color:#374151;
font-weight:500;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
width:100%;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Serviços</h1>

<div class="topbar">

<div class="left-tools">
<input
id="buscaServico"
placeholder="Buscar serviço..."
oninput="filtrarTabela()">
</div>

<div class="right-tools">

<button onclick="exportarExcel()">
<i class="fa-solid fa-file-excel"></i> Exportar
</button>

<button class="btn-novo" onclick="abrirNovo()">
+ Novo Serviço
</button>

<span>Mostrar</span>

<select id="porPaginaSelect" onchange="mudarPorPagina()">
<option value="5">5</option>
<option value="10" selected>10</option>
<option value="20">20</option>
<option value="todos">Todos</option>
</select>

</div>

</div>

<table>

<thead>
<tr>
<th onclick="ordenar('grupo')">Grupo ⬍</th>
<th onclick="ordenar('tempo')">Tempo ⬍</th>
<th onclick="ordenar('valor')">Valor ⬍</th>
<th onclick="ordenar('comissao')">Comissão ⬍</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<div class="pagination" id="paginacao"></div>

</main>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h3>Cadastro Serviço</h3>

<div class="grid">

<div>
<label>Grupo</label>
<select id="grupo">
<option value="">Selecione</option>
<option>Nuru</option>
<option>Vivencia</option>
<option>Four Hands</option>
<option>Fetiche</option>
<option>Podolatria</option>
<option>Pspot</option>
<option>Voyeur</option>
<option>Experiência simultânea no Tantra</option>
<option>Mini Curso Sessão Vivência</option>
</select>
</div>

<div>
<label>Tempo</label>
<select id="tempo">
<option value="">Selecione</option>
<option value="30">30</option>
<option value="45">45</option>
<option value="60">60</option>
<option value="90">90</option>
<option value="120">120</option>
</select>
</div>

<div>
<label>Valor</label>
<input id="valor" type="number" step="0.01">
</div>

<div>
<label>Comissão</label>
<input id="comissao" type="number" step="0.01">
</div>

<div>
<label>Status</label>
<select id="status">
<option value="ativo">ativo</option>
<option value="inativo">inativo</option>
</select>
</div>

</div>

<div class="modal-actions">

<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<!-- SEU SCRIPT ORIGINAL CONTINUA AQUI (NÃO ALTERADO) -->

</body>
</html>
