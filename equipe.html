<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão da Equipe | Hara Spa</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th,td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
  font-size:14px;
}

th{background:#f9fafb;font-weight:600;}

button{
  background:#1f2937;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px 12px;
  cursor:pointer;
}

button.excluir{background:#dc2626}

.top-actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-bottom:16px;
}

.top-actions input, .top-actions select{
  padding:8px;
  border-radius:6px;
  border:1px solid #d1d5db;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#fff;
  width:1000px;
  max-height:90vh;
  overflow:auto;
  border-radius:18px;
  padding:28px;
}

.section{margin-bottom:28px}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Gestão da Equipe</h1>

<div class="top-actions">

<input id="pesquisaNome" placeholder="Pesquisar..." onkeyup="filtrarTabela()">

<select id="filtroStatus">
<option value="">Todos</option>
<option value="Ativo">Ativo</option>
<option value="Inativo">Inativo</option>
</select>

<button onclick="abrirNovo()">+ Novo Cadastro</button>

</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Cargo</th>
<th>CPF</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<!-- DADOS -->
<div class="section">
<h3>Dados Pessoais</h3>
<div class="grid">

<input id="nome_completo" placeholder="Nome completo">
<input id="nome_profissional" placeholder="Nome profissional">
<input id="cpf" placeholder="CPF">
<input id="rg" placeholder="RG">
<input type="date" id="nascimento">
<input id="email" placeholder="Email">
<input id="tipo_sanguineo" placeholder="Tipo sanguíneo">
<input id="telefone" placeholder="Telefone">
<input id="telefone_emer" placeholder="Telefone emergência">

</div>
</div>

<!-- ENDEREÇO -->
<div class="section">
<h3>Endereço</h3>
<div class="grid">

<input id="cep" placeholder="CEP">
<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="complemento" placeholder="Complemento">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="uf" placeholder="UF">

</div>
</div>

<!-- PIX -->
<div class="section">
<h3>Pagamento</h3>
<div class="grid">

<select id="pix_tipo">
<option value="">Tipo PIX</option>
<option>CPF</option>
<option>Email</option>
<option>Telefone</option>
</select>

<input id="pix_chave" placeholder="Chave PIX">

</div>
</div>

<!-- PROFISSIONAL -->
<div class="section">
<h3>Profissional</h3>
<div class="grid">

<input id="cargo" placeholder="Cargo">

<select id="tem_folga">
<option value="">Tem folga?</option>
<option>Sim</option>
<option>Não</option>
</select>

<select id="dia_folga">
<option value="">Dia da folga</option>
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
<option>Sábado</option>
<option>Domingo</option>
</select>

<input type="time" id="hora_entrada">
<input type="time" id="hora_saida">
<input type="date" id="data_inicio">

<select id="status">
<option>Ativo</option>
<option>Inativo</option>
</select>

</div>
</div>

<div class="modal-actions">
<button onclick="fecharModal()">Cancelar</button>
<button onclick="salvar()">Salvar</button>
</div>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

let cpfAtual=null;

const campos=[
"nome_completo","nome_profissional","cpf","rg","nascimento","email",
"tipo_sanguineo","telefone","telefone_emer","cep","rua","numero",
"complemento","bairro","cidade","uf","pix_tipo","pix_chave",
"cargo","tem_folga","dia_folga",
"hora_entrada","hora_saida","data_inicio","status"
];

function getPayload(){
const obj={}
campos.forEach(c=>{
const el=document.getElementById(c)
if(el && el.value!=="") obj[c]=el.value
})
return obj
}

function setForm(data){
campos.forEach(c=>{
const el=document.getElementById(c)
if(el){
el.value=data[c]||""
}
})
}

async function carregar(){
const {data}=await client.from("terapeutas").select("*")
const tbody=document.getElementById("lista")
tbody.innerHTML=""

data.forEach(t=>{
tbody.innerHTML+=`
<tr>
<td>${t.nome_profissional||""}</td>
<td>${t.cargo||""}</td>
<td>${t.cpf||""}</td>
<td>${t.status||""}</td>
<td>
<button onclick="editar('${t.cpf}')">Editar</button>
<button class="excluir" onclick="excluir('${t.cpf}')">Excluir</button>
</td>
</tr>`
})
}

function abrirNovo(){
cpfAtual=null
campos.forEach(c=>{
const el=document.getElementById(c)
if(el) el.value=""
})
document.getElementById("modal").style.display="flex"
}

async function editar(cpf){
cpfAtual=cpf
const {data}=await client.from("terapeutas").select("*").eq("cpf",cpf).single()
setForm(data)
document.getElementById("modal").style.display="flex"
}

async function salvar(){
const payload=getPayload()

if(cpfAtual){
delete payload.cpf
await client.from("terapeutas").update(payload).eq("cpf",cpfAtual)
}else{
await client.from("terapeutas").insert(payload)
}

fecharModal()
carregar()
}

async function excluir(cpf){
if(!confirm("Excluir?")) return
await client.from("terapeutas").delete().eq("cpf",cpf)
carregar()
}

function fecharModal(){
document.getElementById("modal").style.display="none"
}

carregar()

</script>

</body>
</html>
