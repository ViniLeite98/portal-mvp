<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{
display:flex;
flex-direction:column;
font-size:13px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:350px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor" value="50">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Desconto</th>
<th>Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<!-- MODAL COMPLETO -->
<div id="modalEditar" class="modal">
<div class="modal-box">

<h3>Editar</h3>

<label>Data</label>
<input type="date" id="editData">

<label>Cliente</label>
<select id="editCliente"></select>

<label>Serviço</label>
<select id="editServico"></select>

<label>Valor</label>
<input type="number" id="editValor">

<label>Desconto</label>
<input type="number" id="editDesconto">

<br><br>

<button onclick="salvarEdicao()">Salvar</button>
<button class="excluir" onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]
let servicosMap={}
let dadosClientes=[]
let dadosServicos=[]
let editandoId=null

// data hoje
function hoje(){
const d = new Date()
const offset = d.getTimezoneOffset()
return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

document.getElementById("data").value = hoje()

// cálculo
document.getElementById("valor").oninput = calcular
document.getElementById("desconto").oninput = calcular

function calcular(){
const v = parseFloat(valor.value||0)
const d = parseFloat(desconto.value||0)
final.value = v - d
}

// carregar selects
async function carregarSelects(){

const {data:clientes} = await supabaseClient.from("clientes").select("*")
dadosClientes = clientes || []

const selCliente = document.getElementById("cliente")
selCliente.innerHTML="<option value=''>Selecione</option>"

dadosClientes.forEach(c=>{
const nome = c.nome || c.nome_cliente
selCliente.innerHTML += `<option value="${c.id}">${nome}</option>`
})

const {data:servicos} = await supabaseClient.from("servicos").select("*")
dadosServicos = servicos || []

const selServico = document.getElementById("servico")
selServico.innerHTML="<option value=''>Selecione</option>"

dadosServicos.forEach(s=>{
servicosMap[s.id]=s
selServico.innerHTML += `<option value="${s.id}">${s.grupo}</option>`
})

servico.addEventListener("change",()=>{
const s = servicosMap[servico.value]
if(s){
valor.value = s.valor || 50
calcular()
}
})

}

// salvar
async function salvar(){

const data = document.getElementById("data").value
const cliente = clienteEl.value
const servico = servicoEl.value
const valor = parseFloat(valorEl.value||0)
const desconto = parseFloat(descontoEl.value||0)

if(!data || !cliente || !servico){
alert("Preencha tudo")
return
}

await supabaseClient.from("fluxo_caixa").insert({
data,
cliente_id:cliente,
servico_id:servico,
valor,
desconto,
valor_final:valor-desconto
})

clienteEl.value=""
servicoEl.value=""
valorEl.value=50
descontoEl.value=0
calcular()

carregarLista()
}

// lista
async function carregarLista(){

const {data} = await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

dados=data||[]
render()
}

function formatar(v){
return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

function render(){

lista.innerHTML=""

dados.forEach(r=>{
lista.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${r.clientes?.nome || r.clientes?.nome_cliente}</td>
<td>${r.servicos?.grupo}</td>
<td>${formatar(r.valor)}</td>
<td>${formatar(r.desconto)}</td>
<td><strong>${formatar(r.valor_final)}</strong></td>
<td>
<button class="editar" onclick="abrirEditar('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>
`
})
}

// abrir editar
function abrirEditar(id){

editandoId=id
const r = dados.find(d=>d.id==id)

// preenche selects
const selC = document.getElementById("editCliente")
selC.innerHTML="<option value=''>Selecione</option>"
dadosClientes.forEach(c=>{
const nome=c.nome||c.nome_cliente
selC.innerHTML+=`<option value="${c.id}">${nome}</option>`
})

const selS = document.getElementById("editServico")
selS.innerHTML="<option value=''>Selecione</option>"
dadosServicos.forEach(s=>{
selS.innerHTML+=`<option value="${s.id}">${s.grupo}</option>`
})

// valores
editData.value=r.data
editCliente.value=r.cliente_id
editServico.value=r.servico_id
editValor.value=r.valor
editDesconto.value=r.desconto

modalEditar.style.display="flex"
}

// salvar edição
async function salvarEdicao(){

const data = editData.value
const cliente = editCliente.value
const servico = editServico.value
const valor = parseFloat(editValor.value||0)
const desconto = parseFloat(editDesconto.value||0)

await supabaseClient.from("fluxo_caixa")
.update({
data,
cliente_id:cliente,
servico_id:servico,
valor,
desconto,
valor_final:valor-desconto
})
.eq("id",editandoId)

fecharModal()
carregarLista()
}

function fecharModal(){
modalEditar.style.display="none"
}

// excluir
async function excluir(id){
if(!confirm("Excluir?")) return
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

// init
carregarSelects()
carregarLista()
calcular()

</script>

</body>
</html>
