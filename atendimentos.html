<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atendimentos | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:30px;display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.topbar h1{margin:0;font-size:22px;}
.topbar-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
button{background:#1f2937;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
button:hover{opacity:.85;}
button.btn-green{background:#16a34a;}
button.btn-red{background:#dc2626;}
button.btn-blue{background:#2563eb;}
button.btn-yellow{background:#d97706;}
button.btn-ghost{background:#fff;color:#374151;border:1px solid #d1d5db;}
button.btn-ghost:hover{background:#f3f4f6;}
button.btn-novo{background:#16a34a;display:inline-flex !important;}
.agenda-controls{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:12px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;flex-wrap:wrap;}
.semana-nav{display:flex;align-items:center;gap:8px;}
.semana-nav button{padding:6px 10px;}
.semana-label{font-size:14px;font-weight:700;color:#111827;min-width:200px;text-align:center;}
.view-tabs{display:flex;gap:4px;background:#f3f4f6;border-radius:8px;padding:3px;}
.view-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:#6b7280;border:none;background:none;}
.view-tab.active{background:#fff;color:#111827;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.filtro-sel{display:flex;align-items:center;gap:8px;}
.filtro-sel label{font-size:12px;font-weight:600;color:#6b7280;white-space:nowrap;}
.filtro-sel select{padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;}
.legenda{display:flex;gap:12px;align-items:center;font-size:11px;color:#6b7280;margin-left:auto;}
.leg{display:flex;align-items:center;gap:4px;}
.leg-dot{width:10px;height:10px;border-radius:3px;}
.cal-wrap{background:#fff;border-radius:14px;overflow:auto;box-shadow:0 1px 4px rgba(0,0,0,.06);flex:1;}
.cal-corner{background:#f9fafb;border-bottom:2px solid #e5e7eb;border-right:1px solid #e5e7eb;position:sticky;top:0;z-index:3;height:52px;}
.cal-day-hdr{background:#f9fafb;border-bottom:2px solid #e5e7eb;border-right:1px solid #f3f4f6;padding:8px 6px;text-align:center;position:sticky;top:0;z-index:2;}
.cal-day-hdr.hoje{color:#2563eb;}
.cal-day-hdr .ds{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;}
.cal-day-hdr .dn{font-size:18px;font-weight:800;line-height:1.2;}
.time-cell{border-right:1px solid #e5e7eb;display:flex;align-items:flex-start;padding:2px 4px 0 0;font-size:9px;color:#9ca3af;justify-content:flex-end;}
.day-col{border-right:1px solid #f3f4f6;position:relative;}
.slot-line{border-bottom:1px solid #f3f4f6;cursor:pointer;}
.slot-line:hover{background:#f0f9ff;}
.slot-line.hora-cheia{border-bottom:1px solid #e5e7eb;}
.ag-card{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 5px;font-size:11px;cursor:pointer;overflow:hidden;z-index:1;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.ag-card:hover{filter:brightness(.93);}
.ag-card.agendado{background:#bfdbfe;color:#1e40af;border-left:3px solid #3b82f6;}
.ag-card.confirmado{background:#bbf7d0;color:#166534;border-left:3px solid #22c55e;}
.ag-card.cancelado{background:#fecaca;color:#991b1b;border-left:3px solid #ef4444;opacity:.7;}
.ag-card.faturado{background:#e9d5ff;color:#6b21a8;border-left:3px solid #a855f7;}
.ag-hora{font-weight:700;font-size:10px;}
.ag-nome{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-serv{opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px;}
.lista-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px 16px;border-bottom:1px solid #e5e7eb;font-size:13px;text-align:left;}
th{background:#f9fafb;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-agendado{background:#bfdbfe;color:#1e40af;}
.badge-confirmado{background:#bbf7d0;color:#166534;}
.badge-cancelado{background:#fecaca;color:#991b1b;}
.badge-faturado{background:#e9d5ff;color:#6b21a8;}
.smart-search-wrap{position:relative;width:100%;}
.smart-search-wrap input[type="text"]{width:100%;padding:9px 28px 9px 11px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;}
.smart-search-wrap input[type="text"]:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.ss-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:14px;padding:0;display:none;}
.ss-clear.visible{display:block;}
.ss-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #d1d5db;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:200px;overflow-y:auto;z-index:9999;display:none;}
.ss-dropdown.open{display:block;}
.ss-option{padding:9px 12px;cursor:pointer;font-size:13px;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid #f3f4f6;}
.ss-option:last-child{border-bottom:none;}
.ss-option:hover{background:#eff6ff;}
.ss-name{font-weight:600;color:#111827;}
.ss-meta{font-size:11px;color:#6b7280;}
.ss-novo{padding:10px 12px;cursor:pointer;font-size:13px;color:#2563eb;font-weight:600;border-top:1px solid #e5e7eb;display:flex;align-items:center;gap:6px;}
.ss-novo:hover{background:#eff6ff;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:30px 20px;overflow-y:auto;}
.modal-content{background:#fff;width:580px;max-width:100%;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-content.sm{width:440px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;}
.modal-header h2{margin:0;font-size:18px;color:#111827;}
.btn-fechar{background:none;color:#6b7280;font-size:20px;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.btn-fechar:hover{background:#f3f4f6;}
.modal-body{padding:24px;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid #e5e7eb;background:#f9fafb;}
.modal-footer button{padding:9px 20px;}
.btn-cancel{background:#fff;color:#374151;border:1px solid #d1d5db;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.span2{grid-column:span 2;}
.mfield{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.mfield:last-child{margin-bottom:0;}
.mfield label{font-size:12px;font-weight:600;color:#374151;}
.mfield input,.mfield select,.mfield textarea{padding:9px 11px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;color:#111827;background:#fff;width:100%;}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.info-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.9;color:#374151;}
.com-box{border-radius:8px;padding:9px 13px;font-size:12px;margin-top:6px;display:none;}
.com-box.normal{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;}
.com-box.four{background:#eff6ff;border:1px solid #bfdbfe;color:#2563eb;}
.det-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.est-section{border-top:1px solid #e5e7eb;margin-top:16px;padding-top:14px;}
.est-section h4{margin:0 0 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;}
.est-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
.est-row select{flex:1;padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:12px;}
.est-row input[type=number]{width:65px;padding:7px 8px;border:1px solid #d1d5db;border-radius:8px;font-size:12px;text-align:center;}
.btn-rem{background:none;border:none;color:#dc2626;cursor:pointer;font-size:15px;padding:3px;}
.btn-add-est{background:none;color:#2563eb;border:1px dashed #93c5fd;border-radius:8px;padding:7px;font-size:12px;cursor:pointer;width:100%;margin-top:4px;}
.btn-add-est:hover{background:#eff6ff;}
</style>
</head>
<body>
<div class="app">
<aside id="sidebar"></aside>
<main class="content">

  <div class="topbar">
    <h1>Atendimentos</h1>
    <div class="topbar-right">
      <div class="legenda">
        <div class="leg"><div class="leg-dot" style="background:#bfdbfe"></div>Agendado</div>
        <div class="leg"><div class="leg-dot" style="background:#bbf7d0"></div>Confirmado</div>
        <div class="leg"><div class="leg-dot" style="background:#e9d5ff"></div>Faturado</div>
      </div>
      <button onclick="exportarExcel()"><i class="fa fa-file-excel"></i> Exportar</button>
      <button class="btn-novo" onclick="abrirNovo()"><i class="fa fa-plus"></i> Novo Agendamento</button>
    </div>
  </div>

  <div class="agenda-controls">
    <div class="view-tabs">
      <button class="view-tab active" id="tabSemana" onclick="mudarView('semana')">Semana</button>
      <button class="view-tab" id="tabLista" onclick="mudarView('lista')">Lista</button>
    </div>
    <div class="semana-nav" id="navSemana">
      <button class="btn-ghost" onclick="moverSemana(-1)"><i class="fa fa-chevron-left"></i></button>
      <span class="semana-label" id="semanaLabel"></span>
      <button class="btn-ghost" onclick="moverSemana(1)"><i class="fa fa-chevron-right"></i></button>
      <button class="btn-ghost" onclick="irHoje()" style="font-size:12px">Hoje</button>
    </div>
    <div class="filtro-sel">
      <label>Terapeuta:</label>
      <select id="filtroTer" onchange="renderAtual()"><option value="">Todas</option></select>
    </div>
    <div class="filtro-sel" id="filtroStatusWrap" style="display:none">
      <label>Status:</label>
      <select id="filtroStatus" onchange="renderLista()">
        <option value="">Todos</option>
        <option>Agendado</option><option>Confirmado</option><option>Faturado</option><option>Cancelado</option>
      </select>
    </div>
  </div>

  <div id="viewSemana" class="cal-wrap"></div>
  <div id="viewLista" class="lista-wrap" style="display:none">
    <table><thead><tr>
      <th>Data/Hora</th><th>Cliente</th><th>Serviço</th>
      <th>Terapeuta(s)</th><th>Status</th><th>Valor</th><th>Ações</th>
    </tr></thead><tbody id="listaBody"></tbody></table>
  </div>

</main>
</div>

<!-- MODAL AGENDAMENTO -->
<div class="modal" id="modalAg">
<div class="modal-content">
  <div class="modal-header">
    <h2 id="agTitulo">Novo Agendamento</h2>
    <button class="btn-fechar" onclick="fecharAg()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="grid-2">
      <div class="mfield"><label>Data *</label><input type="date" id="agData"></div>
      <div class="mfield"><label>Origem</label><select id="agOrigem"><option value="">Selecione</option></select></div>
      <div class="mfield"><label>Hora Início *</label><input type="time" id="agHoraIni" oninput="autoFim()"></div>
      <div class="mfield"><label>Hora Fim</label><input type="time" id="agHoraFim"></div>
      <div class="mfield span2">
        <label>Cliente *</label>
        <div class="smart-search-wrap">
          <input type="text" id="agCliSrc" placeholder="Buscar por nome ou telefone…" autocomplete="off">
          <button class="ss-clear" id="agCliClr">✕</button>
          <input type="hidden" id="agCli">
          <div class="ss-dropdown" id="agCliDrop"></div>
        </div>
      </div>
      <div class="mfield span2"><label>Serviço *</label><select id="agServ" onchange="aoMudarServ()"><option value="">Selecione</option></select></div>
      <div class="mfield span2" id="campoTer1"><label>Terapeuta *</label><select id="agTer1" onchange="calcCom()"><option value="">Selecione</option></select></div>
      <div class="mfield span2" id="campoTer2" style="display:none"><label>2ª Terapeuta (Four Hands) *</label><select id="agTer2" onchange="calcCom()"><option value="">Selecione</option></select></div>
      <div class="span2" id="comWrap" style="display:none"><div class="com-box" id="comBox"></div></div>
      <div class="mfield span2"><label>Observação</label><textarea id="agObs" rows="2" placeholder="Opcional..."></textarea></div>
    </div>
    <div class="est-section">
      <h4><i class="fa fa-box"></i> Itens de Estoque</h4>
      <div id="agEst"></div>
      <button class="btn-add-est" onclick="addEst('agEst')"><i class="fa fa-plus"></i> Adicionar item</button>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharAg()">Cancelar</button>
    <button class="btn-green" onclick="salvarAg()"><i class="fa fa-save"></i> Salvar</button>
  </div>
</div>
</div>

<!-- MODAL DETALHES -->
<div class="modal" id="modalDet">
<div class="modal-content sm">
  <div class="modal-header">
    <h2 id="detTit">Detalhes</h2>
    <button class="btn-fechar" onclick="fecharDet()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="info-card" id="detInfo"></div>
    <div class="det-btns" id="detBtns"></div>
  </div>
</div>
</div>

<!-- MODAL CONFIRMAR PAGAMENTO -->
<div class="modal" id="modalPgto">
<div class="modal-content sm">
  <div class="modal-header">
    <h2>Confirmar Atendimento</h2>
    <button class="btn-fechar" onclick="fecharPgto()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="info-card" id="pgtoInfo"></div>
    <div class="grid-2">
      <div class="mfield"><label>Valor (R$)</label><input type="number" id="pgtoVal" step="0.01" oninput="calcPgto()"></div>
      <div class="mfield"><label>Desconto (R$)</label><input type="number" id="pgtoDes" value="0" step="0.01" oninput="calcPgto()"></div>
      <div class="mfield span2"><label>Valor Final</label><input type="number" id="pgtoFin" disabled style="background:#f9fafb;font-weight:700;color:#16a34a"></div>
      <div class="mfield span2"><label>Forma de Pagamento</label><select id="pgtoForma"><option value="">Selecione</option></select></div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharPgto()">Cancelar</button>
    <button class="btn-green" onclick="confirmar()"><i class="fa fa-check"></i> Confirmar</button>
  </div>
</div>
</div>

<!-- MODAL NOVO CLIENTE -->
<div class="modal" id="modalNC">
<div class="modal-content sm">
  <div class="modal-header"><h2>Novo Cliente</h2><button class="btn-fechar" onclick="fecharNC()"><i class="fa fa-times"></i></button></div>
  <div class="modal-body">
    <div class="mfield"><label>Nome *</label><input id="ncNome" placeholder="Nome completo"></div>
    <div class="mfield"><label>Telefone *</label><input id="ncTel" placeholder="(11) 99999-9999"></div>
    <div class="mfield"><label>Email</label><input id="ncEmail" type="email" placeholder="opcional"></div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharNC()">Cancelar</button>
    <button class="btn-blue" onclick="salvarNC()"><i class="fa fa-user-plus"></i> Cadastrar</button>
  </div>
</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>
<script>

const HORA_INI=9,HORA_FIM=23,SLOT_H=30,ALT_SLOT=28;
const DIAS_PT=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

let dados=[],servicosMap={},terapeutasMap={},dadosProd=[],dadosServicos=[],dadosTers=[];
let formasPgto=[],editandoId=null,confirmandoId=null,viewAtual="semana",semanaBase=new Date();
let ssAg;

const fmtM=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtD=v=>{if(!v)return"—";const[y,m,d]=v.split("-");return`${d}/${m}/${y}`;};
const fmtH=v=>v?v.substring(0,5):"";
const hoje=()=>{const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().split("T")[0];};
const norm=s=>(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
const nomeS=s=>s?[s.grupo,s.subgrupo,s.tempo?s.tempo+" min":""].filter(Boolean).join(" "):"—";
const nomeC=c=>{if(!c)return"—";const t=(c.telefone_1||"").replace(/\D/g,"");const l4=t.length>=4?t.slice(-4):"";return l4?`${c.nome} ${l4}`:c.nome;};
const h2m=h=>{if(!h)return 0;const[hh,mm]=h.split(":");return+hh*60+ +mm;};
const isFour=sid=>{const s=servicosMap[sid];return s&&(s.grupo||"").toLowerCase().includes("four");};

function getUser(cb,tentativas=20){
  if(window.usuarioLogado) return cb(window.usuarioLogado);
  if(tentativas<=0) return cb(null);
  setTimeout(()=>getUser(cb,tentativas-1),100);
}

/* Terapeuta = role "usuario" com cargo de terapeuta
   Admin/Apoio = role "admin" ou "apoio" — vê tudo e pode selecionar qualquer terapeuta */
function eTerapeuta(u){ return u && u.role==="usuario"; }
function podeEditar(u){ return u && (u.role==="admin" || u.role==="apoio"); }

function mkSS({si,hi,drop,clr,onNovo}){
  let deb=null;
  const close=()=>drop.classList.remove("open");
  const open=rs=>{
    drop.innerHTML="";
    if(!rs.length) drop.innerHTML='<div style="padding:10px;color:#9ca3af;font-size:12px;text-align:center">Nenhum cliente</div>';
    else rs.forEach(c=>{
      const t=(c.telefone_1||"").replace(/\D/g,""),l4=t.length>=4?t.slice(-4):t;
      const el=document.createElement("div");el.className="ss-option";
      el.innerHTML=`<span class="ss-name">${c.nome}</span>${l4?`<span class="ss-meta">${l4}</span>`:""}`;
      el.addEventListener("mousedown",e=>{e.preventDefault();pick(c);});
      drop.appendChild(el);
    });
    if(onNovo){
      const el=document.createElement("div");el.className="ss-novo";
      el.innerHTML='<i class="fa fa-user-plus"></i> Cadastrar novo cliente';
      el.addEventListener("mousedown",e=>{e.preventDefault();onNovo(si.value);});
      drop.appendChild(el);
    }
    drop.classList.add("open");
  };
  const pick=c=>{
    const t=(c.telefone_1||"").replace(/\D/g,""),l4=t.length>=4?t.slice(-4):"";
    si.value=l4?`${c.nome}  ${l4}`:c.nome;hi.value=c.id;
    clr.classList.add("visible");close();
  };
  const clear=()=>{si.value="";hi.value="";clr.classList.remove("visible");close();};
  async function buscar(q){
    const tok=q.split(/\s+/).filter(Boolean),tN=tok.filter(t=>/\D/.test(t)),tT=tok.filter(t=>/^\d+$/.test(t));
    let qb=client.from("clientes").select("id,nome,telefone_1");
    tN.forEach(t=>qb=qb.ilike("nome",`%${t}%`));tT.forEach(t=>qb=qb.ilike("telefone_1",`%${t}%`));
    const {data}=await qb.order("nome").limit(30);return data||[];
  }
  si.addEventListener("input",()=>{
    const v=si.value.trim();clr.classList.toggle("visible",v.length>0);hi.value="";
    clearTimeout(deb);if(!v){close();return;}
    drop.innerHTML='<div style="padding:10px;color:#9ca3af;font-size:12px;text-align:center">Buscando…</div>';
    drop.classList.add("open");
    deb=setTimeout(async()=>open(await buscar(norm(v))),280);
  });
  si.addEventListener("blur",()=>setTimeout(close,150));
  clr.addEventListener("click",clear);
  document.addEventListener("click",e=>{if(!si.closest(".smart-search-wrap").contains(e.target))close();});
  return{setValue(c){if(!c){clear();return;}pick(c);},clearSelection:clear};
}

async function carregarDados(){
  const {data:servs}=await client.from("servicos").select("*").eq("status","ativo").order("grupo");
  dadosServicos=servs||[];dadosServicos.forEach(s=>servicosMap[s.id]=s);
  const selS=document.getElementById("agServ");

  });

  const {data:params}=await client.from("parametros").select("tipo,valor").in("tipo",["origens_lead","formas_pagamento"]).eq("ativo",true).order("valor");

  if(!formasPgto.length) formasPgto.push("Dinheiro","PIX","Cartão Débito","Cartão Crédito");

async function carregar(){
  getUser(async u=>{
    let q=client.from("atendimentos")
      .select(`*,clientes(id,nome,telefone_1),servicos(id,grupo,subgrupo,tempo,valor,comissao),ter1:terapeutas!atendimentos_terapeuta1_cpf_fkey(cpf,nome_profissional),ter2:terapeutas!atendimentos_terapeuta2_cpf_fkey(cpf,nome_profissional)`)
      .order("data").order("hora_inicio");

    // Terapeuta logada: vê só os próprios atendimentos
    if(eTerapeuta(u) && u.cpf){
      q=q.or(`terapeuta1_cpf.eq.${u.cpf},terapeuta2_cpf.eq.${u.cpf}`);
    }

    const {data,error}=await q;
    if(error){console.error(error);return;}
    dados=data||[];
    renderAtual();
  });
}

function renderAtual(){ if(viewAtual==="semana") renderCal(); else renderLista(); }

function iniSemana(d){const c=new Date(d);c.setDate(c.getDate()-c.getDay());c.setHours(0,0,0,0);return c;}

function renderCal(){
  const wrap=document.getElementById("viewSemana");
  const ini=iniSemana(semanaBase);
  const dias=Array.from({length:7},(_,i)=>{const d=new Date(ini);d.setDate(d.getDate()+i);return d;});
  const fim=new Date(ini);fim.setDate(fim.getDate()+6);
  const opt={day:"numeric",month:"short"};
  document.getElementById("semanaLabel").textContent=`${ini.toLocaleDateString("pt-BR",opt)} – ${fim.toLocaleDateString("pt-BR",opt)}`;

  const filtroTer=document.getElementById("filtroTer").value;
  const hojeStr=hoje();
  const iniStr=ini.toISOString().split("T")[0];
  const fimStr=fim.toISOString().split("T")[0];
  const semDados=dados.filter(r=>r.data>=iniStr&&r.data<=fimStr&&(!filtroTer||r.terapeuta1_cpf===filtroTer||r.terapeuta2_cpf===filtroTer));

  const totalSlots=(HORA_FIM-HORA_INI)*2;
  let html=`<div style="display:grid;grid-template-columns:56px repeat(7,1fr);min-width:650px;position:sticky;top:0;z-index:3;background:#fff;">`;
  html+=`<div class="cal-corner"></div>`;
  dias.forEach(d=>{
    const dStr=d.toISOString().split("T")[0];
    const isH=dStr===hojeStr;
    html+=`<div class="cal-day-hdr${isH?" hoje":""}"><div class="ds">${DIAS_PT[d.getDay()]}</div><div class="dn">${d.getDate()}</div></div>`;
  });
  html+=`</div><div style="display:grid;grid-template-columns:56px repeat(7,1fr);min-width:650px">`;

  html+=`<div>`;
  for(let s=0;s<totalSlots;s++){
    const minT=HORA_INI*60+s*30,hh=Math.floor(minT/60),mm=minT%60;
    html+=`<div class="time-cell" style="height:${ALT_SLOT}px">${mm===0?String(hh).padStart(2,"0")+":00":""}</div>`;
  }
  html+=`</div>`;

  dias.forEach(d=>{
    const dStr=d.toISOString().split("T")[0];
    html+=`<div class="day-col">`;
    for(let s=0;s<totalSlots;s++){
      const minT=HORA_INI*60+s*30,hh=String(Math.floor(minT/60)).padStart(2,"0"),mm=minT%60===0?"00":"30";
      const cls=minT%60===0?"slot-line hora-cheia":"slot-line";
      html+=`<div class="${cls}" style="height:${ALT_SLOT}px" onclick="abrirNovoSlot('${dStr}','${hh}:${mm}')"></div>`;
    }
    const cardsDia=dados.filter(r=>r.data===dStr&&(!filtroTer||r.terapeuta1_cpf===filtroTer||r.terapeuta2_cpf===filtroTer)).map(r=>({
      ...r,mI:h2m(r.hora_inicio),mF:r.hora_fim?h2m(r.hora_fim):h2m(r.hora_inicio)+60
    }));
    cardsDia.forEach(r=>{
      r._col=0;
      cardsDia.forEach(o=>{if(o===r||o._col===undefined)return;if(o.mI<r.mF&&o.mF>r.mI&&o._col===r._col)r._col++;});
    });
    cardsDia.forEach(r=>{
      r._totalCols=1;
      cardsDia.forEach(o=>{if(o===r)return;if(o.mI<r.mF&&o.mF>r.mI)r._totalCols=Math.max(r._totalCols,r._col+1,o._col+1);});
    });
    cardsDia.forEach(r=>{
      const topPx=((r.mI-HORA_INI*60)/30)*ALT_SLOT;
      const hPx=Math.max(((r.mF-r.mI)/30)*ALT_SLOT,ALT_SLOT);
      const cls=r.status==="Confirmado"?"confirmado":r.status==="Faturado"?"faturado":r.status==="Cancelado"?"cancelado":"agendado";
      const ter=[r.ter1?.nome_profissional,r.ter2?.nome_profissional].filter(Boolean).join("+");
      const pct=100/r._totalCols,left=r._col*pct;
      html+=`<div class="ag-card ${cls}" style="top:${topPx}px;height:${hPx}px;left:calc(${left}% + 2px);width:calc(${pct}% - 4px)" onclick="abrirDet('${r.id}');event.stopPropagation()">
        <div class="ag-hora">${fmtH(r.hora_inicio)}${r.hora_fim?"–"+fmtH(r.hora_fim):""}</div>
        <div class="ag-nome">${nomeC(r.clientes)}</div>
        <div class="ag-serv">${nomeS(r.servicos)}</div>
        <div class="ag-serv">${ter}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  wrap.innerHTML=html;
}

  tbody.innerHTML="";
  if(!lista.length){tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:32px">Nenhum atendimento.</td></tr>`;return;}
  lista.forEach(r=>{
    const cls=r.status==="Confirmado"?"badge-confirmado":r.status==="Faturado"?"badge-faturado":r.status==="Cancelado"?"badge-cancelado":"badge-agendado";
    const ter=[r.ter1?.nome_profissional,r.ter2?.nome_profissional].filter(Boolean).join(" + ");

      ?`<button class="btn-red" style="padding:5px 9px;font-size:12px" onclick="excluir('${r.id}')"><i class="fa fa-trash"></i></button>`
      :"";
    tbody.innerHTML+=`<tr>

      <td>${nomeS(r.servicos)}</td>

      <td>${r.valor_final?fmtM(r.valor_final):"—"}</td>

  });
}

  ["agData","agHoraIni","agHoraFim","agObs"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});

function abrirNovo(){
  editandoId=null;
  resetAg();
  getUser(u=>{
    const sel=document.getElementById("agTer1");

      sel.value=u.cpf;

function abrirNovoSlot(data,hora){abrirNovo();document.getElementById("agData").value=data;document.getElementById("agHoraIni").value=hora;autoFim();}
function fecharAg(){document.getElementById("modalAg").style.display="none";}

function autoFim(){
  const ini=document.getElementById("agHoraIni").value;
  const sid=document.getElementById("agServ").value;
  const dur=servicosMap[sid]?.tempo?parseInt(servicosMap[sid].tempo):60;
  if(!ini)return;
  const[hh,mm]=ini.split(":").map(Number);
  const f=hh*60+mm+dur;
  document.getElementById("agHoraFim").value=`${String(Math.floor(f/60)).padStart(2,"0")}:${String(f%60).padStart(2,"0")}`;
}

function aoMudarServ(){const s=servicosMap[document.getElementById("agServ").value];document.getElementById("campoTer2").style.display=s&&(s.grupo||"").toLowerCase().includes("four")?"":"none";autoFim();calcCom();}

function calcCom(){
  const s=servicosMap[document.getElementById("agServ").value];
  if(!s||!s.comissao){document.getElementById("comWrap").style.display="none";return;}
  const f=(s.grupo||"").toLowerCase().includes("four");
  const t1=terapeutasMap[document.getElementById("agTer1").value]?.nome_profissional||"";
  const t2=f?terapeutasMap[document.getElementById("agTer2").value]?.nome_profissional||"":"";
  const box=document.getElementById("comBox");box.className="com-box"+(f?" four":" normal");
  if(f&&t1&&t2) box.innerHTML=`<i class="fa fa-handshake"></i> ${fmtM(s.comissao)} p/ <b>${t1}</b> + ${fmtM(s.comissao)} p/ <b>${t2}</b>`;
  else if(!f&&t1) box.innerHTML=`<i class="fa fa-handshake"></i> Comissão: <b>${fmtM(s.comissao)}</b> para <b>${t1}</b>`;
  else{document.getElementById("comWrap").style.display="none";return;}
  document.getElementById("comWrap").style.display="block";
}

async function salvarAg(){
  const cliId=document.getElementById("agCli").value;
  const servId=document.getElementById("agServ").value;
  const dataV=document.getElementById("agData").value;
  const ter1=document.getElementById("agTer1").value;
  if(!cliId){alert("Selecione um cliente.");return;}
  if(!servId){alert("Selecione um serviço.");return;}
  if(!dataV){alert("Informe a data.");return;}
  if(!ter1){alert("Selecione a terapeuta.");return;}
  const f=isFour(servId);
  const ter2=f?document.getElementById("agTer2").value:"";
  if(f&&!ter2){alert("Selecione a 2ª terapeuta.");return;}
  const s=servicosMap[servId];
  const payload={
    data:dataV,hora_inicio:document.getElementById("agHoraIni").value||null,
    hora_fim:document.getElementById("agHoraFim").value||null,status:"Agendado",
    cliente_id:cliId,servico_id:servId,terapeuta1_cpf:ter1,terapeuta2_cpf:ter2||null,
    origem_lead:document.getElementById("agOrigem").value||null,
    observacao:document.getElementById("agObs").value.trim()||null,
    valor:s?.valor||0,desconto:0,valor_final:s?.valor||0,
    comissao_total:f?(s?.comissao||0)*2:(s?.comissao||0)
  };
  let aid=editandoId,error;
  if(editandoId){
    ({error}=await client.from("atendimentos").update(payload).eq("id",editandoId));
  } else {
    const {data:novo,error:e}=await client.from("atendimentos").insert(payload).select().single();
    error=e;if(novo)aid=novo.id;
  }
  if(error){alert("Erro: "+error.message);return;}
  const itens=getEst("agEst");
  if(itens.length&&aid){
    await client.from("atendimento_estoque").delete().eq("atendimento_id",aid);
    await client.from("atendimento_estoque").insert(itens.map(i=>({...i,atendimento_id:aid})));
  }
  fecharAg();carregar();
}

function abrirDet(id){
  const u=window.usuarioLogado;
  const r=dados.find(d=>d.id===id);if(!r)return;
  const ter=[r.ter1?.nome_profissional,r.ter2?.nome_profissional].filter(Boolean).join(" + ");
  document.getElementById("detTit").textContent=nomeC(r.clientes);
  document.getElementById("detInfo").innerHTML=`
    <b>Data:</b> ${fmtD(r.data)} ${fmtH(r.hora_inicio)?`às ${fmtH(r.hora_inicio)}`:""} ${r.hora_fim?"– "+fmtH(r.hora_fim):""}<br>
    <b>Serviço:</b> ${nomeS(r.servicos)}<br>
    <b>Terapeuta(s):</b> ${ter||"—"}<br>
    <b>Origem:</b> ${r.origem_lead||"—"}<br>
    <b>Status:</b> ${r.status}<br>
    ${r.valor_final?`<b>Valor Final:</b> ${fmtM(r.valor_final)}<br>`:""}
    ${r.forma_pagamento?`<b>Pgto:</b> ${r.forma_pagamento}<br>`:""}
    ${r.observacao?`<b>Obs:</b> ${r.observacao}`:""}
  `;
  const btns=document.getElementById("detBtns");btns.innerHTML="";
  if(r.status==="Agendado"){
    mk(btns,"btn-green","fa-check Confirmar & Pagar",()=>{fecharDet();abrirPgto(id);});
    mk(btns,"btn-yellow","fa-pencil Editar",()=>{fecharDet();abrirEditar(id);});
    if(podeEditar(u)) mk(btns,"btn-red","fa-times Cancelar",async()=>{if(!confirm("Cancelar?"))return;await client.from("atendimentos").update({status:"Cancelado"}).eq("id",id);fecharDet();carregar();});
  }
  if(r.status==="Confirmado"){
    mk(btns,"btn-yellow","fa-pencil Editar",()=>{fecharDet();abrirEditar(id);});
    if(podeEditar(u)) mk(btns,"btn-ghost","fa-file-invoice Faturar",async()=>{if(!confirm("Marcar como Faturado?"))return;await client.from("atendimentos").update({status:"Faturado"}).eq("id",id);fecharDet();carregar();});
  }
  if(podeEditar(u)) mk(btns,"btn-ghost","fa-trash",async()=>{fecharDet();excluir(id);},true);
  document.getElementById("modalDet").style.display="flex";
}

function mk(container,cls,iconLabel,fn,danger=false){
  const b=document.createElement("button");
  const[icon,...label]=iconLabel.split(" ");
  b.className=cls;
  b.innerHTML=`<i class="fa ${icon}" ${danger?"style='color:#dc2626'":""}></i>${label.join(" ")}`;
  b.onclick=fn;container.appendChild(b);
}

function fecharDet(){document.getElementById("modalDet").style.display="none";}

async function abrirEditar(id){
  editandoId=id;const r=dados.find(d=>d.id===id);if(!r)return;
  resetAg();document.getElementById("agTitulo").textContent="Editar Agendamento";
  document.getElementById("modalAg").style.display="flex";
  setTimeout(async()=>{
    document.getElementById("agData").value=r.data||"";
    document.getElementById("agHoraIni").value=fmtH(r.hora_inicio);
    document.getElementById("agHoraFim").value=fmtH(r.hora_fim);
    document.getElementById("agServ").value=r.servico_id||"";
    document.getElementById("agOrigem").value=r.origem_lead||"";
    const selTer1=document.getElementById("agTer1");
    selTer1.value=r.terapeuta1_cpf||"";
    getUser(u=>{ selTer1.disabled=eTerapeuta(u); });
    document.getElementById("agObs").value=r.observacao||"";
    const f=isFour(r.servico_id);
    document.getElementById("campoTer2").style.display=f?"":"none";
    document.getElementById("agTer2").value=r.terapeuta2_cpf||"";
    calcCom();
    if(r.cliente_id){const {data:c}=await client.from("clientes").select("id,nome,telefone_1").eq("id",r.cliente_id).limit(1);ssAg?.setValue(c?.[0]||null);}
    const {data:itens}=await client.from("atendimento_estoque").select("produto_id,quantidade").eq("atendimento_id",id);
    document.getElementById("agEst").innerHTML="";
    (itens||[]).forEach(item=>{addEst("agEst");const rows=document.getElementById("agEst").querySelectorAll(".est-row");const last=rows[rows.length-1];last.querySelector("select").value=item.produto_id;last.querySelector("input[type=number]").value=item.quantidade;});
  },30);
}

function abrirPgto(id){
  confirmandoId=id;const r=dados.find(d=>d.id===id);if(!r)return;
  const s=servicosMap[r.servico_id];
  document.getElementById("pgtoInfo").innerHTML=`<b>${nomeC(r.clientes)}</b><br>${nomeS(r.servicos)}<br>${fmtD(r.data)} ${fmtH(r.hora_inicio)?`às ${fmtH(r.hora_inicio)}`:""}`; 
  document.getElementById("pgtoVal").value=s?.valor||r.valor||0;
  document.getElementById("pgtoDes").value=0;calcPgto();
  document.getElementById("pgtoForma").value="";
  document.getElementById("modalPgto").style.display="flex";
}
function fecharPgto(){document.getElementById("modalPgto").style.display="none";}
function calcPgto(){const v=parseFloat(document.getElementById("pgtoVal").value||0),d=parseFloat(document.getElementById("pgtoDes").value||0);document.getElementById("pgtoFin").value=(v-d).toFixed(2);}
async function confirmar(){
  const r=dados.find(d=>d.id===confirmandoId);
  const s=r?servicosMap[r.servico_id]:null;
  const f=s&&(s.grupo||"").toLowerCase().includes("four");
  const v=parseFloat(document.getElementById("pgtoVal").value||0);
  const d=parseFloat(document.getElementById("pgtoDes").value||0);
  const {error}=await client.from("atendimentos").update({
    status:"Confirmado",valor:v,desconto:d,valor_final:v-d,
    comissao_total:f?(s?.comissao||0)*2:(s?.comissao||0),
    forma_pagamento:document.getElementById("pgtoForma").value||null
  }).eq("id",confirmandoId);
  if(error){alert("Erro: "+error.message);return;}
  fecharPgto();carregar();
}

async function excluir(id){
  if(!confirm("Excluir este atendimento?"))return;
  await client.from("atendimento_estoque").delete().eq("atendimento_id",id);
  await client.from("atendimentos").delete().eq("id",id);
  carregar();
}

function addEst(cid){
  const c=document.getElementById(cid),row=document.createElement("div");
  row.className="est-row";
  const sel=document.createElement("select");sel.innerHTML="<option value=''>Selecionar produto</option>";
  dadosProd.forEach(p=>sel.innerHTML+=`<option value="${p.id}">${p.nome}</option>`);

  const btn=document.createElement("button");btn.className="btn-rem";btn.innerHTML='<i class="fa fa-times"></i>';btn.onclick=()=>c.removeChild(row);
  row.appendChild(sel);row.appendChild(qty);row.appendChild(btn);c.appendChild(row);

    return sel.value?{produto_id:sel.value,quantidade:+qty.value||1}:null;
  }).filter(Boolean);
}

    "Valor":+r.valor||0,"Desconto":+r.desconto||0,"Final":+r.valor_final||0,"Comissão":+r.comissao_total||0
  }));
  const ws=XLSX.utils.json_to_sheet(exp);
  ws["!cols"]=Object.keys(exp[0]).map(col=>({wch:Math.max(col.length,...exp.map(r=>String(r[col]||"").length))+2}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Atendimentos");XLSX.writeFile(wb,"atendimentos.xlsx");
}

document.addEventListener("DOMContentLoaded",async()=>{
  await carregarDados();
  getUser(u=>{
    // Terapeuta logada: trava filtro e select na própria terapeuta
    if(eTerapeuta(u) && u.cpf){
      const ft=document.getElementById("filtroTer");
      ft.value=u.cpf; ft.disabled=true;
    }
  });
  await carregar();
});
</script>
