<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atendimentos | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:30px;display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.topbar h1{margin:0;font-size:22px;}
.topbar-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
button{background:#1f2937;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
button:hover{opacity:.85;}
button.btn-green{background:#16a34a;}
button.btn-red{background:#dc2626;}
button.btn-blue{background:#2563eb;}
button.btn-yellow{background:#d97706;}
button.btn-ghost{background:#fff;color:#374151;border:1px solid #d1d5db;}
button.btn-ghost:hover{background:#f3f4f6;}

/* ── CARDS RESUMO DO DIA ── */
.resumo-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.resumo-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px;border-left:4px solid transparent;}
.resumo-card .rc-num{font-size:32px;font-weight:800;line-height:1;color:#111827;}
.resumo-card .rc-label{font-size:12px;font-weight:700;color:#6b7280;margin-top:4px;text-transform:uppercase;letter-spacing:.04em;}
.resumo-card .rc-periodo{font-size:10px;color:#9ca3af;margin-top:2px;font-weight:500;}
.resumo-card .rc-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.resumo-card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px;border-left:4px solid transparent;}

/* ── BARRA DE CONTROLES ── */
.agenda-controls{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:10px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px;flex-wrap:wrap;}

/* Seletor de visão */
.view-tabs{display:flex;gap:3px;background:#f3f4f6;border-radius:8px;padding:3px;}
.view-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:#6b7280;border:none;background:none;}
.view-tab.active{background:#fff;color:#111827;box-shadow:0 1px 3px rgba(0,0,0,.1);}

/* Navegação de data */
.semana-nav{display:flex;align-items:center;gap:6px;}
.semana-nav button{padding:6px 10px;}
.semana-label{font-size:14px;font-weight:700;color:#111827;min-width:190px;text-align:center;}

/* Seletor de profissional — DESTAQUE */
.prof-selector{display:flex;align-items:center;gap:0;background:#f0f4ff;border:2px solid #2563eb;border-radius:10px;padding:0;overflow:hidden;margin-left:4px;}
.prof-selector-label{padding:0 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#2563eb;white-space:nowrap;background:#dbeafe;height:100%;display:flex;align-items:center;}
.prof-selector select{background:#f0f4ff;color:#1e40af;border:none;font-size:13px;font-weight:600;padding:8px 10px;cursor:pointer;min-width:160px;outline:none;}

/* ── LEGENDA ── */
.legenda-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:#fff;border-radius:10px;padding:8px 14px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:14px;}
.legenda-titulo{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-right:4px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#374151;}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.leg-sep{width:1px;height:16px;background:#e5e7eb;margin:0 4px;}
.leg-status{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#374151;}
.leg-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── CALENDÁRIO ── */
.cal-wrap{background:#fff;border-radius:14px;overflow:auto;box-shadow:0 1px 4px rgba(0,0,0,.06);flex:1;}
.cal-corner{background:#f9fafb;border-bottom:2px solid #e5e7eb;border-right:1px solid #e5e7eb;position:sticky;top:0;z-index:3;height:52px;}
.cal-day-hdr{background:#f9fafb;border-bottom:2px solid #e5e7eb;border-right:1px solid #f3f4f6;padding:8px 6px;text-align:center;position:sticky;top:0;z-index:2;}
.cal-day-hdr.hoje{background:#eff6ff;}
.cal-day-hdr .ds{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;}
.cal-day-hdr .dn{font-size:18px;font-weight:800;line-height:1.2;color:#111827;}
.cal-day-hdr.hoje .dn{color:#2563eb;}
.time-cell{border-right:1px solid #e5e7eb;display:flex;align-items:flex-start;padding:2px 4px 0 0;font-size:9px;color:#9ca3af;justify-content:flex-end;}
.day-col{border-right:1px solid #f3f4f6;position:relative;}
.day-col.hoje-col{background:#fafcff;}
.slot-line{border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .1s;}
.slot-line:hover{background:#f0f9ff;}
.slot-line.hora-cheia{border-bottom:1px solid #e5e7eb;}

/* ── LINHA DO AGORA ── */
.linha-agora{position:absolute;left:0;right:0;border-top:2px solid #ef4444;z-index:4;pointer-events:none;}
.linha-agora::before{content:'';position:absolute;left:-1px;top:-5px;width:8px;height:8px;border-radius:50%;background:#ef4444;}

/* ── CARDS DE AGENDAMENTO ── */
.ag-card{position:absolute;left:2px;right:2px;border-radius:7px;padding:4px 6px;font-size:11px;cursor:pointer;overflow:hidden;z-index:1;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:filter .1s,box-shadow .1s;}
.ag-card:hover{filter:brightness(.92);box-shadow:0 3px 10px rgba(0,0,0,.2);z-index:2;}
.ag-hora{font-weight:700;font-size:9.5px;opacity:.85;}
.ag-nome{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-serv{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px;opacity:.9;}

/* Indicador de status no canto do card */
.ag-status-dot{width:7px;height:7px;border-radius:50%;position:absolute;top:5px;right:5px;border:1.5px solid rgba(255,255,255,.6);}

/* ── LISTA ── */
.lista-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px 16px;border-bottom:1px solid #e5e7eb;font-size:13px;text-align:left;}
th{background:#f9fafb;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}

/* ── MODAIS ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:30px 20px;overflow-y:auto;}
.modal-content{background:#fff;width:580px;max-width:100%;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-content.sm{width:440px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;}
.modal-header h2{margin:0;font-size:18px;color:#111827;}
.btn-fechar{background:none;color:#6b7280;font-size:20px;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.btn-fechar:hover{background:#f3f4f6;}
.modal-body{padding:24px;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid #e5e7eb;background:#f9fafb;}
.modal-footer button{padding:9px 20px;}
.btn-cancel{background:#fff;color:#374151;border:1px solid #d1d5db;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.span2{grid-column:span 2;}
.mfield{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.mfield:last-child{margin-bottom:0;}
.mfield label{font-size:12px;font-weight:600;color:#374151;}
.mfield input,.mfield select,.mfield textarea{padding:9px 11px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;color:#111827;background:#fff;width:100%;}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.info-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;line-height:2;color:#374151;}
.com-box{border-radius:8px;padding:9px 13px;font-size:12px;margin-top:6px;display:none;}
.com-box.normal{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;}
.com-box.four{background:#eff6ff;border:1px solid #bfdbfe;color:#2563eb;}
.det-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.est-section{border-top:1px solid #e5e7eb;margin-top:16px;padding-top:14px;}
.est-section h4{margin:0 0 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;}
.est-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
.est-row select{flex:1;padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:12px;}
.est-row input[type=number]{width:65px;padding:7px 8px;border:1px solid #d1d5db;border-radius:8px;font-size:12px;text-align:center;}
.btn-rem{background:none;border:none;color:#dc2626;cursor:pointer;font-size:15px;padding:3px;}
.btn-add-est{background:none;color:#2563eb;border:1px dashed #93c5fd;border-radius:8px;padding:7px;font-size:12px;cursor:pointer;width:100%;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-add-est:hover{background:#eff6ff;}
.smart-search-wrap{position:relative;width:100%;}
.smart-search-wrap input[type="text"]{width:100%;padding:9px 28px 9px 11px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;}
.smart-search-wrap input[type="text"]:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.ss-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:14px;padding:0;display:none;}
.ss-clear.visible{display:block;}
.ss-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #d1d5db;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:200px;overflow-y:auto;z-index:9999;display:none;}
.ss-dropdown.open{display:block;}
.ss-option{padding:9px 12px;cursor:pointer;font-size:13px;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid #f3f4f6;}
.ss-option:last-child{border-bottom:none;}
.ss-option:hover{background:#eff6ff;}
.ss-name{font-weight:600;color:#111827;}
.ss-meta{font-size:11px;color:#6b7280;}
.ss-novo{padding:10px 12px;cursor:pointer;font-size:13px;color:#2563eb;font-weight:600;border-top:1px solid #e5e7eb;display:flex;align-items:center;gap:6px;}
.ss-novo:hover{background:#eff6ff;}
</style>
</head>
<body>
<div class="app">
<aside id="sidebar"></aside>
<main class="content">

  <div class="topbar">
    <h1>Atendimentos</h1>
    <div class="topbar-right">
      <a href="servicos.html" style="text-decoration:none"><button class="btn-ghost"><i class="fa fa-spa"></i> Serviços</button></a>
      <button class="btn-ghost" onclick="exportarExcel()"><i class="fa fa-file-excel"></i> Exportar</button>
      <button class="btn-green" onclick="abrirNovo()"><i class="fa fa-plus"></i> Novo Agendamento</button>
    </div>
  </div>


  <!-- RESUMO DO DIA -->
  <div class="resumo-bar" id="resumoBar">
    <div class="resumo-card" style="border-left-color:#f59e0b">
      <div class="rc-icon" style="background:#fef3c7;color:#d97706"><i class="fa fa-calendar-day"></i></div>
      <div><div class="rc-num" id="rsAgendado">—</div><div class="rc-label">Agendados</div><div class="rc-periodo" id="rsPeriodo1"></div></div>
    </div>
    <div class="resumo-card" style="border-left-color:#22c55e">
      <div class="rc-icon" style="background:#dcfce7;color:#16a34a"><i class="fa fa-check-circle"></i></div>
      <div><div class="rc-num" id="rsConfirmado">—</div><div class="rc-label">Confirmados</div><div class="rc-periodo" id="rsPeriodo2"></div></div>
    </div>
    <div class="resumo-card" style="border-left-color:#8E2440">
      <div class="rc-icon" style="background:#ffe4ec;color:#8E2440"><i class="fa fa-clock"></i></div>
      <div><div class="rc-num" id="rsNaoConf">—</div><div class="rc-label">Não confirmou</div><div class="rc-periodo" id="rsPeriodo3"></div></div>
    </div>
    <div class="resumo-card" style="border-left-color:#9ca3af">
      <div class="rc-icon" style="background:#f3f4f6;color:#6b7280"><i class="fa fa-ban"></i></div>
      <div><div class="rc-num" id="rsCancelado">—</div><div class="rc-label">Cancelados</div><div class="rc-periodo" id="rsPeriodo4"></div></div>
    </div>
    <div class="resumo-card" style="border-left-color:#a855f7">
      <div class="rc-icon" style="background:#f3e8ff;color:#7c3aed"><i class="fa fa-file-invoice-dollar"></i></div>
      <div><div class="rc-num" id="rsFaturado">—</div><div class="rc-label">Faturados</div><div class="rc-periodo" id="rsPeriodo5"></div></div>
    </div>
  </div>

  <!-- CONTROLES -->
  <div class="agenda-controls">
    <!-- Visão -->
    <div class="view-tabs">
      <button class="view-tab active" id="tabDia"    onclick="mudarView('dia')">Dia</button>
      <button class="view-tab"        id="tabSemana" onclick="mudarView('semana')">Semana</button>
      <button class="view-tab"        id="tabLista"  onclick="mudarView('lista')">Lista</button>
    </div>

    <!-- Navegação de data -->
    <div class="semana-nav" id="navData">
      <button class="btn-ghost" onclick="navegar(-1)"><i class="fa fa-chevron-left"></i></button>
      <button class="btn-ghost" onclick="irHoje()" style="font-size:12px">Hoje</button>
      <button class="btn-ghost" onclick="navegar(1)"><i class="fa fa-chevron-right"></i></button>
      <span class="semana-label" id="dataLabel"></span>
    </div>

    <!-- Filtro de status (lista) -->
    <div id="filtroStatusWrap" style="display:none;align-items:center;gap:6px;">
      <span style="font-size:12px;font-weight:600;color:#6b7280">Status:</span>
      <select id="filtroStatus" onchange="renderLista()" style="padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;">
        <option value="">Todos</option>
        <option>Agendado</option><option>Confirmado</option><option>Faturado</option><option>Cancelado</option>
      </select>
    </div>

    <!-- Seletor de profissional — DESTAQUE -->
    <div class="prof-selector" style="margin-left:auto;">
      <span class="prof-selector-label"><i class="fa fa-user" style="margin-right:5px"></i>Profissional</span>
      <select id="filtroTer" onchange="renderAtual()"><option value="">Todas</option></select>
    </div>
  </div>

  <!-- LEGENDA -->
  <div class="legenda-bar" id="legendaBar">
    <!-- preenchida dinamicamente por renderLegenda() após carregar grupos do Supabase -->
  </div>

  <div id="viewCal" class="cal-wrap"></div>
  <div id="viewLista" class="lista-wrap" style="display:none">
    <table><thead><tr>
      <th>Data/Hora</th><th>Cliente</th><th>Serviço</th>
      <th>Terapeuta(s)</th><th>Status</th><th>Valor</th><th>Ações</th>
    </tr></thead><tbody id="listaBody"></tbody></table>
  </div>

</main>
</div>

<!-- MODAL AGENDAMENTO -->
<div class="modal" id="modalAg">
<div class="modal-content">
  <div class="modal-header">
    <h2 id="agTitulo">Novo Agendamento</h2>
    <button class="btn-fechar" onclick="fecharAg()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="grid-2">
      <div class="mfield"><label>Data *</label><input type="date" id="agData"></div>
      <div class="mfield"><label>Origem</label><select id="agOrigem"><option value="">Selecione</option></select></div>
      <div class="mfield"><label>Hora Início *</label><input type="time" id="agHoraIni" oninput="autoFim()"></div>
      <div class="mfield"><label>Hora Fim</label><input type="time" id="agHoraFim"></div>
      <div class="mfield span2">
        <label>Cliente *</label>
        <div class="smart-search-wrap">
          <input type="text" id="agCliSrc" placeholder="Buscar por nome ou telefone…" autocomplete="off">
          <button class="ss-clear" id="agCliClr">✕</button>
          <input type="hidden" id="agCli">
          <div class="ss-dropdown" id="agCliDrop"></div>
        </div>
      </div>
      <div class="mfield span2"><label>Serviço *</label><select id="agServ" onchange="aoMudarServ()"><option value="">Selecione</option></select></div>
      <div class="mfield span2" id="campoTer1"><label>Terapeuta *</label><select id="agTer1" onchange="calcCom()"><option value="">Selecione</option></select></div>
      <div class="mfield span2" id="campoTer2" style="display:none"><label>2ª Terapeuta (Four Hands) *</label><select id="agTer2" onchange="calcCom()"><option value="">Selecione</option></select></div>
      <div class="span2" id="comWrap" style="display:none"><div class="com-box" id="comBox"></div></div>
      <div class="mfield span2"><label>Status</label>
        <select id="agStatus">
          <option value="Agendado">Agendado</option>
          <option value="Nao Confirmado">Cliente não confirmou</option>
          <option value="Confirmado">Confirmado</option>
          <option value="Cancelado">Cancelado</option>
        </select>
      </div>
      <div class="mfield span2"><label>Observação</label><textarea id="agObs" rows="2" placeholder="Opcional..."></textarea></div>
    </div>
    <div class="est-section">
      <h4><i class="fa fa-box"></i> Itens de Estoque</h4>
      <div id="agEst"></div>
      <button class="btn-add-est" onclick="addEst('agEst')"><i class="fa fa-plus"></i> Adicionar item</button>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharAg()">Cancelar</button>
    <button class="btn-green" onclick="salvarAg()"><i class="fa fa-save"></i> Salvar</button>
  </div>
</div>
</div>

<!-- MODAL DETALHES -->
<div class="modal" id="modalDet">
<div class="modal-content sm">
  <div class="modal-header">
    <h2 id="detTit">Detalhes</h2>
    <button class="btn-fechar" onclick="fecharDet()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="info-card" id="detInfo"></div>
    <div class="det-btns" id="detBtns"></div>
  </div>
</div>
</div>

<!-- MODAL PAGAMENTO -->
<div class="modal" id="modalPgto">
<div class="modal-content sm">
  <div class="modal-header">
    <h2>Confirmar Atendimento</h2>
    <button class="btn-fechar" onclick="fecharPgto()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="info-card" id="pgtoInfo"></div>
    <div class="grid-2">
      <div class="mfield"><label>Valor (R$)</label><input type="number" id="pgtoVal" step="0.01" oninput="calcPgto()"></div>
      <div class="mfield"><label>Desconto (R$)</label><input type="number" id="pgtoDes" value="0" step="0.01" oninput="calcPgto()"></div>
      <div class="mfield span2"><label>Valor Final</label><input type="number" id="pgtoFin" disabled style="background:#f9fafb;font-weight:700;color:#16a34a"></div>
      <div class="mfield span2"><label>Forma de Pagamento</label><select id="pgtoForma"><option value="">Selecione</option></select></div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharPgto()">Cancelar</button>
    <button class="btn-green" onclick="confirmar()"><i class="fa fa-check"></i> Confirmar</button>
  </div>
</div>
</div>

<!-- MODAL NOVO CLIENTE -->
<div class="modal" id="modalNC">
<div class="modal-content sm">
  <div class="modal-header"><h2>Novo Cliente</h2><button class="btn-fechar" onclick="fecharNC()"><i class="fa fa-times"></i></button></div>
  <div class="modal-body">
    <div class="mfield"><label>Nome *</label><input id="ncNome" placeholder="Nome completo"></div>
    <div class="mfield"><label>Telefone *</label><input id="ncTel" placeholder="(11) 99999-9999"></div>
    <div class="mfield"><label>Email</label><input id="ncEmail" type="email" placeholder="opcional"></div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharNC()">Cancelar</button>
    <button class="btn-blue" onclick="salvarNC()"><i class="fa fa-user-plus"></i> Cadastrar</button>
  </div>
</div>

<script>

/* ══════════════════════════════════════════
   CORES POR GRUPO — carregadas do Supabase (parametros.cor)
══════════════════════════════════════════ */
let gruposCorMap = {}; // grupo -> hex  (preenchido em carregarDados)

function renderLegenda(){
  const bar = document.getElementById("legendaBar");
  if(!bar) return;
  // Grupos com cor cadastrada, ordenados alfabeticamente
  const grupos = Object.keys(gruposCorMap).sort();
  let html = '<span class="legenda-titulo">Serviços:</span>';
  if(grupos.length){
    grupos.forEach(g=>{
      const cor = gruposCorMap[g];
      html += `<div class="leg"><div class="leg-dot" style="background:${cor}"></div>${g}</div>`;
    });
  } else {
    html += '<span style="font-size:11px;color:#9ca3af">Configure as cores em Serviços → Cores dos Grupos</span>';
  }
  html += `<div class="leg-sep"></div>
    <span class="legenda-titulo">Status:</span>
    <div class="leg-status"><div class="leg-status-dot" style="background:#22c55e"></div>Confirmado</div>
    <div class="leg-status"><div class="leg-status-dot" style="background:#f59e0b"></div>Agendado</div>
    <div class="leg-status"><div class="leg-status-dot" style="background:#8E2440"></div>Não confirmou</div>
    <div class="leg-status"><div class="leg-status-dot" style="background:#9ca3af"></div>Cancelado</div>
    <div class="leg-status"><div class="leg-status-dot" style="background:#a855f7"></div>Faturado</div>`;
  bar.innerHTML = html;
}

function corTexto(hex){
  if(!hex) return "#374151";
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)>150?"#1f2937":"#fff";
}

const STATUS_DOT = {
  "Agendado":       "#f59e0b",
  "Nao Confirmado": "#8E2440",
  "Confirmado":     "#22c55e",
  "Faturado":       "#a855f7",
  "Cancelado":      "#9ca3af",
};

const BADGE_CSS = {
  "Agendado":       "background:#fef3c7;color:#92400e",
  "Nao Confirmado": "background:#ffe4ec;color:#8E2440",
  "Confirmado":     "background:#dcfce7;color:#166534",
  "Faturado":       "background:#f3e8ff;color:#6b21a8",
  "Cancelado":      "background:#f3f4f6;color:#6b7280",
};

function corServico(s) {
  if (!s) return { bg:"#e5e7eb", txt:"#374151" };
  // Busca cor do grupo no mapa carregado do Supabase
  const hex = gruposCorMap[s.grupo] || null;
  if (hex) return { bg: hex, txt: corTexto(hex) };
  return { bg:"#e2e8f0", txt:"#374151" };
}

/* ══════════════════════════════════════════
   CONSTANTES E ESTADO
══════════════════════════════════════════ */
const HORA_INI=9, HORA_FIM=23, SLOT_H=30, ALT_SLOT=28;
const DIAS_PT=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const MESES_PT=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];

let dados=[], servicosMap={}, terapeutasMap={}, dadosProd=[], dadosServicos=[], dadosTers=[];
let formasPgto=[], editandoId=null, confirmandoId=null;
let viewAtual="semana", dataBase=new Date();
let ssAg;

const fmtM = v => Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtD = v => { if(!v)return"—"; const[y,m,d]=v.split("-"); return`${d}/${m}/${y}`; };
const fmtH = v => v ? v.substring(0,5) : "";
const hoje = () => { const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().split("T")[0]; };
const norm = s => (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
const nomeS = s => s ? [s.grupo, s.subgrupo, s.tempo?s.tempo+" min":""].filter(Boolean).join(" ") : "—";
const nomeC = c => { if(!c)return"—"; const t=(c.telefone_1||"").replace(/\D/g,""); const l4=t.length>=4?t.slice(-4):""; return l4?`${c.nome} ${l4}`:c.nome; };
const h2m = h => { if(!h)return 0; const[hh,mm]=h.split(":"); return+hh*60+ +mm; };
const isFour = sid => { const s=servicosMap[sid]; return s&&(s.grupo||"").toLowerCase().includes("four"); };

function getUser(cb,n=20){ if(window.usuarioLogado)return cb(window.usuarioLogado); if(n<=0)return cb(null); setTimeout(()=>getUser(cb,n-1),100); }
function eTerapeuta(u){ return u&&u.role==="usuario"; }
function podeEditar(u){ return u&&(u.role==="admin"||u.role==="apoio"); }

/* ══════ SMART SEARCH ══════ */
function mkSS({si,hi,drop,clr,onNovo}){
  let deb=null;
  const close=()=>drop.classList.remove("open");
  const open=rs=>{
    drop.innerHTML="";
    if(!rs.length) drop.innerHTML='<div style="padding:10px;color:#9ca3af;font-size:12px;text-align:center">Nenhum cliente</div>';
    else rs.forEach(c=>{
      const t=(c.telefone_1||"").replace(/\D/g,""),l4=t.length>=4?t.slice(-4):t;
      const el=document.createElement("div");el.className="ss-option";
      el.innerHTML=`<span class="ss-name">${c.nome}</span>${l4?`<span class="ss-meta">${l4}</span>`:""}`;
      el.addEventListener("mousedown",e=>{e.preventDefault();pick(c);});
      drop.appendChild(el);
    });
    if(onNovo){
      const el=document.createElement("div");el.className="ss-novo";
      el.innerHTML='<i class="fa fa-user-plus"></i> Cadastrar novo cliente';
      el.addEventListener("mousedown",e=>{e.preventDefault();onNovo(si.value);});
      drop.appendChild(el);
    }
    drop.classList.add("open");
  };
  const pick=c=>{
    const t=(c.telefone_1||"").replace(/\D/g,""),l4=t.length>=4?t.slice(-4):"";
    si.value=l4?`${c.nome}  ${l4}`:c.nome; hi.value=c.id;
    clr.classList.add("visible"); close();
  };
  const clear=()=>{si.value="";hi.value="";clr.classList.remove("visible");close();};
  async function buscar(q){
    const tok=q.split(/\s+/).filter(Boolean),tN=tok.filter(t=>/\D/.test(t)),tT=tok.filter(t=>/^\d+$/.test(t));
    let qb=client.from("clientes").select("id,nome,telefone_1");
    tN.forEach(t=>qb=qb.ilike("nome",`%${t}%`));
    tT.forEach(t=>qb=qb.ilike("telefone_1",`%${t}%`));
    const{data}=await qb.order("nome").limit(30); return data||[];
  }
  si.addEventListener("input",()=>{
    const v=si.value.trim();clr.classList.toggle("visible",v.length>0);hi.value="";
    clearTimeout(deb);if(!v){close();return;}
    drop.innerHTML='<div style="padding:10px;color:#9ca3af;font-size:12px;text-align:center">Buscando…</div>';
    drop.classList.add("open");
    deb=setTimeout(async()=>open(await buscar(norm(v))),280);
  });
  si.addEventListener("blur",()=>setTimeout(close,150));
  clr.addEventListener("click",clear);
  document.addEventListener("click",e=>{if(!si.closest(".smart-search-wrap").contains(e.target))close();});
  return{setValue(c){if(!c){clear();return;}pick(c);},clearSelection:clear};
}

/* ══════ CARGA DE DADOS ══════ */
async function carregarDados(){
  const{data:servs}=await client.from("servicos").select("*").eq("status","ativo").order("grupo");
  dadosServicos=servs||[]; dadosServicos.forEach(s=>servicosMap[s.id]=s);
  const selS=document.getElementById("agServ");
  dadosServicos.forEach(s=>selS.innerHTML+=`<option value="${s.id}">${nomeS(s)}</option>`);

  const{data:ters}=await client.from("terapeutas").select("cpf,nome_profissional,cargo").eq("status","Ativo").in("cargo",["Terapeuta Feminina","Terapeuta Masculino"]).order("nome_profissional");
  dadosTers=ters||[]; dadosTers.forEach(t=>{
    terapeutasMap[t.cpf]=t;
    ["agTer1","agTer2","filtroTer"].forEach(id=>document.getElementById(id).innerHTML+=`<option value="${t.cpf}">${t.nome_profissional}</option>`);
  });

  const{data:prods}=await client.from("produtos").select("id,nome").order("nome");
  dadosProd=prods||[];

  const{data:params}=await client.from("parametros").select("tipo,valor,cor").in("tipo",["origens_lead","formas_pagamento","grupos_servico"]).eq("ativo",true).order("valor");
  const origens=(params||[]).filter(p=>p.tipo==="origens_lead").map(p=>p.valor);
  formasPgto=(params||[]).filter(p=>p.tipo==="formas_pagamento").map(p=>p.valor);
  // Mapa grupo -> cor para o calendário
  gruposCorMap={};
  (params||[]).filter(p=>p.tipo==="grupos_servico"&&p.cor).forEach(p=>{gruposCorMap[p.valor]=p.cor;});
  renderLegenda();
  if(!origens.length) origens.push("Instagram","Google","Indicação","WhatsApp","Outro");
  if(!formasPgto.length) formasPgto.push("Dinheiro","PIX","Cartão Débito","Cartão Crédito");
  origens.forEach(o=>document.getElementById("agOrigem").innerHTML+=`<option>${o}</option>`);
  formasPgto.forEach(f=>document.getElementById("pgtoForma").innerHTML+=`<option>${f}</option>`);

  ssAg=mkSS({si:document.getElementById("agCliSrc"),hi:document.getElementById("agCli"),drop:document.getElementById("agCliDrop"),clr:document.getElementById("agCliClr"),onNovo:n=>abrirNC(n)});
}

async function carregar(){
  getUser(async u=>{
    let q=client.from("atendimentos")
      .select(`*,clientes(id,nome,telefone_1),servicos(id,grupo,subgrupo,tempo,valor,comissao),ter1:terapeutas!atendimentos_terapeuta1_cpf_fkey(cpf,nome_profissional),ter2:terapeutas!atendimentos_terapeuta2_cpf_fkey(cpf,nome_profissional)`)
      .order("data").order("hora_inicio");
    if(eTerapeuta(u)&&u.cpf) q=q.or(`terapeuta1_cpf.eq.${u.cpf},terapeuta2_cpf.eq.${u.cpf}`);
    const{data,error}=await q;
    if(error){console.error(error);return;}
    dados=data||[];
    renderAtual();
  });
}

/* ══════ VISÃO ══════ */
function renderAtual(){
  atualizarLabel();
  renderResumo();
  if(viewAtual==="lista") renderLista();
  else renderCal();
}

/* ══════ RESUMO DO DIA ══════ */
function renderResumo(){
  const filtroTer=document.getElementById("filtroTer").value;
  const dias=diasParaRender();
  const datas=new Set(dias.map(d=>isoDate(d)));
  const doPeriodo=dados.filter(r=>datas.has(r.data)&&(!filtroTer||r.terapeuta1_cpf===filtroTer||r.terapeuta2_cpf===filtroTer));
  const conta=s=>doPeriodo.filter(r=>r.status===s).length;
  document.getElementById("rsAgendado").textContent=conta("Agendado");
  document.getElementById("rsConfirmado").textContent=conta("Confirmado");
  document.getElementById("rsNaoConf").textContent=conta("Nao Confirmado");
  document.getElementById("rsCancelado").textContent=conta("Cancelado");
  document.getElementById("rsFaturado").textContent=conta("Faturado");
  // Label do período exibido nos cards
  let periodoLabel="";
  if(viewAtual==="lista") periodoLabel="";
  else if(dias.length===1) periodoLabel=fmtDiaCurto(dias[0]);
  else periodoLabel=fmtDiaCurto(dias[0])+" – "+fmtDiaCurto(dias[dias.length-1]);
  ["rsPeriodo1","rsPeriodo2","rsPeriodo3","rsPeriodo4","rsPeriodo5"].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.textContent=periodoLabel;
  });
}

function fmtDiaCurto(d){
  return d.getDate()+"/"+String(d.getMonth()+1).padStart(2,"0");
}

function diasParaRender(){
  if(viewAtual==="dia") return [new Date(dataBase)];
  const ini=new Date(dataBase);
  ini.setDate(ini.getDate()-ini.getDay()); // domingo
  return Array.from({length:7},(_,i)=>{const d=new Date(ini);d.setDate(d.getDate()+i);return d;});
}

function atualizarLabel(){
  const el=document.getElementById("dataLabel");
  if(viewAtual==="dia"){
    const d=dataBase;
    el.textContent=`${DIAS_PT[d.getDay()]}, ${d.getDate()} de ${MESES_PT[d.getMonth()]} de ${d.getFullYear()}`;
  } else if(viewAtual==="semana"){
    const dias=diasParaRender();
    const ini=dias[0],fim=dias[6];
    el.textContent=`${ini.getDate()} ${MESES_PT[ini.getMonth()]} – ${fim.getDate()} ${MESES_PT[fim.getMonth()]} ${fim.getFullYear()}`;
  } else {
    el.textContent="";
  }
}

function navegar(dir){
  if(viewAtual==="dia") dataBase.setDate(dataBase.getDate()+dir);
  else dataBase.setDate(dataBase.getDate()+dir*7);
  renderAtual();
}
function irHoje(){ dataBase=new Date(); dataBase.setHours(0,0,0,0); renderAtual(); }

function mudarView(v){
  viewAtual=v;
  ["dia","semana","lista"].forEach(n=>document.getElementById("tab"+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle("active",n===v));
  document.getElementById("viewCal").style.display=v!=="lista"?"":"none";
  document.getElementById("viewLista").style.display=v==="lista"?"":"none";
  document.getElementById("navData").style.display=v!=="lista"?"flex":"none";
  document.getElementById("filtroStatusWrap").style.display=v==="lista"?"flex":"none";
  renderAtual();
}

/* ══════ CALENDÁRIO ══════ */
function renderCal(){
  const wrap=document.getElementById("viewCal");
  const dias=diasParaRender();
  const filtroTer=document.getElementById("filtroTer").value;
  const hojeStr=hoje();
  const totalSlots=(HORA_FIM-HORA_INI)*2;
  const nCols=dias.length;

  /* cabeçalho */
  let html=`<div style="display:grid;grid-template-columns:52px repeat(${nCols},1fr);min-width:${nCols===1?320:620}px;position:sticky;top:0;z-index:3;background:#fff;">`;
  html+=`<div class="cal-corner"></div>`;
  dias.forEach(d=>{
    const dStr=isoDate(d);
    const isH=dStr===hojeStr;
    html+=`<div class="cal-day-hdr${isH?" hoje":""}"><div class="ds">${DIAS_PT[d.getDay()]}</div><div class="dn">${d.getDate()}</div></div>`;
  });
  html+=`</div>`;

  /* corpo */
  html+=`<div style="display:grid;grid-template-columns:52px repeat(${nCols},1fr);min-width:${nCols===1?320:620}px">`;

  /* coluna de horas */
  html+=`<div>`;
  for(let s=0;s<totalSlots;s++){
    const minT=HORA_INI*60+s*30,hh=Math.floor(minT/60),mm=minT%60;
    html+=`<div class="time-cell" style="height:${ALT_SLOT}px">${mm===0?String(hh).padStart(2,"0")+":00":""}</div>`;
  }
  html+=`</div>`;

  /* colunas de dia */
  dias.forEach(d=>{
    const dStr=isoDate(d);
    const isH=dStr===hojeStr;
    html+=`<div class="day-col${isH?" hoje-col":""}">`;

    /* slots clicáveis */
    for(let s=0;s<totalSlots;s++){
      const minT=HORA_INI*60+s*30,hh=String(Math.floor(minT/60)).padStart(2,"0"),mm=minT%60===0?"00":"30";
      html+=`<div class="${minT%60===0?"slot-line hora-cheia":"slot-line"}" style="height:${ALT_SLOT}px" onclick="abrirNovoSlot('${dStr}','${hh}:${mm}')"></div>`;
    }

    /* linha do agora */
    if(isH){
      const agora=new Date(),mAgora=agora.getHours()*60+agora.getMinutes();
      if(mAgora>=HORA_INI*60&&mAgora<=HORA_FIM*60){
        const topPx=((mAgora-HORA_INI*60)/30)*ALT_SLOT;
        html+=`<div class="linha-agora" style="top:${topPx}px"></div>`;
      }
    }

    /* cards */
    const cardsDia=dados.filter(r=>r.data===dStr&&(!filtroTer||r.terapeuta1_cpf===filtroTer||r.terapeuta2_cpf===filtroTer));
    /* empacotamento de sobreposição */
    const comMins=cardsDia.map(r=>({...r,mI:h2m(r.hora_inicio),mF:r.hora_fim?h2m(r.hora_fim):h2m(r.hora_inicio)+60}));
    comMins.forEach(r=>{r._col=0;comMins.forEach(o=>{if(o===r)return;if(o.mI<r.mF&&o.mF>r.mI&&o._col===r._col)r._col++;});});
    comMins.forEach(r=>{r._tot=1;comMins.forEach(o=>{if(o===r)return;if(o.mI<r.mF&&o.mF>r.mI)r._tot=Math.max(r._tot,r._col+1,o._col+1);});});

    comMins.forEach(r=>{
      const topPx=((r.mI-HORA_INI*60)/30)*ALT_SLOT;
      const hPx=Math.max(((r.mF-r.mI)/30)*ALT_SLOT-2,ALT_SLOT);
      const pct=100/r._tot, left=r._col*pct;
      const cor=corServico(r.servicos);
      const dot=STATUS_DOT[r.status]||"#9ca3af";
      const ter=[r.ter1?.nome_profissional,r.ter2?.nome_profissional].filter(Boolean).join("+");
      html+=`<div class="ag-card" onclick="abrirDet('${r.id}');event.stopPropagation()"
        style="top:${topPx}px;height:${hPx}px;left:calc(${left}% + 2px);width:calc(${pct}% - 5px);background:${cor.bg};color:${cor.txt};border-left:3px solid rgba(0,0,0,.18)">
        <div class="ag-status-dot" style="background:${dot}"></div>
        <div class="ag-hora">${fmtH(r.hora_inicio)}${r.hora_fim?"–"+fmtH(r.hora_fim):""}</div>
        <div class="ag-nome">${nomeC(r.clientes)}</div>
        <div class="ag-serv">${nomeS(r.servicos)}</div>
        ${ter?`<div class="ag-serv" style="opacity:.75">${ter}</div>`:""}
      </div>`;
    });

    html+=`</div>`;
  });
  html+=`</div>`;
  wrap.innerHTML=html;
}

function isoDate(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

/* ══════ LISTA ══════ */
function renderLista(){
  const fT=document.getElementById("filtroTer").value;
  const fS=document.getElementById("filtroStatus").value;
  const lista=dados.filter(r=>(!fT||r.terapeuta1_cpf===fT||r.terapeuta2_cpf===fT)&&(!fS||r.status===fS));
  const tbody=document.getElementById("listaBody");
  tbody.innerHTML="";
  if(!lista.length){tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:32px">Nenhum atendimento.</td></tr>`;return;}
  const u=window.usuarioLogado;
  lista.forEach(r=>{
    const cor=corServico(r.servicos);
    const css=BADGE_CSS[r.status]||"background:#f3f4f6;color:#6b7280";
    const ter=[r.ter1?.nome_profissional,r.ter2?.nome_profissional].filter(Boolean).join(" + ");
    const dot=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${STATUS_DOT[r.status]||"#9ca3af"};margin-right:5px;vertical-align:middle"></span>`;
    const servChip=`<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:${cor.bg};flex-shrink:0;display:inline-block"></span>${nomeS(r.servicos)}</span>`;
    const btnDel=podeEditar(u)?`<button class="btn-red" style="padding:5px 9px;font-size:12px" onclick="excluir('${r.id}')"><i class="fa fa-trash"></i></button>`:"";
    tbody.innerHTML+=`<tr>
      <td>${fmtD(r.data)} ${fmtH(r.hora_inicio)}</td>
      <td>${nomeC(r.clientes)}</td>
      <td>${servChip}</td>
      <td>${ter||"—"}</td>
      <td><span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;${css}">${dot}${r.status==="Nao Confirmado"?"Não confirmou":r.status}</span></td>
      <td>${r.valor_final?fmtM(r.valor_final):"—"}</td>
      <td style="display:flex;gap:6px">
        <button class="btn-yellow" style="padding:5px 9px;font-size:12px" onclick="abrirDet('${r.id}')"><i class="fa fa-eye"></i></button>
        ${btnDel}
      </td>
    </tr>`;
  });
}

/* ══════ MODAL AGENDAMENTO ══════ */
function resetAg(){
  ["agData","agHoraIni","agHoraFim","agObs"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  ["agServ","agOrigem","agTer1","agTer2"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("agStatus").value="Agendado";
  document.getElementById("agData").value=hoje();
  document.getElementById("agHoraIni").value="09:00";
  document.getElementById("agHoraFim").value="10:00";
  document.getElementById("campoTer2").style.display="none";
  document.getElementById("comWrap").style.display="none";
  document.getElementById("agEst").innerHTML="";
  ssAg?.clearSelection();
}

function abrirNovo(){
  editandoId=null; resetAg();
  getUser(u=>{
    const sel=document.getElementById("agTer1");
    if(eTerapeuta(u)&&u.cpf){sel.value=u.cpf;sel.disabled=true;}
    else sel.disabled=false;
    calcCom();
  });
  document.getElementById("agTitulo").textContent="Novo Agendamento";
  document.getElementById("modalAg").style.display="flex";
}

function abrirNovoSlot(data,hora){
  abrirNovo();
  document.getElementById("agData").value=data;
  document.getElementById("agHoraIni").value=hora;
  autoFim();
}
function fecharAg(){ document.getElementById("modalAg").style.display="none"; }

function autoFim(){
  const ini=document.getElementById("agHoraIni").value;
  const sid=document.getElementById("agServ").value;
  const dur=servicosMap[sid]?.tempo?parseInt(servicosMap[sid].tempo):60;
  if(!ini)return;
  const[hh,mm]=ini.split(":").map(Number);
  const f=hh*60+mm+dur;
  document.getElementById("agHoraFim").value=`${String(Math.floor(f/60)).padStart(2,"0")}:${String(f%60).padStart(2,"0")}`;
}

function aoMudarServ(){
  const s=servicosMap[document.getElementById("agServ").value];
  document.getElementById("campoTer2").style.display=s&&(s.grupo||"").toLowerCase().includes("four")?"":"none";
  autoFim(); calcCom();
}

function calcCom(){
  const s=servicosMap[document.getElementById("agServ").value];
  if(!s||!s.comissao){document.getElementById("comWrap").style.display="none";return;}
  const f=(s.grupo||"").toLowerCase().includes("four");
  const t1=terapeutasMap[document.getElementById("agTer1").value]?.nome_profissional||"";
  const t2=f?terapeutasMap[document.getElementById("agTer2").value]?.nome_profissional||"":"";
  const box=document.getElementById("comBox"); box.className="com-box"+(f?" four":" normal");
  if(f&&t1&&t2) box.innerHTML=`<i class="fa fa-handshake"></i> ${fmtM(s.comissao)} p/ <b>${t1}</b> + ${fmtM(s.comissao)} p/ <b>${t2}</b>`;
  else if(!f&&t1) box.innerHTML=`<i class="fa fa-handshake"></i> Comissão: <b>${fmtM(s.comissao)}</b> para <b>${t1}</b>`;
  else{document.getElementById("comWrap").style.display="none";return;}
  document.getElementById("comWrap").style.display="block";
}

async function salvarAg(){
  const cliId=document.getElementById("agCli").value;
  const servId=document.getElementById("agServ").value;
  const dataV=document.getElementById("agData").value;
  const ter1=document.getElementById("agTer1").value;
  if(!cliId){alert("Selecione um cliente.");return;}
  if(!servId){alert("Selecione um serviço.");return;}
  if(!dataV){alert("Informe a data.");return;}
  if(!ter1){alert("Selecione a terapeuta.");return;}
  const f=isFour(servId);
  const ter2=f?document.getElementById("agTer2").value:"";
  if(f&&!ter2){alert("Selecione a 2ª terapeuta.");return;}
  const s=servicosMap[servId];
  const payload={
    data:dataV, hora_inicio:document.getElementById("agHoraIni").value||null,
    hora_fim:document.getElementById("agHoraFim").value||null,
    status:document.getElementById("agStatus").value||"Agendado",
    cliente_id:cliId, servico_id:servId,
    terapeuta1_cpf:ter1, terapeuta2_cpf:ter2||null,
    origem_lead:document.getElementById("agOrigem").value||null,
    observacao:document.getElementById("agObs").value.trim()||null,
    valor:s?.valor||0, desconto:0, valor_final:s?.valor||0,
    comissao_total:f?(s?.comissao||0)*2:(s?.comissao||0)
  };
  let aid=editandoId, error;
  if(editandoId){({error}=await client.from("atendimentos").update(payload).eq("id",editandoId));}
  else{const{data:novo,error:e}=await client.from("atendimentos").insert(payload).select().single();error=e;if(novo)aid=novo.id;}
  if(error){alert("Erro: "+error.message);return;}
  const itens=getEst("agEst");
  if(itens.length&&aid){
    await client.from("atendimento_estoque").delete().eq("atendimento_id",aid);
    await client.from("atendimento_estoque").insert(itens.map(i=>({...i,atendimento_id:aid})));
  }
  fecharAg(); carregar();
}

/* ══════ MODAL DETALHES ══════ */
function abrirDet(id){
  const u=window.usuarioLogado;
  const r=dados.find(d=>d.id===id); if(!r)return;
  const ter=[r.ter1?.nome_profissional,r.ter2?.nome_profissional].filter(Boolean).join(" + ");
  const cor=corServico(r.servicos);
  const css=BADGE_CSS[r.status]||"background:#f3f4f6;color:#6b7280";
  const statusLabel=r.status==="Nao Confirmado"?"Não confirmou":r.status;
  document.getElementById("detTit").textContent=nomeC(r.clientes);
  document.getElementById("detInfo").innerHTML=`
    <b>Data:</b> ${fmtD(r.data)} ${fmtH(r.hora_inicio)?`às ${fmtH(r.hora_inicio)}`:""} ${r.hora_fim?"– "+fmtH(r.hora_fim):""}<br>
    <b>Serviço:</b> <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:${cor.bg};display:inline-block"></span>${nomeS(r.servicos)}</span><br>
    <b>Terapeuta(s):</b> ${ter||"—"}<br>
    <b>Origem:</b> ${r.origem_lead||"—"}<br>
    <b>Status:</b> <span style="display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;${css}"><span style="width:7px;height:7px;border-radius:50%;background:${STATUS_DOT[r.status]||"#9ca3af"};margin-right:5px;display:inline-block"></span>${statusLabel}</span><br>
    ${r.valor_final?`<b>Valor Final:</b> ${fmtM(r.valor_final)}<br>`:""}
    ${r.forma_pagamento?`<b>Pgto:</b> ${r.forma_pagamento}<br>`:""}
    ${r.observacao?`<b>Obs:</b> ${r.observacao}`:""}
  `;
  const btns=document.getElementById("detBtns"); btns.innerHTML="";
  if(r.status==="Agendado"||r.status==="Nao Confirmado"){
    mk(btns,"btn-green","fa-check Confirmar & Pagar",()=>{fecharDet();abrirPgto(id);});
    mk(btns,"btn-yellow","fa-pencil Editar",()=>{fecharDet();abrirEditar(id);});
    if(podeEditar(u)) mk(btns,"btn-red","fa-times Cancelar",async()=>{if(!confirm("Cancelar?"))return;await client.from("atendimentos").update({status:"Cancelado"}).eq("id",id);fecharDet();carregar();});
  }
  if(r.status==="Confirmado"){
    mk(btns,"btn-yellow","fa-pencil Editar",()=>{fecharDet();abrirEditar(id);});
    if(podeEditar(u)) mk(btns,"btn-ghost","fa-file-invoice Faturar",async()=>{if(!confirm("Marcar como Faturado?"))return;await client.from("atendimentos").update({status:"Faturado"}).eq("id",id);fecharDet();carregar();});
  }
  if(podeEditar(u)) mk(btns,"btn-ghost","fa-trash",async()=>{fecharDet();excluir(id);},true);
  document.getElementById("modalDet").style.display="flex";
}

function mk(container,cls,iconLabel,fn,danger=false){
  const b=document.createElement("button");
  const[icon,...label]=iconLabel.split(" ");
  b.className=cls;
  b.innerHTML=`<i class="fa ${icon}"${danger?" style='color:#dc2626'":""}></i>${label.join(" ")}`;
  b.onclick=fn; container.appendChild(b);
}
function fecharDet(){ document.getElementById("modalDet").style.display="none"; }

async function abrirEditar(id){
  editandoId=id; const r=dados.find(d=>d.id===id); if(!r)return;
  resetAg();
  document.getElementById("agTitulo").textContent="Editar Agendamento";
  document.getElementById("modalAg").style.display="flex";
  setTimeout(async()=>{
    document.getElementById("agData").value=r.data||"";
    document.getElementById("agHoraIni").value=fmtH(r.hora_inicio);
    document.getElementById("agHoraFim").value=fmtH(r.hora_fim);
    document.getElementById("agServ").value=r.servico_id||"";
    document.getElementById("agOrigem").value=r.origem_lead||"";
    document.getElementById("agStatus").value=r.status||"Agendado";
    const selTer1=document.getElementById("agTer1");
    selTer1.value=r.terapeuta1_cpf||"";
    getUser(u=>{selTer1.disabled=eTerapeuta(u);});
    document.getElementById("agObs").value=r.observacao||"";
    document.getElementById("campoTer2").style.display=isFour(r.servico_id)?"":"none";
    document.getElementById("agTer2").value=r.terapeuta2_cpf||"";
    calcCom();
    if(r.cliente_id){const{data:c}=await client.from("clientes").select("id,nome,telefone_1").eq("id",r.cliente_id).limit(1);ssAg?.setValue(c?.[0]||null);}
    const{data:itens}=await client.from("atendimento_estoque").select("produto_id,quantidade").eq("atendimento_id",id);
    document.getElementById("agEst").innerHTML="";
    (itens||[]).forEach(item=>{addEst("agEst");const rows=document.getElementById("agEst").querySelectorAll(".est-row");const last=rows[rows.length-1];last.querySelector("select").value=item.produto_id;last.querySelector("input[type=number]").value=item.quantidade;});
  },30);
}

/* ══════ MODAL PAGAMENTO ══════ */
function abrirPgto(id){
  confirmandoId=id; const r=dados.find(d=>d.id===id); if(!r)return;
  const s=servicosMap[r.servico_id];
  document.getElementById("pgtoInfo").innerHTML=`<b>${nomeC(r.clientes)}</b><br>${nomeS(r.servicos)}<br>${fmtD(r.data)} ${fmtH(r.hora_inicio)?`às ${fmtH(r.hora_inicio)}`:""}`; 
  document.getElementById("pgtoVal").value=s?.valor||r.valor||0;
  document.getElementById("pgtoDes").value=0; calcPgto();
  document.getElementById("pgtoForma").value="";
  document.getElementById("modalPgto").style.display="flex";
}
function fecharPgto(){ document.getElementById("modalPgto").style.display="none"; }
function calcPgto(){ const v=parseFloat(document.getElementById("pgtoVal").value||0),d=parseFloat(document.getElementById("pgtoDes").value||0);document.getElementById("pgtoFin").value=(v-d).toFixed(2); }
async function confirmar(){
  const r=dados.find(d=>d.id===confirmandoId);
  const s=r?servicosMap[r.servico_id]:null;
  const f=s&&(s.grupo||"").toLowerCase().includes("four");
  const v=parseFloat(document.getElementById("pgtoVal").value||0);
  const d=parseFloat(document.getElementById("pgtoDes").value||0);
  const{error}=await client.from("atendimentos").update({
    status:"Confirmado",valor:v,desconto:d,valor_final:v-d,
    comissao_total:f?(s?.comissao||0)*2:(s?.comissao||0),
    forma_pagamento:document.getElementById("pgtoForma").value||null
  }).eq("id",confirmandoId);
  if(error){alert("Erro: "+error.message);return;}
  fecharPgto(); carregar();
}

/* ══════ ESTOQUE ══════ */
function addEst(cid){
  const c=document.getElementById(cid),row=document.createElement("div");row.className="est-row";
  const sel=document.createElement("select");sel.innerHTML="<option value=''>Selecionar produto</option>";
  dadosProd.forEach(p=>sel.innerHTML+=`<option value="${p.id}">${p.nome}</option>`);
  const qty=document.createElement("input");qty.type="number";qty.min="1";qty.value="1";
  const btn=document.createElement("button");btn.className="btn-rem";btn.innerHTML='<i class="fa fa-times"></i>';btn.onclick=()=>c.removeChild(row);
  row.appendChild(sel);row.appendChild(qty);row.appendChild(btn);c.appendChild(row);
}
function getEst(cid){
  return Array.from(document.getElementById(cid).querySelectorAll(".est-row")).map(row=>{
    const sel=row.querySelector("select"),qty=row.querySelector("input[type=number]");
    return sel.value?{produto_id:sel.value,quantidade:+qty.value||1}:null;
  }).filter(Boolean);
}

/* ══════ NOVO CLIENTE ══════ */
function abrirNC(nome){document.getElementById("ncNome").value=nome||"";document.getElementById("ncTel").value="";document.getElementById("ncEmail").value="";document.getElementById("modalNC").style.display="flex";}
function fecharNC(){ document.getElementById("modalNC").style.display="none"; }
async function salvarNC(){
  const nome=document.getElementById("ncNome").value.trim(),tel=document.getElementById("ncTel").value.trim();
  if(!nome){alert("Nome obrigatório.");return;}if(!tel){alert("Telefone obrigatório.");return;}
  const{data:novo,error}=await client.from("clientes").insert({nome,telefone_1:tel,email:document.getElementById("ncEmail").value.trim()||null}).select().single();
  if(error){alert("Erro: "+error.message);return;}fecharNC();ssAg?.setValue(novo);
}

/* ══════ EXCLUIR / EXPORTAR ══════ */
async function excluir(id){
  if(!confirm("Excluir este atendimento?"))return;
  await client.from("atendimento_estoque").delete().eq("atendimento_id",id);
  await client.from("atendimentos").delete().eq("id",id);
  carregar();
}

function exportarExcel(){
  if(!dados.length){alert("Nada para exportar.");return;}
  const exp=dados.map(r=>({
    "Data":fmtD(r.data),"Hora":fmtH(r.hora_inicio),"Status":r.status==="Nao Confirmado"?"Não confirmou":r.status,
    "Cliente":nomeC(r.clientes),"Serviço":nomeS(r.servicos),
    "Terapeuta 1":r.ter1?.nome_profissional||"","Terapeuta 2":r.ter2?.nome_profissional||"",
    "Origem":r.origem_lead||"","Forma Pgto":r.forma_pagamento||"",
    "Valor":+r.valor||0,"Desconto":+r.desconto||0,"Final":+r.valor_final||0,"Comissão":+r.comissao_total||0
  }));
  const ws=XLSX.utils.json_to_sheet(exp);
  ws["!cols"]=Object.keys(exp[0]).map(col=>({wch:Math.max(col.length,...exp.map(r=>String(r[col]||"").length))+2}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Atendimentos");XLSX.writeFile(wb,"atendimentos.xlsx");
}

  dataBase=new Date(); dataBase.setHours(0,0,0,0);
  await carregarDados();
  getUser(u=>{
    if(eTerapeuta(u)&&u.cpf){
      const ft=document.getElementById("filtroTer");ft.value=u.cpf;ft.disabled=true;
    }
  });
  mudarView("semana");
  await carregar();
});
