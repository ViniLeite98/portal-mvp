<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

.app{display:flex}
.content{flex:1;padding:40px}

.grid{
display:grid;
grid-template-columns: 320px 1fr;
gap:30px;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

.lista-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-radius:12px;
background:#f9fafb;
margin-bottom:10px;
}

.qtd{
font-weight:bold;
}

.repor{
color:#dc2626;
font-size:12px;
}

.ok{
color:#16a34a;
font-size:12px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Estoque</h1>

<div class="grid">

<!-- CADASTRO -->
<div class="card">

<h3>Novo Produto</h3>

<input id="nome" placeholder="Nome">
<select id="categoria">
<option value="">Categoria</option>
<option>Bebida</option>
<option>Higiene</option>
<option>Comida</option>
<option>Outros</option>
</select>

<input id="unidade" placeholder="Unidade (ml, un)">
<input id="minimo" type="number" placeholder="Alerta de reposição">

<button onclick="criarProduto()">Cadastrar</button>

<hr style="margin:15px 0">

<h3>Movimentar</h3>

<select id="produtoMov"></select>
<input id="qtd" type="number" placeholder="Quantidade">

<button onclick="entrada()">+ Entrada</button>
<button onclick="saida()" style="background:#dc2626;margin-top:5px">- Saída</button>

</div>

<!-- LISTA -->
<div class="card">

<h3>Produtos</h3>
<div id="lista"></div>

</div>

</div>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

async function criarProduto(){

const nome = document.getElementById("nome").value.trim()

if(!nome){
alert("Digite o nome")
return
}

const { data: existe } = await supabaseClient
.from("produtos")
.select("id")
.ilike("nome", nome)

if(existe.length){
alert("Produto já existe")
return
}

await supabaseClient
.from("produtos")
.insert({
nome,
categoria:document.getElementById("categoria").value,
unidade:document.getElementById("unidade").value,
estoque_minimo:document.getElementById("minimo").value || 0
})

carregar()

}

async function carregar(){

const {data} = await supabaseClient
.from("estoque_atual")
.select("*")
.order("nome")

const lista = document.getElementById("lista")
lista.innerHTML=""

data.forEach(p=>{

const baixo = p.saldo <= p.estoque_minimo

lista.innerHTML+=`
<div class="lista-item">

<div>
<div><strong>${p.nome}</strong></div>
<div>${p.categoria || ""}</div>
</div>

<div style="text-align:right">
<div class="qtd">${p.saldo} ${p.unidade || ""}</div>
<div class="${baixo ? 'repor':'ok'}">
${baixo ? '⚠️ Repor' : 'OK'}
</div>
</div>

</div>
`
})

// select
const sel=document.getElementById("produtoMov")
sel.innerHTML=""
data.forEach(p=>{
sel.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
})

}

async function entrada(){

const id=document.getElementById("produtoMov").value
const qtd=document.getElementById("qtd").value

if(!qtd) return

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,
tipo:"entrada",
quantidade:qtd
})

carregar()
}

async function saida(){

const id=document.getElementById("produtoMov").value
const qtd=document.getElementById("qtd").value

if(!qtd) return

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id:id,
tipo:"saida",
quantidade:qtd
})

carregar()
}

carregar()

</script>

</body>
</html>
