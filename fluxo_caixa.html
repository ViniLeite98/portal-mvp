<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/sidebar/sidebar.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f7fb;}
.app{display:flex;min-height:100vh;}
#sidebar{width:260px;flex-shrink:0;}
.content{flex:1;padding:40px;}

/* ── TOPBAR ── */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.topbar h1{margin:0;}
.topbar-btns{display:flex;gap:10px;}
button{background:#1f2937;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
button:hover{opacity:.9;}
button.btn-green{background:#16a34a;}
button.btn-red{background:#dc2626;}
button.btn-blue{background:#2563eb;}
button.btn-yellow{background:#d97706;}
button.btn-ghost{background:#fff;color:#374151;border:1px solid #d1d5db;}
button.btn-ghost:hover{background:#f9fafb;}

/* ── FILTROS ── */
.filtros-card{
  background:#fff;border-radius:14px;padding:20px 24px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:20px;
  display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;
}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;font-weight:600;color:#374151;}
.field input,.field select{
  padding:8px 11px;border:1px solid #d1d5db;border-radius:8px;
  font-size:13px;color:#111827;background:#fff;
}
.field input:focus,.field select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}

/* ── SMART SEARCH ── */
.smart-search-wrap{position:relative;min-width:200px;}
.smart-search-wrap input[type="text"]{width:100%;padding:8px 28px 8px 11px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;}
.smart-search-wrap input[type="text"]:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.ss-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:14px;padding:0;display:none;line-height:1;}
.ss-clear.visible{display:block;}
.ss-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #d1d5db;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:220px;overflow-y:auto;z-index:9999;display:none;}
.ss-dropdown.open{display:block;}
.ss-option{padding:9px 12px;cursor:pointer;font-size:13px;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid #f3f4f6;transition:background .1s;}
.ss-option:last-child{border-bottom:none;}
.ss-option:hover,.ss-option.focused{background:#eff6ff;}
.ss-name{font-weight:600;color:#111827;}
.ss-meta{font-size:11px;color:#6b7280;}
.ss-highlight{background:#fef9c3;border-radius:2px;padding:0 1px;}
.ss-empty{padding:12px;color:#9ca3af;font-size:13px;text-align:center;}
.ss-novo{padding:10px 12px;cursor:pointer;font-size:13px;color:#2563eb;font-weight:600;border-top:1px solid #e5e7eb;display:flex;align-items:center;gap:6px;}
.ss-novo:hover{background:#eff6ff;}

/* ── TOTALIZADOR ── */
.totais{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;
}
.total-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.total-card .t-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:4px;}
.total-card .t-valor{font-size:20px;font-weight:800;color:#111827;}

/* ── TABELA ── */
.table-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
table{width:100%;border-collapse:collapse;}
th,td{padding:13px 16px;border-bottom:1px solid #e5e7eb;font-size:13px;text-align:left;}
th{background:#f9fafb;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:10;padding:30px 20px;overflow-y:auto;}
.modal-content{background:#fff;width:520px;max-width:100%;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-content.sm{width:420px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;}
.modal-header h2{margin:0;font-size:18px;color:#111827;}
.btn-fechar{background:none;color:#6b7280;font-size:20px;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.btn-fechar:hover{background:#f3f4f6;}
.modal-body{padding:24px;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid #e5e7eb;background:#f9fafb;}
.modal-footer button{padding:9px 20px;}
.btn-cancel{background:#fff;color:#374151;border:1px solid #d1d5db;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.span2{grid-column:span 2;}
.modal-body .field{margin-bottom:12px;}
.modal-body .field:last-child{margin-bottom:0;}
.modal-body input,.modal-body select{width:100%;padding:9px 11px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;}
.modal-body input:focus,.modal-body select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
</style>
</head>

<body>
<div class="app">
<aside id="sidebar"></aside>
<main class="content">

  <div class="topbar">
    <h1>Fluxo de Caixa</h1>
    <div class="topbar-btns">
      <button class="btn-green" onclick="abrirNovo()"><i class="fa fa-plus"></i> Novo Lançamento</button>
      <button onclick="exportarExcel()"><i class="fa fa-file-excel"></i> Exportar</button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="filtros-card">
    <div class="field">
      <label>Data Inicial</label>
      <input type="date" id="filtroInicio">
    </div>
    <div class="field">
      <label>Data Final</label>
      <input type="date" id="filtroFim">
    </div>
    <div class="field">
      <label>Cliente</label>
      <div class="smart-search-wrap">
        <input type="text" id="filtroClienteSearch" placeholder="Todos os clientes…" autocomplete="off">
        <button class="ss-clear" id="filtroClienteClear">✕</button>
        <input type="hidden" id="filtroCliente">
        <div class="ss-dropdown" id="filtroClienteDropdown"></div>
      </div>
    </div>
    <div class="field">
      <label>Serviço</label>
      <select id="filtroServico"><option value="">Todos</option></select>
    </div>
    <div class="field">
      <label>Origem</label>
      <select id="filtroOrigem"><option value="">Todas</option></select>
    </div>
    <button class="btn-blue" onclick="aplicarFiltro()"><i class="fa fa-filter"></i> Filtrar</button>
    <button class="btn-ghost" onclick="limparFiltro()"><i class="fa fa-times"></i> Limpar</button>
  </div>

  <!-- Totalizadores -->
  <div class="totais">
    <div class="total-card">
      <div class="t-label"><i class="fa fa-list"></i> Lançamentos</div>
      <div class="t-valor" id="totalCount">—</div>
    </div>
    <div class="total-card">
      <div class="t-label"><i class="fa fa-dollar-sign"></i> Total Bruto</div>
      <div class="t-valor" id="totalBruto">—</div>
    </div>
    <div class="total-card">
      <div class="t-label"><i class="fa fa-tag"></i> Total Descontos</div>
      <div class="t-valor" id="totalDescontos" style="color:#dc2626">—</div>
    </div>
    <div class="total-card" style="border-left:3px solid #16a34a">
      <div class="t-label" style="color:#16a34a"><i class="fa fa-check-circle"></i> Total Final</div>
      <div class="t-valor" id="totalFinal" style="color:#16a34a">—</div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Cliente</th>
          <th>Origem</th>
          <th>Serviço</th>
          <th>Valor</th>
          <th>Desconto</th>
          <th>Final</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</main>
</div>

<!-- MODAL NOVO / EDITAR LANÇAMENTO -->
<div class="modal" id="modalLancamento">
<div class="modal-content">
  <div class="modal-header">
    <h2 id="modalLancTitulo">Novo Lançamento</h2>
    <button class="btn-fechar" onclick="fecharModalLanc()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="grid-2">
      <div class="field">
        <label>Data *</label>
        <input type="date" id="lancData">
      </div>
      <div class="field">
        <label>Origem</label>
        <select id="lancOrigem"><option value="">Selecione</option></select>
      </div>
      <div class="field span2">
        <label>Cliente *</label>
        <div class="smart-search-wrap" style="min-width:unset">
          <input type="text" id="clienteSearch" placeholder="Buscar por nome ou telefone…" autocomplete="off">
          <button class="ss-clear" id="clienteClear">✕</button>
          <input type="hidden" id="cliente">
          <div class="ss-dropdown" id="clienteDropdown"></div>
        </div>
      </div>
      <div class="field span2">
        <label>Serviço *</label>

        <label>Valor (R$)</label>
        <input type="number" id="lancValor" value="0" step="0.01" oninput="calcularLanc()">

      <div class="field">
        <label>Desconto (R$)</label>

      <div class="field span2">
        <label>Valor Final</label>

  <div class="modal-footer">

    <button class="btn-green" onclick="salvar()"><i class="fa fa-save"></i> Salvar</button>
  </div>
</div>
</div>

<!-- MODAL NOVO CLIENTE RÁPIDO -->
<div class="modal" id="modalNovoCliente">
<div class="modal-content sm">
  <div class="modal-header">
    <h2>Novo Cliente</h2>
    <button class="btn-fechar" onclick="fecharModalCliente()"><i class="fa fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div class="field">
      <label>Nome *</label>
      <input id="ncNome" placeholder="Nome completo">
    </div>
    <div class="field">
      <label>Telefone *</label>
      <input id="ncTelefone" placeholder="(11) 99999-9999">
    </div>
    <div class="field">
      <label>Email</label>
      <input id="ncEmail" type="email" placeholder="opcional">
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="fecharModalCliente()">Cancelar</button>
    <button class="btn-blue" onclick="salvarNovoCliente()"><i class="fa fa-user-plus"></i> Cadastrar</button>
  </div>
</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/sidebar/sidebar.js"></script>
<script>

let dados        = [];
let listaFiltrada = [];
let dadosServicos = [];
let servicosMap   = {};
let editandoId    = null;
let ssCliente, ssFiltroCliente;

/* ── HELPERS ── */
function fmtMoeda(v){ return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function fmtData(v){
  if(!v) return "—";
  const [y,m,d] = v.split("-");
  return `${d}/${m}/${y}`;
}
function normalizar(str){
  return (str||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}
function nomeCliente(c){
  if(!c) return "—";
  const tel = (c.telefone_1||"").replace(/\D/g,"");
  const last4 = tel.length >= 4 ? tel.slice(-4) : "";
  return last4 ? `${c.nome} ${last4}` : c.nome;
}
function nomeServico(s){
  if(!s) return "—";
  const partes = [s.grupo, s.subgrupo, s.tempo ? s.tempo+" min" : ""];
  return partes.filter(Boolean).join(" ");
}
function hoje(){
  const d = new Date();
  return new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().split("T")[0];
}
function calcularLanc(){
  const v = parseFloat(document.getElementById("lancValor").value||0);
  const d = parseFloat(document.getElementById("lancDesconto").value||0);
  document.getElementById("lancFinal").value = (v - d).toFixed(2);
}

/* ── SMART SEARCH ── */
function createSmartSearch({searchInput, hiddenInput, dropdown, clearBtn, onNovoCliente}){
  let focusedIndex = -1, debounceTimer = null;

  function getTokens(){ return normalizar(searchInput.value.trim()).split(/\s+/).filter(Boolean); }

  function openDropdown(results){
    focusedIndex = -1;
    dropdown.innerHTML = "";
    if(!results.length){
      dropdown.innerHTML = '<div class="ss-empty">Nenhum cliente encontrado</div>';
    } else {
      const tokens = getTokens();
      results.forEach(c => {
        const tel   = (c.telefone_1||"").replace(/\D/g,"");
        const last4 = tel.length >= 4 ? tel.slice(-4) : tel;
        const full  = tel.length > 4 ? `(${tel.slice(0,-4)}) ${last4}` : tel;
        const el    = document.createElement("div");
        el.className = "ss-option";
        el.innerHTML = `<span class="ss-name">${highlight(c.nome||"", tokens)}</span>${full?`<span class="ss-meta"><i class="fa fa-phone" style="font-size:10px"></i> ${full}</span>`:""}`;
        el.addEventListener("mousedown", e => { e.preventDefault(); select(c); });
        dropdown.appendChild(el);
      });
    }
    // botão novo cliente
    if(onNovoCliente){
      const novoEl = document.createElement("div");
      novoEl.className = "ss-novo";
      novoEl.innerHTML = `<i class="fa fa-user-plus"></i> Cadastrar novo cliente`;
      novoEl.addEventListener("mousedown", e => { e.preventDefault(); onNovoCliente(searchInput.value); });
      dropdown.appendChild(novoEl);
    }
    dropdown.classList.add("open");
  }

  function highlight(str, tokens){
    let out = str;
    tokens.forEach(tok => {
      const re = new RegExp(`(${tok.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi");
      out = out.replace(re, '<span class="ss-highlight">$1</span>');
    });
    return out;
  }

  function closeDropdown(){ dropdown.classList.remove("open"); focusedIndex = -1; }

  function select(c){
    const tel   = (c.telefone_1||"").replace(/\D/g,"");
    const last4 = tel.length >= 4 ? tel.slice(-4) : "";
    searchInput.value = last4 ? `${c.nome}  ${last4}` : c.nome;
    hiddenInput.value = c.id;
    clearBtn.classList.add("visible");
    closeDropdown();
  }

  function clearSelection(){
    searchInput.value = "";
    hiddenInput.value = "";
    clearBtn.classList.remove("visible");
    closeDropdown();
  }

  function setValue(c){
    if(!c){ clearSelection(); return; }
    select(c);
  }

  async function buscar(query){
    const tokens  = query.trim().split(/\s+/).filter(Boolean);
    const tokNome = tokens.filter(t => /\D/.test(t));
    const tokTel  = tokens.filter(t => /^\d+$/.test(t));
    let q = client.from("clientes").select("id,nome,telefone_1");
    tokNome.forEach(t => q = q.ilike("nome", `%${t}%`));
    tokTel.forEach(t  => q = q.ilike("telefone_1", `%${t}%`));
    const {data} = await q.order("nome").limit(30);
    return data || [];
  }

  searchInput.addEventListener("input", () => {
    const val = searchInput.value.trim();
    clearBtn.classList.toggle("visible", val.length > 0);
    hiddenInput.value = "";
    clearTimeout(debounceTimer);
    if(!val){ closeDropdown(); return; }
    dropdown.innerHTML = '<div class="ss-empty">Buscando…</div>';
    dropdown.classList.add("open");
    debounceTimer = setTimeout(async () => {
      openDropdown(await buscar(normalizar(val)));
    }, 280);
  });

  searchInput.addEventListener("keydown", e => {
    const items = dropdown.querySelectorAll(".ss-option");
    if(!dropdown.classList.contains("open") || !items.length) return;
    if(e.key === "ArrowDown"){ e.preventDefault(); focusedIndex = Math.min(focusedIndex+1, items.length-1); }
    else if(e.key === "ArrowUp"){ e.preventDefault(); focusedIndex = Math.max(focusedIndex-1, 0); }
    else if(e.key === "Enter" && focusedIndex >= 0){ e.preventDefault(); items[focusedIndex].dispatchEvent(new Event("mousedown")); return; }
    else if(e.key === "Escape"){ closeDropdown(); return; }
    items.forEach((el,i) => el.classList.toggle("focused", i === focusedIndex));
    if(focusedIndex >= 0) items[focusedIndex].scrollIntoView({block:"nearest"});
  });

  searchInput.addEventListener("blur", () => setTimeout(closeDropdown, 150));
  clearBtn.addEventListener("click", clearSelection);
  document.addEventListener("click", e => {
    if(!searchInput.closest(".smart-search-wrap").contains(e.target)) closeDropdown();
  });

  return {setValue, clearSelection};
}

/* ── CARREGAR SELECTS ── */
async function carregarSelects(){
  // serviços
  const {data: servs} = await client.from("servicos").select("*").eq("status","ativo");
  dadosServicos = servs || [];
  const selLanc = document.getElementById("lancServico");
  dadosServicos.forEach(s => {
    servicosMap[s.id] = s;
    selLanc.innerHTML += `<option value="${s.id}">${nomeServico(s)}</option>`;
    document.getElementById("filtroServico").innerHTML += `<option value="${s.id}">${nomeServico(s)}</option>`;
  });

  // origens do parametros
  const {data: origens} = await client.from("parametros").select("valor")
    .eq("tipo","origens_lead").eq("ativo",true).order("valor");
  const origensLista = origens?.length
    ? origens.map(o => o.valor)
    : ["Instagram","Google","Indicação","Cliente antigo","WhatsApp","Outro"];

  [document.getElementById("lancOrigem"), document.getElementById("filtroOrigem")].forEach((sel, i) => {
    if(i === 1) sel.innerHTML = "<option value=''>Todas</option>";
    origensLista.forEach(o => sel.innerHTML += `<option value="${o}">${o}</option>`);
  });

  // smart search lançamento (com botão novo cliente)
  ssCliente = createSmartSearch({
    searchInput:  document.getElementById("clienteSearch"),
    hiddenInput:  document.getElementById("cliente"),
    dropdown:     document.getElementById("clienteDropdown"),
    clearBtn:     document.getElementById("clienteClear"),
    onNovoCliente: (nome) => abrirModalCliente(nome)
  });

  // smart search filtro (sem botão novo cliente)
  ssFiltroCliente = createSmartSearch({
    searchInput: document.getElementById("filtroClienteSearch"),
    hiddenInput: document.getElementById("filtroCliente"),
    dropdown:    document.getElementById("filtroClienteDropdown"),
    clearBtn:    document.getElementById("filtroClienteClear"),
  });

  // listener serviço → preenche valor
  document.getElementById("lancServico").addEventListener("change", () => {
    const s = servicosMap[document.getElementById("lancServico").value];
    if(s){ document.getElementById("lancValor").value = s.valor || 0; calcularLanc(); }
  });
}

/* ── CARREGAR LISTA ── */
async function carregar(){
  const {data, error} = await client
    .from("fluxo_caixa")
    .select("*,clientes(*),servicos(*)")
    .order("data",{ascending:false});
  if(error){ console.error(error); return; }
  dados = data || [];
  listaFiltrada = [...dados];
  render();
}

/* ── RENDER ── */
function render(){
  const tbody = document.getElementById("lista");
  tbody.innerHTML = "";

  if(!listaFiltrada.length){
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#9ca3af;padding:32px">Nenhum lançamento encontrado.</td></tr>`;
    atualizarTotais([]);
    return;
  }

  listaFiltrada.forEach(r => {
    tbody.innerHTML += `
    <tr>
      <td>${fmtData(r.data)}</td>
      <td>${nomeCliente(r.clientes)}</td>
      <td>${r.origem_lead||"—"}</td>
      <td>${nomeServico(r.servicos)}</td>
      <td>${fmtMoeda(r.valor)}</td>
      <td>${fmtMoeda(r.desconto)}</td>
      <td><strong>${fmtMoeda(r.valor_final)}</strong></td>
      <td style="display:flex;gap:6px">
        <button class="btn-yellow" onclick="abrirEditar('${r.id}')"><i class="fa fa-pencil"></i></button>
        <button class="btn-red"    onclick="excluir('${r.id}')"><i class="fa fa-trash"></i></button>
      </td>
    </tr>`;
  });

  atualizarTotais(listaFiltrada);
}

function atualizarTotais(lista){
  const count    = lista.length;
  const bruto    = lista.reduce((s,r) => s + (r.valor||0), 0);
  const descontos= lista.reduce((s,r) => s + (r.desconto||0), 0);
  const final    = lista.reduce((s,r) => s + (r.valor_final||0), 0);
  document.getElementById("totalCount").textContent    = count;
  document.getElementById("totalBruto").textContent    = fmtMoeda(bruto);
  document.getElementById("totalDescontos").textContent= fmtMoeda(descontos);
  document.getElementById("totalFinal").textContent    = fmtMoeda(final);
}

/* ── FILTRO ── */
function aplicarFiltro(){
  const ini    = document.getElementById("filtroInicio").value;
  const fim    = document.getElementById("filtroFim").value;
  const cliId  = document.getElementById("filtroCliente").value;
  const servId = document.getElementById("filtroServico").value;
  const orig   = document.getElementById("filtroOrigem").value;

  listaFiltrada = dados.filter(r => {
    if(ini    && r.data < ini)              return false;
    if(fim    && r.data > fim)              return false;
    if(cliId  && r.cliente_id !== cliId)    return false;
    if(servId && r.servico_id !== servId)   return false;
    if(orig   && r.origem_lead !== orig)    return false;
    return true;
  });
  render();
}

function limparFiltro(){
  document.getElementById("filtroInicio").value = "";
  document.getElementById("filtroFim").value    = "";
  document.getElementById("filtroServico").value = "";
  document.getElementById("filtroOrigem").value  = "";
  ssFiltroCliente.clearSelection();
  listaFiltrada = [...dados];
  render();
}

/* ── MODAL LANÇAMENTO ── */
function abrirNovo(){
  editandoId = null;
  document.getElementById("lancData").value     = hoje();
  document.getElementById("lancServico").value  = "";
  document.getElementById("lancOrigem").value   = "";
  document.getElementById("lancValor").value    = "0";
  document.getElementById("lancDesconto").value = "0";
  document.getElementById("lancFinal").value    = "0";
  ssCliente.clearSelection();
  document.getElementById("modalLancTitulo").textContent = "Novo Lançamento";
  document.getElementById("modalLancamento").style.display = "flex";
}

async function abrirEditar(id){
  editandoId = id;
  const r = dados.find(d => String(d.id) === String(id));
  if(!r){ console.error("Lançamento não encontrado:", id); return; }

  // abre o modal primeiro para garantir que os selects estão visíveis
  document.getElementById("modalLancTitulo").textContent = "Editar Lançamento";
  document.getElementById("modalLancamento").style.display = "flex";

  // preencher campos
  document.getElementById("lancData").value     = r.data || "";
  document.getElementById("lancValor").value    = r.valor || 0;
  document.getElementById("lancDesconto").value = r.desconto || 0;
  calcularLanc();

  // serviço — aguarda um tick para o select estar pronto
  setTimeout(() => {
    document.getElementById("lancServico").value = r.servico_id || "";
    document.getElementById("lancOrigem").value  = r.origem_lead || "";
  }, 50);

  // carregar cliente
  if(r.cliente_id){
    const {data: cArr} = await client.from("clientes").select("id,nome,telefone_1").eq("id",r.cliente_id).limit(1);
    ssCliente.setValue(cArr?.[0] || null);
  } else {
    ssCliente.clearSelection();
  }
}

function fecharModalLanc(){
  document.getElementById("modalLancamento").style.display = "none";
}

async function salvar(){
  const clienteId = document.getElementById("cliente").value;
  const servicoId = document.getElementById("lancServico").value;
  const dataVal   = document.getElementById("lancData").value;

  if(!clienteId){ alert("Selecione um cliente."); return; }
  if(!servicoId){ alert("Selecione um serviço."); return; }
  if(!dataVal)  { alert("Informe a data."); return; }

  const valor      = parseFloat(document.getElementById("lancValor").value||0);
  const desconto   = parseFloat(document.getElementById("lancDesconto").value||0);
  const valor_final= valor - desconto;
  const origem_lead= document.getElementById("lancOrigem").value || null;

  let error;
  if(editandoId){
    ({error} = await client.from("fluxo_caixa").update({
      data: dataVal, cliente_id: clienteId, servico_id: servicoId,
      valor, desconto, valor_final, origem_lead
    }).eq("id", editandoId));
  } else {
    ({error} = await client.from("fluxo_caixa").insert({
      data: dataVal, cliente_id: clienteId, servico_id: servicoId,
      valor, desconto, valor_final, origem_lead
    }));
  }

  if(error){ alert("Erro ao salvar: "+error.message); return; }
  fecharModalLanc();
  carregar();
}

async function excluir(id){
  if(!confirm("Excluir este lançamento?")) return;
  await client.from("fluxo_caixa").delete().eq("id",id);
  carregar();
}

/* ── MODAL NOVO CLIENTE ── */
let _nomePreenchido = "";
function abrirModalCliente(nome){
  _nomePreenchido = nome || "";
  document.getElementById("ncNome").value     = nome || "";
  document.getElementById("ncTelefone").value = "";
  document.getElementById("ncEmail").value    = "";
  document.getElementById("modalNovoCliente").style.display = "flex";
}
function fecharModalCliente(){
  document.getElementById("modalNovoCliente").style.display = "none";
}

async function salvarNovoCliente(){
  const nome = document.getElementById("ncNome").value.trim();
  const tel  = document.getElementById("ncTelefone").value.trim().replace(/\D/g,"");
  if(!nome){ alert("Nome obrigatório."); return; }
  if(!tel) { alert("Telefone obrigatório."); return; }

  const {data: novo, error} = await client.from("clientes")
    .insert({nome, telefone_1: tel, email: document.getElementById("ncEmail").value.trim()||null})
    .select().single();

  if(error){ alert("Erro: "+error.message); return; }

  fecharModalCliente();
  // seleciona automaticamente no campo de lançamento
  ssCliente.setValue(novo);
}

/* ── EXPORTAR ── */
function exportarExcel(){
  if(!listaFiltrada.length){ alert("Nada para exportar."); return; }
  const exportData = listaFiltrada.map(r => ({
    "Data":     fmtData(r.data),
    "Cliente":  nomeCliente(r.clientes),
    "Origem":   r.origem_lead || "",
    "Serviço":  nomeServico(r.servicos),
    "Valor":    Number(r.valor||0),
    "Desconto": Number(r.desconto||0),
    "Final":    Number(r.valor_final||0)
  }));
  const ws = XLSX.utils.json_to_sheet(exportData);
  const colunas = ["Data","Cliente","Origem","Serviço","Valor","Desconto","Final"];
  ws["!cols"] = colunas.map(col => ({
    wch: Math.max(col.length, ...exportData.map(r => String(r[col]||"").length)) + 2
  }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Fluxo de Caixa");
  XLSX.writeFile(wb, "fluxo_caixa.xlsx");
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
  carregarSelects();
  carregar();
});
