<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificações | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

.app{
display:flex;
min-height:100vh;
}

#sidebar{
width:260px;
flex-shrink:0;
}

.content{
flex:1;
padding:40px;
}

h1{margin-top:0}

/* FORM */

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-box div{
display:flex;
flex-direction:column;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
min-width:200px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

button.excluir{background:#dc2626}
button.editar{background:#f59e0b}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.busca{
display:flex;
gap:10px;
}

.busca input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
width:220px;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#f9fafb;
text-align:left;
}

.servico{
display:flex;
align-items:center;
gap:8px;
}

.servico i{
margin-left:6px;
color:#6366f1;
}

/* PAGINAÇÃO */

.pagination{
margin-top:20px;
display:flex;
gap:6px;
}

.pagination button{
background:#e5e7eb;
color:#111;
}

.pagination button.active{
background:#2563eb;
color:#fff;
}

</style>
</head>

<body>

<div class="app">

<aside id="sidebar"></aside>

<main class="content">

<h1>Certificações</h1>

<div class="form-box">

<div>
<label>Terapeuta</label>
<select id="cpf_terapeuta"></select>
</div>

<div>
<label>Certificação</label>
<select id="certificacao_id"></select>
</div>

<div>
<label>Data</label>
<input type="date" id="data_obtencao">
</div>

<button onclick="vincular()">Vincular</button>

</div>

<!-- LEGENDA -->
<div style="margin-bottom:10px;font-size:13px;color:#555;">
<strong>Legenda:</strong>
<i class="fa-solid fa-person-dress"></i> Feminina |
<i class="fa-solid fa-user-group"></i> Casais |
<i class="fa-solid fa-droplet"></i> Nuru |
<i class="fa-solid fa-spa"></i> Vivência |
<i class="fa-solid fa-shoe-prints"></i> Podologia
</div>

<div class="topbar">

<div class="busca">

<input id="buscaTerapeuta" placeholder="Buscar terapeuta..." oninput="filtrarTabela()">

</div>

</div>

<table>

<thead>
<tr>
<th>Terapeuta</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</main>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let dados=[]

function iconeCertificacao(nome){

if(!nome) return "fa-certificate"

nome = nome.toLowerCase()

if(nome.includes("massagem feminina")) return "fa-person-dress"
if(nome.includes("massagem casais")) return "fa-user-group"
if(nome.includes("massagem nuru")) return "fa-droplet"
if(nome.includes("massagem vivência")) return "fa-spa"
if(nome.includes("podologia") || nome.includes("podolatria")) return "fa-shoe-prints"

return "fa-certificate"

}

async function carregarSelects(){

const selTer=document.getElementById("cpf_terapeuta")
const selCert=document.getElementById("certificacao_id")

const {data:terapeutas}=await supabaseClient
.from("terapeutas")
.select("cpf,nome_profissional")
.eq("status","Ativo")

selTer.innerHTML="<option value=''>Selecione</option>"

;(terapeutas||[]).forEach(t=>{
selTer.innerHTML+=`<option value="${t.cpf}">${t.nome_profissional}</option>`
})

const {data:cert}=await supabaseClient
.from("certificacoes")
.select("id,nome")

selCert.innerHTML="<option value=''>Selecione</option>"

;(cert||[]).forEach(c=>{
selCert.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
})

}

async function carregarLista(){

const {data}=await supabaseClient
.from("terapeuta_certificacoes")
.select(`
id,
cpf_terapeuta,
certificacoes(nome),
terapeutas(nome_profissional)
`)

dados=data||[]

render()

}

function render(){

const agrupado={}

dados.forEach(r=>{

const nome=r.terapeutas?.nome_profissional||"Sem nome"
const cert=r.certificacoes?.nome||""

if(!agrupado[nome]){
agrupado[nome]={nome,certs:[],ids:[]}
}

agrupado[nome].certs.push(cert)
agrupado[nome].ids.push(r.id)

})

const tbody=document.getElementById("lista")
tbody.innerHTML=""

Object.values(agrupado).forEach(t=>{

let icones=""

t.certs.forEach(c=>{
icones+=`<i class="fa-solid ${iconeCertificacao(c)}" title="${c}"></i>`
})

tbody.innerHTML+=`
<tr>
<td>
<div class="servico">
<strong>${t.nome}</strong>
${icones}
</div>
</td>

<td>
<button class="excluir" onclick="excluir('${t.ids[0]}')">Excluir</button>
</td>
</tr>
`

})

}

function filtrarTabela(){

const termo=document.getElementById("buscaTerapeuta").value.toLowerCase()

const filtrado=dados.filter(d=>
(d.terapeutas?.nome_profissional||"").toLowerCase().includes(termo)
)

dados=filtrado
render()

}

async function vincular(){

const cpf=document.getElementById("cpf_terapeuta").value
const cert=document.getElementById("certificacao_id").value

if(!cpf||!cert){
alert("Selecione terapeuta e certificação")
return
}

await supabaseClient
.from("terapeuta_certificacoes")
.insert({cpf_terapeuta:cpf,certificacao_id:cert})

carregarLista()

}

async function excluir(id){

if(!confirm("Excluir vínculo?"))return

await supabaseClient
.from("terapeuta_certificacoes")
.delete()
.eq("id",id)

carregarLista()

}

carregarSelects()
carregarLista()

</script>

</body>
</html>
