<script>

// ✅ CRIA CLIENTE SEM CONFLITO
const client = window.supabase.createClient(
  "https://rymehgsoarjeecuwyhny.supabase.co",
  "SUA_ANON_KEY_AQUI"
);

let documentos = [];

function abrir(){ modal.style.display = 'block'; }
function fechar(){ modal.style.display = 'none'; }

// SALVAR
async function salvar(){
  const nome = nomeInput.value;
  const tipo = tipoInput.value;
  const file = fileInput.files[0];

  if(!nome || !tipo || !file){
    alert("Preencha tudo");
    return;
  }

  const fileName = Date.now() + "-" + file.name;

  const { error } = await client.storage
    .from("documentos")
    .upload(fileName, file);

  if(error){
    console.log(error);
    alert("Erro no upload");
    return;
  }

  const url = client.storage
    .from("documentos")
    .getPublicUrl(fileName).data.publicUrl;

  await client.from("documentos").insert([
    { nome, tipo, url }
  ]);

  fechar();
  carregar();
}

// CARREGAR
async function carregar(){
  const { data, error } = await client
    .from("documentos")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.log(error);
    alert("Erro ao carregar");
    return;
  }

  documentos = data || [];
  render();
}

// RENDER
function render(){
  lista.innerHTML = "";

  documentos.forEach(d => {
    lista.innerHTML += `
      <div class="doc">
        <div>
          <strong>${d.nome}</strong><br>
          <span class="tag">${d.tipo}</span>
        </div>
        <div>
          <a href="${d.url}" target="_blank">👁️</a>
          <a href="${d.url}" download>⬇️</a>
        </div>
      </div>
    `;
  });
}

// BUSCA
function filtrar(){
  const termo = busca.value.toLowerCase();

  const filtrados = documentos.filter(d =>
    d.nome.toLowerCase().includes(termo) ||
    d.tipo.toLowerCase().includes(termo)
  );

  lista.innerHTML = "";

  filtrados.forEach(d => {
    lista.innerHTML += `
      <div class="doc">
        <strong>${d.nome}</strong>
      </div>
    `;
  });
}

// DOM
const modal = document.getElementById("modal");
const nomeInput = document.getElementById("nome");
const tipoInput = document.getElementById("tipo");
const fileInput = document.getElementById("file");
const lista = document.getElementById("lista");
const busca = document.getElementById("busca");

carregar();

</script>
