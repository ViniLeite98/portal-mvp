<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa | Hara Spa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/sidebar/sidebar.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.app{display:flex}
.content{flex:1;padding:40px}

.form-box{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
align-items:flex-end;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.field{display:flex;flex-direction:column;font-size:13px;}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
min-width:160px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button.editar{background:#f59e0b}
button.excluir{background:#dc2626}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
width:350px;
}

.mat-linha{
display:flex;
gap:5px;
margin-bottom:5px;
}
</style>
</head>

<body>

<div class="app">
<aside id="sidebar"></aside>

<main class="content">

<h1>Fluxo de Caixa</h1>

<div class="form-box">

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<div class="field">
<label>Cliente</label>
<select id="cliente"></select>
</div>

<div class="field">
<label>Serviço</label>
<select id="servico"></select>
</div>

<div class="field">
<label>Origem</label>
<select id="origem">
<option value="">Selecione</option>
<option>Instagram</option>
<option>Google</option>
<option>Indicação</option>
<option>Cliente antigo</option>
<option>WhatsApp</option>
<option>Outro</option>
</select>
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="valor">
</div>

<div class="field">
<label>Desconto</label>
<input type="number" id="desconto" value="0">
</div>

<div class="field">
<label>Final</label>
<input type="number" id="final" disabled>
</div>

<!-- 🔥 MATERIAIS -->
<div class="field" style="min-width:250px;">
<label>Materiais usados</label>

<div id="materiais"></div>

<button type="button" onclick="addMaterial()">+ Material</button>
</div>

<button onclick="salvar()">Adicionar</button>

</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor Final</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/sidebar/sidebar.js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rymehgsoarjeecuwyhny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bWVoZ3NvYXJqZWVjdXd5aG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTc0ODUsImV4cCI6MjA4NjIzMzQ4NX0.K9BUapByrh6TsSi5jEkL8HGLDmMT_tGSSykl7LGxIec"
)

let produtos=[]

function hoje(){
const d=new Date()
const offset=d.getTimezoneOffset()
return new Date(d.getTime()-offset*60000).toISOString().split("T")[0]
}

data.value=hoje()

valor.oninput=calcular
desconto.oninput=calcular

function calcular(){
final.value=(parseFloat(valor.value||0)-parseFloat(desconto.value||0))
}

async function carregar(){

// clientes
const {data:clientes}=await supabaseClient.from("clientes").select("*")
cliente.innerHTML=""
clientes.forEach(c=>{
cliente.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
})

// serviços
const {data:servicos}=await supabaseClient.from("servicos").select("*")
servico.innerHTML=""
servicos.forEach(s=>{
servico.innerHTML+=`<option value="${s.id}">${s.grupo}</option>`
})

// produtos
const {data:p}=await supabaseClient.from("produtos").select("*")
produtos=p

servico.addEventListener("change", async ()=>{
const {data:s}=await supabaseClient.from("servicos").select("*").eq("id",servico.value).single()
if(s){
valor.value=s.valor || 0
calcular()
}
})

carregarLista()
}

function addMaterial(){

const div=document.createElement("div")
div.className="mat-linha"

div.innerHTML=`
<select class="mat-prod"></select>
<input type="number" class="mat-qtd" placeholder="Qtd">
`

const select=div.querySelector(".mat-prod")

produtos.forEach(p=>{
select.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
})

document.getElementById("materiais").appendChild(div)
}

async function salvar(){

// fluxo
const {data:novo} = await supabaseClient
.from("fluxo_caixa")
.insert({
data:data.value,
cliente_id:cliente.value,
servico_id:servico.value,
valor:parseFloat(valor.value||0),
desconto:parseFloat(desconto.value||0),
valor_final:parseFloat(final.value||0),
origem_lead: origem.value || null
})
.select()
.single()

const fluxoId = novo.id

// materiais
const linhas=document.querySelectorAll("#materiais .mat-linha")

for(const l of linhas){

const produto = l.querySelector(".mat-prod").value
const qtd = parseFloat(l.querySelector(".mat-qtd").value)

if(!qtd) continue

await supabaseClient.from("fluxo_materiais").insert({
fluxo_id: fluxoId,
produto_id: produto,
quantidade: qtd
})

await supabaseClient.from("movimentacoes_estoque").insert({
produto_id: produto,
tipo: "saida",
quantidade: qtd
})

}

document.getElementById("materiais").innerHTML=""

carregarLista()
}

async function carregarLista(){

const {data}=await supabaseClient
.from("fluxo_caixa")
.select(`*,clientes(*),servicos(*)`)
.order("data",{ascending:false})

const tbody=document.getElementById("lista")
tbody.innerHTML=""

data.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.data}</td>
<td>${r.clientes?.nome}</td>
<td>${r.servicos?.grupo}</td>
<td>R$ ${r.valor_final}</td>
<td>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
</tr>
`
})
}

async function excluir(id){
if(!confirm("Excluir?")) return
await supabaseClient.from("fluxo_caixa").delete().eq("id",id)
carregarLista()
}

carregar()

</script>

</body>
</html>
